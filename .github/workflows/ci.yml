name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dev deps (Playwright for headless self-tests)
        run: npm ci

      - name: Install Chromium for Playwright
        run: npx playwright install chromium --with-deps

      - name: Basic file + core logic presence check
        run: |
          node --input-type=module -e '
            import fs from "fs";
            const html = fs.readFileSync("index.html", "utf8");
            if (html.length < 100000) throw new Error("index.html unexpectedly small");
            if (!html.includes("// inbox.list v2")) throw new Error("missing .list v2 marker");
            if (!html.includes("function mergeRemoteIntoLocal")) throw new Error("missing merge fn");
            if (!html.includes("function parseListFile")) throw new Error("missing parser");
            if (!html.includes("function ts(") || !html.includes("computeItemActivity")) throw new Error("missing sync helpers");
            if (!html.includes("runInboxSelfTests")) throw new Error("missing test runner");
            if (!html.includes("normalizeListsInPlace") || !html.includes("assertGhostsAtEnd")) throw new Error("missing step 4/5 harden");
            if (!html.includes("shouldAbortFlushAfterAwait")) throw new Error("missing R1 flush guards");
            if (!html.includes("shouldAllowWakeDriveSync") || !html.includes("shouldContinuePollAfterAwait")) throw new Error("missing R5 lifecycle guards");
            if (!html.includes("__inboxDriveTest") || !html.includes("installDriveFetchMock")) throw new Error("missing A10 Drive race harness hooks");
            if (!fs.existsSync("scripts/run-selftests.mjs")) throw new Error("missing headless self-test runner");
            if (!fs.existsSync("self-tests.js")) throw new Error("missing self-tests.js");
            console.log("\u2713 Basic structure, core sync, R1/R5/A10 hooks present");
          '

      - name: Full self-tests in headless Chromium (R9 — authoritative)
        run: npm test

      - name: Non-extraction verification (grep for hardenings + plan)
        run: |
          grep -q "normalizeListsInPlace" index.html self-tests.js || (echo "missing normalize"; exit 1)
          grep -q "assertGhostsAtEnd" index.html || (echo "missing asserts"; exit 1)
          grep -q "shouldAbortFlushAfterAwait" index.html self-tests.js || (echo "missing R1 flush guards"; exit 1)
          grep -q "shouldAllowWakeDriveSync" index.html self-tests.js || (echo "missing R5 wake guards"; exit 1)
          grep -q "LifecycleGuard" self-tests.js || (echo "missing LifecycleGuard suite"; exit 1)
          grep -q "DriveRace\|runDriveRaceSelfTest" self-tests.js || (echo "missing DriveRace suite"; exit 1)
          grep -q "CrossFile\|runCrossFileSelfTest" self-tests.js || (echo "missing CrossFile suite"; exit 1)
          grep -q "__inboxDriveTest" index.html || (echo "missing A10 harness"; exit 1)
          grep -q "restoreCrossFileMovedItem\|findTargetListIndexByName" index.html || (echo "missing A11 cross-file helpers"; exit 1)
          grep -q "Bulletproof Loop" README.md self-tests.js index.html || (echo "missing loop refs"; exit 1)
          grep -q "LOOP-STATUS.md" README.md || (echo "missing LOOP-STATUS pointer"; exit 1)
          echo "\u2713 Grep hardenings, R1 guards, and Bulletproof Loop refs passed"

      - name: Optional Node pure-extract smoke (non-blocking)
        continue-on-error: true
        run: |
          node --input-type=module -e '
            import fs from "fs";
            import vm from "vm";
            const html = fs.readFileSync("index.html", "utf8");
            const scriptMatch = html.match(/<script>\s*\(function\(\)\s*\{([\s\S]*?)\}\)\(\);?\s*<\/script>/);
            if (!scriptMatch) { console.log("Could not extract script (optional smoke)"); process.exit(0); }
            let code = scriptMatch[1];
            code = code.replace(/const DEBUG\s*=\s*[^;]+;/, "var DEBUG = false;");
            code = code.replace(/^\s*init\(\);\s*$/m, "/* init skipped */");
            const host = `
              var localStorage={getItem:()=>null,setItem:()=>{},removeItem:()=>{}};
              function el(){return{style:{},classList:{add(){},remove(){},toggle(){},contains(){return false}},textContent:"",value:"",innerHTML:"",addEventListener(){},removeEventListener(){},focus(){},select(){},appendChild(){},append(){},setAttribute(){},getAttribute(){return null},querySelector(){return null},querySelectorAll(){return[]},closest(){return null},dataset:{}};}
              var document={getElementById:()=>el(),body:{classList:{contains(){return false},add(){},remove(){},toggle(){}},appendChild(){},style:{}},documentElement:{style:{setProperty(){}},classList:{add(){},remove(){}}},addEventListener(){},visibilityState:"visible",createElement:()=>el(),querySelectorAll:()=>[],querySelector:()=>el()};
              var location={protocol:"file:",hostname:"localhost",search:"",href:"file://test",reload(){}};
              var window={addEventListener(){},location,matchMedia:()=>({matches:false,addEventListener(){},addListener(){}}),getComputedStyle:()=>({})};
              var navigator={onLine:true,userAgent:"node"};
              var performance={now:()=>Date.now()};
              var google; var fetch=async()=>({ok:true,json:async()=>({}),text:async()=>""});
              var ResizeObserver=function(){this.observe=()=>{}};
              var requestAnimationFrame=()=>0; var cancelAnimationFrame=()=>{};
            `;
            const ctx = vm.createContext({
              console, Number, Math, Date, Set, Map, Array, Object, JSON, String, Boolean,
              encodeURIComponent, decodeURIComponent, RegExp, Error, parseInt, parseFloat, isNaN, Infinity, NaN,
              setTimeout:()=>0, clearTimeout:()=>{}, URL, Promise, Symbol, WeakMap,
            });
            ctx.globalThis = ctx;
            vm.runInContext(host + code + "\nglobalThis.__merge=mergeRemoteIntoLocal;globalThis.__abort=shouldAbortFlushAfterAwait;", ctx, { timeout: 10000 });
            const m = ctx.__merge([{name:"T",items:[{text:"hi",timestamp:1,checked:false}]}], [{name:"T",items:[{text:"hi",timestamp:1,checked:false}]}]);
            if (!m || m[0].name !== "T") throw new Error("merge smoke failed");
            const a = ctx.__abort({driveConnected:true,driveFileSwitching:false,online:true,activeFileId:"B",intendedFileId:"A",driveOpSeq:1,flushOpSeq:1});
            if (!a.abort) throw new Error("R1 smoke: file mismatch must abort");
            console.log("\u2713 Optional Node pure smoke (merge + R1 abort) passed");
          '
