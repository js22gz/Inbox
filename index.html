      if (!list || !ts) return -1;
      return list.items.findIndex(it => String(it.timestamp) === String(ts));
    }

    function updateSectionCounts() {
      const list = state.lists[state.currentIndex];
      if (!list) return;
      const counts = countItemsBySection(list);
      const container = getItemsContainer();
      if (!container) return;
      container.querySelectorAll('[data-section="recurrent"], [data-section="finished"]').forEach(section => {
        const name = section.dataset.section;
        const label = name === 'recurrent' ? 'Recurrent' : 'Finished';
        const toggle = section.querySelector('.finished-toggle');
        if (toggle) {
          const labelSpan = toggle.querySelector('.finished-label');
          if (labelSpan) labelSpan.textContent = ` ${label} (${counts[name]})`;
        }
        if (counts[name] === 0) section.remove();
      });
    }

    function ensureActiveUl() {
      const container = getItemsContainer();
      const empty = container.querySelector('.empty-state');
      if (empty) empty.remove();
      let ul = container.querySelector('ul[data-section="active"]');
      if (!ul) {
        ul = document.createElement('ul');
        ul.dataset.section = 'active';
        const firstSection = container.querySelector('[data-section]');
        if (firstSection) container.insertBefore(ul, firstSection);
        else container.appendChild(ul);
      }
      return ul;
    }

    function buildCollapsibleSection(name, label, count) {
      const isOpen = name === 'recurrent' ? recurrentOpen : finishedOpen;
      const section = document.createElement('div');
      section.className = 'finished-section';
      section.dataset.section = name;

      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'finished-toggle';

      const arrow = document.createElement('span');
      arrow.className = `finished-toggle-arrow${isOpen ? ' open' : ''}`;
      arrow.textContent = '▶';

      const labelSpan = document.createElement('span');
      labelSpan.className = 'finished-label';
      labelSpan.textContent = ` ${label} (${count})`;

      toggle.appendChild(arrow);
      toggle.appendChild(labelSpan);

      if (name === 'finished') {
        const clearBtn = document.createElement('button');
        clearBtn.type = 'button';
        clearBtn.className = 'finished-clear';
        clearBtn.textContent = 'clear all';
        clearBtn.setAttribute('aria-label', 'Clear all finished items');
        clearBtn.onclick = (e) => {
          e.stopPropagation();
          clearAllFinished();
        };
        toggle.appendChild(clearBtn);
      }

      const itemsDiv = document.createElement('div');
      itemsDiv.className = `finished-items${isOpen ? ' open' : ''}`;
      const ul = document.createElement('ul');
      itemsDiv.appendChild(ul);

      toggle.onclick = () => {
        const next = !itemsDiv.classList.contains('open');
        if (name === 'recurrent') recurrentOpen = next;
        else finishedOpen = next;
        arrow.classList.toggle('open', next);
        itemsDiv.classList.toggle('open', next);
      };

      section.append(toggle, itemsDiv);
      return section;
    }

    function ensureCollapsibleSection(name, label) {
      const container = getItemsContainer();
      let section = container.querySelector(`[data-section="${name}"]`);
      if (!section) {
        const counts = countItemsBySection(state.lists[state.currentIndex]);
        section = buildCollapsibleSection(name, label, counts[name]);
        container.appendChild(section);
      }
      return section.querySelector('.finished-items ul');
    }

    function insertIntoFinishedList(ul, li, item) {
      const bucket = getCheckedDateBucket(item.checkedAt);
      const bucketLabel = BUCKET_LABELS[bucket];
      let header = [...ul.querySelectorAll('.finished-group-header')].find(h => h.textContent === bucketLabel);
      if (!header) {
        header = document.createElement('li');
        header.className = 'finished-group-header';
        header.setAttribute('aria-hidden', 'true');
        header.textContent = bucketLabel;
        const bucketIdx = BUCKET_ORDER.indexOf(bucket);
        let insertBefore = null;
        for (const h of ul.querySelectorAll('.finished-group-header')) {
          const key = Object.entries(BUCKET_LABELS).find(([, v]) => v === h.textContent)?.[0];
          if (key && BUCKET_ORDER.indexOf(key) > bucketIdx) {
            insertBefore = h;
            break;
          }
        }
        ul.insertBefore(header, insertBefore);
      }
      let node = header;
      while (node.nextElementSibling && !node.nextElementSibling.classList.contains('finished-group-header')) {
        node = node.nextElementSibling;
      }
      node.after(li);
    }

    function mountItemInSection(item, itemIndex) {
      const section = classifyItemSection(item);
      const li = createItemElement(item, itemIndex);
      if (section === 'active') {
        ensureActiveUl().appendChild(li);
        reorderActiveListDom();
        return li;
      }
      if (section === 'recurrent') {
        const ul = ensureCollapsibleSection('recurrent', 'Recurrent');
        li.classList.add('finished-item');
        ul.appendChild(li);
        return li;
      }
      const ul = ensureCollapsibleSection('finished', 'Finished');
      li.classList.add('finished-item');
      insertIntoFinishedList(ul, li, item);
      return li;
    }

    function reorderActiveListDom() {
      const list = state.lists[state.currentIndex];
      const ul = getItemsContainer()?.querySelector('ul[data-section="active"]');
      if (!list || !ul) return false;
      list.items.forEach(item => {
        if (isDeleted(item) || classifyItemSection(item) !== 'active') return;
        const li = findItemElementByTs(item.timestamp);
        if (li) ul.appendChild(li);
      });
      reindexItemElements();
      return true;
    }

    function patchAddItem(itemIndex) {
      const container = getItemsContainer();
      if (!container || container.querySelector('.empty-state')) return false;
      const item = state.lists[state.currentIndex]?.items[itemIndex];
      if (!item || isDeleted(item) || classifyItemSection(item) !== 'active') return false;
      ensureActiveUl().prepend(createItemElement(item, itemIndex));
      return true;
    }

    function patchDeleteItem(patch) {
      const list = state.lists[state.currentIndex];
      if (!list || isDeleted(list)) return false;
      const itemIndex = patch && typeof patch === 'object' ? patch.itemIndex : patch;
      const itemTs = patch && typeof patch === 'object' ? patch.itemTs : null;
      let li = findItemElement(itemIndex);
      if (!li && itemTs != null) {
        li = findItemElementByTs(itemTs);
      }
      if (!li) return false;
      li.remove();
      reindexItemElements();
      updateSectionCounts();
      // Use alive count (ghosts at end after soft del; relaxed for empty check + patch fallback)
      if (filterAliveItems(list.items).length === 0) return false;
      const counts = countItemsBySection(list);
      if (counts.active === 0) {
        const activeUl = getItemsContainer()?.querySelector('ul[data-section="active"]');
        if (activeUl && activeUl.children.length === 0) activeUl.remove();
      }
      return true;
    }

    function patchEditItem(itemIndex) {
      const item = state.lists[state.currentIndex]?.items[itemIndex];
      if (!item || isDeleted(item)) return false;
      let li = findItemElement(itemIndex);
      if (!li && item.timestamp != null) li = findItemElementByTs(item.timestamp);
      if (!li || li.querySelector('.item-edit-input')) return false;
      clearRecurrenceMetaCache();
      const newLi = createItemElement(item, itemIndex);
      if (li.classList.contains('finished-item')) newLi.classList.add('finished-item');
      li.replaceWith(newLi);
      return true;
    }

    function patchMoveItem(indexA, indexB) {
      const list = state.lists[state.currentIndex];
      if (!list) return false;
      const itemA = list.items[indexA];
      const itemB = list.items[indexB];
      if (!itemA || !itemB || isDeleted(itemA) || isDeleted(itemB)) return false;
      if (classifyItemSection(itemA) !== 'active' || classifyItemSection(itemB) !== 'active') return false;
      return reorderActiveListDom();
    }

    function patchToggleItem(itemIndex) {
      const list = state.lists[state.currentIndex];
      const item = list?.items[itemIndex];
      if (!item || isDeleted(item)) return false;
      let li = findItemElement(itemIndex);
      if (!li && item.timestamp != null) li = findItemElementByTs(item.timestamp);
      if (li) li.remove();
      mountItemInSection(item, itemIndex);
      updateSectionCounts();
      const counts = countItemsBySection(list);
      if (counts.active === 0) {
        const activeUl = getItemsContainer()?.querySelector('ul[data-section="active"]');
        if (activeUl && activeUl.children.length === 0) activeUl.remove();
      }
      return true;
    }

    function applyItemsPatch(patch) {
      if (patch.listIndex !== state.currentIndex) return false;
      switch (patch.op) {
        case 'add': return patchAddItem(patch.itemIndex);
        case 'delete': return patchDeleteItem(patch);
        case 'edit': return patchEditItem(patch.itemIndex);
        case 'move': return patchMoveItem(patch.fromIndex, patch.toIndex);
        case 'toggle': return patchToggleItem(patch.itemIndex);
        default: return false;
      }
    }

    function getCheckedDateBucket(checkedAt) {
      if (!checkedAt) return 'older';
      const todayStart = recStartOfDay(new Date());
      if (checkedAt >= todayStart) return 'today';
      if (checkedAt >= todayStart - 864e5) return 'yesterday';
      if (checkedAt >= todayStart - 7 * 864e5) return 'last week';
      return 'older';
    }

    function renderItems() {
      clearRecurrenceMetaCache();
      const container = document.getElementById('items-container');
      container.innerHTML = '';
      const list = state.lists[state.currentIndex];
      const aliveCount = list ? filterAliveItems(list.items).length : 0;
      if (!list || isDeleted(list) || aliveCount === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = list && !isDeleted(list) ? 'No items in this list.' : 'No lists yet.';
        container.appendChild(empty);
        return;
      }

      const active = [], recurrent = [], finished = [];
      list.items.forEach((item, idx) => {
        if (isDeleted(item)) return;
        const { rule } = getItemMeta(item.text);
        if (!item.checked) {
          active.push({ item, idx });
          return;
        }
        if (rule) recurrent.push({ item, idx });
        else finished.push({ item, idx });
      });

      if (active.length > 0) {
        const ul = document.createElement('ul');
        ul.dataset.section = 'active';
        active.forEach(({ item, idx }) => ul.appendChild(createItemElement(item, idx)));
        container.appendChild(ul);
      } else if (recurrent.length === 0 && finished.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No items in this list.';
        container.appendChild(empty);
      }

      function appendCollapsibleSection(title, count, getOpen, setOpen, buildList) {
        const section = document.createElement('div');
        section.className = 'finished-section';
        section.dataset.section = title.toLowerCase();

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'finished-toggle';

        const arrow = document.createElement('span');
        arrow.className = `finished-toggle-arrow${getOpen() ? ' open' : ''}`;
        arrow.textContent = '▶';

        const labelSpan = document.createElement('span');
        labelSpan.className = 'finished-label';
        labelSpan.textContent = ` ${title} (${count})`;

        toggle.appendChild(arrow);
        toggle.appendChild(labelSpan);

        if (title === 'Finished') {
          const clearBtn = document.createElement('button');
          clearBtn.type = 'button';
          clearBtn.className = 'finished-clear';
          clearBtn.textContent = 'clear all';
          clearBtn.setAttribute('aria-label', 'Clear all finished items');
          clearBtn.onclick = (e) => {
            e.stopPropagation();
            clearAllFinished();
          };
          toggle.appendChild(clearBtn);
        }

        const itemsDiv = document.createElement('div');
        itemsDiv.className = `finished-items${getOpen() ? ' open' : ''}`;
        itemsDiv.appendChild(buildList());

        toggle.onclick = () => {
          const next = !getOpen();
          setOpen(next);
          arrow.classList.toggle('open', next);
          itemsDiv.classList.toggle('open', next);
        };

        section.appendChild(toggle);
        section.appendChild(itemsDiv);
        container.appendChild(section);
      }

      if (recurrent.length > 0) {
        appendCollapsibleSection('Recurrent', recurrent.length, () => recurrentOpen, (v) => { recurrentOpen = v; }, () => {
          const ul = document.createElement('ul');
          recurrent.forEach(({ item, idx }) => {
            const li = createItemElement(item, idx);
            li.classList.add('finished-item');
            ul.appendChild(li);
          });
          return ul;
        });
      }

      if (finished.length > 0) {
        appendCollapsibleSection('Finished', finished.length, () => finishedOpen, (v) => { finishedOpen = v; }, () => {
          const buckets = { today: [], yesterday: [], 'last week': [], older: [] };
          finished.forEach(({ item, idx }) => buckets[getCheckedDateBucket(item.checkedAt)].push({ item, idx }));

          const ul = document.createElement('ul');
          BUCKET_ORDER.forEach(key => {
            if (buckets[key].length === 0) return;
            const header = document.createElement('li');
            header.className = 'finished-group-header';
            header.setAttribute('aria-hidden', 'true');
            header.textContent = BUCKET_LABELS[key];
            ul.appendChild(header);
            buckets[key].forEach(({ item, idx }) => {
              const li = createItemElement(item, idx);
              li.classList.add('finished-item');
              ul.appendChild(li);
            });
          });
          return ul;
        });
      }
    }

    function toggleItem(listIndex, itemIndex) {
      const list = state.lists[listIndex];
      const item = list && list.items[itemIndex];
      if (!item || isDeleted(item)) return;
      const { rule } = getItemMeta(item.text);
      let patch = null;
      if (rule && !item.checked) {
        // Completing (checking) a recurrent item: use special complete logic (may move to home list)
        const movedHome = completeRecurrentItem(listIndex, itemIndex, item, rule);
        // Do not set patch: force full renderItems() after syncRecurrenceState() to ensure
        // clean section move + fresh elements (avoids any potential stale index/DOM issues
        // after recurrence activation or cross-list home moves).
      } else {
        item.checked = !item.checked;
        const now = Date.now();
        item.toggledAt = now;
        if (item.checked) item.checkedAt = now;
        else delete item.checkedAt;
        patch = { op: 'toggle', listIndex, itemIndex };
      }
      if (rule) patch = null; // force full renderItems() after sync for recurrent toggles (ensures clean active/recurrent/finished section transitions)
      saveAndRender(patch);
    }
    function deleteItem(listIndex, itemIndex) {
      const list = state.lists[listIndex];
      if (!list) return;
      const items = list.items;
      const item = items[itemIndex];
      if (!item || isDeleted(item)) return;
      const ts = item.timestamp;
      item.deletedAt = Date.now();
      // Soft delete: keep ghost for tombstone propagation; move to end of array so alive items stay in contiguous low indices (minimizes skew for patches/reindexes of survivors).
      const ghost = items.splice(itemIndex, 1)[0];
      items.push(ghost);
      if (DEBUG) normalizeListsInPlace([list]); // or ghostsToEndInPlace(list)
      saveAndRender({ op: 'delete', listIndex, itemIndex, itemTs: ts });
    }

    function clearAllFinished() {
      const list = state.lists[state.currentIndex];
      if (!list || isDeleted(list)) return;
      const indices = [];
      list.items.forEach((item, idx) => {
        if (!isDeleted(item) && item.checked) {
          const { rule } = getItemMeta(item.text);
          if (!rule) indices.push(idx);
        }
      });
      let changed = false;
      for (let i = indices.length - 1; i >= 0; i--) {
        const idx = indices[i];
        const item = list.items[idx];
        if (item && !isDeleted(item)) {
          item.deletedAt = Date.now();
          const ghost = list.items.splice(idx, 1)[0];
          list.items.push(ghost);
          changed = true;
        }
      }
      if (changed) {
        saveAndRender();
      }
    }

    function addItem() {
      const input = document.getElementById('add-input');
      if (!input.value.trim()) return;
      const curList = state.lists[state.currentIndex];
      if (!curList || isDeleted(curList)) return;
      // timestamp is stored for export/import round-tripping; not displayed in the UI
      // PR-5: set updatedAt = birth ts on add (and createNewList oupd) for last paths; absent means alive (pre-PR5 data).
      const now = Date.now();
      const item = { text: input.value.trim(), timestamp: now, checked: false, updatedAt: now };
      applyDueFromText(item);

      // Run any auto-activation/promotion for recurrents and dues *before* inserting the new item.
      // This ensures that items the user just added stay at the very top (user action wins top spot).
      // Previously: unshift new, then saveAndRender's sync could promote others which unshifted and displaced it.
      const autoRec = syncRecurrenceState();
      const autoDue = syncDueState();

      // Insert new at top, and *claim* the order by bumping list orderUpdatedAt.
      // Critical for mergeRemoteIntoLocal: without this, a subsequent flush pull+merge that uses remote
      // order (lower/equal oupd) would append the "local unique" new item at the end of orderedAlive.
      curList.items.unshift(item);
      curList.orderUpdatedAt = now;

      input.value = '';
      // Skip re-running sync inside saveAndRender; we already did, and want the new item to remain #1.
      saveAndRender({ op: 'add', listIndex: state.currentIndex, itemIndex: 0, itemTs: item.timestamp }, { runSync: false });

      // If pre-sync activated items (moved sections or promoted), the surgical patchAdd may have only
      // prepended the new without moving the newly-activated ones in DOM. Force a clean rebuild.
      if (autoRec || autoDue) {
        renderItems();
      }

      // Delay lets the mobile keyboard reflow before re-focusing the input
      setTimeout(() => input.focus(), INPUT_REFOCUS_DELAY_MS);
    }
    function showListModal() {
      document.getElementById('list-textarea').value = generateListFile();
      openModalDialog('list-modal', (modal, close) => {
        const closeBtn = document.getElementById('modal-close-btn');
        const copyBtn = document.getElementById('modal-copy-btn');
        const doneBtn = document.getElementById('done-btn');
        const trap = createFocusTrap(modal, 'button, textarea');
        function onBackdrop(e) { if (e.target === modal) close(); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(); } }
        closeBtn.addEventListener('click', close);
        copyBtn.addEventListener('click', copyListContent);
        doneBtn.addEventListener('click', close);
        modal.addEventListener('click', onBackdrop);
        modal.addEventListener('keydown', onKey);
        modal.addEventListener('keydown', trap);
        closeBtn.focus();
        return () => {
          closeBtn.removeEventListener('click', close);
          copyBtn.removeEventListener('click', copyListContent);
          doneBtn.removeEventListener('click', close);
          modal.removeEventListener('click', onBackdrop);
          modal.removeEventListener('keydown', onKey);
          modal.removeEventListener('keydown', trap);
          document.getElementById('settings-btn').focus();
        };
      });
    }
    function generateListFile(lists) {
      // Format: each list starts with a '# Name' header; items are '- [x]/[ ] text |ts:<epoch_ms>|tg:<epoch_ms>|cts:<epoch_ms>'.
      // |tg: (toggledAt) is used for reliable cross-device check/uncheck merge (newer wins).
      // The '|ts:' suffix replaced the legacy ' @<epoch_ms>' suffix to prevent false positives
      // when item text itself ends with ' @<digits>'. parseListFile accepts both formats + |tg: / |cts:.
      // PR-1: supports |upd: and |del: (post-ts), // deleted ts/del for ghosts, // listmeta for list ts/oupd, // deleted-list.
      // |ts: is emitted first for alive items, followed by optional |upd/|due/|cts/|tg suffixes (ts becomes the 'final' birth marker after multi-strip in parse).
      // Consistent with prior |tg handling. // tombstones after # ignored by old parsers.
      // New writes start with // inbox.list v2 (compat).
      const src = lists || state.lists;
      const body = src.map(list => {
        if (list.deletedAt) {
          // Emit |lts only if present (timestamp); omit when absent so parse regex matches |del directly.
          // This fixes roundtrip for deleted lists created without lts (absent=alive for list birth ts).
          const ltsPart = list.timestamp ? `|lts:${list.timestamp}` : '';
          // Use encodeURIComponent on name to safely support | : etc in list names for tombstones (parse decodes).
          // This avoids breaking on names containing the | delimiter used for lts/del.
          // Note (PR-1): deleted lists should have items:[] (ghosts for contained items are separate); non-empty dropped on emit for simplicity (current deletes splice whole list).
          if (DEBUG && (list.items || []).length > 0) console.warn('[Inbox] deleted list with items on generate (will drop items for tombstone)');
          return `// deleted-list name:${encodeURIComponent(list.name)}${ltsPart}|del:${list.deletedAt}`;
        }
        const header = `# ${list.name}`;
        const metaLine = (list.timestamp || list.orderUpdatedAt)
          ? `// listmeta lts:${list.timestamp || ''} lupd:${list.orderUpdatedAt || ''}`
          : '';
        const lines = [];
        (list.items || []).forEach(item => {
          if (item.deletedAt) {
            lines.push(`// deleted ts:${item.timestamp} del:${item.deletedAt}`);
            return;
          }
          const upd = item.updatedAt ? `|upd:${item.updatedAt}` : '';
          const due = item.dueAt ? `|due:${item.dueAt}` : '';
          const cts = item.checkedAt ? `|cts:${item.checkedAt}` : '';
          const tg = item.toggledAt ? `|tg:${item.toggledAt}` : '';
          lines.push(`- ${item.checked ? '[x]' : '[ ]'} ${item.text} |ts:${item.timestamp}${upd}${due}${cts}${tg}`);
        });
        let out = header;
        if (metaLine) out += '\n' + metaLine;
        if (lines.length) out += '\n' + lines.join('\n');
        return out;
      }).join('\n\n').trim();
      return body ? ('// inbox.list v2\n\n' + body) : '// inbox.list v2';
    }
    function parseListFile(text) {
      const result = [];
      let current = null;
      for (const raw of text.split('\n')) {
        const line = raw.trimEnd();
        if (line.startsWith('# ')) {
          if (current) result.push(current);
          // Clean name even if // comments were appended to # line in mixed files (compat)
          const name = line.slice(2).trim().replace(/\s*\/\/.*$/, '').trim();
          current = { name, items: [] };
        } else if (line.startsWith('// deleted-list')) {
          if (current) { result.push(current); current = null; }
          // Decode name (was encodeURIComponent in generate) to support names with |, :, etc.
          const m = line.match(/^\/\/ deleted-list name:([^|]+)(?:\|lts:(\d+)?)?\|del:(\d+)$/);
          if (m) {
            let name = m[1].trim();
            try { name = decodeURIComponent(name); } catch { /* fallback to raw if malformed */ }
            const lts = ts(m[2]);
            const del = ts(m[3]);
            if (del) {
              const ghostL = { name, items: [], deletedAt: del };
              if (lts) ghostL.timestamp = lts;
              result.push(ghostL);
            }
          }
        } else if (/^\/\/ listmeta/.test(line)) {
          if (current) {
            // listmeta may appear anywhere after the # for the list (not only immediately after header); DESIGN allows under current.
            const ltsM = line.match(/lts:(\d+)/);
            const lupdM = line.match(/lupd:(\d+)/);
            if (ltsM) { const v = ts(ltsM[1]); if (v) current.timestamp = v; }
            if (lupdM) { const v = ts(lupdM[1]); if (v) current.orderUpdatedAt = v; }
          }
        } else if (current && /^\/\/ deleted ts:(\d+) del:(\d+)$/.test(line)) {
          const m = line.match(/^\/\/ deleted ts:(\d+) del:(\d+)$/);
          if (m) {
            const t = ts(m[1]), d = ts(m[2]);
            if (t && d) {
              current.items.push({ text: '', timestamp: t, checked: false, deletedAt: d });
            }
          }
        } else if (current && line.startsWith('- ')) {
          const checked = line.startsWith('- [x] ');
          const hasStatePrefix = checked || line.startsWith('- [ ] ');
          const prefixLen = hasStatePrefix ? 6 : 2;
          const rest = line.slice(prefixLen);
          // Parse optional |tg: / |cts: / |due: / |upd: / |del: suffixes (order independent via loop).
          // Strip from end repeatedly; then |ts: or legacy @. Post-clean for any residual |meta in text (compat).
          let workingRest = rest;
          let checkedAt, dueAt, toggledAt, updatedAt, deletedAt;
          const stripMeta = (key) => {
            const m = workingRest.match(new RegExp(`\\|${key}:(\\d+)$`));
            if (m) {
              const v = Number(m[1]);
              if (Number.isFinite(v) && v > 0) {
                if (key === 'tg') toggledAt = v;
                else if (key === 'cts') checkedAt = v;
                else if (key === 'due') dueAt = v;
                else if (key === 'upd') updatedAt = v;
                else if (key === 'del') deletedAt = v;
              }
              workingRest = workingRest.slice(0, workingRest.length - m[0].length);
              return true;
            }
            return false;
          };
          let didStrip;
          do {
            didStrip = stripMeta('tg') || stripMeta('cts') || stripMeta('due') || stripMeta('upd') || stripMeta('del');
          } while (didStrip);
          // Regex matches the timestamp (after multi-strip of trailing |meta) strictly at end.
          // |ts: is the birth marker (emitted before appended |upd etc); parse strips trailing metas first so |ts (or @) anchors at $.
          // Prevents false positives mid-text. Supports legacy @ too.
          const tsMatch = workingRest.match(/ (?:\|ts:|@)(\d+)$/);
          let itemText = workingRest, timestamp = Date.now();
          if (tsMatch) {
            const ts = Number(tsMatch[1]);
            if (ts > 0) { timestamp = ts; itemText = workingRest.slice(0, workingRest.length - tsMatch[0].length); }
          }
          // Post-clean: only trailing (end-of-string) meta residues from mixed-version/old parse pollution.
          // Restricted to |upd|del (PR-1 added fields) to avoid mangling legitimate end-of-text metas like " |due:NN" or " |tg:..." 
          // when the item has no metadata fields (no |xxx appended *after* |ts in generate). 
          // New emits place metas after |ts so text content ending in such patterns is preserved when fields present.
          // Limitation noted for old/mixed .list files or text intentionally ending in meta-like patterns without appended fields.
          // Do NOT use global replace.
          itemText = itemText.replace(/\s*\|(?:upd|del):\d+\s*$/, '').trim();
          const newItem = { text: itemText, timestamp, checked };
          if (Number.isFinite(checkedAt)) newItem.checkedAt = checkedAt;
          if (Number.isFinite(toggledAt)) newItem.toggledAt = toggledAt;
          if (Number.isFinite(dueAt)) newItem.dueAt = dueAt;
          if (Number.isFinite(updatedAt)) newItem.updatedAt = updatedAt;
          if (Number.isFinite(deletedAt)) newItem.deletedAt = deletedAt;
          else applyDueFromText(newItem);
          current.items.push(newItem);
        }
      }
      if (current) result.push(current);
      return result.length > 0 ? result : null;
    }
    function copyListContent() {
      const ta = document.getElementById('list-textarea');
      navigator.clipboard.writeText(ta.value).then(() => showAlert('Copied!')).catch(() => showAlert('Copy failed. Please select the text and copy manually.'));
    }

    function editItem(listIndex, itemIndex) {
      const list = state.lists[listIndex];
      const item = list && list.items[itemIndex];
      if (!item || isDeleted(item)) return;
      const itemTs = item.timestamp;
      // Use ts-based lookup so edit works even if array indices shifted since button was created
      const li = document.querySelector(`#items-container .item[data-item-ts="${itemTs}"]`) ||
                 document.querySelector(`#items-container .item[data-item-index="${itemIndex}"]`);
      if (!li) return;
      const textSpan = li.querySelector('.item-text');
      if (!textSpan) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'item-edit-input';
      input.value = item.text;

      let saved = false;
      function saveEdit() {
        if (saved) return;
        saved = true;
        const curIdx = getItemIndexByTimestamp(itemTs);
        const targetIdx = curIdx >= 0 ? curIdx : itemIndex;
        const newText = input.value.trim();
        const targetItem = state.lists[listIndex] && state.lists[listIndex].items[targetIdx];
        if (newText && targetItem && newText !== targetItem.text) {
          targetItem.text = newText;
          targetItem.updatedAt = Date.now();
          applyDueFromText(targetItem);
          saveAndRender({ op: 'edit', listIndex, itemIndex: targetIdx });
        } else {
          renderItems();
        }
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        if (e.key === 'Escape') { saved = true; renderItems(); }
      });
      input.addEventListener('blur', saveEdit);

      li.replaceChild(input, textSpan);
      input.focus();
      input.select();
    }

    function applyDark(isDark, persist = true) {
      document.body.classList.toggle('dark', isDark);
      if (persist) localStorage.setItem('darkMode', isDark ? 'true' : 'false');
    }

    function init() {
      loadData();
      loadDriveFilesState();
      if (localStorage.getItem('driveWasConnected')) {
        // Wait for Drive hydrate — don't apply offline cache over what Drive will return.
        state.driveSyncReady = false;
      } else {
        restoreActiveDriveFileFromCache();
        state.driveSyncReady = true;
      }
      render();
      renderFileStrip();

      const darkPref = localStorage.getItem('darkMode');
      // Apply saved preference (persisted), or OS default (not persisted so the
      // matchMedia change listener can detect that no explicit choice was made yet).
      applyDark(darkPref !== null ? darkPref === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches, darkPref !== null);
      // Follow OS-level theme changes when the user hasn't pinned a preference manually
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (localStorage.getItem('darkMode') === null) applyDark(e.matches, false);
      });

      document.getElementById('settings-btn').addEventListener('click', showSettingsModal);
      document.getElementById('drive-status-indicator').addEventListener('click', async (e) => {
        if (state.driveConnected && !state.driveFileSwitching) {
          // Quick cross-device sync action: pull latest (so checks from phone/laptop appear here).
          try {
            await loadAndApplyDriveData();
            flushPendingDriveSave();
            // Briefly indicate success via the live region without opening settings.
            const live = document.getElementById('drive-status-live');
            if (live) {
              const prev = live.textContent;
              live.textContent = 'Synced with Drive';
              setTimeout(() => { if (live) live.textContent = prev || 'Drive connected'; }, 1400);
            }
            return;
          } catch (_) {
            // fall through to settings on error so user can see/reconnect
          }
        }
        showSettingsModal();
      });
      document.getElementById('add-btn').addEventListener('click', addItem);

      const input = document.getElementById('add-input');
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
      setTimeout(() => input.focus(), INIT_FOCUS_DELAY_MS);

      syncMainBottomPadding();
      window.addEventListener('resize', syncMainBottomPadding);
      window.addEventListener('orientationchange', syncMainBottomPadding);
      const bottomBar = document.querySelector('.bottom-bar');
      if ('ResizeObserver' in window && bottomBar) {
        new ResizeObserver(syncMainBottomPadding).observe(bottomBar);
      }



      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(registration => {
          // Check for SW updates on load (helps new versions propagate to installed PWAs)
          registration.update();

          // When a new SW takes control, the old cache has been cleared (thanks to versioned CACHE_NAME)
          // We can optionally reload to pick up fresh assets immediately.
          let refreshing = false;
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            if (refreshing) return;
            refreshing = true;
            // Auto-reload so users get the new version (with cleared old cache) without manual action
            window.location.reload();
          });
        }).catch(() => {});
      }

      if (DEBUG) {
        try { window.runInboxSelfTests && window.runInboxSelfTests(); } catch (err) { console.error('[Inbox] Self-tests failed:', err); }
        // PR4 sims remain lightweight (structural, opSeq, sanitize contract)
        try {
          if (!state.structuralRemovePending) state.structuralRemovePending = {};
          if (typeof state.driveOpSeq !== 'number') state.driveOpSeq = 0;
          const testRaw = [{ name: 'T', items: [{ text: 'x', timestamp: 1, checked: false }] }];
          const san = sanitizeLists(testRaw) || [];
          if (!san[0] || san[0].items[0].text !== 'x') throw new Error('post sanitize sim');
          if (DEBUG) console.log('%c[Inbox] PR4 sims: structuralRemovePending/opSeq/sanitize/guards ready.', 'color:#34c759');
        } catch (e) { console.error('[Inbox] PR4 sim note failed:', e); }
      }
      if (DEBUG) console.log('%c[Inbox] Ready.', 'color:#34c759');
    }

    // ==================== ALWAYS-ON SMOKE + SELFTEST SUPPORT ====================
    // Strengthened smoke (runs on every load). Covers core roundtrips + basic merge invariants.
    // Complements the full matrix in run*SelfTest (invoked via runInboxSelfTests() or ?selftest).
    try {
      const sGen = generateListFile([{ name: 'Smoke', items: [{ text: 'x', timestamp: 111, checked: false }] }]);
      if (!sGen.includes('// inbox.list v2')) throw new Error('v2 header');
      const sParsed = parseListFile(sGen);
      const sSan = sanitizeLists(sParsed) || [];
      if (!sSan.length || sSan[0].name !== 'Smoke') throw new Error('sanitize');
      const sMerged = mergeRemoteIntoLocal(sSan, sParsed);
      if (!sMerged || sMerged.length !== 1 || sMerged[0].name !== 'Smoke' || !sMerged[0].items.length) throw new Error('merge');
      // Quick ghost + ts helper check
      const g = [{ name: 'G', items: [{ text: '', timestamp: 222, checked: false, deletedAt: 333 }] }];
      const gSan = sanitizeLists(g) || [];
      if (!ts(gSan[0].items[0].deletedAt)) throw new Error('ghost ts');
      if (filterAliveItems(gSan[0].items).length !== 0) throw new Error('filterAlive');

      // Step 2: Enhanced smoke with basic invariants (ghost suffix, no-dup-ts, alive prefix). Non-fatal.
      try {
        const invLists = [{ name: 'Alive', items: [{text:'a', timestamp:1, checked:false}, {text:'', timestamp:2, checked:false, deletedAt:10}] }];
        const invSan = sanitizeLists(invLists) || [];
        // Ghost suffix
        const itms = invSan[0] && invSan[0].items || [];
        if (itms.length > 1 && itms[0].deletedAt) throw new Error('ghost not at suffix in smoke');
        // No dup ts
        const tsSet = new Set();
        itms.forEach(i => { if (tsSet.has(i.timestamp)) throw new Error('dup ts in smoke'); tsSet.add(i.timestamp); });
        // Alive prefix for lists
        const mixed = [{name:'A', items:[]}, {name:'G', deletedAt:999, items:[]}];
        const mSan = sanitizeLists(mixed) || [];
        if (mSan.length > 1 && mSan[0].deletedAt) throw new Error('list ghost not at suffix');
      } catch (invErr) {
        if (DEBUG) console.warn('[Inbox] smoke invariant check failed (non-fatal):', invErr);
      }
    } catch (e) { if (DEBUG) console.warn('[Inbox] smoke failed (non-fatal):', e); /* silent in prod */ }

    // Auto-run full self-tests when ?selftest (or ?debug=1 for convenience). Non-fatal.
    if (location.search.includes('selftest') || location.search.includes('debug=1')) {
      setTimeout(() => {
        try { window.runInboxSelfTests && window.runInboxSelfTests(); } catch (_) {}
      }, 50);
    }

    if (DEBUG) window._inboxState = state;
    init();
  })();
  </script>
</body>
