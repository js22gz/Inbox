<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <title>Inbox</title>
  <meta name="description" content="Quick notes and lists. Mobile-first, calm, minimal.">
  <!-- CSP: restricts resource loading to self + Google APIs needed for GIS/Drive.
       'unsafe-inline' is required because this is a self-contained single-file app with
       no build step; moving all scripts/styles to separate files would allow removing it. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; connect-src 'self' https://www.googleapis.com https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-ancestors 'none'">
  <style>
    /* Custom properties */
    :root {
      --bg: #f8f8f8;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #222222;
      --bottom-bar-height: 90px;
      --top-bar-height: 44px;
      --pill-height: 28px;
    }

    /* Base */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    .header-btn {
      font-size: 15px; padding: 8px 14px; border: 1px solid var(--accent);
      background: transparent; color: var(--accent); cursor: pointer;
    }
    .header-icon-btn { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    /* Tabs */
    .tabs {
      position: fixed; top: var(--top-bar-height); left: 0; right: 0;
      background: white; border-bottom: 1px solid var(--border);
      z-index: 90; overflow-x: auto;
    }
    .tabs-inner { display: flex; padding: 0 8px; min-height: 48px; align-items: center; gap: 4px; }
    .tab { padding: 10px 16px; font-size: 15px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab.active { font-weight: 600; border-bottom-color: var(--accent); }
    .tab-add { padding: 10px 14px; font-size: 18px; color: var(--muted); cursor: pointer; }
    .tab-group { display: flex; align-items: center; border: 2px solid gold; }
    .tab-action-btn {
      border: none; background: none; font-family: inherit; line-height: inherit;
      padding: 4px 5px; font-size: 15px; color: var(--muted); cursor: pointer;
      display: flex; align-items: center;
    }
    .tab-action-btn:hover { color: var(--text); }

    /* Main & items */
    .main { padding-top: calc(var(--top-bar-height) + 48px); padding-bottom: var(--bottom-bar-height); min-height: 72vh; }
    .items { padding: 0 8px; }
    .items ul { list-style: none; margin: 0; padding: 0; }
    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 12px; border-bottom: 1px solid var(--border);
      user-select: none; touch-action: manipulation; -webkit-touch-callout: none;
    }
    .item:active { background: #f0f0f0; }
    .checkbox {
      width: 22px; height: 22px; border: 2px solid var(--accent); flex-shrink: 0;
      cursor: pointer; padding: 0; background: transparent;
    }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .item-text { flex: 1; font-size: 15px; color: var(--text); }
    .item-text.checked { text-decoration: line-through; color: var(--muted); }
    .item-edit-input { flex: 1; font-size: 17px; font-family: inherit; border: none; border-bottom: 2px solid var(--accent); background: transparent; color: var(--text); padding: 0; outline: none; }
    .delete-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); cursor: pointer; }

    .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 15px; }

    /* Collapsible item sections (Recurrent, Finished) */
    .finished-section { border-top: 1px solid var(--border); margin-top: 4px; }
    .finished-group-header {
      padding: 8px 12px 4px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; list-style: none;
    }
    .finished-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 12px; font-size: 15px; color: var(--muted);
      cursor: pointer; border: none; background: none; font-family: inherit;
      width: 100%; text-align: left;
    }
    .finished-toggle:hover { color: var(--text); }
    .finished-toggle-arrow { font-size: 11px; display: inline-block; transition: transform 0.15s; }
    .finished-toggle-arrow.open { transform: rotate(90deg); }
    .finished-items { display: none; }
    .finished-items.open { display: block; }
    .finished-item { opacity: 0.65; }
    .finished-clear {
      margin-left: auto;
      font-size: 10px;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      line-height: 1;
      white-space: nowrap;
    }
    .finished-toggle:hover .finished-clear { color: var(--text); }
    .finished-clear:hover { border-color: var(--accent); color: var(--accent); }
    .finished-label { flex: 1 1 auto; }
    .recurrence-hint, .due-hint {
      flex-shrink: 0; margin-left: auto; padding-left: 8px;
      font-size: 13px; color: var(--muted); text-align: right;
      max-width: 50%; line-height: 1.3;
    }
    .hint-overdue { color: #c93400; font-weight: 500; }
    .item-overdue .item-text:not(.checked) { color: #c93400; }
    body.dark .hint-overdue { color: #ff9f0a; }
    body.dark .item-overdue .item-text:not(.checked) { color: #ff9f0a; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      padding: 10px 10px 8px; z-index: 100; display: flex; flex-direction: column; gap: 6px;
    }
    .add-row { display: flex; align-items: center; gap: 6px; }
    #add-input { flex: 1; min-width: 0; padding: 11px 13px; font-size: 16px; border: 2px solid var(--accent); outline: none; }
    #add-btn { padding: 11px 18px; background: var(--muted); color: white; border: none; font-weight: 600; cursor: pointer; white-space: nowrap; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 100%; padding: 20px 16px 24px; box-sizing: border-box; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    #list-textarea { width: 100%; height: 220px; font-family: monospace; font-size: 13px; padding: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
    .modal-footer .header-btn { flex: 1; }
    /* Use CSS variables so #done-btn adapts to dark mode automatically */
    #done-btn, .modal-ok-btn { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    /* Modal element-specific styles */
    .modal-message { margin: 0 0 16px; white-space: pre-wrap; }
    .settings-panel { display: flex; flex-direction: column; gap: 22px; max-height: 62vh; overflow-y: auto; margin-bottom: 4px; }
    .settings-block-label {
      margin: 0 0 8px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em;
    }
    .settings-line { margin: 0; font-size: 15px; line-height: 1.45; color: var(--text); }
    .settings-hint { margin: 6px 0 0; font-size: 13px; line-height: 1.5; color: var(--muted); }
    .settings-text-btn {
      border: none; background: none; padding: 0; font: inherit; font-size: 15px;
      color: var(--text); text-decoration: underline; cursor: pointer; text-align: left;
    }
    .settings-text-btn:hover { color: var(--muted); }
    .settings-legal {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    .settings-legal-sep {
      color: var(--border);
      margin: 0 2px;
    }
    .settings-legal .settings-text-btn {
      font-size: 13px;
      text-decoration: none;
    }
    .settings-legal .settings-text-btn:hover {
      text-decoration: underline;
    }
    .settings-theme-btn {
      width: var(--pill-height); height: var(--pill-height); box-sizing: border-box;
      border: 1px solid var(--border); background: transparent; color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; cursor: pointer; font-family: inherit;
    }
    .settings-theme-btn:hover { border-color: var(--accent); }
    .settings-theme-btn svg { display: block; }
    .settings-theme-btn .theme-icon-sun { display: none; }
    body.dark .settings-theme-btn .theme-icon-moon { display: none; }
    body.dark .settings-theme-btn .theme-icon-sun { display: block; }
    .settings-chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .settings-chip {
      font-size: 12px; line-height: 1.3; padding: 5px 9px;
      background: #f0f0f0; color: var(--muted); border-radius: 2px;
    }
    body.dark .settings-chip { background: #2a2a2a; }
    .settings-sub { margin: 14px 0 0; }
    .settings-sub:first-of-type { margin-top: 10px; }
    .settings-sub-label { margin: 0 0 6px; font-size: 12px; color: var(--text); }
    #settings-help > .settings-hint:first-child { margin-top: 0; }
    .settings-footer { display: flex; gap: 8px; margin-top: 4px; }
    .settings-footer .header-btn { flex: 1; }
    #alert-modal-ok { flex: 1; }
    #file-picker-title { margin: 0; }
    #file-picker-list { max-height: 280px; overflow-y: auto; margin-top: 8px; }
    #prompt-modal-label { display: block; margin-bottom: 8px; font-weight: 600; }
    #prompt-modal-input { width: 100%; padding: 12px; font-size: 17px; border: 2px solid var(--accent); box-sizing: border-box; background: transparent; color: var(--text); }

    /* Move mode */


    /* Drag */
    .item.dragging { opacity: 0.4; background: #f0f0f0; }
    .item.drop-before { border-top: 4px solid #007aff; }
    .item.drop-after { border-bottom: 4px solid #007aff; }
    .item.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.drag-over { background: #fff8e1; border-bottom-color: #ffd700; }
    .tab.tab-dragging { opacity: 0.4; }
    .tab.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.tab-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .tab.tab-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .file-pill.pill-drag-over { border-color: var(--accent); background: rgba(0, 122, 255, 0.08); }
    .file-pill.pill-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .file-pill.pill-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .file-pill.pill-dragging { opacity: 0.4; }
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: white; border: 2px solid var(--accent); border-radius: 8px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25); padding: 16px 12px;
      display: flex; align-items: center; gap: 14px; width: 280px; max-width: 80vw;
      font-size: 17px; opacity: 0.42;
    }

    button.checkbox, button.tab, button.tab-add, button.delete-btn {
      font-family: inherit; line-height: inherit;
    }
    button.tab { border: none; border-bottom: 3px solid transparent; background: none; font-size: inherit; color: inherit; }
    button.tab-add, button.delete-btn { border: none; background: none; }
    button.checkbox { background: none; }

    /* Top bar (files · brand · actions) */
    .file-strip {
      position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-height);
      background: white; border-bottom: 1px solid var(--border);
      z-index: 100;
      display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center; padding: 0 8px; gap: 8px;
    }
    .file-strip-files {
      grid-column: 1; justify-self: start; width: 100%; min-width: 0;
      display: flex; align-items: center; gap: 6px; overflow-x: auto;
    }
    .file-strip-brand {
      grid-column: 2; justify-self: center;
      font-size: 17px; font-weight: 600; white-space: nowrap; pointer-events: none;
    }
    .file-strip-actions {
      grid-column: 3; justify-self: end;
      display: flex; gap: 4px; align-items: center;
    }
    .file-strip.has-pills {
      grid-template-columns: minmax(0, 1fr) auto;
    }
    .file-strip.has-pills .file-strip-brand { display: none; }
    .file-strip.has-pills .file-strip-actions { grid-column: 2; }

    .top-bar-btn {
      width: var(--pill-height); height: var(--pill-height); box-sizing: border-box;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; cursor: pointer; flex-shrink: 0; font-family: inherit;
    }
    .top-bar-btn:hover { color: var(--text); border-color: var(--accent); }
    .top-bar-btn svg { display: block; }
    .top-bar-status { position: relative; }
    .top-bar-status::before {
      content: ""; width: 10px; height: 10px; border-radius: 999px;
      background: #ff3b30; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }
    .top-bar-status.connected::before { background: #34c759; }
    .file-pill {
      display: inline-flex; align-items: center; gap: 3px;
      height: var(--pill-height); box-sizing: border-box; padding: 0 10px; font-size: 13px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }
    .file-pill.active { border-color: var(--accent); color: var(--text); font-weight: 600; }
    .file-pill-name { cursor: pointer; font-family: inherit; font-size: 13px; background: none; border: none; padding: 0; color: inherit; }
    .file-pill-remove {
      font-size: 13px; line-height: 1; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0 0 0 3px;
      font-family: inherit;
    }
    .file-pill-remove:hover { color: var(--text); }
    .file-strip-add {
      display: inline-flex; align-items: center;
      height: var(--pill-height); box-sizing: border-box; padding: 0 10px; font-size: 13px;
      border: 1px dashed var(--muted); background: transparent; color: var(--muted);
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      font-family: inherit;
    }
    .file-strip-add:hover { color: var(--text); border-color: var(--text); }
    /* File picker list row */
    .file-picker-row {
      display: block; width: 100%; text-align: left;
      padding: 12px 16px; border: none; border-bottom: 1px solid var(--border);
      background: none; font-family: inherit; font-size: 15px;
      cursor: pointer; color: var(--text); box-sizing: border-box;
    }
    .file-picker-row:disabled { color: var(--muted); cursor: default; }
    .file-picker-empty {
      padding: 12px 16px; color: var(--muted); font-size: 14px; margin: 0;
    }
    .file-picker-create { color: var(--muted); }

    /* Dark mode */
    body.dark {
      --bg: #0f0f0f;
      --text: #e5e5e5;
      --muted: #777777;
      --border: #2a2a2a;
      --accent: #e5e5e5;
    }
    body.dark .tabs,
    body.dark .bottom-bar {
      background: #1a1a1a;
      border-color: var(--border);
    }
    body.dark .item:active { background: #222222; }
    body.dark .item.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark #add-input {
      background: #222222;
      border-color: #444444;
      color: var(--text);
    }
    body.dark .empty-state { color: var(--muted); }
    body.dark .modal-content { background: #1a1a1a; color: var(--text); }
    body.dark .drag-ghost { background: #1a1a1a; color: #e5e5e5; }
    body.dark .tab.drag-over { background: #3a3a3a; border-bottom-color: #c0c0c0; }
    body.dark .tab.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark .tab.tab-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .tab.tab-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }
    body.dark .tab-group { border-color: silver; }
    body.dark .file-pill.pill-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .file-pill.pill-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }
    body.dark .top-bar-status::before { background: #ff453a; box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08); }
    body.dark .top-bar-status.connected::before { background: #30d158; }
    body.dark .file-strip { background: #1a1a1a; border-color: var(--border); }
    body.dark .file-picker-row:not(:disabled):hover { background: #222222; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Top bar -->
  <div class="file-strip" id="file-strip">
    <div class="file-strip-files" id="file-strip-files"></div>
    <div class="file-strip-brand">Inbox</div>
    <div class="file-strip-actions">
      <button id="settings-btn" class="top-bar-btn" type="button" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82L4.21 7.2a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 9.93 3.1V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l-.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0A1.65 1.65 0 0 0 20.9 9H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button id="drive-status-indicator" class="top-bar-btn top-bar-status" type="button" aria-label="Drive disconnected" title="Drive disconnected"></button>
      <span id="drive-status-live" class="sr-only" aria-live="polite" aria-atomic="true">Drive disconnected</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs"><div class="tabs-inner" id="tabs-container" role="tablist"></div></div>

  <!-- Main content -->
  <div class="main">
    <div id="items-container" class="items"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="add-row">
      <input type="text" id="add-input" placeholder="Add item to current list...">
      <button id="add-btn">Add</button>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="list-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="list-modal-title">
      <div class="modal-header">
        <h3 id="list-modal-title">inbox.list</h3>
        <button class="header-btn" id="modal-close-btn">Close</button>
      </div>
      <textarea id="list-textarea" readonly></textarea>
      <div class="modal-footer">
        <button class="header-btn" id="modal-copy-btn">Copy</button>
        <button id="done-btn" class="header-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- File picker modal -->
  <div class="modal" id="file-picker-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="file-picker-title">
      <div class="modal-header">
        <h3 id="file-picker-title">Drive Files</h3>
        <button class="header-btn" id="file-picker-close-btn">Close</button>
      </div>
      <div id="file-picker-list"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal" id="settings-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-header">
        <h3 id="settings-modal-title">Settings</h3>
        <button class="header-btn" id="settings-close-btn">Close</button>
      </div>
      <div class="settings-panel">
        <section class="settings-block">
          <div class="settings-block-label">Appearance</div>
          <button type="button" id="settings-theme-btn" class="settings-theme-btn" aria-label="Switch to dark mode">
            <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>

  <script>
  (function() {
    const DEBUG = false;

    let recurrentOpen = false;
    let finishedOpen = false;

    const state = {
      // App core
      lists: [],
      currentIndex: 0,


      // Drive – token / auth
      driveToken: null,
      driveTokenExpiry: 0,
      tokenClient: null,
      driveConnected: false,
      driveUser: null,
      driveUserLoadFailed: false,

      // Drive – multi-file
      driveFiles: [],           // [{ id, name }, ...]
      activeDriveFileIdx: 0,    // index into driveFiles
      verifiedDriveFileId: null, // cached ID of the last GET-verified active file (session-only)
      saveDataDriveTimer: null,  // debounce timer for Drive saves triggered by saveData()
      driveFileCache: {},        // fileId → parsed lists array (restored from localStorage on startup)
      persistedDriveFileCache: {}, // serialized cache metadata mirrored from localStorage
      driveFileSaveSeq: {},      // fileId → latest queued background-save token
      driveFileSaveChains: {},   // fileId → chained background save promise
      driveSwitchSeq: 0,         // increments on every user file transition (switch/add/remove/create) to ignore stale results
      driveFileSwitching: false, // true while a file transition is in progress; blocks most auto saves/polls
      driveSyncReady: false,     // false until first Drive hydrate; prevents pre-load saves from clobbering remote
      driveOpSeq: 0,             // increments on pull/merge/flush/load ops to ignore stale results from interleaving
      structuralRemovePending: {}, // fileId -> last ts of structural changes (cross-file item remove, or list/tab reorder) to bypass pull+merge in flush so local order/mutation isn't clobbered by remote bias in mergeRemoteIntoLocal

      // Drive – async token flow
      driveTokenResolve: null,
      driveTokenReject: null,
      tokenRequestPending: false, // synchronous guard against overlapping requestToken calls
    };

    // ==================== GOOGLE DRIVE ====================
    // OAuth client ID — safe to be public; it identifies the app to Google, not a secret.
    // Credentials are validated server-side by Google; possession of the ID alone grants nothing.
    const DRIVE_CLIENT_ID = '15670895710-b94o3lc8amk41n8m2dsft3pm6uf4i71t.apps.googleusercontent.com';
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
    const DRIVE_FILE_NAME = 'inbox.list';
    const DRIVE_API = 'https://www.googleapis.com/drive/v3';
    const DRIVE_UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';
    const DRIVE_FILE_CACHE_STORAGE_KEY = 'driveFileCacheV1';
    const DRIVE_FILE_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const INBOX_LISTS_UPDATED_KEY = 'inboxListsUpdatedAt';
    const LAST_DRIVE_UPLOAD_KEY = 'inboxLastDriveUploadAt';

    // Stable timestamp for the initial "example item" seed. Using a fixed value (instead of
    // Date.now() each call) ensures that when getEmptyDriveLists() is used both for local
    // state and for "remote is empty" (new/blank Drive file), mergeRemoteIntoLocal sees
    // the same item timestamp and does not duplicate the example item.
    const SEED_EXAMPLE_TIMESTAMP = 1609459200000; // 2021-01-01T00:00:00Z
    // Min gap between completion-log items for the same recurrent source (anti check/uncheck spam).
    const RECURRENT_LOG_COOLDOWN_MS = 15000;
    // After list reorder / cross-file source remove: skip pull+merge for this window so remote
    // order bias cannot undo the local structural change. Device-local only (A12).
    const STRUCTURAL_BYPASS_MS = 60000;

    // ==================== PURE SYNC & DATA HELPERS (for clarity + testability) ====================
    // These are intentionally small, pure, and side-effect free. They centralize the
    // repetitive "valid positive timestamp" checks and activity math used throughout
    // sanitize, merge, reconcile, and recurrence. This reduces duplication and makes
    // the core LWW + ghost rules easier to read and unit-test in the self-tests.
    //
    // Bulletproof Loop context: See LOOP-STATUS.md and BULLETPROOF-LOOP-PLAN.md
    // Current iteration focuses on full normalize + assert coverage + expanded test matrix.
    function ts(v) {
      const n = Number(v);
      return (Number.isFinite(n) && n > 0) ? n : 0;
    }
    function computeItemActivity(it) {
      if (!it) return 0;
      return Math.max(ts(it.timestamp), ts(it.updatedAt), ts(it.toggledAt), ts(it.dueAt));
    }
    function computeListActivity(lst) {
      if (!lst) return 0;
      let act = Math.max(ts(lst.timestamp), ts(lst.orderUpdatedAt));
      (lst.items || []).forEach(it => { act = Math.max(act, computeItemActivity(it)); });
      return act;
    }
    function ghostsToEndInPlace(list) {
      // Soft-deleted items (deletedAt) stay in memory for multi-device LWW, but always as a suffix
      // so UI/tabs/drag only see alive prefix. File body omits them; they go to // inbox.deletes.
      if (!list || list.deletedAt || !list.items || list.items.length <= 1) return;
      const alive = list.items.filter(it => it && !it.deletedAt);
      const ghosts = list.items.filter(it => it && it.deletedAt);
      if (ghosts.length) list.items = [...alive, ...ghosts];
    }

    // Step 5: Central normalize for enforcement (called at stable points + structural ops)
    function normalizeListsInPlace(lists) {
      if (!Array.isArray(lists)) return;
      // Per-item ghosts suffix
      lists.forEach(ghostsToEndInPlace);
      // Top-level list ghosts to end (alive prefix for tabs/indices)
      const alive = lists.filter(l => l && !l.deletedAt);
      const ghosts = lists.filter(l => l && l.deletedAt);
      if (ghosts.length) {
        lists.length = 0;
        alive.forEach(l => lists.push(l));
        ghosts.forEach(l => lists.push(l));
      }
      // Cheap debug-only (N tiny): no-dup ts guard
      if (DEBUG) {
        const seen = new Set();
        lists.forEach(l => (l && l.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (t && seen.has(t)) console.warn('[Inbox] dup ts detected', t);
          if (t) seen.add(t);
        }));
      }
    }

    // ==================== STATE INVARIANTS (Bulletproof Loop) ====================
    // These are the core safety properties we want to hold after every stable operation.
    // Enforced in DEBUG via asserts (step 4), normalized at key points (step 5), and tested in self-tests.js.
    // See BULLETPROOF-LOOP-PLAN.md for the full loop, failure modes, and PR plan.
    //
    // 1. Ghosts suffix (per list + top-level lists): alive items first, ghosts (deletedAt) last.
    //    - Enables clamp/render/drag to assume prefix-contiguous alives.
    //    - Currently partially via construction in merge/reconcile, ghostsToEndInPlace in limited paths, manual splice+push in deletes.
    //    - Goal: central normalizeListsInPlace called after mutations/assigns.
    // 2. No duplicate timestamps within a file (cross-list items unique by ts).
    //    - ts is birth id for matching in merge/reconcile/dedup.
    //    - Protected by seenTs + localPlacement in merge; addItem uses fresh Date.now().
    // 3. Alive lists prefix (top-level): deleted lists (ghosts) at end of state.lists.
    //    - clampCurrentIndex, findTargetListIndexByName, tab indices, drag all rely on this.
    // 4. Post-sanitize/apply/merge: all items have required fields (text, ts, checked bool); times are valid via ts().
    // 5. orderUpdatedAt / lts present for merge bias decisions after creates/reorders.
    // 6. Recurrence/due: text meta + derived fields (dueAt) consistent after sync/merge.
    //
    // Stable points for asserts/normalize (planned): return of mergeRemoteIntoLocal/sanitize/reconcile*,
    // after applyDrive* , end of flush success, post-parse loads, after saveAndRender, after structural ops + save.
    // Use window._assertInboxInvariants() (DEBUG) for manual checks.
    // Run `runInboxSelfTests()` or ?selftest frequently.

    // Step 4: Cheap DEBUG runtime assertions (warn only, never throw in prod paths)
    function assertGhostsAtEnd(list, where = '') {
      if (!DEBUG || !list || list.deletedAt || !list.items || list.items.length <= 1) return;
      let seenGhost = false;
      list.items.forEach((it, i) => {
        if (it && it.deletedAt) seenGhost = true;
        else if (seenGhost) console.warn('[Inbox assert] ghosts not suffix at', where, i);
      });
    }
    function assertNoDupTsAcrossLists(lists, where = '') {
      // Cheap enough to run more often; keep warn-only
      const seen = new Set();
      (lists || []).forEach(l => (l && l.items || []).forEach(it => {
        const t = ts(it && it.timestamp);
        if (t && seen.has(t)) console.warn('[Inbox assert] dup ts', t, where);
        if (t) seen.add(t);
      }));
    }
    function assertValidSanitized(lists, where = '') {
      if (!DEBUG) return;
      (lists || []).forEach(l => {
        if (!l || typeof l.name !== 'string') console.warn('[Inbox assert] bad list', where);
        (l && l.items || []).forEach(it => {
          // DEBUG-only: tolerate missing checked (coerced later); strict on core identity.
          if (!it || typeof it.text !== 'string' || !ts(it.timestamp) || (typeof it.checked !== 'boolean' && it.checked != null)) {
            console.warn('[Inbox assert] bad item', where);
          }
        });
      });
    }

    function generateListFile(lists) {
      // Format:
      //   // inbox.list v2
      //   # Name / // listmeta / - [ ] text |ts:…   ← human-readable body (alive only)
      //   // inbox.deletes v1                       ← private delete log for multi-device LWW
      //   // del-item name:…|ts:…|del:…
      //   // del-list name:…|lts:…|del:…
      // UI and the body never show tombstones; merge still uses soft-deletedAt in memory.
      const src = lists || state.lists || [];
      const bodyParts = [];
      const deleteLines = [];

      src.forEach(list => {
        if (!list || typeof list.name !== 'string') return;
        if (list.deletedAt) {
          const ltsPart = list.timestamp ? `|lts:${list.timestamp}` : '';
          deleteLines.push(`// del-list name:${encodeURIComponent(list.name)}${ltsPart}|del:${list.deletedAt}`);
          return;
        }
        const header = `# ${list.name}`;
        const metaLine = (list.timestamp || list.orderUpdatedAt)
          ? `// listmeta lts:${list.timestamp || ''} lupd:${list.orderUpdatedAt || ''}`
          : '';
        const lines = [];
        (list.items || []).forEach(item => {
          if (!item) return;
          if (item.deletedAt) {
            deleteLines.push(`// del-item name:${encodeURIComponent(list.name)}|ts:${item.timestamp}|del:${item.deletedAt}`);
            return;
          }
          const upd = item.updatedAt ? `|upd:${item.updatedAt}` : '';
          const due = item.dueAt ? `|due:${item.dueAt}` : '';
          const cts = item.checkedAt ? `|cts:${item.checkedAt}` : '';
          const tg = item.toggledAt ? `|tg:${item.toggledAt}` : '';
          lines.push(`- ${item.checked ? '[x]' : '[ ]'} ${item.text} |ts:${item.timestamp}${upd}${due}${cts}${tg}`);
        });
        let out = header;
        if (metaLine) out += '\n' + metaLine;
        if (lines.length) out += '\n' + lines.join('\n');
        bodyParts.push(out);
      });

      const body = bodyParts.join('\n\n').trim();
      let out = body ? ('// inbox.list v2\n\n' + body) : '// inbox.list v2';
      if (deleteLines.length) {
        out += '\n\n// inbox.deletes v1\n' + deleteLines.join('\n');
      }
      return out;
    }
    function parseListFile(text) {
      const result = [];
      let current = null;
      let inDeletes = false;

      function findOrCreateListForDelete(name) {
        let list = result.find(l => l && l.name === name && !l.deletedAt);
        if (list) return list;
        // List may already be a full list-tombstone; attach item ghosts only to alive shells
        list = result.find(l => l && l.name === name);
        if (list && !list.deletedAt) return list;
        // Create a temporary alive shell so item tombstones have a home; list del is separate.
        list = { name, items: [] };
        result.push(list);
        return list;
      }

      for (const raw of text.split('\n')) {
        const line = raw.trimEnd();
        if (/^\/\/ inbox\.deletes\b/.test(line)) {
          if (current) { result.push(current); current = null; }
          inDeletes = true;
          continue;
        }
        if (line.startsWith('# ')) {
          inDeletes = false;
          if (current) result.push(current);
          // Clean name even if // comments were appended to # line in mixed files (compat)
          const name = line.slice(2).trim().replace(/\s*\/\/.*$/, '').trim();
          current = { name, items: [] };
        } else if (line.startsWith('// deleted-list') || line.startsWith('// del-list ')) {
          if (current) { result.push(current); current = null; }
          // Private log: // del-list name:…|lts:…|del:…  OR legacy // deleted-list name:…|lts:…|del:…
          const m = line.match(/^\/\/ (?:deleted-list|del-list) name:([^|]+)(?:\|lts:(\d+)?)?\|del:(\d+)$/);
          if (m) {
            let name = m[1].trim();
            try { name = decodeURIComponent(name); } catch { /* fallback to raw if malformed */ }
            const lts = ts(m[2]);
            const del = ts(m[3]);
            if (del) {
              const ghostL = { name, items: [], deletedAt: del };
              if (lts) ghostL.timestamp = lts;
              result.push(ghostL);
            }
          }
        } else if (line.startsWith('// del-item ')) {
          // Private log: // del-item name:…|ts:…|del:…
          if (current) { result.push(current); current = null; }
          const m = line.match(/^\/\/ del-item name:([^|]+)\|ts:(\d+)\|del:(\d+)$/);
          if (m) {
            let name = m[1].trim();
            try { name = decodeURIComponent(name); } catch { /* ignore */ }
            const t = ts(m[2]), d = ts(m[3]);
            if (t && d) {
              const list = findOrCreateListForDelete(name);
              list.items.push({ text: '', timestamp: t, checked: false, deletedAt: d });
            }
          }
        } else if (/^\/\/ listmeta/.test(line)) {
          if (current) {
            // listmeta may appear anywhere after the # for the list (not only immediately after header); DESIGN allows under current.
            const ltsM = line.match(/lts:(\d+)/);
            const lupdM = line.match(/lupd:(\d+)/);
            if (ltsM) { const v = ts(ltsM[1]); if (v) current.timestamp = v; }
            if (lupdM) { const v = ts(lupdM[1]); if (v) current.orderUpdatedAt = v; }
          }
        } else if (current && /^\/\/ deleted ts:(\d+) del:(\d+)$/.test(line)) {
          // Legacy inline body tombstones (pre private-log) — still rehydrate for merge
          const m = line.match(/^\/\/ deleted ts:(\d+) del:(\d+)$/);
          if (m) {
            const t = ts(m[1]), d = ts(m[2]);
            if (t && d) {
              current.items.push({ text: '', timestamp: t, checked: false, deletedAt: d });
            }
          }
        } else if (!inDeletes && current && line.startsWith('- ')) {
          const checked = line.startsWith('- [x] ');
          const hasStatePrefix = checked || line.startsWith('- [ ] ');
          const prefixLen = hasStatePrefix ? 6 : 2;
          const rest = line.slice(prefixLen);
          // Parse optional |tg: / |cts: / |due: / |upd: / |del: suffixes (order independent via loop).
          // Strip from end repeatedly; then |ts: or legacy @. Post-clean for any residual |meta in text (compat).
          let workingRest = rest;
          let checkedAt, dueAt, toggledAt, updatedAt, deletedAt;
          const stripMeta = (key) => {
            const m = workingRest.match(new RegExp(`\\|${key}:(\\d+)$`));
            if (m) {
              const v = ts(m[1]);
              if (ts(v)) {
                if (key === 'tg') toggledAt = v;
                else if (key === 'cts') checkedAt = v;
                else if (key === 'due') dueAt = v;
                else if (key === 'upd') updatedAt = v;
                else if (key === 'del') deletedAt = v;
              }
              workingRest = workingRest.slice(0, workingRest.length - m[0].length);
              return true;
            }
            return false;
          };
          let didStrip;
          do {
            didStrip = stripMeta('tg') || stripMeta('cts') || stripMeta('due') || stripMeta('upd') || stripMeta('del');
          } while (didStrip);
          // Regex matches the timestamp (after multi-strip of trailing |meta) strictly at end.
          // |ts: is the birth marker (emitted before appended |upd etc); parse strips trailing metas first so |ts (or @) anchors at $.
          // Prevents false positives mid-text. Supports legacy @ too.
          const tsMatch = workingRest.match(/ (?:\|ts:|@)(\d+)$/);
          let itemText = workingRest, timestamp = Date.now();
          if (tsMatch) {
            const ts = Number(tsMatch[1]);
            if (ts > 0) { timestamp = ts; itemText = workingRest.slice(0, workingRest.length - tsMatch[0].length); }
          }
          // Post-clean: only trailing (end-of-string) meta residues from mixed-version/old parse pollution.
          // Restricted to |upd|del (PR-1 added fields) to avoid mangling legitimate end-of-text metas like " |due:NN" or " |tg:..." 
          // when the item has no metadata fields (no |xxx appended *after* |ts in generate). 
          // New emits place metas after |ts so text content ending in such patterns is preserved when fields present.
          // Limitation noted for old/mixed .list files or text intentionally ending in meta-like patterns without appended fields.
          // Do NOT use global replace.
          itemText = itemText.replace(/\s*\|(?:upd|del):\d+\s*$/, '').trim();
          const newItem = { text: itemText, timestamp, checked };
          if (Number.isFinite(checkedAt)) newItem.checkedAt = checkedAt;
          if (Number.isFinite(toggledAt)) newItem.toggledAt = toggledAt;
          if (Number.isFinite(dueAt)) newItem.dueAt = dueAt;
          if (Number.isFinite(updatedAt)) newItem.updatedAt = updatedAt;
          if (Number.isFinite(deletedAt)) newItem.deletedAt = deletedAt;
          else applyDueFromText(newItem);
          current.items.push(newItem);
        }
      }
      if (current) result.push(current);
      return result.length > 0 ? result : null;
    }

    // ==================== CURRENT LAYER MODEL (Track B) ====================
    // Single-file architecture (non-negotiable delivery model):
    //
    //   Sync: pure data / domain-adjacent layer
    //     - ts, compute*, sanitize, merge/reconcile, normalize, ghostsToEnd, asserts
    //     - parseListFile / generateListFile
    //     - structural helpers: reorderInArray, afterReorder, bumpOrderUpdatedAt, moveItemToList,
    //       prepareItemForCrossFileMove, finalizeAfterDrop, getDropPosition
    //     - All mutations that affect ordering or ghosts go through these for invariant enforcement.
    //
    //   Domain: business rules (recurrence, due dates, promotions)
    //     - Domain.Recurrence and Domain.Due subs
    //     - syncRecurrenceState / syncDueState act as post-mutation enforcers
    //
    //   Drive: I/O + coordination + multi-file orchestration
    //     - fetch/save, polling, flushPendingDriveSave (read-merge-write + guards)
    //     - wakeDriveSync + lifecycle listeners for visibility/focus/online/pageshow (centralized wake)
    //     - file management (switch/add/remove/create) via withFileTransition wrapper
    //     - Drive.Management.performCrossFileItemMove for structural drag-across-files
    //     - Drive.File / Drive.Sync / Drive.Management / Drive.Cache / Drive.Transition / Drive.Coordinator subs
    //     - Uses structuralRemovePending + opSeq + intendedFileId snapshots for race safety
    //
    //   UI: presentation + interaction (no data ownership)
    //     - render*, modals (surgical patches removed for lightness)
    //     - createDragController factory + three configured instances (items, tabs, file-pills)
    //     - UI.Drag / UI.Render / UI.Modal subs (Surgical patch helpers removed for lightness)
    //
    // All functions are hoisted inside the single IIFE. Namespaces are lightweight organizational
    // objects (not modules) that provide discoverability and a migration path while keeping the
    // app a single self-contained file.
    //
    // Invariants protected by layering:
    //   - Ghosts (deletedAt) always suffix within each list after stable operations.
    //   - No duplicate timestamps.
    //   - Alive lists prefix deleted lists.
    //   - Structural ops (reorders, cross-list, cross-file) go through Sync helpers that call
    //     normalize + bump as needed.
    //
    // Comment maintenance:
    //   - These blocks describe the *current* boundaries and contracts.
    //   - Living loop state: LOOP-STATUS.md. Archive chronicle: LOOP-HISTORY.md. Git for code history.
    //   - When updating comments, favor "why the boundary", "what it owns", "what it guarantees",
    //     call-site expectations, and known limitations over transient details.
    //
    // Always run runInboxSelfTests() after any change that touches Sync/Drive/Domain logic.
    //
    // ==================== IN-FILE MODULES / LAYERING (Track B) ====================
    // Restructuring follows the same Bulletproof Loop used for robustness:
    //   Audit → Characterization → Harden (extract/namespace) → Verify (self-tests + behavior) → Document → Repeat.
    //
    // Single-file constraint is absolute. We use plain objects (Sync, Drive, UI, Domain) + sub-objects
    // for grouping. Call sites were gradually migrated; direct top-level references remain only where
    // hoisting or historical reasons made immediate change risky.
    //
    // See LOOP-STATUS.md (living) + LOOP-HISTORY.md (B-track archive) for process context.
    const Sync = {
      // Core pure + data layer (heavily bulletproofed in Track A)
      ts,
      computeItemActivity,
      computeListActivity,
      ghostsToEndInPlace,
      normalizeListsInPlace,
      // Invariant helpers (DEBUG)
      assertGhostsAtEnd,
      assertNoDupTsAcrossLists,
      assertValidSanitized,
      // Key domain ops
      isValidItem,
      isDeleted,
      filterAliveItems,
      filterAliveLists,
      getAliveItems,
      sanitizeLists,
      parseListFile,
      generateListFile,
      mergeRemoteIntoLocal,
      reconcileList,
      reconcileItems,
      reconcileItem,
      getDriveListsSignature,
      promoteByTimestamps,
      applyPromotions
    };

    // --- Drive layer grouping (Track B work) ---
    // Audit findings: ~15-20 Drive functions mixed with state updates + render calls.
    // Many async I/O + token + poll + flush live between lines ~1280-1825 + switch/add/remove.
    // Entanglement: Drive code calls renderDriveStatus, saveData, apply* which touch UI/state.
    // Harden: Group core Drive surface here for clarity. Call sites unchanged for now.
    const Drive = {
      // Core I/O and sync
      driveFetch,
      createDriveFile,
      fetchDriveFileLists,
      loadAndApplyFileById,
      loadFromDrive,

    /**
     * A11: Restore an item that was spliced from source before an async cross-file target failed.
     * state.lists may have been replaced during await (switch/load) — never trust only a detached list ref.
     * Prefers: live list on source file (by name) → source file cache → original list ref.
     */
    function restoreCrossFileMovedItem({ sourceListName, movedItem, sourceListForMove, srcFileId }) {
      if (!movedItem || !Number.isFinite(Number(movedItem.timestamp))) return false;
      const ts = movedItem.timestamp;

      function listHasItem(list) {
        return !!(list && list.items && list.items.some(i => i && i.timestamp === ts));
      }
      function unshiftOnto(list) {
        if (!list || listHasItem(list)) return !!list;
        if (!Array.isArray(list.items)) list.items = [];
        list.items.unshift(movedItem);
        list.orderUpdatedAt = Date.now();
        Sync.normalizeListsInPlace([list]);
        return true;
      }

      // 1) Still viewing source file → mutate live state.lists
      if (srcFileId && getActiveDriveFileId() === srcFileId) {
        let live = null;
        if (sourceListName) {
          live = (state.lists || []).find(l => l && !isDeleted(l) && l.name === sourceListName) || null;
        }
        if (!live && sourceListForMove) {
          live = (state.lists || []).find(l => l === sourceListForMove) || null;
        }
        if (unshiftOnto(live || sourceListForMove)) {
          cacheDriveFileLists(srcFileId, getDriveFileName(srcFileId), state.lists);
          saveLocalData();
          if (state.driveConnected) {
            saveToDrive(Sync.generateListFile(state.lists), { fileId: srcFileId }).catch(() => {});
          }
          render();
          return true;
        }
      }

      // 2) Source file only in cache (user switched away during await)
      if (srcFileId && state.driveFileCache[srcFileId]) {
        const cached = JSON.parse(JSON.stringify(state.driveFileCache[srcFileId]));
        let cl = null;
        if (sourceListName) cl = cached.find(l => l && !isDeleted(l) && l.name === sourceListName);
        if (!cl) cl = cached[0];
        if (!cl) {
          cl = { name: sourceListName || 'inbox', items: [], timestamp: Date.now(), orderUpdatedAt: Date.now() };
          cached.unshift(cl);
        }
        if (unshiftOnto(cl)) {
          const name = getDriveFileName(srcFileId, 'inbox.list');
          cacheDriveFileLists(srcFileId, name, cached);
          saveLocalData();
          if (state.driveConnected) {
            saveToDrive(Sync.generateListFile(cached), { fileId: srcFileId }).catch(() => {});
          }
          // If user is still on source, also refresh UI from cache
          if (getActiveDriveFileId() === srcFileId) {
            Drive.applyDriveListsPreservingCurrent(cached);
            render();
          }
          return true;
        }
      }

      // 3) Best-effort detached ref (pre-A11 path)
      if (unshiftOnto(sourceListForMove)) {
        saveLocalData();
        const curId = getActiveDriveFileId();
        if (state.driveConnected && curId) {
          saveToDrive(Sync.generateListFile(), { fileId: curId }).catch(() => {});
        }
        render();
        return true;
      }
      return false;
    }

    async function performCrossFileItemMove({ targetFileIdx, sourceListName, movedItem, sourceListForMove, srcFileId }) {
      const targetFile = state.driveFiles[targetFileIdx];
      // A11: fail closed if prep was incomplete
      if (!targetFile || !targetFile.id || !movedItem) {
        if (DEBUG) console.warn('[Drive] cross-file move aborted: missing target or item');
        restoreCrossFileMovedItem({ sourceListName, movedItem, sourceListForMove, srcFileId });
        return { ok: false, reason: 'invalid-args' };
      }
      const targetFileId = targetFile.id;
      const targetFileName = targetFile.name;

      // Immediate direct source write (bypass read-merge pull in flushPendingDriveSave):
      // structural move (not user del) would be resurrected by remote-items-first + local-absent append in merge.
      const sourceSnapshotAfterMove = Sync.generateListFile();
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      if (state.driveConnected && srcFileId) {
        saveToDrive(sourceSnapshotAfterMove, { fileId: srcFileId }).catch((e) => {
          if (DEBUG) console.warn('[Drive] source direct after cross move failed', e);
        });

        let remoteBase;
        try {
          const fetched = await fetchDriveFileLists(targetFileId, stripListExtension(targetFileName), { forceRemote: true });
          remoteBase = fetched && fetched.lists ? JSON.parse(JSON.stringify(fetched.lists)) : null;
        } catch (_) {}

        // A11: after await — still OK to write to targetFileId (bound id). Abort only if app disconnected
        // mid-flight with no offline cache path; prefer completing the target write when we have lists.
        if (!state.driveConnected && !remoteBase && !state.driveFileCache[targetFileId]) {
          throw new Error('cross-file: disconnected and no target cache');
        }

        let targetLists = remoteBase
          ? JSON.parse(JSON.stringify(remoteBase))
          : (state.driveFileCache[targetFileId]
              ? JSON.parse(JSON.stringify(state.driveFileCache[targetFileId]))
              : getEmptyDriveLists(targetFileName));

        if (!remoteBase) remoteBase = JSON.parse(JSON.stringify(targetLists));

        let targetListIdx = findTargetListIndexByName(targetLists, sourceListName);
        let tList = targetListIdx >= 0 ? targetLists[targetListIdx] : null;
        const tNow = Date.now();
        if (!tList) {
          // Create a list with the source list's name on the target file (not index 0!).
          tList = { name: sourceListName || '?', items: [], timestamp: tNow, orderUpdatedAt: tNow };
          targetLists.push(tList);
          targetListIdx = targetLists.length - 1;
        }
        if (!Array.isArray(tList.items)) tList.items = [];

        const existingIdx = tList.items.findIndex(i => i && i.timestamp === movedItem.timestamp);

          const mTog = Number(movedItem.toggledAt) || Number(movedItem.checkedAt) || 0;
          const eTog = Number(ex.toggledAt) || Number(ex.checkedAt) || 0;

            ex.checked = !!movedItem.checked;
            ex.toggledAt = movedItem.toggledAt || ex.toggledAt;
            ex.checkedAt = movedItem.checkedAt || ex.checkedAt;
          }
          if (Number(movedItem.dueAt) && (!ex.dueAt || Number(movedItem.dueAt) > Number(ex.dueAt))) {
            ex.dueAt = movedItem.dueAt;
          }
          if (ex.deletedAt) {
            const mAct = Math.max(Number(movedItem.timestamp) || 0, mUpd, mTog, Number(movedItem.dueAt) || 0);
            if (mAct > Number(ex.deletedAt)) delete ex.deletedAt;
          }
        } else {
          tList.items.unshift(movedItem);
        }

        tList.orderUpdatedAt = tNow;  // single now for birth/structural in this op

        targetLists = Sync.mergeRemoteIntoLocal(targetLists, remoteBase) || targetLists;
        if (DEBUG) console.log('[Drive] cross-target pull+fullmerge+dedup for file', targetFileId);
        Sync.normalizeListsInPlace(targetLists);
        if (DEBUG) assertValidSanitized(targetLists, 'post-structural-tgt');

        // A11: ensure moved item survived merge/dedup (remote ghost/tombstone could theoretically drop it)

        );

        const cachedForWrite = state.driveFileCache[targetFileId] || targetLists;

          targetFileId,
          listCount: (cachedForWrite || []).length,

          listsSnapshot: JSON.parse(JSON.stringify(cachedForWrite || [])),
