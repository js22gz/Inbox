<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <title>Inbox</title>
  <meta name="description" content="Quick notes and lists. Mobile-first, calm, minimal.">
  <!-- CSP: restricts resource loading to self + Google APIs needed for GIS/Drive.
       'unsafe-inline' is required because this is a self-contained single-file app with
       no build step; moving all scripts/styles to separate files would allow removing it. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; connect-src 'self' https://www.googleapis.com https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-ancestors 'none'">
  <style>
    /* Custom properties */
    :root {
      --bg: #f8f8f8;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #222222;
      --bottom-bar-height: 120px;
    }

    /* Base */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    /* Header */
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: white; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100;
    }
    .header-title { font-size: 21px; font-weight: 600; }
    .header-actions { display: flex; gap: 8px; align-items: center; }
    .header-btn {
      font-size: 15px; padding: 8px 14px; border: 1px solid var(--accent);
      background: transparent; color: var(--accent); cursor: pointer;
    }
    .header-icon-btn { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; }
    #sun-icon { display: none; }
    .drive-status-indicator {
      width: 24px; height: 24px; border: none; padding: 0; cursor: pointer;
      background: transparent; flex-shrink: 0; position: relative;
    }
    .drive-status-indicator::before {
      content: ""; position: absolute; inset: 6px; border-radius: 999px;
      background: #ff3b30; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }
    .drive-status-indicator.connected::before { background: #34c759; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    /* Tabs */
    .tabs {
      position: fixed; top: 56px; left: 0; right: 0;
      background: white; border-bottom: 1px solid var(--border);
      z-index: 90; overflow-x: auto;
    }
    .tabs-inner { display: flex; padding: 0 8px; min-height: 48px; align-items: center; gap: 4px; }
    .tab { padding: 10px 16px; font-size: 15px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab.active { font-weight: 600; border-bottom-color: var(--accent); }
    .tab-add { padding: 10px 14px; font-size: 18px; color: var(--muted); cursor: pointer; }
    .tab-group { display: flex; align-items: center; border: 2px solid gold; }
    .tab-action-btn {
      border: none; background: none; font-family: inherit; line-height: inherit;
      padding: 4px 5px; font-size: 15px; color: var(--muted); cursor: pointer;
      display: flex; align-items: center;
    }
    .tab-action-btn:hover { color: var(--text); }

    /* Main & items */
    .main { padding-top: 112px; padding-bottom: var(--bottom-bar-height); min-height: 72vh; }
    .items { padding: 0 8px; }
    .items ul { list-style: none; margin: 0; padding: 0; }
    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 12px; border-bottom: 1px solid var(--border);
      user-select: none; touch-action: manipulation; -webkit-touch-callout: none;
    }
    .item:active { background: #f0f0f0; }
    .checkbox {
      width: 22px; height: 22px; border: 2px solid var(--accent); flex-shrink: 0;
      cursor: pointer; padding: 0; background: transparent;
    }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .item-text { flex: 1; font-size: 17px; color: var(--text); }
    .item-text.checked { text-decoration: line-through; color: var(--muted); }
    .item-edit-input { flex: 1; font-size: 17px; font-family: inherit; border: none; border-bottom: 2px solid var(--accent); background: transparent; color: var(--text); padding: 0; outline: none; }
    .delete-btn, .edit-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); cursor: pointer; }
    .move-controls { display: flex; gap: 2px; margin-right: 4px; }
    .move-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--muted); cursor: pointer; }
    .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 15px; }

    /* Collapsible item sections (Recurrent, Finished) */
    .finished-section { border-top: 1px solid var(--border); margin-top: 4px; }
    .finished-group-header {
      padding: 8px 12px 4px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; list-style: none;
    }
    .finished-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 12px; font-size: 15px; color: var(--muted);
      cursor: pointer; border: none; background: none; font-family: inherit;
      width: 100%; text-align: left;
    }
    .finished-toggle:hover { color: var(--text); }
    .finished-toggle-arrow { font-size: 11px; display: inline-block; transition: transform 0.15s; }
    .finished-toggle-arrow.open { transform: rotate(90deg); }
    .finished-items { display: none; }
    .finished-items.open { display: block; }
    .finished-item { opacity: 0.65; }
    .recurrence-hint, .due-hint {
      flex-shrink: 0; margin-left: auto; padding-left: 8px;
      font-size: 13px; color: var(--muted); text-align: right;
      max-width: 50%; line-height: 1.3;
    }
    .hint-overdue { color: #c93400; font-weight: 500; }
    .item-overdue .item-text:not(.checked) { color: #c93400; }
    body.dark .hint-overdue { color: #ff9f0a; }
    body.dark .item-overdue .item-text:not(.checked) { color: #ff9f0a; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      padding: 10px 10px 14px; z-index: 100; display: flex; flex-direction: column; gap: 6px;
    }
    .add-row { display: flex; align-items: center; gap: 6px; }
    #add-input { flex: 1; min-width: 0; padding: 11px 13px; font-size: 16px; border: 2px solid var(--accent); outline: none; }
    #add-btn { padding: 11px 18px; background: var(--muted); color: white; border: none; font-weight: 600; cursor: pointer; white-space: nowrap; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 100%; padding: 20px 16px 24px; box-sizing: border-box; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    #list-textarea { width: 100%; height: 220px; font-family: monospace; font-size: 13px; padding: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
    .modal-footer .header-btn { flex: 1; }
    /* Use CSS variables so #done-btn adapts to dark mode automatically */
    #done-btn, .modal-ok-btn { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    /* Modal element-specific styles */
    .modal-message { margin: 0 0 16px; white-space: pre-wrap; }
    .settings-detail { margin: 0 0 16px; color: var(--muted); }
    .settings-legend {
      max-height: 42vh; overflow-y: auto; margin: 0 0 16px;
      font-size: 13px; color: var(--muted); line-height: 1.45;
    }
    .settings-legend h4 { margin: 12px 0 6px; font-size: 14px; color: var(--text); }
    .settings-legend h4:first-child { margin-top: 0; }
    .settings-legend pre {
      margin: 6px 0; padding: 10px; background: #f0f0f0; font-size: 12px;
      white-space: pre-wrap; word-break: break-word;
    }
    body.dark .settings-legend pre { background: #2a2a2a; }
    #alert-modal-ok { flex: 1; }
    #file-picker-title { margin: 0; }
    #file-picker-list { max-height: 280px; overflow-y: auto; margin-top: 8px; }
    #prompt-modal-label { display: block; margin-bottom: 8px; font-weight: 600; }
    #prompt-modal-input { width: 100%; padding: 12px; font-size: 17px; border: 2px solid var(--accent); box-sizing: border-box; background: transparent; color: var(--text); }

    /* Footer */
    .app-footer { width: 100%; padding: 2px 4px 0; text-align: center; font-size: 12px; color: var(--muted); }
    .app-footer a { display: inline-block; color: var(--muted); text-decoration: underline; margin: 4px 0; }

    /* Move mode */
    .move-mode .tab { outline: 2px dashed var(--accent); outline-offset: -2px; cursor: pointer; }
    .move-mode .tab.active { outline-style: solid; }

    /* Drag */
    .item.dragging { opacity: 0.4; background: #f0f0f0; }
    .item.drop-before { border-top: 4px solid #007aff; }
    .item.drop-after { border-bottom: 4px solid #007aff; }
    .item.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.drag-over { background: #fff8e1; border-bottom-color: #ffd700; }
    .tab.tab-dragging { opacity: 0.4; }
    .tab.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.tab-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .tab.tab-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .file-pill.pill-drag-over { border-color: var(--accent); background: rgba(0, 122, 255, 0.08); }
    .file-pill.pill-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .file-pill.pill-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .file-pill.pill-dragging { opacity: 0.4; }
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: white; border: 2px solid var(--accent); border-radius: 8px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25); padding: 16px 12px;
      display: flex; align-items: center; gap: 14px; width: 280px; max-width: 80vw;
      font-size: 17px; opacity: 0.42;
    }

    button.checkbox, button.tab, button.tab-add, button.delete-btn, button.edit-btn, button.move-btn {
      font-family: inherit; line-height: inherit;
    }
    button.tab { border: none; border-bottom: 3px solid transparent; background: none; font-size: inherit; color: inherit; }
    button.tab-add, button.delete-btn, button.edit-btn, button.move-btn { border: none; background: none; }
    button.checkbox { background: none; }

    /* File strip */
    .file-strip {
      position: fixed; top: 56px; left: 0; right: 0; height: 40px;
      background: white; border-bottom: 1px solid var(--border);
      z-index: 95; display: none; align-items: center;
      padding: 0 8px; gap: 6px; overflow-x: auto;
    }
    .file-strip.visible { display: flex; }
    .file-pill {
      display: inline-flex; align-items: center; gap: 3px;
      padding: 3px 8px; font-size: 13px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }
    .file-pill.active { border-color: var(--accent); color: var(--text); font-weight: 600; }
    .file-pill-name { cursor: pointer; font-family: inherit; font-size: 13px; background: none; border: none; padding: 0; color: inherit; }
    .file-pill-remove {
      font-size: 13px; line-height: 1; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0 0 0 3px;
      font-family: inherit;
    }
    .file-pill-remove:hover { color: var(--text); }
    .file-strip-add {
      display: inline-flex; align-items: center;
      padding: 3px 8px; font-size: 13px;
      border: 1px dashed var(--muted); background: transparent; color: var(--muted);
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      font-family: inherit;
    }
    .file-strip-add:hover { color: var(--text); border-color: var(--text); }
    body.file-strip-visible .tabs { top: 96px; }
    body.file-strip-visible .main { padding-top: 152px; }
    /* File picker list row */
    .file-picker-row {
      display: block; width: 100%; text-align: left;
      padding: 12px 16px; border: none; border-bottom: 1px solid var(--border);
      background: none; font-family: inherit; font-size: 15px;
      cursor: pointer; color: var(--text); box-sizing: border-box;
    }
    .file-picker-row:disabled { color: var(--muted); cursor: default; }
    .file-picker-empty {
      padding: 12px 16px; color: var(--muted); font-size: 14px; margin: 0;
    }
    .file-picker-create { color: var(--muted); }

    /* Dark mode */
    body.dark {
      --bg: #0f0f0f;
      --text: #e5e5e5;
      --muted: #777777;
      --border: #2a2a2a;
      --accent: #e5e5e5;
    }
    body.dark .header,
    body.dark .tabs,
    body.dark .bottom-bar {
      background: #1a1a1a;
      border-color: var(--border);
    }
    body.dark .item:active { background: #222222; }
    body.dark .item.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark #add-input {
      background: #222222;
      border-color: #444444;
      color: var(--text);
    }
    body.dark .empty-state { color: var(--muted); }
    body.dark .modal-content { background: #1a1a1a; color: var(--text); }
    body.dark .drag-ghost { background: #1a1a1a; color: #e5e5e5; }
    body.dark .tab.drag-over { background: #3a3a3a; border-bottom-color: #c0c0c0; }
    body.dark .tab.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark .tab.tab-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .tab.tab-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }
    body.dark .tab-group { border-color: silver; }
    body.dark .file-pill.pill-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .file-pill.pill-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }
    body.dark #moon-icon { display: none; }
    body.dark #sun-icon { display: block; }
    body.dark .drive-status-indicator::before { background: #ff453a; box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08); }
    body.dark .drive-status-indicator.connected::before { background: #30d158; }
    body.dark .file-strip { background: #1a1a1a; border-color: var(--border); }
    body.dark .file-picker-row:not(:disabled):hover { background: #222222; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-title">Inbox</div>
    <div class="header-actions">
      <button id="theme-toggle" class="header-btn header-icon-btn" aria-label="Toggle dark mode">
        <!-- Sun/Moon icons -->
        <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg id="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
      <button id="settings-btn" class="header-btn header-icon-btn" aria-label="Settings">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82L4.21 7.2a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 9.93 3.1V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0A1.65 1.65 0 0 0 20.9 9H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button id="list-btn" class="header-btn">.list</button>
      <button id="drive-status-indicator" class="drive-status-indicator" type="button" aria-label="Drive disconnected" title="Drive disconnected"></button>
      <span id="drive-status-live" class="sr-only" aria-live="polite" aria-atomic="true">Drive disconnected</span>
    </div>
  </div>

  <!-- File strip (Drive files) -->
  <div class="file-strip" id="file-strip"></div>

  <!-- Tabs -->
  <div class="tabs"><div class="tabs-inner" id="tabs-container" role="tablist"></div></div>

  <!-- Main content -->
  <div class="main">
    <div id="items-container" class="items"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="add-row">
      <input type="text" id="add-input" placeholder="Add item to current list...">
      <button id="add-btn">Add</button>
    </div>
    <div class="app-footer">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="list-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="list-modal-title">
      <div class="modal-header">
        <h3 id="list-modal-title">inbox.list</h3>
        <button class="header-btn" id="modal-close-btn">Close</button>
      </div>
      <textarea id="list-textarea" readonly></textarea>
      <div class="modal-footer">
        <button class="header-btn" id="modal-copy-btn">Copy</button>
        <button id="done-btn" class="header-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- File picker modal -->
  <div class="modal" id="file-picker-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="file-picker-title">
      <div class="modal-header">
        <h3 id="file-picker-title">Drive Files</h3>
        <button class="header-btn" id="file-picker-close-btn">Close</button>
      </div>
      <div id="file-picker-list"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal" id="settings-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-header">
        <h3 id="settings-modal-title">Settings</h3>
        <button class="header-btn" id="settings-close-btn">Close</button>
      </div>
      <p id="settings-drive-summary" class="modal-message"></p>
      <p id="settings-drive-detail" class="settings-detail"></p>
      <div id="settings-recurrence-legend" class="settings-legend"></div>
      <div class="modal-footer">
        <button class="header-btn" id="settings-connect-btn">Connect Drive</button>
        <button class="header-btn" id="settings-disconnect-btn">Disconnect Drive</button>
      </div>
    </div>
  </div>

  <!-- Confirm modal -->
  <div class="modal" id="confirm-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="confirm-modal-msg">
      <p id="confirm-modal-msg" class="modal-message"></p>
      <div class="modal-footer">
        <button class="header-btn" id="confirm-modal-cancel">Cancel</button>
        <button class="header-btn modal-ok-btn" id="confirm-modal-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Prompt modal -->
  <div class="modal" id="prompt-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="prompt-modal-label">
      <label id="prompt-modal-label" for="prompt-modal-input"></label>
      <input type="text" id="prompt-modal-input">
      <div class="modal-footer">
        <button class="header-btn" id="prompt-modal-cancel">Cancel</button>
        <button class="header-btn modal-ok-btn" id="prompt-modal-ok">OK</button>
      </div>
    </div>
  </div>

  <!-- Alert modal -->
  <div class="modal" id="alert-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="alert-modal-msg">
      <p id="alert-modal-msg" class="modal-message"></p>
      <div class="modal-footer">
        <button class="header-btn modal-ok-btn" id="alert-modal-ok">OK</button>
      </div>
    </div>
  </div>

  <script>
  (function() {
    const DEBUG = false;

    let recurrentOpen = false;
    let finishedOpen = false;

    const state = {
      // App core
      lists: [],
      currentIndex: 0,
      pendingMove: null,

      // Drive – token / auth
      driveToken: null,
      driveTokenExpiry: 0,
      tokenClient: null,
      driveConnected: false,
      driveUser: null,
      driveUserLoadFailed: false,

      // Drive – multi-file
      driveFiles: [],           // [{ id, name }, ...]
      activeDriveFileIdx: 0,    // index into driveFiles
      verifiedDriveFileId: null, // cached ID of the last GET-verified active file (session-only)
      saveDataDriveTimer: null,  // debounce timer for Drive saves triggered by saveData()
      driveFileCache: {},        // fileId → parsed lists array (restored from localStorage on startup)
      persistedDriveFileCache: {}, // serialized cache metadata mirrored from localStorage
      driveFileSaveSeq: {},      // fileId → latest queued background-save token
      driveFileSaveChains: {},   // fileId → chained background save promise
      driveSwitchSeq: 0,         // increments on every file switch to ignore stale refreshes

      // Drive – async token flow
      driveTokenResolve: null,
      driveTokenReject: null,
      tokenRequestPending: false, // synchronous guard against overlapping requestToken calls
    };

    // ==================== GOOGLE DRIVE ====================
    // OAuth client ID — safe to be public; it identifies the app to Google, not a secret.
    // Credentials are validated server-side by Google; possession of the ID alone grants nothing.
    const DRIVE_CLIENT_ID = '15670895710-b94o3lc8amk41n8m2dsft3pm6uf4i71t.apps.googleusercontent.com';
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
    const DRIVE_FILE_NAME = 'inbox.list';
    const DRIVE_API = 'https://www.googleapis.com/drive/v3';
    const DRIVE_UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';
    const DRIVE_FILE_CACHE_STORAGE_KEY = 'driveFileCacheV1';
    const DRIVE_FILE_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const INBOX_LISTS_UPDATED_KEY = 'inboxListsUpdatedAt';

    function saveLocalData() {
      localStorage.setItem('inboxLists', JSON.stringify(state.lists));
      localStorage.setItem(INBOX_LISTS_UPDATED_KEY, String(Date.now()));
    }

    function stripListExtension(name) {
      return name.replace(/\.list$/, '');
    }

    function getEmptyDriveLists(fileName) {
      return [{ name: stripListExtension(fileName), items: [] }];
    }

    function getDriveFileName(fileId, fallbackName = DRIVE_FILE_NAME) {
      return state.driveFiles.find(f => f.id === fileId)?.name || fallbackName;
    }

    function cacheDriveFileLists(fileId, fileName, lists, lastUpdated = Date.now()) {
      const sanitized = sanitizeLists(lists);
      if (!sanitized) return;
      state.driveFileCache[fileId] = sanitized;
      state.persistedDriveFileCache[fileId] = { name: fileName, lists: sanitized, lastUpdated };
      localStorage.setItem(DRIVE_FILE_CACHE_STORAGE_KEY, JSON.stringify(state.persistedDriveFileCache));
    }

    function loadPersistedDriveFileCache() {
      state.driveFileCache = {};
      try { state.persistedDriveFileCache = JSON.parse(localStorage.getItem(DRIVE_FILE_CACHE_STORAGE_KEY) || '{}'); }
      catch (err) {
        if (DEBUG) console.warn('[Drive] Failed to parse persisted cache, resetting to empty', err);
        state.persistedDriveFileCache = {};
      }
      let cacheChanged = false;
      Object.entries(state.persistedDriveFileCache).forEach(([fileId, entry]) => {
        if (!entry || typeof entry.name !== 'string' || !Number.isFinite(entry.lastUpdated)) {
          delete state.persistedDriveFileCache[fileId];
          cacheChanged = true;
          return;
        }
        if (Date.now() - entry.lastUpdated > DRIVE_FILE_CACHE_MAX_AGE_MS) {
          delete state.persistedDriveFileCache[fileId];
          cacheChanged = true;
          return;
        }
        const lists = sanitizeLists(entry.lists);
        if (!lists) {
          delete state.persistedDriveFileCache[fileId];
          cacheChanged = true;
          return;
        }
        state.driveFileCache[fileId] = lists;
      });
      if (cacheChanged) localStorage.setItem(DRIVE_FILE_CACHE_STORAGE_KEY, JSON.stringify(state.persistedDriveFileCache));
    }

    function clearPersistedDriveFileCache() {
      state.driveFileCache = {};
      state.persistedDriveFileCache = {};
      state.driveFileSaveSeq = {};
      state.driveFileSaveChains = {};
      localStorage.removeItem(DRIVE_FILE_CACHE_STORAGE_KEY);
    }

    function applyDriveListsToState(lists, { persist = true, renderNow = true } = {}) {
      state.lists = lists;
      state.currentIndex = 0;
      if (persist) saveLocalData();
      if (renderNow) render();
    }

    function getDriveListsSignature(lists) {
      return JSON.stringify(lists);
    }

    function restoreActiveDriveFileFromCache() {
      const activeFile = state.driveFiles[state.activeDriveFileIdx];
      const cachedLists = activeFile && state.driveFileCache[activeFile.id];
      if (!cachedLists) return false;
      const localUpdated = Number(localStorage.getItem(INBOX_LISTS_UPDATED_KEY) || 0);
      const cacheUpdated = state.persistedDriveFileCache[activeFile.id]?.lastUpdated || 0;
      // loadData() already applied inboxLists; only use cache when it is at least as fresh.
      if (!localUpdated || localUpdated > cacheUpdated) return false;
      applyDriveListsToState(cachedLists, { persist: true, renderNow: false });
      return true;
    }

    function saveDriveFilesState() {
      localStorage.setItem('driveFiles', JSON.stringify(state.driveFiles));
      localStorage.setItem('activeDriveFileIdx', String(state.activeDriveFileIdx));
    }

    function loadDriveFilesState() {
      try { state.driveFiles = JSON.parse(localStorage.getItem('driveFiles') || '[]'); }
      catch { state.driveFiles = []; }
      state.activeDriveFileIdx = Number(localStorage.getItem('activeDriveFileIdx') || 0);
      if (state.activeDriveFileIdx >= state.driveFiles.length) state.activeDriveFileIdx = 0;
      loadPersistedDriveFileCache();
    }

    function formatDriveUser(user, fallback = '') {
      if (!user) return fallback;
      const name = typeof user.displayName === 'string' ? user.displayName.trim() : '';
      const email = typeof user.emailAddress === 'string' ? user.emailAddress.trim() : '';
      if (name && email && name !== email) return `${name} (${email})`;
      return name || email || fallback;
    }

    async function loadDriveUser() {
      const res = await driveFetch(`${DRIVE_API}/about?fields=user(displayName,emailAddress)`);
      const data = await res.json();
      state.driveUser = data && data.user ? data.user : null;
      state.driveUserLoadFailed = false;
      return state.driveUser;
    }

    function renderDriveStatusIndicator(status) {
      const indicator = document.getElementById('drive-status-indicator');
      const liveRegion = document.getElementById('drive-status-live');
      if (!indicator) return;
      indicator.classList.toggle('connected', state.driveConnected);
      const formattedUser = formatDriveUser(state.driveUser);
      const label = state.driveConnected
        ? `Drive connected${formattedUser ? `: ${formattedUser}` : ''}`
        : (status === 'error' ? 'Drive connection needs attention' : 'Drive disconnected');
      indicator.setAttribute('aria-label', label);
      indicator.title = label;
      if (liveRegion) liveRegion.textContent = label;
      renderFileStrip();
    }

    function setDriveStatus(status) {
      // status: 'disconnected' | 'connected' | 'error'
      state.driveConnected = status === 'connected';
      if (status !== 'connected') {
        state.driveUser = null;
        state.driveUserLoadFailed = false;
      }
      renderDriveStatusIndicator(status);
    }

    function initTokenClient() {
      if (state.tokenClient) return;
      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (response) => {
          if (response.error) {
            if (state.driveTokenReject) { state.driveTokenReject(new Error(response.error)); state.driveTokenReject = null; state.driveTokenResolve = null; }
            return;
          }
          state.driveToken = response.access_token;
          state.driveTokenExpiry = Date.now() + (response.expires_in - 60) * 1000;
          localStorage.setItem('driveToken', state.driveToken);
          localStorage.setItem('driveTokenExpiry', String(state.driveTokenExpiry));
          if (state.driveTokenResolve) { state.driveTokenResolve(state.driveToken); state.driveTokenResolve = null; state.driveTokenReject = null; }
        },
        error_callback: (err) => {
          if (state.driveTokenReject) { state.driveTokenReject(new Error(err.type || 'token_error')); state.driveTokenReject = null; state.driveTokenResolve = null; }
        },
      });
    }

    function requestToken(prompt = 'select_account', hint = '') {
      return new Promise((resolve, reject) => {
        if (state.tokenRequestPending) {
          reject(new Error('Token request already in progress'));
          return;
        }
        state.tokenRequestPending = true;
        state.driveTokenResolve = (token) => { state.tokenRequestPending = false; resolve(token); };
        state.driveTokenReject = (err) => { state.tokenRequestPending = false; reject(err); };
        const config = { prompt };
        if (hint) config.login_hint = hint;
        state.tokenClient.requestAccessToken(config);
      });
    }

    async function ensureToken() {
      if (state.driveToken && Date.now() < state.driveTokenExpiry) return state.driveToken;
      // Try to restore a fresh token from localStorage before going to GIS.
      const storedToken = localStorage.getItem('driveToken');
      const storedExpiry = Number(localStorage.getItem('driveTokenExpiry') || 0);
      if (storedToken && Date.now() < storedExpiry) {
        state.driveToken = storedToken;
        state.driveTokenExpiry = storedExpiry;
        return state.driveToken;
      }
      // Token missing or expired — attempt a silent GIS refresh if possible.
      if (!state.tokenRequestPending && state.tokenClient && localStorage.getItem('driveWasConnected')) {
        try {
          const hint = localStorage.getItem('driveUserHint') || '';
          const token = await requestToken('none', hint);
          if (DEBUG) console.log('[Drive] ensureToken: silent refresh succeeded.');
          return token;
        } catch (err) {
          if (DEBUG) console.log('[Drive] ensureToken: silent refresh failed.', err);
        }
      }
      // Silent refresh not possible or failed — signal reconnect needed.
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      setDriveStatus('error');
      throw new Error('Drive token expired. Please reconnect.');
    }

    async function driveFetch(url, options = {}) {
      const token = await ensureToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`Drive API error ${res.status}: ${text}`);
      }
      return res;
    }

    // Builds the multipart/related body used by the Drive upload API.
    function buildDriveMultipartBody(name, content) {
      const meta = JSON.stringify({ name, mimeType: 'text/plain' });
      return [
        '--inbox_boundary',
        'Content-Type: application/json; charset=UTF-8',
        '',
        meta,
        '--inbox_boundary',
        'Content-Type: text/plain; charset=UTF-8',
        '',
        content,
        '--inbox_boundary--',
      ].join('\r\n');
    }

    async function createDriveFile(fileName) {
      const res = await driveFetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart`, {
        method: 'POST',
        headers: { 'Content-Type': 'multipart/related; boundary=inbox_boundary' },
        body: buildDriveMultipartBody(fileName, ''),
      });
      return res.json();
    }

    async function fetchDriveFileLists(fileId, fallbackName) {
      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      const parsed = text.trim() ? parseListFile(text) : null;
      const fileName = getDriveFileName(fileId, fallbackName);
      const lists = parsed || getEmptyDriveLists(fileName);
      cacheDriveFileLists(fileId, fileName, lists);
      return lists;
    }

    // Fetches a Drive file by ID, parses it, applies it to local state, and re-renders.
    async function loadAndApplyFileById(fileId, fallbackName) {
      const lists = await fetchDriveFileLists(fileId, fallbackName);
      applyDriveListsToState(lists);
      return lists;
    }

    async function findOrCreateDriveFile() {
      // Use the cached verified file ID to skip the redundant GET on repeated saves.
      if (state.verifiedDriveFileId && state.driveFiles[state.activeDriveFileIdx]?.id === state.verifiedDriveFileId) {
        return state.verifiedDriveFileId;
      }

      // Verify the active file is still accessible.
      if (state.driveFiles.length > 0 && state.activeDriveFileIdx < state.driveFiles.length) {
        const activeFile = state.driveFiles[state.activeDriveFileIdx];
        try {
          await driveFetch(`${DRIVE_API}/files/${activeFile.id}?fields=id`);
          state.verifiedDriveFileId = activeFile.id;
          return activeFile.id;
        } catch {
          state.verifiedDriveFileId = null;
          // File not accessible — fall through to search/create
        }
      }

      // Search for an existing inbox.list created by this app
      const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
      const res = await driveFetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name)&spaces=drive`);
      const data = await res.json();
      if (data.files && data.files.length > 0) {
        const fId = data.files[0].id;
        if (!state.driveFiles.some(f => f.id === fId)) {
          state.driveFiles.push({ id: fId, name: DRIVE_FILE_NAME });
          state.activeDriveFileIdx = state.driveFiles.length - 1;
          saveDriveFilesState();
          renderFileStrip();
        }
        state.verifiedDriveFileId = fId;
        return fId;
      }

      // Create a new empty file
      const created = await createDriveFile(DRIVE_FILE_NAME);
      state.driveFiles.push({ id: created.id, name: DRIVE_FILE_NAME });
      state.activeDriveFileIdx = state.driveFiles.length - 1;
      saveDriveFilesState();
      renderFileStrip();
      state.verifiedDriveFileId = created.id;
      return created.id;
    }

    async function loadFromDrive() {
      const fileId = await findOrCreateDriveFile();
      const metaRes = await driveFetch(`${DRIVE_API}/files/${fileId}?fields=modifiedTime`);
      const meta = await metaRes.json();
      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      const lists = text.trim() ? parseListFile(text) : null;
      const modifiedTime = meta.modifiedTime ? Date.parse(meta.modifiedTime) : 0;
      return { lists, modifiedTime };
    }

    async function saveToDrive(content) {
      if (!state.driveConnected) return;
      // Skip immediately if offline; the 'online' event listener will flush later.
      // Network failures that slip past this check are caught by the try/catch below.
      if (!navigator.onLine) { return; }
      try {
        const fileId = await findOrCreateDriveFile();
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
        });
        setDriveStatus('connected');
      } catch (err) {
        if (DEBUG) console.warn('[Drive] save failed', err);
        setDriveStatus('error');
      }
    }

    // Saves content to a specific Drive file by ID (used for cross-file item moves).
    async function saveToDriveFile(fileId, content, { setStatusOnSuccess = false, throwOnError = false } = {}) {
      if (!state.driveConnected || !navigator.onLine) return;
      try {
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
        });
        if (setStatusOnSuccess) setDriveStatus('connected');
      } catch (err) {
        if (DEBUG) console.warn('[Drive] saveToDriveFile failed', err);
        if (throwOnError) throw err;
      }
    }

    function flushDriveFileInBackground(fileId, content) {
      if (!fileId || !state.driveConnected || !navigator.onLine) return;
      const seq = (state.driveFileSaveSeq[fileId] || 0) + 1;
      state.driveFileSaveSeq[fileId] = seq;
      const previousSavePromise = state.driveFileSaveChains[fileId] || Promise.resolve();
      const chain = previousSavePromise
        .catch((err) => {
          if (DEBUG) console.warn('[Drive] Prior background save failed', err);
        })
        .then(async () => {
          if (state.driveFileSaveSeq[fileId] !== seq) return;
          await saveToDriveFile(fileId, content, { setStatusOnSuccess: true, throwOnError: true });
        });
      state.driveFileSaveChains[fileId] = chain.catch((err) => {
        if (DEBUG) console.warn('[Drive] background file save failed', err);
        setDriveStatus('error');
      });
    }

    // Silently load the Drive file and apply it to the local state.
    // Called after every successful auto-reconnect so the app always starts
    // with the latest saved data rather than whatever is in localStorage.
    async function loadAndApplyDriveData() {
      try {
        const { lists: remote, modifiedTime: remoteModified } = await loadFromDrive();
        if (remote) {
          const activeFile = state.driveFiles[state.activeDriveFileIdx];
          const localUpdated = Number(localStorage.getItem(INBOX_LISTS_UPDATED_KEY) || 0);
          // Local edits can be ahead of Drive when the debounced upload has not flushed yet.
          if (localUpdated > remoteModified) {
            if (activeFile) cacheDriveFileLists(activeFile.id, activeFile.name, state.lists);
            await saveToDrive(generateListFile());
          } else {
            if (activeFile) cacheDriveFileLists(activeFile.id, activeFile.name, remote);
            applyDriveListsToState(remote);
          }
        }
        // Preload remaining files in the background so switching is lag-free
        preloadDriveFiles();
      } catch (err) {
        if (DEBUG) console.warn('[Drive] auto-load on reconnect failed', err);
      }
    }

    // Attempt to restore the connected state from a persisted token on startup.
    // Called automatically via onGoogleLibraryLoad when the GIS script is ready.
    async function autoReconnectDrive() {
      if (!localStorage.getItem('driveWasConnected')) return;
      // Try to restore a still-valid token from localStorage — no GIS call needed.
      const storedToken = localStorage.getItem('driveToken');
      // Fallback of 0 means epoch (already expired), so the check below fails safely.
      const storedExpiry = Number(localStorage.getItem('driveTokenExpiry') || 0);
      if (storedToken && Date.now() < storedExpiry) {
        state.driveToken = storedToken;
        state.driveTokenExpiry = storedExpiry;
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Restored from persisted token.');
        await loadAndApplyDriveData();
        return;
      }
      // Token expired — attempt a silent GIS refresh with no user interaction (prompt: 'none').
      // This works when the user has an active Google session that previously granted access,
      // keeping them connected across browser restarts and app re-opens without any popup.
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      await silentReconnectDrive();
    }

    // Silently requests a new access token via GIS without showing any UI.
    // On success, restores the connected state and syncs data.
    // On failure (e.g. session expired, consent revoked), signals the error state
    // so the user can tap the Drive button to reconnect manually.
    async function silentReconnectDrive() {
      const hint = localStorage.getItem('driveUserHint') || '';
      try {
        initTokenClient();
        await requestToken('none', hint);
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Silent re-auth succeeded.');
        await loadAndApplyDriveData();
      } catch (err) {
        setDriveStatus('error');
        if (DEBUG) console.log('[Drive] Silent re-auth failed — tap Drive button to reconnect.', err);
      }
    }

    // The GIS library calls window.onGoogleLibraryLoad once it is ready.
    // Set this before the <script> tag executes so the callback is in place.
    window.onGoogleLibraryLoad = autoReconnectDrive;

    async function connectDrive() {
      try {
        initTokenClient();
        const emailHint = await showPrompt('Enter the Google account email to connect\n(leave blank for automatic selection):');
        if (emailHint === null) return; // user cancelled
        await requestToken('select_account', emailHint.trim() || undefined);
        // Mark as connected so saveToDrive is allowed to proceed
        localStorage.setItem('driveWasConnected', '1');
        try {
          await loadDriveUser();
          // Store the email as a hint to enable silent re-auth on future visits.
          const email = state.driveUser && state.driveUser.emailAddress;
          if (email) localStorage.setItem('driveUserHint', email);
        } catch (err) {
          state.driveUserLoadFailed = true;
          if (DEBUG) console.warn('[Drive] load user on connect failed', err);
        }
        setDriveStatus('connected');
        // Load file and offer merge/replace if remote data exists
        let remote = null;
        try {
          ({ lists: remote } = await loadFromDrive());
        } catch (err) {
          if (DEBUG) console.warn('[Drive] load on connect failed', err);
        }

        if (remote && remote.length > 0) {
          const choice = await showConfirm(
            'Found existing inbox.list on Drive.\n\nOK = Use Drive data (replaces local)\nCancel = Keep local data (overwrites Drive)'
          );
          if (choice) {
            state.lists = remote;
            saveData();
            render();
          } else {
            // Push local data to Drive
            await saveToDrive(generateListFile());
          }
        } else {
          // No remote data — push local
          await saveToDrive(generateListFile());
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] connect failed', err);
        setDriveStatus('error');
      }
    }

    function disconnectDrive() {
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      if (state.driveToken) {
        google.accounts.oauth2.revoke(state.driveToken, () => {});
      }
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      state.driveFiles = [];
      state.activeDriveFileIdx = 0;
      state.verifiedDriveFileId = null;
      state.driveUser = null;
      state.driveUserLoadFailed = false;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      localStorage.removeItem('driveWasConnected');
      localStorage.removeItem('driveUserHint');
      localStorage.removeItem('driveFiles');
      localStorage.removeItem('activeDriveFileIdx');
      clearPersistedDriveFileCache();
      setDriveStatus('disconnected');
    }

    function flushPendingDriveSave() {
      if (state.saveDataDriveTimer) {
        clearTimeout(state.saveDataDriveTimer);
        state.saveDataDriveTimer = null;
      }
      if (state.driveConnected) saveToDrive(generateListFile());
    }

    // Flush debounced Drive writes before the page unloads or goes offline
    window.addEventListener('pagehide', flushPendingDriveSave);
    window.addEventListener('online', () => {
      if (state.driveConnected) flushPendingDriveSave();
    });
    // ==================== END GOOGLE DRIVE ====================

    const INPUT_REFOCUS_DELAY_MS = 50;  // mobile keyboard needs time to reflow
    const INIT_FOCUS_DELAY_MS = 300;    // initial focus delay on page load
    const DRIVE_SAVE_DEBOUNCE_MS = 800; // coalesce rapid saves; short enough to feel responsive
    const MAIN_BOTTOM_PADDING_OFFSET_PX = 8; // breathing room so the last item is not flush against the bar

    // ==================== DRAG CONTROLLER ====================
    const DRAG_THRESHOLD_PX = 8;
    const LONG_PRESS_DELAY = 300;            // milliseconds
    const LONG_PRESS_CANCEL_THRESHOLD = 10;  // px; cancel long-press if finger moves this far
    const DRAG_AUTO_SCROLL_EDGE = 96;        // px from content edge that triggers scroll
    const DRAG_AUTO_SCROLL_MAX_SPEED = 14;   // px per animation frame at deepest edge

    function getDragScrollBounds() {
      const main = document.querySelector('.main');
      const bottomBar = document.querySelector('.bottom-bar');
      const top = main ? main.getBoundingClientRect().top : 112;
      const bottomInset = bottomBar ? bottomBar.getBoundingClientRect().height : 120;
      return { top, bottom: window.innerHeight - bottomInset };
    }

    function canScrollPageUp() {
      return window.scrollY > 0;
    }

    function canScrollPageDown() {
      return window.scrollY + window.innerHeight < document.documentElement.scrollHeight - 1;
    }

    // Factory that creates an independent drag controller.
    // config: {
    //   draggingClass        – CSS class applied to the source element while dragging
    //   ghostOffset(e)       – returns { x, y } cursor offset for the ghost element
    //   buildGhost(sourceEl) – returns a populated ghost HTMLElement (className set by factory)
    //   updateDropTarget(x, y) – clears old indicators, sets new ones, returns dropTarget or null
    //   clearDropIndicators()  – removes all drop-indicator classes (called on drag end)
    //   commitDrop(fromIndex, dropTarget) – mutates data, saves, re-renders
    //   onDragComplete()     – optional hook called at the end of every drag (cancel or drop)
    //   shouldSkip(e)        – optional; return true to abort onPointerDown early
    //   blockedWhile()       – optional; return true when another controller is active
    //   autoScroll           – optional; scroll the page when dragging near viewport edges
    // }
    function createDragController(config) {
      let isDragging = false;
      let fromIndex = null;
      let ghost = null;
      let sourceEl = null;
      let dropTarget = null;
      let pendingDrag = null;
      let longPressPending = null;
      let longPressTimer = null;
      let contextMenuSuppressedAt = 0;
      let lastPointerX = 0;
      let lastPointerY = 0;
      let autoScrollRafId = null;

      let blockedWhileCallback = config.blockedWhile || null;
      function isBlocked() { return blockedWhileCallback ? blockedWhileCallback() : false; }

      function suppressContextMenu(e) {
        e.preventDefault();
        contextMenuSuppressedAt = Date.now();
        if (DEBUG) console.log('[drag] context menu suppressed', { isDragging, hasLongPressPending: !!longPressPending });
        if (!isDragging && longPressPending) {
          if (DEBUG) console.log('[drag] context menu triggered – starting drag immediately from long-press state');
          const lp = longPressPending;
          cancelLongPress(false);

    async function switchDriveFile(idx) {
      if (idx === state.activeDriveFileIdx || idx < 0 || idx >= state.driveFiles.length) return;
      const previousFile = state.driveFiles[state.activeDriveFileIdx];
      const previousContent = previousFile ? generateListFile() : null;
      const switchSeq = ++state.driveSwitchSeq;
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      state.activeDriveFileIdx = idx;
      state.verifiedDriveFileId = null;
      saveDriveFilesState();
      renderFileStrip();
      const file = state.driveFiles[idx];
      const fallbackName = stripListExtension(file.name);
      const cachedLists = state.driveFileCache[file.id];
      if (previousFile && previousContent) flushDriveFileInBackground(previousFile.id, previousContent);
      // If the file is already cached, apply it immediately (zero-lag switch),
      // then refresh in the background so data stays up-to-date.
      if (cachedLists) {
        const cachedSignature = getDriveListsSignature(cachedLists);
        applyDriveListsToState(cachedLists);
        fetchDriveFileLists(file.id, fallbackName).then((lists) => {
          const activeFile = state.driveFiles[state.activeDriveFileIdx];
          if (!activeFile || activeFile.id !== file.id || state.driveSwitchSeq !== switchSeq) return;
          // If the user has already changed the currently rendered data, do not let
          // the background refresh overwrite those local edits with older cached or remote data.
          const currentSignature = getDriveListsSignature(state.lists);
          const fetchedSignature = getDriveListsSignature(lists);
          if (currentSignature !== cachedSignature) return;
          if (fetchedSignature === cachedSignature) return;
          applyDriveListsToState(lists);
        }).catch((err) => {
          if (DEBUG) console.warn('[Drive] background refresh failed', err);
        });
      } else {
        try {
          const lists = await fetchDriveFileLists(file.id, fallbackName);
          const activeFile = state.driveFiles[state.activeDriveFileIdx];
          if (!activeFile || activeFile.id !== file.id || state.driveSwitchSeq !== switchSeq) return;
          applyDriveListsToState(lists);
        } catch (err) {
          if (DEBUG) console.warn('[Drive] switchDriveFile failed', err);
          setDriveStatus('error');
        }
      }
    }

    // Background-preloads any Drive files not yet in the session cache so
    // that future file switches are instant (cache-hit path in switchDriveFile).
    async function preloadDriveFiles() {
      const uncached = state.driveFiles.filter(f => !state.driveFileCache[f.id]);
      if (uncached.length === 0) return;
      await Promise.allSettled(uncached.map(async (file) => {
        try {
          await fetchDriveFileLists(file.id, file.name);
          if (DEBUG) console.log('[Drive] preloaded', file.name);
        } catch (err) {
          if (DEBUG) console.warn('[Drive] preload failed for', file.name, err);
        }
      }));
    }

    async function removeDriveFile(idx) {
      const removedFile = state.driveFiles[idx];
      const wasActive = idx === state.activeDriveFileIdx;
      state.driveFiles.splice(idx, 1);
      state.verifiedDriveFileId = null;
      if (removedFile) {
        delete state.driveFileSaveSeq[removedFile.id];
        delete state.driveFileSaveChains[removedFile.id];
        delete state.driveFileCache[removedFile.id];
        delete state.persistedDriveFileCache[removedFile.id];
        localStorage.setItem(DRIVE_FILE_CACHE_STORAGE_KEY, JSON.stringify(state.persistedDriveFileCache));
      }
      if (state.driveFiles.length === 0) {
        state.activeDriveFileIdx = 0;
      } else if (idx < state.activeDriveFileIdx) {
        state.activeDriveFileIdx--;
      } else if (state.activeDriveFileIdx >= state.driveFiles.length) {
        state.activeDriveFileIdx = state.driveFiles.length - 1;
      }
      saveDriveFilesState();
      renderFileStrip();
      if (wasActive && state.driveFiles.length > 0) {
        try {
          const file = state.driveFiles[state.activeDriveFileIdx];
          await loadAndApplyFileById(file.id, stripListExtension(file.name));
        } catch (err) {
          if (DEBUG) console.warn('[Drive] removeDriveFile failed', err);
          setDriveStatus('error');
        }
      }
    }

    async function addDriveFile(file) {
      const existing = state.driveFiles.findIndex(f => f.id === file.id);

    // Replace native prompt/confirm/alert so they work in PWA full-screen mode and
    // respect the app's dark mode + CSS variables.

    // Returns a keydown handler that traps Tab focus within modal among selector-matching elements.
    function createFocusTrap(modal, selector) {
      return function(e) {
        if (e.key !== 'Tab') return;
        const focusable = Array.from(modal.querySelectorAll(selector));
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      };
    }

    // Shared boilerplate: opens modalId, calls setup(modal, close) which wires event
    // listeners, focuses the initial element, and returns a teardown callback that
    // removes them. Resolves with whatever value setup passes to close().
    function openModalDialog(modalId, setup) {
      return new Promise(resolve => {
        const modal = document.getElementById(modalId);
        function close(value) {
          modal.classList.remove('open');
          cleanup();
          resolve(value);
        }
        const cleanup = setup(modal, close);
        modal.classList.add('open');
      });
    }

    function showConfirm(message) {
      return openModalDialog('confirm-modal', (modal, close) => {
        document.getElementById('confirm-modal-msg').textContent = message;
        const okBtn = document.getElementById('confirm-modal-ok');
        const cancelBtn = document.getElementById('confirm-modal-cancel');
        function onOk() { close(true); }
        function onCancel() { close(false); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); onCancel(); } }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        modal.addEventListener('keydown', onKey);
        cancelBtn.focus();
        return () => {
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          modal.removeEventListener('keydown', onKey);
        };
      });
    }

    function showPrompt(label, defaultValue = '') {
      return openModalDialog('prompt-modal', (modal, close) => {
        document.getElementById('prompt-modal-label').textContent = label;
        const input = document.getElementById('prompt-modal-input');
        input.value = defaultValue;
        const okBtn = document.getElementById('prompt-modal-ok');
        const cancelBtn = document.getElementById('prompt-modal-cancel');
        function onOk() { close(input.value); }
        function onCancel() { close(null); }
        function onKey(e) {
          if (e.key === 'Enter') { e.preventDefault(); onOk(); }
          if (e.key === 'Escape') { e.stopPropagation(); onCancel(); }
        }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        input.addEventListener('keydown', onKey);
        input.focus();
        input.select();
        return () => {
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          input.removeEventListener('keydown', onKey);
        };
      });
    }

    function showAlert(message) {
      return openModalDialog('alert-modal', (modal, close) => {
        document.getElementById('alert-modal-msg').textContent = message;
        const okBtn = document.getElementById('alert-modal-ok');
        function onKey(e) { if (e.key === 'Escape' || e.key === 'Enter') { e.stopPropagation(); close(); } }
        okBtn.addEventListener('click', close);
        modal.addEventListener('keydown', onKey);
        okBtn.focus();
        return () => {
          okBtn.removeEventListener('click', close);
          modal.removeEventListener('keydown', onKey);

    function showSettingsModal() {
      return openModalDialog('settings-modal', (modal, close) => {
        const summaryEl = document.getElementById('settings-drive-summary');
        const detailEl = document.getElementById('settings-drive-detail');
        const closeBtn = document.getElementById('settings-close-btn');
        const connectBtn = document.getElementById('settings-connect-btn');
        const disconnectBtn = document.getElementById('settings-disconnect-btn');
        const trap = createFocusTrap(modal, 'button:not([hidden])');
        let closed = false;

        function renderSettings(loading = false) {
          if (state.driveConnected) {
            summaryEl.textContent = 'Google Drive is connected.';
            detailEl.textContent = loading
              ? 'Loading connected account…'
              : (state.driveUser
                ? formatDriveUser(state.driveUser, 'Unknown user')
                : (state.driveUserLoadFailed ? 'Unable to load account details.' : 'Connected to Google Drive.'));
          } else {
            summaryEl.textContent = 'Google Drive is not connected.';
            detailEl.textContent = 'Connect Google Drive to sync your lists across devices.';
          }
          connectBtn.hidden = state.driveConnected;
          disconnectBtn.hidden = !state.driveConnected;
        }

        async function hydrateDriveUser() {
          if (!state.driveConnected) return;
          renderSettings(true);
          try {
            await loadDriveUser();
          } catch (err) {
            state.driveUserLoadFailed = true;
            if (DEBUG) console.warn('[Drive] load user in settings failed', err);
          }
          if (!closed) {
            if (state.driveConnected) renderDriveStatusIndicator('connected');
            renderSettings(false);
          }
        }

        function onClose() { close(null); }
        function onConnect() { close('connect'); }
        function onDisconnect() { close('disconnect'); }
        function onBackdrop(e) { if (e.target === modal) close(null); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(null); } }

        renderSettings();
        renderRecurrenceLegend();
        if (state.driveConnected) hydrateDriveUser();
        closeBtn.addEventListener('click', onClose);
        connectBtn.addEventListener('click', onConnect);
        disconnectBtn.addEventListener('click', onDisconnect);
        modal.addEventListener('click', onBackdrop);
        modal.addEventListener('keydown', onKey);
        modal.addEventListener('keydown', trap);
        closeBtn.focus();

        return () => {
          closed = true;
          closeBtn.removeEventListener('click', onClose);
          connectBtn.removeEventListener('click', onConnect);
          disconnectBtn.removeEventListener('click', onDisconnect);
          modal.removeEventListener('click', onBackdrop);
          modal.removeEventListener('keydown', onKey);
          modal.removeEventListener('keydown', trap);
        };
      }).then(async action => {
        if (action === 'disconnect') {
          if (await showConfirm('Disconnect from Google Drive?')) disconnectDrive();
          return;
        }
        if (action === 'connect') {
          if (typeof google === 'undefined' || !google.accounts) {
            await showAlert('Google Sign-In is still loading. Please try again in a moment.');
            return;
          }
          connectDrive();
        }
      });
    }

    async function deleteCurrentList() {
      const list = state.lists[state.currentIndex];
      if (!list) return;
      const itemCount = list.items.length;
      const message = itemCount > 0
        ? `Delete "${list.name}"? This will permanently remove ${itemCount} item${itemCount === 1 ? '' : 's'}.`
        : `Delete "${list.name}"?`;
