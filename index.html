    // Builds and returns a fully-wired <li> element for a single list item.
    // Keeping item DOM construction here separates it from renderItems' concern
    // of managing the container and the empty-state check.
    function createItemElement(item, itemIndex) {
      const li = document.createElement('li');
      li.className = 'item';
      li.dataset.itemIndex = itemIndex;

      if (!item.checked) {
        li.addEventListener('pointerdown', (e) => itemDrag.onPointerDown(e, li, itemIndex));
      }

      const checkbox = document.createElement('button');
      checkbox.type = 'button';
      checkbox.className = `checkbox ${item.checked ? 'checked' : ''}`;
      checkbox.setAttribute('aria-label', item.checked ? 'Uncheck item' : 'Check item');
      checkbox.onclick = (e) => { e.stopImmediatePropagation(); toggleItem(state.currentIndex, itemIndex); };

      const textSpan = document.createElement('span');
      textSpan.className = `item-text ${item.checked ? 'checked' : ''}`;
      const meta = getItemMeta(item.text);
      textSpan.textContent = meta.displayText;
      const displayForActions = meta.displayText || item.text;

      const moveControls = document.createElement('div');
      moveControls.className = 'move-controls';

      if (!item.checked) {
        const up = document.createElement('button');
        up.type = 'button'; up.className = 'move-btn'; up.textContent = '↑';
        up.setAttribute('aria-label', 'Move item up');
        up.onclick = (e) => { e.stopImmediatePropagation(); moveItemUp(state.currentIndex, itemIndex); };

        const down = document.createElement('button');
        down.type = 'button'; down.className = 'move-btn'; down.textContent = '↓';
        down.setAttribute('aria-label', 'Move item down');
        down.onclick = (e) => { e.stopImmediatePropagation(); moveItemDown(state.currentIndex, itemIndex); };

        const move = document.createElement('button');
        move.type = 'button'; move.className = 'move-btn'; move.textContent = '→';
        move.setAttribute('aria-label', 'Move item to another list');
        move.onclick = (e) => { e.stopImmediatePropagation(); startMoveMode(state.currentIndex, itemIndex); };

        moveControls.append(up, down, move);
      }

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'delete-btn';
      del.textContent = '×';
      del.setAttribute('aria-label', 'Delete item');
      del.onclick = async (e) => { e.stopImmediatePropagation(); if (await showConfirm(`Delete "${displayForActions}"?`)) deleteItem(state.currentIndex, itemIndex); };

      const editBtn = document.createElement('button');
      editBtn.type = 'button';
      editBtn.className = 'edit-btn';
      editBtn.textContent = '✎';
      editBtn.setAttribute('aria-label', 'Edit item');
      editBtn.onclick = (e) => { e.stopImmediatePropagation(); editItem(state.currentIndex, itemIndex); };

      const children = [checkbox, textSpan];
      if (meta.recurrenceLabel) {
        const hint = document.createElement('span');
        hint.className = 'recurrence-hint';
        hint.textContent = meta.recurrenceLabel;
        if (!item.checked && meta.rule) {
          const { overdue, dueAt } = evaluateRecurrence(meta.rule, item);
          const overdueHint = formatOverdueHint(overdue, dueAt);
          if (overdueHint) applyOverdueHint(li, hint, overdueHint);
        }
        children.push(hint);
      } else if (meta.dueLabel || item.dueAt) {
        const hint = document.createElement('span');
        hint.className = 'due-hint';
        if (!item.checked && item.dueAt) {
          const overdueHint = formatOverdueHint(Date.now() > item.dueAt, item.dueAt);
          if (overdueHint) applyOverdueHint(li, hint, overdueHint);
          else hint.textContent = formatDueLabel(item.dueAt);
        } else if (item.dueAt && item.checked) {
          hint.textContent = formatDueLabel(item.dueAt);
        } else {
          hint.textContent = meta.dueLabel;
        }
        children.push(hint);
      }
      children.push(moveControls, editBtn, del);
      li.append(...children);
      return li;
    }

    // ==================== RECURRENCE ====================
    // Recurrent item state contract:
    //   checked   — dormant (Recurrent section) vs active; toggled by syncRecurrenceState + completeRecurrentItem
    //   checkedAt — lastDoneAt; kept while active so interval math survives overlord activation
    const REC_MONTHS = {
      january: 1, jan: 1, february: 2, feb: 2, march: 3, mar: 3, april: 4, apr: 4,
      may: 5, june: 6, jun: 6, july: 7, jul: 7, august: 8, aug: 8,
      september: 9, sep: 9, sept: 9, october: 10, oct: 10, november: 11, nov: 11,
      december: 12, dec: 12,
    };
    const REC_WEEKDAYS = {
      sunday: 0, sun: 0, monday: 1, mon: 1, tuesday: 2, tue: 2, tues: 2,
      wednesday: 3, wed: 3, thursday: 4, thu: 4, thur: 4, thurs: 4,
      friday: 5, fri: 5, saturday: 6, sat: 6,
    };
    const REC_SEASONS = {
      spring: [3, 4, 5], summer: [6, 7, 8], autumn: [9, 10, 11], fall: [9, 10, 11], winter: [12, 1, 2],
    };
    const REC_ORDINALS = { first: 1, second: 2, third: 3, fourth: 4, last: -1 };

    function recStartOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    function recDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function recNthWeekdayOfMonth(year, month, weekday, ordinal) {
      if (ordinal === -1) {
        for (let day = recDaysInMonth(year, month); day >= 1; day--) {
          const dt = new Date(year, month - 1, day);
          if (dt.getDay() === weekday) return recStartOfDay(dt);
        }
        return null;
      }
      let count = 0;
      for (let day = 1; day <= recDaysInMonth(year, month); day++) {
        const dt = new Date(year, month - 1, day);
        if (dt.getDay() === weekday) {
          count++;
          if (count === ordinal) return recStartOfDay(dt);
        }
      }
      return null;
    }

    function recAddIntervalMs(ms, every, unit) {
      const d = new Date(ms);
      if (unit === 'day') d.setDate(d.getDate() + every);
      else if (unit === 'week') d.setDate(d.getDate() + every * 7);
      else if (unit === 'month') d.setMonth(d.getMonth() + every);
      else if (unit === 'year') d.setFullYear(d.getFullYear() + every);
      return d.getTime();
    }

    function recMonthInWindow(m, window) {
      if (!window) return true;
      if (window.type === 'months') return window.months.has(m);
      if (window.from <= window.to) return m >= window.from && m <= window.to;
      return m >= window.from || m <= window.to;
    }

    function recParseWindow(expr) {
      const e = expr.trim().toLowerCase();
      if (REC_SEASONS[e]) return { type: 'months', months: new Set(REC_SEASONS[e]) };
      if (e.includes(' to ')) {
        const [a, b] = e.split(' to ').map(s => s.trim());
        const from = REC_MONTHS[a], to = REC_MONTHS[b];
        if (from && to) return { type: 'range', from, to };
      }
      if (e.includes(' and ')) {
        const parts = e.split(' and ').map(s => REC_MONTHS[s.trim()]);
        if (parts.every(Boolean)) return { type: 'months', months: new Set(parts) };
      }
      const single = REC_MONTHS[e];
      if (single) return { type: 'months', months: new Set([single]) };
      return null;
    }

    function recParseClockTime(s) {
      const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return null;
      const hour = Number(m[1]);
      const minute = Number(m[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
      return hour * 60 + minute;
    }

    function recParseDailyTimesRule(s) {
      if (!/\d{1,2}:\d{2}/.test(s)) return null;
      const parts = s.split(/\s+and\s+/);
      const times = [];
      for (const part of parts) {
        const mins = recParseClockTime(part);
        if (mins == null) return null;
        times.push(mins);
      }
      if (times.length === 0) return null;
      return { type: 'dailyTimes', times: [...new Set(times)].sort((a, b) => a - b) };
    }

    function recDailyTimeSlotMs(dayStart, minutes) {
      return dayStart + minutes * 60 * 1000;
    }

    function recDailyTimeSlotsForDay(dayStart, times) {
      return times.map(mins => recDailyTimeSlotMs(dayStart, mins));
    }

    function recNextDailyTimeSlotAfter(times, afterMs, now = new Date()) {
      for (let dayOffset = 0; dayOffset < 3; dayOffset++) {
        const dayStart = recStartOfDay(new Date(now.getFullYear(), now.getMonth(), now.getDate() + dayOffset));
        for (const slot of recDailyTimeSlotsForDay(dayStart, times)) {
          if (slot > afterMs) return slot;
        }
      }
      return null;
    }

    function recParseIntervalPart(s) {
      let m = s.match(/^every\s+(\d+)?\s*(day|days|week|weeks|month|months|year|years)$/);
      if (m) {
        const n = m[1] ? Number(m[1]) : 1;
        const u = m[2];
        const unit = u.startsWith('day') ? 'day' : u.startsWith('week') ? 'week' : u.startsWith('month') ? 'month' : 'year';
        return n > 0 ? { every: n, unit } : null;
      }
      m = s.match(/^(\d+)\s*(d|w|m|y)$/);
      if (m) {
        const unit = { d: 'day', w: 'week', m: 'month', y: 'year' }[m[2]];
        const n = Number(m[1]);
        return n > 0 ? { every: n, unit } : null;
      }
      m = s.match(/^(\d+)\s+(day|days|week|weeks|month|months|year|years)$/);
      if (m) {
        const n = Number(m[1]);
        const u = m[2];
        const unit = u.startsWith('day') ? 'day' : u.startsWith('week') ? 'week' : u.startsWith('month') ? 'month' : 'year';
        return n > 0 ? { every: n, unit } : null;
      }
      return null;
    }

    function recSplitRuleAndHome(raw) {
      let home = null;
      const ruleParts = [];
      raw.split('|').forEach(part => {
        const trimmed = part.trim();
        const hm = trimmed.match(/^home:\s*(.+)$/i);
        if (hm) home = hm[1].trim();
        else if (trimmed) ruleParts.push(trimmed);
      });
      return { ruleText: ruleParts.join(' | '), home };
    }

    function parseRecurrenceRule(raw) {
      const s = raw.toLowerCase().replace(/\s+/g, ' ').trim();
      if (!s) return null;

      let m = s.match(/^(?:on\s+)?(\d{1,2})\s+([a-z]+)$/);
      if (m) {
        const day = Number(m[1]), month = REC_MONTHS[m[2]];
        if (month && day >= 1 && day <= 31) return { type: 'annualDate', day, month };
      }

      m = s.match(/^(last|first|second|third|fourth)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\s+(?:of\s+)?each\s+month$/);
      if (m) {
        const ordinal = REC_ORDINALS[m[1]];
        const weekday = REC_WEEKDAYS[m[2]];
        if (ordinal != null && weekday !== undefined) return { type: 'weekdayOfMonth', ordinal, weekday };
      }

      m = s.match(/^once\s+in\s+(.+)$/);
      if (m) {
        const w = recParseWindow(m[1]);
        if (w && w.type === 'months') return { type: 'onceInMonths', months: [...w.months].sort((a, b) => a - b) };
      }

      if (!s.includes('every') && !/\d\s*(d|w|m|y)\b/.test(s) && !/\d\s+(day|week|month|year)/.test(s)) {
        m = s.match(/^in\s+(.+)$/);
        if (m) {
          const w = recParseWindow(m[1]);
          if (w && w.type === 'months') return { type: 'onceInMonths', months: [...w.months].sort((a, b) => a - b) };
        }
      }

      if (s === 'every month') return { type: 'dayOfMonth', day: 1 };

      const dailyTimes = recParseDailyTimesRule(s);
      if (dailyTimes) return dailyTimes;

      m = s.match(/^on\s+the\s+(\d{1,2})(?:st|nd|rd|th)?(?:\s+of\s+every\s+month)?$/);
      if (m) {
        const day = Number(m[1]);
        if (day >= 1 && day <= 31) return { type: 'dayOfMonth', day };
      }

      m = s.match(/^every\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)(?:\s+in\s+(.+))?$/);
      if (m) {
        const weekday = REC_WEEKDAYS[m[1]];
        const window = m[2] ? recParseWindow(m[2]) : null;
        if (weekday !== undefined && (!m[2] || window)) return { type: 'everyWeekday', weekday, window };
      }

      m = s.match(/^(.+?)\s+in\s+(.+)$/);
      if (m) {
        const interval = recParseIntervalPart(m[1]);
        const window = recParseWindow(m[2]);
        if (interval && window) return recIntervalRule(interval, window);
      }

      const interval = recParseIntervalPart(s);
      if (interval) return recIntervalRule(interval, null);

      return null;
    }

    function recIntervalRule(interval, window) {
      if (interval.unit === 'month') {
        if (interval.every === 1) return { type: 'dayOfMonth', day: 1, window };
        return { type: 'everyNMonths', every: interval.every, window };
      }
      return { type: 'interval', ...interval, window };
    }

    function parseRecurrence(raw) {
      const { ruleText, home } = recSplitRuleAndHome(raw.trim());
      const rule = parseRecurrenceRule(ruleText);
      if (!rule) return null;
      if (home) rule.home = home;
      return rule;
    }

    function findListIndexByName(name) {
      return state.lists.findIndex(l => l.name === name);
    }

    function promoteItemToTop(list, itemIndex) {
      if (itemIndex <= 0) return false;
      const [item] = list.items.splice(itemIndex, 1);
      list.items.unshift(item);
      return true;
    }

    function returnRecurrentItemToHome(listIndex, itemIndex, rule) {
      if (!rule.home) return;
      const homeIdx = findListIndexByName(rule.home);
      if (homeIdx < 0 || homeIdx === listIndex) return;
      const [moved] = state.lists[listIndex].items.splice(itemIndex, 1);
      state.lists[homeIdx].items.unshift(moved);
      if (state.pendingMove && state.pendingMove.listIndex === listIndex && state.pendingMove.itemIndex === itemIndex) {
        cancelMoveMode();
      }
    }

    const recurrenceMetaCache = new Map();
    let recurrenceJustCompleted = null; // Set<item> — skip auto-reactivation in the next sync pass

    function buildItemMeta(text) {
      if (typeof text !== 'string') return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
      const recMatch = text.match(/\s*\[recurrent:\s*([^\]]+)\]\s*$/i);
      if (recMatch) {
        const bracketContent = recMatch[1].trim();
        const rule = parseRecurrence(bracketContent);
        if (!rule) return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
        return {
          displayText: text.slice(0, recMatch.index).trimEnd(),
          recurrenceLabel: recSplitRuleAndHome(bracketContent).ruleText,
          rule,
          dueLabel: null,
        };
      }
      const dueMatch = text.match(/\s*\[due:\s*([^\]]+)\]\s*$/i);
      if (dueMatch) {
        const dueContent = dueMatch[1].trim();
        if (!parseDueDate(dueContent, Date.now())) return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
        return {
          displayText: text.slice(0, dueMatch.index).trimEnd(),
          recurrenceLabel: null,
          rule: null,
          dueLabel: dueContent,
        };
      }
      return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
    }

    function getItemMeta(text) {
      if (!recurrenceMetaCache.has(text)) recurrenceMetaCache.set(text, buildItemMeta(text));
      return recurrenceMetaCache.get(text);
    }

    function clearRecurrenceMetaCache() {
      recurrenceMetaCache.clear();
    }

    function completeRecurrentItem(listIndex, itemIndex, item, rule) {
      item.checked = true;
      item.checkedAt = Date.now();
      if (!recurrenceJustCompleted) recurrenceJustCompleted = new Set();
      recurrenceJustCompleted.add(item);
      returnRecurrentItemToHome(listIndex, itemIndex, rule);
    }

    function recWeekdayOnOrBefore(weekday, now) {
      const d = new Date(recStartOfDay(now));
      const diff = (d.getDay() - weekday + 7) % 7;
      d.setDate(d.getDate() - diff);
      return recStartOfDay(d);
    }

    function recNextWeekdayStart(weekday, afterMs) {
      const d = new Date(afterMs);
      d.setDate(d.getDate() + 1);
      const start = new Date(recStartOfDay(d));
      const diff = (weekday - start.getDay() + 7) % 7;
      start.setDate(start.getDate() + diff);
      return recStartOfDay(start);
    }

    function recDoneInCalendarMonth(lastDone, year, month) {
      if (!lastDone) return false;
      const d = new Date(lastDone);
      return d.getFullYear() === year && d.getMonth() + 1 === month;
    }

    function recOnceInMonthPeriodEnd(year, actMonth) {
      return actMonth === 12
        ? recStartOfDay(new Date(year + 1, 0, 1))
        : recStartOfDay(new Date(year, actMonth, 1));
    }

    // Done during the month, or after its window closed (logged late while overdue).
    function recSatisfiedOnceInMonth(lastDone, year, actMonth) {
      if (recDoneInCalendarMonth(lastDone, year, actMonth)) return true;
      return !!(lastDone && lastDone >= recOnceInMonthPeriodEnd(year, actMonth));
    }

    function recMissedOnceInMonth(rule, lastDone, year, month, todayStart) {
      return rule.months.filter(m => m < month).some(actMonth => {
        const actEnd = recOnceInMonthPeriodEnd(year, actMonth);
        if (todayStart < actEnd) return false;
        return !recSatisfiedOnceInMonth(lastDone, year, actMonth);
      });
    }

    function recEarliestMissedOnceInMonthDueAt(rule, lastDone, year, month, todayStart) {
      const missed = rule.months
        .filter(m => m < month)
        .sort((a, b) => a - b)
        .find(actMonth => {
          const actEnd = recOnceInMonthPeriodEnd(year, actMonth);
          if (todayStart < actEnd) return false;
          return !recSatisfiedOnceInMonth(lastDone, year, actMonth);
        });
      return missed ? recOnceInMonthPeriodEnd(year, missed) : null;
    }

    function recStatus(dormant, overdue, dueAt = null) {
      return { dormant, overdue, dueAt: overdue ? dueAt : null };
    }

    function evaluateRecurrence(rule, item, now = new Date()) {
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const todayStart = recStartOfDay(now);
      const checkedAtMs = Number(item.checkedAt);
      const lastDone = Number.isFinite(checkedAtMs) && checkedAtMs > 0 ? checkedAtMs : null;

      if (rule.type === 'annualDate') {
        const activateStart = recStartOfDay(new Date(year, rule.month - 1, rule.day));
        if (todayStart < activateStart) return recStatus(true, false);
        const doneThisYear = lastDone && lastDone >= activateStart;
        if (doneThisYear) return recStatus(true, false);
        return recStatus(false, true, activateStart);
      }

      if (rule.type === 'dayOfMonth') {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        const activateStart = recStartOfDay(new Date(year, month - 1, rule.day));
        const nextPeriodStart = month === 12
          ? recStartOfDay(new Date(year + 1, 0, rule.day))
          : recStartOfDay(new Date(year, month, rule.day));
        if (recDoneInCalendarMonth(lastDone, year, month) && lastDone >= activateStart) {
          return recStatus(true, false);
        }
        if (todayStart < activateStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextPeriodStart, activateStart);
      }

      if (rule.type === 'weekdayOfMonth') {
        const ordinal = rule.ordinal === -1 ? -1 : rule.ordinal;
        const activateStart = recNthWeekdayOfMonth(year, month, rule.weekday, ordinal);
        const nextMonthStart = recStartOfDay(new Date(year, month, 1));
        if (!activateStart) return recStatus(true, false);
        if (lastDone && lastDone >= activateStart) return recStatus(true, false);
        if (todayStart < activateStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextMonthStart, activateStart);
      }

      if (rule.type === 'onceInMonths') {
        if (!rule.months.includes(month)) {
          if (recMissedOnceInMonth(rule, lastDone, year, month, todayStart)) {
            return recStatus(false, true, recEarliestMissedOnceInMonthDueAt(rule, lastDone, year, month, todayStart));
          }
          return recStatus(true, false);
        }
        const monthStart = recStartOfDay(new Date(year, month - 1, 1));
        const nextMonthStart = month === 12
          ? recStartOfDay(new Date(year + 1, 0, 1))
          : recStartOfDay(new Date(year, month, 1));
        if (lastDone && lastDone >= monthStart && lastDone < nextMonthStart) {
          return recStatus(true, false);
        }
        return recStatus(false, todayStart >= nextMonthStart, monthStart);
      }

      if (rule.type === 'everyWeekday') {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        const periodStart = recWeekdayOnOrBefore(rule.weekday, now);
        const nextPeriodStart = recNextWeekdayStart(rule.weekday, periodStart);
        if (lastDone && lastDone >= periodStart) return recStatus(true, false);
        if (todayStart < periodStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextPeriodStart, periodStart);
      }

      if (rule.type === 'everyNMonths') {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        const anchor = new Date(item.timestamp);
        const anchorMonthIndex = anchor.getFullYear() * 12 + anchor.getMonth();
        const currentMonthIndex = year * 12 + (month - 1);
        const delta = currentMonthIndex - anchorMonthIndex;
        if (delta < 0 || delta % rule.every !== 0) return recStatus(true, false);
        const day = Math.min(anchor.getDate(), recDaysInMonth(year, month));
        const activateStart = recStartOfDay(new Date(year, month - 1, day));
        const nextPeriodStart = recStartOfDay(new Date(year, month - 1 + rule.every, day));
        if (lastDone && lastDone >= activateStart) return recStatus(true, false);
        if (todayStart < activateStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextPeriodStart, activateStart);
      }

      if (rule.type === 'interval') {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        if (!lastDone) return recStatus(false, false);
        const nextDue = recAddIntervalMs(lastDone, rule.every, rule.unit);
        const nextDueStart = recStartOfDay(new Date(nextDue));
        if (todayStart < nextDueStart) return recStatus(true, false);
        return recStatus(false, todayStart > nextDueStart, nextDueStart);
      }

      if (rule.type === 'dailyTimes') {
        const nowMs = now.getTime();
        if (!lastDone) {
          const todaySlots = recDailyTimeSlotsForDay(todayStart, rule.times);
          const passedToday = todaySlots.filter(slot => nowMs >= slot);
          if (passedToday.length === 0) return recStatus(true, false);
          const dueSlot = passedToday[passedToday.length - 1];
          return recStatus(false, nowMs > dueSlot, dueSlot);
        }
        const nextSlot = recNextDailyTimeSlotAfter(rule.times, lastDone, now);
        if (nextSlot == null || nowMs < nextSlot) return recStatus(true, false);
        return recStatus(false, nowMs > nextSlot, nextSlot);
      }

      return recStatus(false, false);
    }

    function syncRecurrenceState() {
      let changed = false;
      state.lists.forEach(list => {
        const toPromote = [];
        list.items.forEach((item, idx) => {
          const { rule } = getItemMeta(item.text);
          if (!rule) return;
          const { dormant } = evaluateRecurrence(rule, item);
          if (dormant && !item.checked) {
            item.checked = true;
            changed = true;
          } else if (!dormant && item.checked) {
            if (recurrenceJustCompleted && recurrenceJustCompleted.has(item)) return;
            item.checked = false;
            toPromote.push(idx);
            changed = true;
          }
        });
        toPromote.sort((a, b) => b - a).forEach(idx => {
          if (promoteItemToTop(list, idx)) changed = true;
        });
      });
      if (recurrenceJustCompleted) recurrenceJustCompleted.clear();
      if (changed) saveData();
    }

    // ==================== DUE DATES ====================
    // One-shot deadlines via [due: …]. Relative offsets resolve from item.timestamp (add time).
    // Date-only values use start-of-day; checked items keep the bracket and move to Finished.

    function dueAtFromYMD(year, month, day, timeStr) {
      if (!Number.isFinite(year) || month < 1 || month > 12 || day < 1 || day > 31) return null;
      const probe = new Date(year, month - 1, day);
      if (probe.getFullYear() !== year || probe.getMonth() !== month - 1 || probe.getDate() !== day) return null;
      let dueAt = recStartOfDay(probe);
      if (timeStr) {
        const mins = recParseClockTime(timeStr);
        if (mins == null) return null;
        dueAt += mins * 60 * 1000;
      }
      return dueAt;
    }

    function dueDayMonthFromDmy(first, second) {
      if (first > 12) return { day: first, month: second };
      if (second > 12) return { day: second, month: first };
      return { day: first, month: second };
    }

    function parseDueDate(raw, anchorMs) {
      const s = raw.toLowerCase().replace(/\s+/g, ' ').trim();
      if (!s) return null;

      let interval = recParseIntervalPart(s);
      if (!interval && s.startsWith('in ')) interval = recParseIntervalPart(s.slice(3).trim());
      if (interval) return { dueAt: recAddIntervalMs(anchorMs, interval.every, interval.unit), label: raw.trim() };

      const anchor = new Date(anchorMs);
      if (s === 'today') return { dueAt: recStartOfDay(anchor), label: 'today' };
      if (s === 'tomorrow') {
        const d = new Date(anchor);
        d.setDate(d.getDate() + 1);
        return { dueAt: recStartOfDay(d), label: 'tomorrow' };
      }

      let m = s.match(/^(today|tomorrow)\s+(\d{1,2}:\d{2})$/);
      if (m) {
        const d = new Date(anchor);
        if (m[1] === 'tomorrow') d.setDate(d.getDate() + 1);
        const mins = recParseClockTime(m[2]);
        if (mins == null) return null;
        return { dueAt: recStartOfDay(d) + mins * 60 * 1000, label: raw.trim() };
      }

      // ISO / numeric year-first: 2026-06-28, 2026/6/28, 2026-06-28 17:00, 2026-06-28t17:00
      m = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})(?:[t\s]+(\d{1,2}:\d{2}))?$/);
      if (m) {
        const dueAt = dueAtFromYMD(Number(m[1]), Number(m[2]), Number(m[3]), m[4]);
        if (dueAt != null) return { dueAt, label: raw.trim() };
      }

      // Day-first numeric: 28-06-2026, 28/06/2026, 28.06.2026 17:00 (DD-MM-YYYY when ambiguous)
      m = s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})(?:\s+(\d{1,2}:\d{2}))?$/);
      if (m) {
        const { day, month } = dueDayMonthFromDmy(Number(m[1]), Number(m[2]));
        const dueAt = dueAtFromYMD(Number(m[3]), month, day, m[4]);
        if (dueAt != null) return { dueAt, label: raw.trim() };
      }

      m = s.match(/^(\d{1,2})\s+([a-z]+)(?:\s+(\d{1,2}:\d{2}))?$/);
      if (m) {
        const day = Number(m[1]);
        const month = REC_MONTHS[m[2]];
        if (!month || day < 1 || day > 31) return null;
        let dueAt = recStartOfDay(new Date(anchor.getFullYear(), month - 1, day));
        if (m[3]) {
          const mins = recParseClockTime(m[3]);
          if (mins == null) return null;
          dueAt += mins * 60 * 1000;
        }
        return { dueAt, label: raw.trim() };
      }

      return null;
    }

    function applyDueFromText(item) {
      const match = typeof item.text === 'string' ? item.text.match(/\s*\[due:\s*([^\]]+)\]\s*$/i) : null;
      if (!match) {
        delete item.dueAt;
        return;
      }
      const parsed = parseDueDate(match[1].trim(), item.timestamp);
      if (parsed) item.dueAt = parsed.dueAt;
      else delete item.dueAt;
    }

    function dueHasClockTime(dueAt) {
      const d = new Date(dueAt);
      return d.getHours() !== 0 || d.getMinutes() !== 0;
    }

    function dueFormatClockTime(dueAt) {
      const d = new Date(dueAt);
      return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function dueFormatShortDate(dueAt, includeTime) {
      const d = new Date(dueAt);
      const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
      const base = `${d.getDate()} ${months[d.getMonth()]}`;
      return includeTime ? `${base} ${dueFormatClockTime(dueAt)}` : base;
    }

    function formatOverdueHint(isOverdue, dueAt) {
      if (!isOverdue) return null;
      return dueAt ? formatDueDisplay(dueAt) : 'overdue';
    }

    function applyOverdueHint(li, hint, hintText) {
      hint.classList.add('hint-overdue');
      li.classList.add('item-overdue');
      hint.textContent = hintText;
    }

    function formatDueLabel(dueAt, now = new Date()) {
      const todayStart = recStartOfDay(now);
      const dueDayStart = recStartOfDay(new Date(dueAt));
      const hasTime = dueHasClockTime(dueAt);
      if (dueDayStart === todayStart) return hasTime ? `today ${dueFormatClockTime(dueAt)}` : 'today';
      if (dueDayStart === todayStart + 864e5) return hasTime ? `tomorrow ${dueFormatClockTime(dueAt)}` : 'tomorrow';
      return dueFormatShortDate(dueAt, hasTime);
    }

    function formatDueDisplay(dueAt, now = new Date()) {
      const nowMs = now.getTime();
      if (nowMs > dueAt) {
        const days = Math.floor((nowMs - dueAt) / 864e5);
        if (days < 1) return 'overdue';
        if (days === 1) return 'overdue · 1 day';
        return `overdue · ${days} days`;
      }
      return formatDueLabel(dueAt, now);
    }

    function syncDueState() {
      let changed = false;
      state.lists.forEach(list => {
        const toPromote = [];
        list.items.forEach((item, idx) => {
          if (item.checked) return;
          const { dueLabel } = getItemMeta(item.text);
          if (!dueLabel && !item.dueAt) return;
          if (!item.dueAt) applyDueFromText(item);
          if (!item.dueAt || Date.now() <= item.dueAt) return;
          toPromote.push(idx);
        });
        toPromote.sort((a, b) => b - a).forEach(idx => {
          if (promoteItemToTop(list, idx)) changed = true;
        });
      });
      if (changed) saveData();
    }

    function runDueSelfTest() {
      const anchor = new Date(2026, 2, 17, 10, 30).getTime();
      const cases = [
        ['tomorrow', recStartOfDay(new Date(2026, 2, 18))],
        ['2w', recAddIntervalMs(anchor, 2, 'week')],
        ['17 march', recStartOfDay(new Date(2026, 2, 17))],
        ['17 march 17:00', recStartOfDay(new Date(2026, 2, 17)) + 17 * 60 * 60 * 1000],
        ['in 3 days', recAddIntervalMs(anchor, 3, 'day')],
        ['2026-06-28', recStartOfDay(new Date(2026, 5, 28))],
        ['2026/06/28', recStartOfDay(new Date(2026, 5, 28))],
        ['28-06-2026', recStartOfDay(new Date(2026, 5, 28))],
        ['28.06.2026 17:00', recStartOfDay(new Date(2026, 5, 28)) + 17 * 60 * 60 * 1000],
        ['2026-06-28t17:00', recStartOfDay(new Date(2026, 5, 28)) + 17 * 60 * 60 * 1000],
      ];
      cases.forEach(([input, expect]) => {
        const got = parseDueDate(input, anchor);
        if (!got || got.dueAt !== expect) throw new Error(`parseDueDate("${input}") expected ${expect}, got ${got ? got.dueAt : null}`);
      });
      if (parseDueDate('not a date', anchor)) throw new Error('parseDueDate should reject unknown input');
      const overdueText = formatDueDisplay(recStartOfDay(new Date(2026, 2, 16)), new Date(2026, 2, 17));
      if (overdueText !== 'overdue · 1 day') throw new Error(`formatDueDisplay overdue expected "overdue · 1 day", got "${overdueText}"`);
      if (DEBUG) console.log('%c[Inbox] Due self-test passed.', 'color:#34c759');
    }

    function runRecurrenceSelfTest() {
      const parseCases = [
        ['once in november and june', 'onceInMonths'],
        ['1 week in may to september', 'interval'],
        ['4 may', 'annualDate'],
        ['last sunday each month', 'weekdayOfMonth'],
        ['every month', 'dayOfMonth'],
        ['every 3 months', 'everyNMonths'],
        ['every 2 weeks | home: Garden', 'interval'],
        ['08:00 and 20:00', 'dailyTimes'],
        ['8:00', 'dailyTimes'],
        ['not a rule', null],
      ];
      parseCases.forEach(([input, expect]) => {
        const rule = parseRecurrence(input);
        const got = rule ? rule.type : null;
        if (got !== expect) throw new Error(`parseRecurrence("${input}") expected ${expect}, got ${got}`);
      });
      const dormantItem = { text: 'X [recurrent: 4 may]', timestamp: Date.now(), checked: false };
      const apr1 = new Date(2026, 3, 1);
      const status = evaluateRecurrence(parseRecurrence('4 may'), dormantItem, apr1);
      if (!status.dormant) throw new Error('annual 4 may should be dormant before activation');
      const may10 = new Date(2026, 4, 10);
      const completed = { text: 'X [recurrent: 4 may]', timestamp: Date.now(), checked: true, checkedAt: may10.getTime() };
      const afterComplete = evaluateRecurrence(parseRecurrence('4 may'), completed, may10);
      if (!afterComplete.dormant) throw new Error('annual 4 may should be dormant after completion');
      const timesRule = parseRecurrence('08:00 and 20:00');
      const beforeMorning = evaluateRecurrence(timesRule, { timestamp: Date.now(), checked: false }, new Date(2026, 5, 25, 7, 30));
      if (!beforeMorning.dormant) throw new Error('08:00 and 20:00 should be dormant before first slot');
      const afterMorning = evaluateRecurrence(timesRule, { timestamp: Date.now(), checked: false }, new Date(2026, 5, 25, 8, 5));
      if (afterMorning.dormant) throw new Error('08:00 and 20:00 should be active after 08:00');
      const doneMorning = { timestamp: Date.now(), checked: true, checkedAt: new Date(2026, 5, 25, 8, 10).getTime() };
      const beforeEvening = evaluateRecurrence(timesRule, doneMorning, new Date(2026, 5, 25, 12, 0));
      if (!beforeEvening.dormant) throw new Error('08:00 and 20:00 should be dormant before 20:00 after morning completion');
      const onceMayRule = parseRecurrence('once in may');
      const overdueJune = evaluateRecurrence(onceMayRule, { timestamp: Date.now(), checked: false }, new Date(2026, 5, 15));
      if (overdueJune.dormant) throw new Error('once in may should be overdue in June before completion');
      if (!overdueJune.dueAt) throw new Error('once in may overdue should include dueAt');
      const annualOverdue = evaluateRecurrence(parseRecurrence('4 may'), { timestamp: Date.now(), checked: false }, new Date(2026, 4, 10));
      if (!annualOverdue.overdue || !annualOverdue.dueAt) throw new Error('annual 4 may should be overdue with dueAt on May 10');
      const doneLateJune = { timestamp: Date.now(), checked: true, checkedAt: new Date(2026, 5, 25).getTime() };
      const afterLateComplete = evaluateRecurrence(onceMayRule, doneLateJune, new Date(2026, 5, 25));
      if (!afterLateComplete.dormant) throw new Error('once in may should be dormant after late June completion');
      const stillDormantJuly = evaluateRecurrence(onceMayRule, doneLateJune, new Date(2026, 6, 1));
      if (!stillDormantJuly.dormant) throw new Error('once in may should stay dormant in July after June completion');
      if (DEBUG) console.log('%c[Inbox] Recurrence self-test passed.', 'color:#34c759');
    }

    function renderRecurrenceLegend() {
      const el = document.getElementById('settings-recurrence-legend');
      if (!el) return;
      el.innerHTML = `
        <h4>Recurring items</h4>
        <p>Add a bracket at the end of the item text. Unknown brackets are treated as normal items.</p>
        <h4>Examples</h4>
        <pre>- [ ] Prune shrubs [recurrent: once in june and august]
- [ ] Mow lawn [recurrent: 1 week in may to september | home: Garden]
- [ ] Take meds [recurrent: 08:00 and 20:00]
- [ ] File taxes [recurrent: 4 may]
- [ ] Change air filter [recurrent: last sunday each month]
- [ ] Pay rent [recurrent: every month]
- [ ] Insurance [recurrent: on the 15th of every month]</pre>
        <h4>Rules</h4>
        <p><strong>every day/week</strong> · <strong>08:00 and 20:00</strong> (daily times) · <strong>every month</strong> (1st) · <strong>every 3 months</strong> (calendar) · <strong>1 week in may to september</strong> · <strong>once in june and august</strong> · <strong>4 may</strong> · <strong>last sunday each month</strong> · <strong>every monday</strong> · <strong>| home: Listname</strong></p>
        <p>Recurring items show their rule on the right (e.g. <em>once in june and august</em>). Optional <strong>| home: Garden</strong> returns the item to that list when checked. If the list does not exist, it stays put. Done recurring items appear under <strong>Recurrent</strong> until their next due date; tap to log done early. Regular done items appear under <strong>Finished</strong>. When a recurring item activates, it moves to the top; you can reorder active items manually. Overdue recurring items show the same <strong>overdue</strong> hint and highlighting as due items.</p>
        <h4>Due items</h4>
        <p>Add <strong>[due: …]</strong> for a one-shot deadline. Relative offsets resolve when you add the item.</p>
        <h4>Examples</h4>
        <pre>- [ ] Buy milk [due: tomorrow 17:00]
- [ ] Call dentist [due: 17 march]
- [ ] Ship release [due: 2026-06-28]
- [ ] Review PR [due: 2w]
- [ ] Quick task [due: in 3 days]</pre>
        <h4>Rules</h4>
        <p><strong>today</strong> · <strong>tomorrow</strong> · <strong>17 march</strong> (start of day) · <strong>17 march 17:00</strong> · <strong>2026-06-28</strong> / <strong>28-06-2026</strong> / <strong>2026/06/28</strong> · optional <strong>17:00</strong> or <strong>T17:00</strong> · <strong>1d</strong> / <strong>2w</strong> / <strong>in 2 weeks</strong> (from add time)</p>
        <p>Due date shows on the right. Overdue items are highlighted and move to the top. Checking moves them to <strong>Finished</strong>; the bracket is kept.</p>
      `;
    }

    const BUCKET_ORDER = ['today', 'yesterday', 'last week', 'older'];
    const BUCKET_LABELS = { today: 'Today', yesterday: 'Yesterday', 'last week': 'Last week', older: 'Older' };
    function getCheckedDateBucket(checkedAt) {
      if (!checkedAt) return 'older';
      const todayStart = recStartOfDay(new Date());
      if (checkedAt >= todayStart) return 'today';
      if (checkedAt >= todayStart - 864e5) return 'yesterday';
      if (checkedAt >= todayStart - 7 * 864e5) return 'last week';
      return 'older';
    }

    function renderItems() {
      clearRecurrenceMetaCache();
      const container = document.getElementById('items-container');
      container.innerHTML = '';
      const list = state.lists[state.currentIndex];
      if (!list || list.items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = list ? 'No items in this list.' : 'No lists yet.';
        container.appendChild(empty);
        return;
      }

      const active = [], recurrent = [], finished = [];
      list.items.forEach((item, idx) => {
        const { rule } = getItemMeta(item.text);
        if (!item.checked) {
          active.push({ item, idx });
          return;
        }
        if (rule) recurrent.push({ item, idx });
        else finished.push({ item, idx });
      });

      if (active.length > 0) {
        const ul = document.createElement('ul');
        active.forEach(({ item, idx }) => ul.appendChild(createItemElement(item, idx)));
        container.appendChild(ul);
      } else if (recurrent.length === 0 && finished.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'No items in this list.';
        container.appendChild(empty);
      }

      function appendCollapsibleSection(title, count, getOpen, setOpen, buildList) {
        const section = document.createElement('div');
        section.className = 'finished-section';

        const toggle = document.createElement('button');
        toggle.type = 'button';
        toggle.className = 'finished-toggle';

        const arrow = document.createElement('span');
        arrow.className = `finished-toggle-arrow${getOpen() ? ' open' : ''}`;
        arrow.textContent = '▶';

        toggle.appendChild(arrow);
        toggle.appendChild(document.createTextNode(` ${title} (${count})`));

        const itemsDiv = document.createElement('div');
        itemsDiv.className = `finished-items${getOpen() ? ' open' : ''}`;
        itemsDiv.appendChild(buildList());

        toggle.onclick = () => {
          const next = !getOpen();
          setOpen(next);
          arrow.classList.toggle('open', next);
          itemsDiv.classList.toggle('open', next);
        };

        section.appendChild(toggle);
        section.appendChild(itemsDiv);
        container.appendChild(section);
      }

      if (recurrent.length > 0) {
        appendCollapsibleSection('Recurrent', recurrent.length, () => recurrentOpen, (v) => { recurrentOpen = v; }, () => {
          const ul = document.createElement('ul');
          recurrent.forEach(({ item, idx }) => {
            const li = createItemElement(item, idx);
            li.classList.add('finished-item');
            ul.appendChild(li);
          });
          return ul;
        });
      }

      if (finished.length > 0) {
        appendCollapsibleSection('Finished', finished.length, () => finishedOpen, (v) => { finishedOpen = v; }, () => {
          const buckets = { today: [], yesterday: [], 'last week': [], older: [] };
          finished.forEach(({ item, idx }) => buckets[getCheckedDateBucket(item.checkedAt)].push({ item, idx }));

          const ul = document.createElement('ul');
          BUCKET_ORDER.forEach(key => {
            if (buckets[key].length === 0) return;
            const header = document.createElement('li');
            header.className = 'finished-group-header';
            header.setAttribute('aria-hidden', 'true');
            header.textContent = BUCKET_LABELS[key];
            ul.appendChild(header);
            buckets[key].forEach(({ item, idx }) => {
              const li = createItemElement(item, idx);
              li.classList.add('finished-item');
              ul.appendChild(li);
            });
          });
          return ul;
        });
      }
    }

    function toggleItem(listIndex, itemIndex) {
      const item = state.lists[listIndex].items[itemIndex];
      const { rule } = getItemMeta(item.text);
      if (rule) {
        completeRecurrentItem(listIndex, itemIndex, item, rule);
      } else {
        item.checked = !item.checked;
        if (item.checked) item.checkedAt = Date.now();
        else delete item.checkedAt;
      }
      saveAndRender();
    }
    function deleteItem(listIndex, itemIndex) {
      state.lists[listIndex].items.splice(itemIndex, 1);
      saveAndRender();
    }
    function shiftItem(listIndex, itemIndex, delta) {
      const items = state.lists[listIndex].items;
      const newIndex = itemIndex + delta;
      if (newIndex < 0 || newIndex >= items.length) return;
      [items[newIndex], items[itemIndex]] = [items[itemIndex], items[newIndex]];
      // Keep pendingMove in sync so the correct item is moved when the user picks a target tab
      if (state.pendingMove && state.pendingMove.listIndex === listIndex) {
        if (state.pendingMove.itemIndex === itemIndex) state.pendingMove.itemIndex = newIndex;
        else if (state.pendingMove.itemIndex === newIndex) state.pendingMove.itemIndex = itemIndex;
      }
      saveAndRender();
    }
    function moveItemUp(listIndex, itemIndex) { shiftItem(listIndex, itemIndex, -1); }
    function moveItemDown(listIndex, itemIndex) { shiftItem(listIndex, itemIndex, +1); }
    function cancelMoveMode() {
      state.pendingMove = null;
      document.body.classList.remove('move-mode');
    }
    function startMoveMode(listIndex, itemIndex) {
      state.pendingMove = { listIndex, itemIndex };
      document.body.classList.add('move-mode');
      renderTabs();
    }
    function moveItemToList(fromListIdx, fromItemIdx, toListIdx) {
      if (fromListIdx === toListIdx) { cancelMoveMode(); renderTabs(); return; }
      const item = state.lists[fromListIdx].items.splice(fromItemIdx, 1)[0];
      state.lists[toListIdx].items.unshift(item);
      saveData();
      cancelMoveMode();
      state.currentIndex = toListIdx;
      render();
    }
    function addItem() {
      const input = document.getElementById('add-input');
      if (!input.value.trim()) return;
      if (!state.lists[state.currentIndex]) return;
      // timestamp is stored for export/import round-tripping; not displayed in the UI
      const item = { text: input.value.trim(), timestamp: Date.now(), checked: false };
      applyDueFromText(item);
      state.lists[state.currentIndex].items.unshift(item);
      input.value = '';
      saveAndRender();
      // Delay lets the mobile keyboard reflow before re-focusing the input
      setTimeout(() => input.focus(), INPUT_REFOCUS_DELAY_MS);
    }
    function showListModal() {
      document.getElementById('list-textarea').value = generateListFile();
      openModalDialog('list-modal', (modal, close) => {
        const closeBtn = document.getElementById('modal-close-btn');
        const copyBtn = document.getElementById('modal-copy-btn');
        const doneBtn = document.getElementById('done-btn');
        const trap = createFocusTrap(modal, 'button, textarea');
        function onBackdrop(e) { if (e.target === modal) close(); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(); } }
        closeBtn.addEventListener('click', close);
        copyBtn.addEventListener('click', copyListContent);
        doneBtn.addEventListener('click', close);
        modal.addEventListener('click', onBackdrop);
        modal.addEventListener('keydown', onKey);
        modal.addEventListener('keydown', trap);
        closeBtn.focus();
        return () => {
          closeBtn.removeEventListener('click', close);
          copyBtn.removeEventListener('click', copyListContent);
          doneBtn.removeEventListener('click', close);
          modal.removeEventListener('click', onBackdrop);
          modal.removeEventListener('keydown', onKey);
          modal.removeEventListener('keydown', trap);
          document.getElementById('list-btn').focus();
        };
      });
    }
    function generateListFile(lists) {
      // Format: each list starts with a '# Name' header; items are '- [x]/[ ] text |ts:<epoch_ms>'.
      // The '|ts:' suffix replaced the legacy ' @<epoch_ms>' suffix to prevent false positives
      // when item text itself ends with ' @<digits>'. parseListFile accepts both formats.
      const src = lists || state.lists;
      return src.map(list => {
        const header = `# ${list.name}`;
        if (list.items.length === 0) return header;
        const lines = list.items.map(item => {
          const due = item.dueAt ? `|due:${item.dueAt}` : '';
          const cts = item.checkedAt ? `|cts:${item.checkedAt}` : '';
          return `- ${item.checked ? '[x]' : '[ ]'} ${item.text} |ts:${item.timestamp}${due}${cts}`;
        });
        return header + '\n' + lines.join('\n');
      }).join('\n\n').trim();
    }
    function parseListFile(text) {
      const result = [];
      let current = null;
      for (const raw of text.split('\n')) {
        const line = raw.trimEnd();
        if (line.startsWith('# ')) {
          if (current) result.push(current);
          current = { name: line.slice(2).trim(), items: [] };
        } else if (current && line.startsWith('- ')) {
          const checked = line.startsWith('- [x] ');
          const hasStatePrefix = checked || line.startsWith('- [ ] ');
          const prefixLen = hasStatePrefix ? 6 : 2;
          const rest = line.slice(prefixLen);
          // Parse optional |cts: / |due: suffixes, then the creation |ts: or legacy @.
          // Strip from the end so each regex still anchors at $.
          let workingRest = rest;
          let checkedAt;
          let dueAt;
          const ctsMatch = workingRest.match(/\|cts:(\d+)$/);
          if (ctsMatch) {
            const cts = Number(ctsMatch[1]);
            if (Number.isFinite(cts) && cts > 0) checkedAt = cts;
            workingRest = workingRest.slice(0, workingRest.length - ctsMatch[0].length);
          }
          const dueMatch = workingRest.match(/\|due:(\d+)$/);
          if (dueMatch) {
            const due = Number(dueMatch[1]);
            if (Number.isFinite(due) && due > 0) dueAt = due;
            workingRest = workingRest.slice(0, workingRest.length - dueMatch[0].length);
          }
          // Regex matches the timestamp suffix strictly at the end of the string,
          // preventing false positives when item text contains ' |ts:' or ' @' mid-text.
          // Supports both current '|ts:' format and legacy '@' format for backward compatibility.
          const tsMatch = workingRest.match(/ (?:\|ts:|@)(\d+)$/);
          let itemText = workingRest, timestamp = Date.now();
          if (tsMatch) {
            const ts = Number(tsMatch[1]);
            if (ts > 0) { timestamp = ts; itemText = workingRest.slice(0, workingRest.length - tsMatch[0].length); }
          }
          const newItem = { text: itemText, timestamp, checked };
          if (Number.isFinite(checkedAt)) newItem.checkedAt = checkedAt;
          if (Number.isFinite(dueAt)) newItem.dueAt = dueAt;
          else applyDueFromText(newItem);
          current.items.push(newItem);
        }
      }
      if (current) result.push(current);
      return result.length > 0 ? result : null;
    }
    function copyListContent() {
      const ta = document.getElementById('list-textarea');
      navigator.clipboard.writeText(ta.value).then(() => showAlert('Copied!')).catch(() => showAlert('Copy failed. Please select the text and copy manually.'));
    }

    function editItem(listIndex, itemIndex) {
      const item = state.lists[listIndex] && state.lists[listIndex].items[itemIndex];
      if (!item) return;
      const li = document.querySelector(`#items-container .item[data-item-index="${itemIndex}"]`);
      if (!li) return;
      const textSpan = li.querySelector('.item-text');
      if (!textSpan) return;

      const input = document.createElement('input');
      input.type = 'text';
      input.className = 'item-edit-input';
      input.value = item.text;

      let saved = false;
      function saveEdit() {
        if (saved) return;
        saved = true;
        const newText = input.value.trim();
        if (newText && newText !== item.text) {
          const edited = state.lists[listIndex].items[itemIndex];
          edited.text = newText;
          applyDueFromText(edited);
          saveAndRender();
        } else {
          renderItems();
        }
      }

      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') { e.preventDefault(); saveEdit(); }
        if (e.key === 'Escape') { saved = true; renderItems(); }
      });
      input.addEventListener('blur', saveEdit);

      li.replaceChild(input, textSpan);
      input.focus();
      input.select();
    }

    function applyDark(isDark, persist = true) {
      document.body.classList.toggle('dark', isDark);
      if (persist) localStorage.setItem('darkMode', isDark ? 'true' : 'false');
    }

    function init() {
      loadData();
      loadDriveFilesState();
      restoreActiveDriveFileFromCache();
      render();
      renderFileStrip();

      const darkPref = localStorage.getItem('darkMode');
      // Apply saved preference (persisted), or OS default (not persisted so the
      // matchMedia change listener can detect that no explicit choice was made yet).
      applyDark(darkPref !== null ? darkPref === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches, darkPref !== null);
      // Follow OS-level theme changes when the user hasn't pinned a preference manually
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (localStorage.getItem('darkMode') === null) applyDark(e.matches, false);
      });

      document.getElementById('theme-toggle').onclick = () => {
        const isDark = document.body.classList.contains('dark');
        applyDark(!isDark);
      };

      document.getElementById('list-btn').addEventListener('click', showListModal);
      document.getElementById('settings-btn').addEventListener('click', showSettingsModal);
      document.getElementById('drive-status-indicator').addEventListener('click', showSettingsModal);
      document.getElementById('add-btn').addEventListener('click', addItem);

      const input = document.getElementById('add-input');
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
      setTimeout(() => input.focus(), INIT_FOCUS_DELAY_MS);

      syncMainBottomPadding();
      window.addEventListener('resize', syncMainBottomPadding);
      window.addEventListener('orientationchange', syncMainBottomPadding);
      const bottomBar = document.querySelector('.bottom-bar');
      if ('ResizeObserver' in window && bottomBar) {
        new ResizeObserver(syncMainBottomPadding).observe(bottomBar);
      }

      // Escape cancels pending move-to-list mode (modals handle their own Escape internally)
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && state.pendingMove) {
          cancelMoveMode();
          render();
        }
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      if (DEBUG) {
        try { runRecurrenceSelfTest(); } catch (err) { console.error('[Inbox] Recurrence self-test failed:', err); }
        try { runDueSelfTest(); } catch (err) { console.error('[Inbox] Due self-test failed:', err); }
      }
      if (DEBUG) console.log('%c[Inbox] Ready.', 'color:#34c759');
    }

    if (DEBUG) window._inboxState = state;
    init();
  })();
  </script>
