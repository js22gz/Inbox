<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <title>Inbox</title>
  <style>
    :root {
      --bg: #f8f8f8;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #222222;
    }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }
    .header {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: white; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 16px; z-index: 100;
    }
    .header-title { font-size: 21px; font-weight: 600; }
    .header-btn {
      font-size: 15px; padding: 8px 14px; border: 1px solid var(--accent);
      background: transparent; color: var(--accent); cursor: pointer;
    }
    .tabs {
      position: fixed; top: 56px; left: 0; right: 0;
      background: white; border-bottom: 1px solid var(--border);
      z-index: 90; overflow-x: auto;
    }
    .tabs-inner { display: flex; padding: 0 8px; min-height: 48px; align-items: center; gap: 4px; }
    .tab { padding: 10px 16px; font-size: 15px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab.active { font-weight: 600; border-bottom-color: var(--accent); }
    .tab-add { padding: 10px 14px; font-size: 18px; color: var(--muted); cursor: pointer; }
    .main { padding-top: 112px; padding-bottom: 90px; min-height: 100vh; }
    .items { padding: 0 8px; }
    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 12px; border-bottom: 1px solid var(--border);
      user-select: none; touch-action: manipulation; -webkit-touch-callout: none;
    }
    .item:active { background: #f0f0f0; }
    .checkbox { width: 22px; height: 22px; border: 2px solid var(--accent); flex-shrink: 0; }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .item-text { flex: 1; font-size: 17px; color: var(--text); }
    .item-text.checked { text-decoration: line-through; color: var(--muted); }
    .delete-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); cursor: pointer; }
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      padding: 12px; padding-bottom: 24px; z-index: 100; display: flex; gap: 8px;
    }
    #add-input { flex: 1; padding: 14px 16px; font-size: 17px; border: 2px solid var(--accent); outline: none; }
    #add-btn { padding: 14px 24px; background: var(--muted); color: white; border: none; font-weight: 600; cursor: pointer; }
    .move-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 15px; color: var(--muted); cursor: pointer; }
    .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 15px; }
    .app-footer { padding: 20px 16px 8px; text-align: center; font-size: 12px; color: var(--muted); }
    .app-footer a { color: var(--muted); text-decoration: underline; margin: 0 6px; }

    /* Drag styles */
    .item.dragging { opacity: 0.4; background: #f0f0f0; }
    .item.drop-before { border-top: 4px solid #007aff; }
    .item.drop-after { border-bottom: 4px solid #007aff; }
    .tab.drag-over { background: #fff8e1; border-bottom-color: #ffd700; }
    .item.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.tab-dragging { opacity: 0.4; }
    .tab.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.tab-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .tab.tab-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: white; border: 2px solid var(--accent); border-radius: 8px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25); padding: 16px 12px;
      display: flex; align-items: center; gap: 14px; width: 280px; max-width: 80vw;
      font-size: 17px; opacity: 0.42;
    }

    /* ==================== DARK MODE ==================== */
    body.dark {
      --bg: #0f0f0f;
      --text: #e5e5e5;
      --muted: #777777;
      --border: #2a2a2a;
      --accent: #e5e5e5;
    }
    body.dark .header,
    body.dark .tabs,
    body.dark .bottom-bar {
      background: #1a1a1a;
      border-color: var(--border);
    }
    body.dark .item:active { background: #222222; }
    body.dark .item.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark #add-input {
      background: #222222;
      border-color: #444444;
      color: var(--text);
    }
    body.dark .empty-state { color: var(--muted); }
    body.dark .modal-content { background: #1a1a1a; color: var(--text); }
    body.dark .drag-ghost { background: #1a1a1a; color: #e5e5e5; }
    body.dark .tab.drag-over { background: #3a3a3a; border-bottom-color: #c0c0c0; }
    body.dark .tab.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark .tab.tab-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .tab.tab-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }

    /* Move-mode: highlight tabs as drop targets */
    .move-mode .tab { outline: 2px dashed var(--accent); outline-offset: -2px; cursor: pointer; }
    .move-mode .tab.active { outline-style: solid; }

    /* Items list reset */
    .items ul { list-style: none; margin: 0; padding: 0; }

    /* Move controls */
    .move-controls { display: flex; gap: 2px; margin-right: 4px; }

    /* Header actions */
    .header-actions { display: flex; gap: 8px; align-items: center; }
    #theme-toggle { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; }

    /* Drive button states */
    #drive-btn { font-size: 13px; padding: 6px 10px; }
    #drive-btn.drive-connected { border-color: #34c759; color: #34c759; }
    #drive-btn.drive-error { border-color: #ff3b30; color: #ff3b30; }
    body.dark #drive-btn.drive-connected { border-color: #30d158; color: #30d158; }
    body.dark #drive-btn.drive-error { border-color: #ff453a; color: #ff453a; }

    /* Sun/moon icon visibility — toggled declaratively via body.dark */
    #sun-icon { display: none; }
    body.dark #moon-icon { display: none; }
    body.dark #sun-icon { display: block; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 100%; padding: 20px 16px 24px; box-sizing: border-box; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    #list-textarea { width: 100%; height: 220px; font-family: monospace; font-size: 13px; padding: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
    .modal-footer .header-btn { flex: 1; }
    /* Use CSS variables so #done-btn adapts to dark mode automatically */
    #done-btn { background: var(--accent); color: var(--bg); border-color: var(--accent); }

    /* Reset default UA button styles for controls rendered as <button> */
    button.checkbox, button.tab, button.tab-add, button.delete-btn, button.move-btn {
      font-family: inherit; line-height: inherit;
    }
    button.tab { border: none; border-bottom: 3px solid transparent; background: none; font-size: inherit; color: inherit; }
    button.tab-add, button.delete-btn, button.move-btn { border: none; background: none; }
    button.checkbox { background: none; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-title">Inbox</div>
    <div class="header-actions">
      <button id="theme-toggle" class="header-btn">
        <!-- Sun/Moon icons -->
        <svg id="moon-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
        <svg id="sun-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
      </button>
      <button id="list-btn" class="header-btn">.list</button>
      <button id="drive-btn" class="header-btn">Connect Drive</button>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs"><div class="tabs-inner" id="tabs-container" role="tablist"></div></div>

  <!-- Main content -->
  <div class="main">
    <div id="items-container" class="items"></div>
    <div class="app-footer">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <input type="text" id="add-input" placeholder="Add item to current list...">
    <button id="add-btn">Add</button>
  </div>

  <!-- Modal -->
  <div class="modal" id="list-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="list-modal-title">
      <div class="modal-header">
        <h3 id="list-modal-title">inbox.list</h3>
        <button class="header-btn" id="modal-close-btn">Close</button>
      </div>
      <textarea id="list-textarea" readonly></textarea>
      <div class="modal-footer">
        <button class="header-btn" id="modal-copy-btn">Copy</button>
        <button id="done-btn" class="header-btn">Done</button>
      </div>
    </div>
  </div>

  <script>
    const DEBUG = false;

    let lists = [];
    let currentIndex = 0;
    let pendingMove = null;
    let modalFocusTrap = null;

    // ==================== GOOGLE DRIVE ====================
    const DRIVE_CLIENT_ID = '15670895710-b94o3lc8amk41n8m2dsft3pm6uf4i71t.apps.googleusercontent.com';
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
    const DRIVE_FILE_NAME = 'inbox.list';
    const DRIVE_API = 'https://www.googleapis.com/drive/v3';
    const DRIVE_UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';

    // Runtime Drive state (token not persisted; connection flag is)
    let driveToken = null;
    let driveTokenExpiry = 0;
    let driveFileId = localStorage.getItem('driveFileId') || null;
    let tokenClient = null;
    let driveConnected = false;

    // Pending token-request resolve/reject for async flow
    let driveTokenResolve = null;
    let driveTokenReject = null;

    function setDriveStatus(state) {
      // state: 'disconnected' | 'connected' | 'error'
      const btn = document.getElementById('drive-btn');
      if (!btn) return;
      btn.classList.remove('drive-connected', 'drive-error');
      if (state === 'connected') {
        btn.textContent = 'Drive ✓';
        btn.classList.add('drive-connected');
        driveConnected = true;
      } else if (state === 'error') {
        btn.textContent = 'Drive ✗';
        btn.classList.add('drive-error');
        driveConnected = false;
      } else {
        btn.textContent = 'Connect Drive';
        driveConnected = false;
      }
    }

    function initTokenClient() {
      if (tokenClient) return;
      tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (response) => {
          if (response.error) {
            if (driveTokenReject) { driveTokenReject(new Error(response.error)); driveTokenReject = null; driveTokenResolve = null; }
            return;
          }
          driveToken = response.access_token;
          driveTokenExpiry = Date.now() + (response.expires_in - 60) * 1000;
          if (driveTokenResolve) { driveTokenResolve(driveToken); driveTokenResolve = null; driveTokenReject = null; }
        },
        error_callback: (err) => {
          if (driveTokenReject) { driveTokenReject(new Error(err.type || 'token_error')); driveTokenReject = null; driveTokenResolve = null; }
        },
      });
    }

    function requestToken(prompt = 'select_account') {
      return new Promise((resolve, reject) => {
        driveTokenResolve = resolve;
        driveTokenReject = reject;
        tokenClient.requestAccessToken({ prompt });
      });
    }

    async function ensureToken() {
      if (driveToken && Date.now() < driveTokenExpiry) return driveToken;
      // An empty prompt string attempts a silent token refresh without showing the
      // account-picker UI. This succeeds if the user's session is still active.
      try {
        await requestToken('');
        return driveToken;
      } catch {
        // Silent refresh failed — clear state
        driveToken = null;
        driveTokenExpiry = 0;
        driveFileId = null;
        localStorage.removeItem('driveFileId');
        setDriveStatus('disconnected');
        throw new Error('Drive token expired. Please reconnect.');
      }
    }

    async function driveFetch(url, options = {}) {
      const token = await ensureToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      const res = await fetch(url, { ...options, headers });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`Drive API error ${res.status}: ${text}`);
      }
      return res;
    }

    async function findOrCreateDriveFile() {
      // If we already have a file ID stored, verify it still exists
      if (driveFileId) {
        try {
          await driveFetch(`${DRIVE_API}/files/${driveFileId}?fields=id`);
          return driveFileId;
        } catch {
          // File not accessible — fall through to search/create
          driveFileId = null;
          localStorage.removeItem('driveFileId');
        }
      }

      // Search for an existing inbox.list created by this app
      const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
      const res = await driveFetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name)&spaces=drive`);
      const data = await res.json();
      if (data.files && data.files.length > 0) {
        driveFileId = data.files[0].id;
        localStorage.setItem('driveFileId', driveFileId);
        return driveFileId;
      }

      // Create a new empty file
      const meta = JSON.stringify({ name: DRIVE_FILE_NAME, mimeType: 'text/plain' });
      const createRes = await driveFetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart`, {
        method: 'POST',
        headers: {
          'Content-Type': 'multipart/related; boundary=inbox_boundary',
        },
        body: [
          '--inbox_boundary',
          'Content-Type: application/json; charset=UTF-8',
          '',
          meta,
          '--inbox_boundary',
          'Content-Type: text/plain; charset=UTF-8',
          '',
          '',
          '--inbox_boundary--',
        ].join('\r\n'),
      });
      const created = await createRes.json();
      driveFileId = created.id;
      localStorage.setItem('driveFileId', driveFileId);
      return driveFileId;
    }

    async function loadFromDrive() {
      const fileId = await findOrCreateDriveFile();
      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      return text.trim() ? parseListFile(text) : null;
    }

    async function saveToDrive(content) {
      if (!driveConnected) return;
      // Skip immediately if offline; the 'online' event listener will flush later.
      // Network failures that slip past this check are caught by the try/catch below.
      if (!navigator.onLine) { return; }
      try {
        const fileId = await findOrCreateDriveFile();
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
        });
        setDriveStatus('connected');
      } catch (err) {
        if (DEBUG) console.warn('[Drive] save failed', err);
        setDriveStatus('error');
      }
    }

    // Attempt a silent (no-UI) token refresh and restore the connected state.
    // Called automatically via onGoogleLibraryLoad when the GIS script is ready.
    async function autoReconnectDrive() {
      if (!localStorage.getItem('driveWasConnected')) return;
      try {
        initTokenClient();
        // Empty prompt = silent refresh: no account-picker is shown.
        await requestToken('');
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Auto-reconnected silently.');
      } catch (err) {
        // Silent refresh failed (e.g. session expired) — clear persisted flag
        driveToken = null;
        driveTokenExpiry = 0;
        localStorage.removeItem('driveWasConnected');
        setDriveStatus('disconnected');
        if (DEBUG) console.warn('[Drive] Silent reconnect failed — please reconnect manually.', err);
      }
    }

    // The GIS library calls window.onGoogleLibraryLoad once it is ready.
    // Set this before the <script> tag executes so the callback is in place.
    window.onGoogleLibraryLoad = autoReconnectDrive;

    async function connectDrive() {
      try {
        initTokenClient();
        await requestToken('select_account');
        // Mark as connected so saveToDrive is allowed to proceed
        localStorage.setItem('driveWasConnected', '1');
        setDriveStatus('connected');
        // Load file and offer merge/replace if remote data exists
        let remote = null;
        try {
          remote = await loadFromDrive();
        } catch (err) {
          if (DEBUG) console.warn('[Drive] load on connect failed', err);
        }

        if (remote && remote.length > 0) {
          const choice = confirm(
            'Found existing inbox.list on Drive.\n\nOK = Use Drive data (replaces local)\nCancel = Keep local data (overwrites Drive)'
          );
          if (choice) {
            lists = remote;
            saveData();
            render();
          } else {
            // Push local data to Drive
            await saveToDrive(generateListFile());
          }
        } else {
          // No remote data — push local
          await saveToDrive(generateListFile());
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] connect failed', err);
        setDriveStatus('error');
      }
    }

    function disconnectDrive() {
      if (driveToken) {
        google.accounts.oauth2.revoke(driveToken, () => {});
      }
      driveToken = null;
      driveTokenExpiry = 0;
      driveFileId = null;
      localStorage.removeItem('driveFileId');
      localStorage.removeItem('driveWasConnected');
      setDriveStatus('disconnected');
    }

    // Flush any offline changes when the connection is restored
    window.addEventListener('online', () => {
      if (driveConnected) saveToDrive(generateListFile());
    });
    // ==================== END GOOGLE DRIVE ====================

    const TAB_CLICK_DEBOUNCE_MS = 150;  // suppress tab-click immediately after a tab drag
    const INPUT_REFOCUS_DELAY_MS = 50;  // mobile keyboard needs time to reflow
    const INIT_FOCUS_DELAY_MS = 300;    // initial focus delay on page load

    // ==================== DRAG CONTROLLER ====================
    const DRAG_THRESHOLD_PX = 8;
    const LONG_PRESS_DELAY = 300;            // milliseconds
    const LONG_PRESS_CANCEL_THRESHOLD = 10;  // px; cancel long-press if finger moves this far

    // Factory that creates an independent drag controller.
    // config: {
    //   draggingClass        – CSS class applied to the source element while dragging
    //   ghostOffset(e)       – returns { x, y } cursor offset for the ghost element
    //   buildGhost(sourceEl) – returns a populated ghost HTMLElement (className set by factory)
    //   updateDropTarget(x, y) – clears old indicators, sets new ones, returns dropTarget or null
    //   clearDropIndicators()  – removes all drop-indicator classes (called on drag end)
    //   commitDrop(fromIndex, dropTarget) – mutates data, saves, re-renders
    //   onDragComplete()     – optional hook called at the end of every drag (cancel or drop)
    //   shouldSkip(e)        – optional; return true to abort onPointerDown early
    //   blockedWhile()       – optional; return true when another controller is active
    // }
    function createDragController(config) {
      let isDragging = false;
      let fromIndex = null;
      let ghost = null;
      let sourceEl = null;
      let dropTarget = null;
      let pendingDrag = null;
      let longPressPending = null;
      let longPressTimer = null;
      let contextMenuSuppressedAt = 0;

      let blockedWhileCallback = config.blockedWhile || null;
      function isBlocked() { return blockedWhileCallback ? blockedWhileCallback() : false; }

      function suppressContextMenu(e) {
        e.preventDefault();
        contextMenuSuppressedAt = Date.now();
        if (DEBUG) console.log('[drag] context menu suppressed', { isDragging, hasLongPressPending: !!longPressPending });
        if (!isDragging && longPressPending) {
          if (DEBUG) console.log('[drag] context menu triggered – starting drag immediately from long-press state');
          const lp = longPressPending;
          cancelLongPress(false);
          startDrag(lp.el, lp.index,
            { clientX: lp.lastX, clientY: lp.lastY, pointerId: lp.pointerId, pointerType: lp.pointerType },
            lp.pointerId);
        }
      }

      function onLongPressMove(e) {
        if (!longPressPending || e.pointerId !== longPressPending.pointerId) return;
        longPressPending.lastX = e.clientX;
        longPressPending.lastY = e.clientY;
        const dx = e.clientX - longPressPending.startX;
        const dy = e.clientY - longPressPending.startY;
        const dist = Math.hypot(dx, dy);
        if (dist > LONG_PRESS_CANCEL_THRESHOLD) {
          if (DEBUG) console.log('[drag] long-press cancelled – finger moved too far', { dist: dist.toFixed(1) });
          cancelLongPress();
        } else {
          // Still within the hold threshold – block the browser from starting a
          // scroll gesture so setPointerCapture won't trigger pointercancel later.
          e.preventDefault();
        }
      }

      function cancelLongPress(removeActiveClass = true) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (longPressPending) {
          if (removeActiveClass) {
            longPressPending.el.classList.remove('long-press-active');
            if (DEBUG) console.log('[drag] long-press cancelled');
          }
          longPressPending.el.style.touchAction = ''; // restore scrollability
          longPressPending = null;
        }
        document.removeEventListener('pointermove', onLongPressMove);
        document.removeEventListener('pointerup', cancelLongPress);
        document.removeEventListener('pointercancel', cancelLongPress);
        document.removeEventListener('contextmenu', suppressContextMenu);
      }

      function onPendingMove(e) {
        if (!pendingDrag || e.pointerId !== pendingDrag.pointerId) return;
        const dx = e.clientX - pendingDrag.startX;
        const dy = e.clientY - pendingDrag.startY;
        if (Math.hypot(dx, dy) > DRAG_THRESHOLD_PX) {
          const pd = pendingDrag;
          cancelPendingDrag();
          startDrag(pd.el, pd.index, e, pd.pointerId);
        }
      }

      function cancelPendingDrag() {
        if (!pendingDrag) return;
        pendingDrag = null;
        document.removeEventListener('pointermove', onPendingMove);
        document.removeEventListener('pointerup', cancelPendingDrag);
        document.removeEventListener('pointercancel', cancelPendingDrag);
      }

      function startDrag(el, index, startEvent, pointerId) {
        if (DEBUG) console.log('[drag] startDrag', { index, pointerId, x: startEvent.clientX, y: startEvent.clientY });
        isDragging = true;
        fromIndex = index;
        el.classList.remove('long-press-active');
        el.classList.add(config.draggingClass);

        // Prevent the browser from scrolling while the drag gesture is active.
        // Setting touch-action on body alone is not enough because the item element's
        // CSS rule (touch-action: manipulation) has higher specificity and wins.
        // cancelLongPress() cleared the inline style, restoring the CSS class rule,
        // so we must re-apply touch-action:none directly on the element.
        document.body.style.touchAction = 'none';
        el.style.touchAction = 'none';
        sourceEl = el;

        ghost = config.buildGhost(el);
        ghost.className = 'drag-ghost';
        document.body.appendChild(ghost);
        const offset = config.ghostOffset(startEvent);
        ghost.style.left = (startEvent.clientX - offset.x) + 'px';
        ghost.style.top  = (startEvent.clientY - offset.y) + 'px';

        const isTouchDrag = startEvent.pointerType === 'touch' || startEvent.pointerType === 'pen';

        // setPointerCapture routes events to this element even when the pointer drifts off it.
        // Skip it for touch/pen: on Android/iOS calling setPointerCapture on a touch pointer
        // that the browser has partially claimed fires pointercancel immediately, killing the drag.
        // Document-level listeners already capture all events so this is safe.
        if (!isTouchDrag && el.setPointerCapture) {
          try {
            el.setPointerCapture(pointerId);
            if (DEBUG) console.log('[drag] setPointerCapture succeeded', { pointerId });
          } catch (err) {
            if (DEBUG) console.warn('[drag] setPointerCapture failed', err);
          }
        }

        // Re-attach context-menu suppressor for touch/pen: cancelLongPress removes it before
        // this function runs, but some browsers fire contextmenu with a short delay after the
        // long-press threshold, which would steal the pointer and fire pointercancel mid-drag.
        if (isTouchDrag) {
          document.addEventListener('contextmenu', suppressContextMenu);
          // On iOS, pointermove events are not delivered reliably without setPointerCapture.
          // Use touchmove as an additional source of position updates so the ghost tracks
          // the finger and dropTarget is populated when the user lifts.
          document.addEventListener('touchmove', onTouchDragMove, { passive: false });
          document.addEventListener('touchend', onTouchDragEnd);
          document.addEventListener('touchcancel', onDragEnd);
        }

        document.addEventListener('pointermove', onDragMove, { passive: false });
        document.addEventListener('pointerup', onDragEnd);
        // pointercancel fires on mobile when the browser takes over scrolling;
        // handle it so the ghost is always cleaned up and never gets stuck
        document.addEventListener('pointercancel', onDragEnd);
      }

      // touchmove handler: mirrors onDragMove using the first touch point.
      // This is a fallback for iOS where pointermove may not fire without setPointerCapture.
      function onTouchDragMove(e) {
        if (!isDragging || !ghost) return;
        e.preventDefault();
        const t = e.touches[0];
        if (!t) return;
        const offset = config.ghostOffset({ clientX: t.clientX, clientY: t.clientY, pointerType: 'touch' });
        ghost.style.left = (t.clientX - offset.x) + 'px';
        ghost.style.top  = (t.clientY - offset.y) + 'px';
        dropTarget = config.updateDropTarget(t.clientX, t.clientY, sourceEl);
      }

      // touchend handler: commit the drop using the last known position tracked by touchmove.
      function onTouchDragEnd(e) {
        // Remove touch-specific listeners and let onDragEnd handle state cleanup.
        document.removeEventListener('touchmove', onTouchDragMove);
        document.removeEventListener('touchend', onTouchDragEnd);
        document.removeEventListener('touchcancel', onDragEnd);
        // Synthesise a pointerup-like object so onDragEnd logic is reused.
        onDragEnd({ type: 'pointerup' });
      }

      function onDragMove(e) {
        if (!isDragging || !ghost) return;
        e.preventDefault();
        const offset = config.ghostOffset(e);
        ghost.style.left = (e.clientX - offset.x) + 'px';
        ghost.style.top  = (e.clientY - offset.y) + 'px';
        dropTarget = config.updateDropTarget(e.clientX, e.clientY, sourceEl);
      }

      function onDragEnd(e) {
        if (!isDragging) return;
        // Some browsers fire pointercancel as a side-effect of their long-press
        // context-menu gesture even after e.preventDefault() was called on
        // contextmenu.  Ignore such spurious cancels so the drag can continue.
        if (e.type === 'pointercancel' && Date.now() - contextMenuSuppressedAt < 500) {
          if (DEBUG) console.log('[drag] ignoring pointercancel within 500 ms of context menu suppression');
          contextMenuSuppressedAt = 0;
          return;
        }
        if (DEBUG) console.log('[drag] onDragEnd', { type: e.type, dropTarget: dropTarget ? dropTarget.type : null });
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', onDragEnd);
        document.removeEventListener('pointercancel', onDragEnd);
        document.removeEventListener('contextmenu', suppressContextMenu);
        // Clean up touch-specific listeners (safe to call even if not attached)
        document.removeEventListener('touchmove', onTouchDragMove);
        document.removeEventListener('touchend', onTouchDragEnd);
        document.removeEventListener('touchcancel', onDragEnd);
        isDragging = false;

        document.body.style.touchAction = '';

        if (ghost) { ghost.remove(); ghost = null; }
        if (sourceEl) { sourceEl.style.touchAction = ''; sourceEl.classList.remove(config.draggingClass); sourceEl = null; }
        config.clearDropIndicators();

        const savedFromIndex = fromIndex;
        const savedDropTarget = dropTarget;
        fromIndex = null;
        dropTarget = null;

        // Don't commit a drop if the browser cancelled the pointer (e.g. for scrolling)
        if (e.type !== 'pointercancel' && savedDropTarget && savedFromIndex !== null) {
          config.commitDrop(savedFromIndex, savedDropTarget);
        }
        if (config.onDragComplete) config.onDragComplete();
      }

      function onPointerDown(e, el, index) {
        if (isBlocked()) return;
        if (config.shouldSkip && config.shouldSkip(e)) return;
        if (isDragging || pendingDrag || longPressPending) return;

        if (e.pointerType === 'touch' || e.pointerType === 'pen') {
          // Touch/pen: require a long-press before drag starts
          if (DEBUG) console.log('[drag] pointerdown touch/pen – starting long-press timer', { index, pointerId: e.pointerId });
          longPressPending = {
            el, index,
            startX: e.clientX, startY: e.clientY,
            lastX: e.clientX, lastY: e.clientY,
            pointerId: e.pointerId,
            pointerType: e.pointerType
          };
          el.classList.add('long-press-active');
          // Set touch-action:none immediately so the browser cannot claim this
          // touch for scrolling before the long-press window closes.  It is
          // restored in cancelLongPress if the gesture is abandoned.
          el.style.touchAction = 'none';
          longPressTimer = setTimeout(() => {
            if (!longPressPending) return;
            if (DEBUG) console.log('[drag] long-press timer fired – starting drag', { index });
            const lp = longPressPending;
            cancelLongPress(false); // drag start removes active class instead
            startDrag(lp.el, lp.index,
              { clientX: lp.lastX, clientY: lp.lastY, pointerId: lp.pointerId, pointerType: lp.pointerType },
              lp.pointerId);
          }, LONG_PRESS_DELAY);
          // passive:false so we can call e.preventDefault() and stop the browser
          // from entering a scroll gesture while we wait for the long-press.
          document.addEventListener('pointermove', onLongPressMove, { passive: false });
          document.addEventListener('pointerup', cancelLongPress);
          document.addEventListener('pointercancel', cancelLongPress);
          // Suppress the native context menu that browsers show on long-press;
          // it would steal the touch and fire pointercancel on the drag.
          document.addEventListener('contextmenu', suppressContextMenu);
        } else {
          // Mouse: start drag immediately once movement threshold is exceeded
          pendingDrag = { el, index, startX: e.clientX, startY: e.clientY, pointerId: e.pointerId };
          // passive:true here so normal scrolling is not blocked during the threshold check;
          // once drag commits, onDragMove uses passive:false so it can call e.preventDefault()
          document.addEventListener('pointermove', onPendingMove, { passive: true });
          document.addEventListener('pointerup', cancelPendingDrag);
          document.addEventListener('pointercancel', cancelPendingDrag);
        }
      }

      function cancelAll() {
        cancelLongPress();
        cancelPendingDrag();
        if (isDragging) onDragEnd({ type: 'pointercancel' });
      }

      return {
        get isDragging() { return isDragging; },
        onPointerDown,
        cancelAll,
        setBlockedWhile(fn) { blockedWhileCallback = fn; },
      };
    }

    // Shared helper: clears all drop-indicator classes used by itemDrag.
    // Called both during live dragging (updateDropTarget) and at drag end (clearDropIndicators).
    function clearItemDragIndicators() {
      document.querySelectorAll('#items-container .item').forEach(el => el.classList.remove('drop-before', 'drop-after'));
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('drag-over'));
    }

    const itemDrag = createDragController({
      draggingClass: 'dragging',
      shouldSkip: (e) => !!(e.target.closest('.move-btn') || e.target.closest('.delete-btn') || e.target.closest('.checkbox')),
      ghostOffset: () => ({ x: 140, y: 30 }),
      buildGhost: (el) => {
        const g = document.createElement('div');
        const src = el.querySelector('.item-text');
        g.textContent = src ? src.textContent : el.textContent;
        return g;
      },
      clearDropIndicators: clearItemDragIndicators,
      updateDropTarget: (clientX, clientY, dragSourceEl) => {
        clearItemDragIndicators();
        const elementsUnder = document.elementsFromPoint(clientX, clientY);
        const tab = elementsUnder.find(el => el.classList.contains('tab') && !el.classList.contains('tab-add'));
        if (tab) {
          tab.classList.add('drag-over');
          return { type: 'tab', element: tab };
        }
        // sourceEl is the live DOM element captured at drag-start. renderItems/renderTabs
        // are only called from commitDrop (post-drag) or button-click handlers (which are
        // guarded by shouldSkip), so the reference is stable throughout the drag.
        const item = elementsUnder.find(el => el.classList.contains('item') && el !== dragSourceEl);
        if (item) {
          const rect = item.getBoundingClientRect();
          const mid = rect.top + rect.height / 2;
          if (clientY < mid) {
            item.classList.add('drop-before');
            return { type: 'item', element: item, position: 'before' };
          } else {
            item.classList.add('drop-after');
            return { type: 'item', element: item, position: 'after' };
          }
        }
        return null;
      },
      commitDrop: (fromIdx, dt) => {
        if (dt.type === 'item') {
          const allItems = Array.from(document.querySelectorAll('#items-container .item'));
          const toIndex = allItems.indexOf(dt.element);
          if (toIndex !== -1 && toIndex !== fromIdx) {
            const items = lists[currentIndex].items;
            const [moved] = items.splice(fromIdx, 1);
            let insertIndex = toIndex;
            if (fromIdx < insertIndex) insertIndex--;
            if (dt.position === 'after') insertIndex++;
            items.splice(insertIndex, 0, moved);
          }
        } else if (dt.type === 'tab') {
          const allTabs = Array.from(document.querySelectorAll('.tab'));
          const tabIndex = allTabs.indexOf(dt.element);
          if (tabIndex !== -1 && tabIndex !== currentIndex) {
            const item = lists[currentIndex].items.splice(fromIdx, 1)[0];
            lists[tabIndex].items.push(item);
            currentIndex = tabIndex;
          }
        }
        clampCurrentIndex();
        saveData();
        render();
      },
    });

    let tabDragEndTime = 0; // timestamp of last completed tab drag; used to suppress the immediate post-drag click
    const tabDrag = createDragController({
      blockedWhile: () => itemDrag.isDragging,
      draggingClass: 'tab-dragging',
      ghostOffset: () => ({ x: 60, y: 20 }),
      buildGhost: (el) => {
        const g = document.createElement('div');
        g.textContent = el.textContent;
        return g;
      },
      clearDropIndicators: () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('tab-drop-before', 'tab-drop-after'));
      },
      updateDropTarget: (clientX, clientY, dragSourceEl) => {
        const allTabs = Array.from(document.querySelectorAll('.tab:not(.tab-add)'));
        allTabs.forEach(t => t.classList.remove('tab-drop-before', 'tab-drop-after'));
        const tab = allTabs.find(t => {
          const r = t.getBoundingClientRect();
          return clientX >= r.left && clientX <= r.right && clientY >= r.top && clientY <= r.bottom;
        });
        // dragSourceEl is the live DOM element captured at drag-start. renderTabs is only
        // called from commitDrop (post-drag) or guarded paths, so the reference is stable.
        if (tab && tab !== dragSourceEl) {
          const rect = tab.getBoundingClientRect();
          if (clientX < rect.left + rect.width / 2) {
            tab.classList.add('tab-drop-before');
            return { element: tab, position: 'before' };
          } else {
            tab.classList.add('tab-drop-after');
            return { element: tab, position: 'after' };
          }
        }
        return null;
      },
      commitDrop: (fromIdx, dt) => {
        const allTabs = Array.from(document.querySelectorAll('.tab:not(.tab-add)'));
        const toIndex = allTabs.indexOf(dt.element);
        if (toIndex !== -1 && toIndex !== fromIdx) {
          const [movedList] = lists.splice(fromIdx, 1);
          let insertIndex = toIndex;
          if (fromIdx < insertIndex) insertIndex--;
          if (dt.position === 'after') insertIndex++;
          lists.splice(insertIndex, 0, movedList);
          currentIndex = insertIndex;
          clampCurrentIndex();
          saveData();
          render();
        }
      },
      onDragComplete: () => { tabDragEndTime = Date.now(); },
    });
    // Wire up cross-controller guards now that both instances are fully defined
    itemDrag.setBlockedWhile(() => tabDrag.isDragging);
    // ==================== END DRAG CONTROLLER ====================

    function saveData() {
      localStorage.setItem('inboxLists', JSON.stringify(lists));
      // Fire-and-forget Drive sync; errors flip the status indicator without blocking the UI
      if (driveConnected) saveToDrive(generateListFile());
    }
    function render() { clampCurrentIndex(); renderTabs(); renderItems(); }
    // saveAndRender only re-renders items because tab state never changes on item-only operations.
    function saveAndRender() { saveData(); renderItems(); }

    function isValidItem(it) {
      return it && typeof it.text === 'string' && Number.isFinite(it.timestamp) && typeof it.checked === 'boolean';
    }
    function sanitizeLists(raw) {
      if (!Array.isArray(raw)) return null;
      const result = raw
        .filter(l => l && typeof l.name === 'string' && Array.isArray(l.items))
        .map(l => ({
          name: l.name,
          items: l.items.filter(isValidItem).map(it => ({ text: it.text, timestamp: it.timestamp, checked: it.checked })),
        }));
      return result.length > 0 ? result : null;
    }

    function clampCurrentIndex() {
      if (lists.length === 0) currentIndex = 0;
      else currentIndex = Math.max(0, Math.min(currentIndex, lists.length - 1));
    }

    function loadData() {
      const saved = localStorage.getItem('inboxLists');
      if (saved) {
        try {
          lists = sanitizeLists(JSON.parse(saved)) || [];
        } catch (e) { lists = []; }
      }
      if (lists.length === 0) {
        lists = [
          { name: "List 1", items: [
            { text: "Example item 1", timestamp: Date.now(), checked: false },
            { text: "Example item 2", timestamp: Date.now()-1000, checked: false },
            { text: "Example item 3", timestamp: Date.now()-2000, checked: true }
          ]},
          { name: "List 2", items: [
            { text: "Example item 1", timestamp: Date.now(), checked: false },
            { text: "Example item 2", timestamp: Date.now()-500, checked: true }
          ]}
        ];
        saveData();
      }
      clampCurrentIndex();
    }

    function renderTabs() {
      const container = document.getElementById('tabs-container');
      container.innerHTML = '';
      lists.forEach((list, index) => {
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = `tab ${index === currentIndex ? 'active' : ''}`;
        tab.textContent = list.name;
        tab.setAttribute('role', 'tab');
        tab.setAttribute('aria-selected', index === currentIndex ? 'true' : 'false');
        tab.addEventListener('pointerdown', (e) => { if (!pendingMove) tabDrag.onPointerDown(e, tab, index); });
        tab.onclick = () => {
          if (Date.now() - tabDragEndTime < TAB_CLICK_DEBOUNCE_MS) return;
          if (pendingMove) moveItemToList(pendingMove.listIndex, pendingMove.itemIndex, index);
          else { currentIndex = index; render(); }
        };
        container.appendChild(tab);
      });
      const addTab = document.createElement('button');
      addTab.type = 'button';
      addTab.className = 'tab-add';
      addTab.textContent = '+';
      addTab.setAttribute('aria-label', 'Add new list');
      addTab.onclick = createNewList;
      container.appendChild(addTab);
    }

    function createNewList() {
      const name = prompt('New list name:');
      if (name && name.trim()) {
        lists.push({ name: name.trim(), items: [] });
        currentIndex = lists.length - 1;
        saveData();
        render();
      }
    }

    function renderItems() {
      const container = document.getElementById('items-container');
      container.innerHTML = '';
      const list = lists[currentIndex];
      if (!list || list.items.length === 0) {
        const empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = list ? 'No items in this list.' : 'No lists yet.';
        container.appendChild(empty);
        return;
      }
      const ul = document.createElement('ul');

      list.items.forEach((item, itemIndex) => {
        const li = document.createElement('li');
        li.className = 'item';

        li.addEventListener('pointerdown', (e) => itemDrag.onPointerDown(e, li, itemIndex));

        const checkbox = document.createElement('button');
        checkbox.type = 'button';
        checkbox.className = `checkbox ${item.checked ? 'checked' : ''}`;
        checkbox.setAttribute('aria-label', item.checked ? 'Uncheck item' : 'Check item');
        checkbox.onclick = (e) => { e.stopImmediatePropagation(); toggleItem(currentIndex, itemIndex); };

        const textSpan = document.createElement('span');
        textSpan.className = `item-text ${item.checked ? 'checked' : ''}`;
        textSpan.textContent = item.text;
        textSpan.onclick = (e) => { e.stopImmediatePropagation(); toggleItem(currentIndex, itemIndex); };

        const moveControls = document.createElement('div');
        moveControls.className = 'move-controls';

        const up = document.createElement('button');
        up.type = 'button'; up.className = 'move-btn'; up.textContent = '↑';
        up.setAttribute('aria-label', 'Move item up');
        up.onclick = (e) => { e.stopImmediatePropagation(); moveItemUp(currentIndex, itemIndex); };

        const down = document.createElement('button');
        down.type = 'button'; down.className = 'move-btn'; down.textContent = '↓';
        down.setAttribute('aria-label', 'Move item down');
        down.onclick = (e) => { e.stopImmediatePropagation(); moveItemDown(currentIndex, itemIndex); };

        const move = document.createElement('button');
        move.type = 'button'; move.className = 'move-btn'; move.textContent = '→';
        move.setAttribute('aria-label', 'Move item to another list');
        move.onclick = (e) => { e.stopImmediatePropagation(); startMoveMode(currentIndex, itemIndex); };

        moveControls.append(up, down, move);

        const del = document.createElement('button');
        del.type = 'button';
        del.className = 'delete-btn';
        del.textContent = '×';
        del.setAttribute('aria-label', 'Delete item');
        del.onclick = (e) => { e.stopImmediatePropagation(); if (confirm('Delete this item?')) deleteItem(currentIndex, itemIndex); };

        li.append(checkbox, textSpan, moveControls, del);
        ul.appendChild(li);
      });
      container.appendChild(ul);
    }

    function toggleItem(listIndex, itemIndex) {
      lists[listIndex].items[itemIndex].checked = !lists[listIndex].items[itemIndex].checked;
      saveAndRender();
    }
    function deleteItem(listIndex, itemIndex) {
      lists[listIndex].items.splice(itemIndex, 1);
      saveAndRender();
    }
    function moveItemUp(listIndex, itemIndex) {
      if (itemIndex === 0) return;
      const items = lists[listIndex].items;
      [items[itemIndex-1], items[itemIndex]] = [items[itemIndex], items[itemIndex-1]];
      saveAndRender();
    }
    function moveItemDown(listIndex, itemIndex) {
      const items = lists[listIndex].items;
      if (itemIndex === items.length-1) return;
      [items[itemIndex], items[itemIndex+1]] = [items[itemIndex+1], items[itemIndex]];
      saveAndRender();
    }
    function cancelMoveMode() {
      pendingMove = null;
      document.body.classList.remove('move-mode');
    }
    function startMoveMode(listIndex, itemIndex) {
      pendingMove = { listIndex, itemIndex };
      document.body.classList.add('move-mode');
      renderTabs();
    }
    function moveItemToList(fromListIdx, fromItemIdx, toListIdx) {
      if (fromListIdx === toListIdx) { cancelMoveMode(); renderTabs(); return; }
      const item = lists[fromListIdx].items.splice(fromItemIdx, 1)[0];
      lists[toListIdx].items.push(item);
      saveData();
      cancelMoveMode();
      currentIndex = toListIdx;
      render();
    }
    function addItem() {
      const input = document.getElementById('add-input');
      if (!input.value.trim()) return;
      // timestamp is stored for export/import round-tripping; not displayed in the UI
      lists[currentIndex].items.push({ text: input.value.trim(), timestamp: Date.now(), checked: false });
      input.value = '';
      saveAndRender();
      // Delay lets the mobile keyboard reflow before re-focusing the input
      setTimeout(() => input.focus(), INPUT_REFOCUS_DELAY_MS);
    }
    function showListModal() {
      const modal = document.getElementById('list-modal');
      document.getElementById('list-textarea').value = generateListFile();
      modal.classList.add('open');
      // Move focus into the modal and trap it while open
      document.getElementById('modal-close-btn').focus();
      modalFocusTrap = (e) => {
        if (e.key !== 'Tab') return;
        const focusable = Array.from(modal.querySelectorAll('button, textarea'));
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      };
      modal.addEventListener('keydown', modalFocusTrap);
    }
    function hideListModal() {
      const modal = document.getElementById('list-modal');
      modal.classList.remove('open');
      if (modalFocusTrap) { modal.removeEventListener('keydown', modalFocusTrap); modalFocusTrap = null; }
      // Return focus to the trigger button
      document.getElementById('list-btn').focus();
    }
    function generateListFile() {
      return lists.map(list => {
        const header = `# ${list.name}`;
        if (list.items.length === 0) return header;
        const lines = list.items.map(item => `- ${item.checked ? '[x]' : '[ ]'} ${item.text} @${item.timestamp}`);
        return header + '\n' + lines.join('\n');
      }).join('\n\n').trim();
    }
    function parseListFile(text) {
      const result = [];
      let current = null;
      for (const raw of text.split('\n')) {
        const line = raw.trimEnd();
        if (line.startsWith('# ')) {
          if (current) result.push(current);
          current = { name: line.slice(2).trim(), items: [] };
        } else if (current && line.startsWith('- ')) {
          const checked = line.startsWith('- [x] ');
          const hasStatePrefix = checked || line.startsWith('- [ ] ');
          const prefixLen = hasStatePrefix ? 6 : 2;
          const rest = line.slice(prefixLen);
          const atIdx = rest.lastIndexOf(' @');
          let itemText = rest, timestamp = Date.now();
          if (atIdx !== -1) {
            const ts = Number(rest.slice(atIdx + 2));
            if (Number.isFinite(ts) && ts > 0) { timestamp = ts; itemText = rest.slice(0, atIdx); }
          }
          current.items.push({ text: itemText, timestamp, checked });
        }
      }
      if (current) result.push(current);
      return result.length > 0 ? result : null;
    }
    function copyListContent() {
      const ta = document.getElementById('list-textarea');
      navigator.clipboard.writeText(ta.value).then(() => alert('Copied!')).catch(() => alert('Copy failed. Please select the text and copy manually.'));
    }

    function applyDark(isDark, persist = true) {
      document.body.classList.toggle('dark', isDark);
      if (persist) localStorage.setItem('darkMode', isDark ? 'true' : 'false');
    }

    function init() {
      loadData();
      render();

      const darkPref = localStorage.getItem('darkMode');
      // Apply saved preference (persisted), or OS default (not persisted so the
      // matchMedia change listener can detect that no explicit choice was made yet).
      applyDark(darkPref !== null ? darkPref === 'true' : window.matchMedia('(prefers-color-scheme: dark)').matches, darkPref !== null);
      // Follow OS-level theme changes when the user hasn't pinned a preference manually
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', e => {
        if (localStorage.getItem('darkMode') === null) applyDark(e.matches, false);
      });

      document.getElementById('theme-toggle').onclick = () => {
        const isDark = document.body.classList.contains('dark');
        applyDark(!isDark);
      };

      document.getElementById('list-btn').addEventListener('click', showListModal);
      document.getElementById('add-btn').addEventListener('click', addItem);

      document.getElementById('drive-btn').addEventListener('click', () => {
        if (driveConnected) {
          if (confirm('Disconnect from Google Drive?')) disconnectDrive();
        } else {
          // GIS is loaded asynchronously; guard against clicking before it's ready
          if (typeof google === 'undefined' || !google.accounts) {
            alert('Google Sign-In is still loading. Please try again in a moment.');
            return;
          }
          connectDrive();
        }
      });

      // Modal event handlers (moved out of inline onclick attributes)
      document.getElementById('list-modal').addEventListener('click', (e) => {
        if (e.target.id === 'list-modal') hideListModal();
      });
      document.getElementById('modal-close-btn').addEventListener('click', hideListModal);
      document.getElementById('modal-copy-btn').addEventListener('click', copyListContent);
      document.getElementById('done-btn').addEventListener('click', hideListModal);

      const input = document.getElementById('add-input');
      input.addEventListener('keydown', e => { if (e.key === 'Enter') addItem(); });
      setTimeout(() => input.focus(), INIT_FOCUS_DELAY_MS);

      // Escape closes the modal or cancels pending move-to-list mode
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
          if (document.getElementById('list-modal').classList.contains('open')) {
            hideListModal();
          } else if (pendingMove) {
            cancelMoveMode();
            render();
          }
        }
      });

      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }

      if (DEBUG) console.log('%c[Inbox] Ready.', 'color:#34c759');
    }

    init();
  </script>
</body>
</html>
