  <script>
  (function() {
    const DEBUG = false;

    let recurrentOpen = false;
    let finishedOpen = false;

    const state = {
      // App core
      lists: [],
      currentIndex: 0,


      // Drive – token / auth
      driveToken: null,
      driveTokenExpiry: 0,
      tokenClient: null,
      driveConnected: false,
      driveUser: null,
      driveUserLoadFailed: false,

      // Drive – multi-file
      driveFiles: [],           // [{ id, name }, ...]
      activeDriveFileIdx: 0,    // index into driveFiles
      verifiedDriveFileId: null, // cached ID of the last GET-verified active file (session-only)
      saveDataDriveTimer: null,  // debounce timer for Drive saves triggered by saveData()
      driveFileCache: {},        // fileId → parsed lists array (restored from localStorage on startup)
      persistedDriveFileCache: {}, // serialized cache metadata mirrored from localStorage
      driveFileSaveSeq: {},      // fileId → latest queued background-save token
      driveFileSaveChains: {},   // fileId → chained background save promise
      driveSwitchSeq: 0,         // increments on every user file transition (switch/add/remove/create) to ignore stale results
      driveFileSwitching: false, // true while a file transition is in progress; blocks most auto saves/polls
      driveSyncReady: false,     // false until first Drive hydrate; prevents pre-load saves from clobbering remote
      driveOpSeq: 0,             // increments on pull/merge/flush/load ops to ignore stale results from interleaving
      structuralRemovePending: {}, // fileId -> last timestamp of cross-file *source* structural splice (bypass pull-merge on next flush for relocation integrity, esp. offline+reconnect)

      // NOTE on races (fixed 2026): The main hazards were:
      // 1. Updating activeDriveFileIdx + renderFileStrip() *before* loading the target's lists (remove).
      // 2. Pending debounce flush or in-flight pull+merge in flushPendingDriveSave writing *current* state.lists
      //    to a previously captured fileId after a close/switch changed which file is active.
      // 3. Rapid add/switch calls racing on push + activeIdx + lists assignment (completion order wins).
      // Fixes: explicit fileId binding at start of every transition + flush, always flush leaving file with its ID
      // before mutating active, seq checks after every await in transitions, defer active+strip render until target
      // content is applied, and abort writes in flush when switching or activeId no longer matches the captured one.
      // See flushPendingDriveSave, removeDriveFile, addDriveFile, switchDriveFile, createNewDriveFile.

      // Drive – async token flow
      driveTokenResolve: null,
      driveTokenReject: null,
      tokenRequestPending: false, // synchronous guard against overlapping requestToken calls
    };

    // ==================== GOOGLE DRIVE ====================
    // OAuth client ID — safe to be public; it identifies the app to Google, not a secret.
    // Credentials are validated server-side by Google; possession of the ID alone grants nothing.
    const DRIVE_CLIENT_ID = '15670895710-b94o3lc8amk41n8m2dsft3pm6uf4i71t.apps.googleusercontent.com';
    const DRIVE_SCOPE = 'https://www.googleapis.com/auth/drive.file';
    const DRIVE_FILE_NAME = 'inbox.list';
    const DRIVE_API = 'https://www.googleapis.com/drive/v3';
    const DRIVE_UPLOAD_API = 'https://www.googleapis.com/upload/drive/v3';
    const DRIVE_FILE_CACHE_STORAGE_KEY = 'driveFileCacheV1';
    const DRIVE_FILE_CACHE_MAX_AGE_MS = 7 * 24 * 60 * 60 * 1000;
    const INBOX_LISTS_UPDATED_KEY = 'inboxListsUpdatedAt';
    const LAST_DRIVE_UPLOAD_KEY = 'inboxLastDriveUploadAt';

    // Stable timestamp for the initial "example item" seed. Using a fixed value (instead of
    // Date.now() each call) ensures that when getEmptyDriveLists() is used both for local
    // state and for "remote is empty" (new/blank Drive file), mergeRemoteIntoLocal sees
    // the same item timestamp and does not duplicate the example item.
    const SEED_EXAMPLE_TIMESTAMP = 1609459200000; // 2021-01-01T00:00:00Z

    // ==================== PURE SYNC & DATA HELPERS (for clarity + testability) ====================
    // These are intentionally small, pure, and side-effect free. They centralize the
    // repetitive "valid positive timestamp" checks and activity math used throughout
    // sanitize, merge, reconcile, and recurrence. This reduces duplication and makes
    // the core LWW + ghost rules easier to read and unit-test in the self-tests.
    function ts(v) {
      const n = Number(v);
      return (Number.isFinite(n) && n > 0) ? n : 0;
    }
    function computeItemActivity(it) {
      if (!it) return 0;
      return Math.max(ts(it.timestamp), ts(it.updatedAt), ts(it.toggledAt), ts(it.dueAt));
    }
    function computeListActivity(lst) {
      if (!lst) return 0;
      let act = Math.max(ts(lst.timestamp), ts(lst.orderUpdatedAt));
      (lst.items || []).forEach(it => { act = Math.max(act, computeItemActivity(it)); });
      return act;
    }
    function ghostsToEndInPlace(list) {
      // Ensure ghosts (soft-deleted) are always at the suffix for render/clamp/drag assumptions.
      // Safe no-op for deleted lists or short arrays.
      if (!list || list.deletedAt || !list.items || list.items.length <= 1) return;
      const alive = list.items.filter(it => it && !it.deletedAt);
      const ghosts = list.items.filter(it => it && it.deletedAt);
      if (ghosts.length) list.items = [...alive, ...ghosts];
    }

    // Step 5: Central normalize for enforcement (called at stable points + structural ops)
    function normalizeListsInPlace(lists) {
      if (!Array.isArray(lists)) return;
      // Per-item ghosts suffix
      lists.forEach(ghostsToEndInPlace);
      // Top-level list ghosts to end (alive prefix)
      const alive = lists.filter(l => l && !l.deletedAt);
      const ghosts = lists.filter(l => l && l.deletedAt);
      if (ghosts.length) {
        // mutate in place to preserve reference
        lists.length = 0;
        alive.forEach(l => lists.push(l));
        ghosts.forEach(l => lists.push(l));
      }
    }

    // ==================== STATE INVARIANTS (Bulletproof Loop) ====================
    // These are the core safety properties we want to hold after every stable operation.
    // Enforced in DEBUG via asserts (step 4), normalized at key points (step 5), and tested in self-tests.js.
    // See BULLETPROOF-LOOP-PLAN.md for the full loop, failure modes, and PR plan.
    //
    // 1. Ghosts suffix (per list + top-level lists): alive items first, ghosts (deletedAt) last.
    //    - Enables clamp/render/drag to assume prefix-contiguous alives.
    //    - Currently partially via construction in merge/reconcile, ghostsToEndInPlace in limited paths, manual splice+push in deletes.
    //    - Goal: central normalizeListsInPlace called after mutations/assigns.
    // 2. No duplicate timestamps within a file (cross-list items unique by ts).
    //    - ts is birth id for matching in merge/reconcile/dedup.
    //    - Protected by seenTs + localPlacement in merge; addItem uses fresh Date.now().
    // 3. Alive lists prefix (top-level): deleted lists (ghosts) at end of state.lists.
    //    - clampCurrentIndex, findTargetListIndexByName, tab indices, drag all rely on this.
    // 4. Post-sanitize/apply/merge: all items have required fields (text, ts, checked bool); times are valid via ts().
    // 5. orderUpdatedAt / lts present for merge bias decisions after creates/reorders.
    // 6. Recurrence/due: text meta + derived fields (dueAt) consistent after sync/merge.
    //
    // Stable points for asserts/normalize (planned): return of mergeRemoteIntoLocal/sanitize/reconcile*,
    // after applyDrive* , end of flush success, post-parse loads, after saveAndRender, after structural ops + save.
    // Use window._assertInboxInvariants() (DEBUG) for manual checks.
    // Run `runInboxSelfTests()` or ?selftest frequently.

    // Step 4: Cheap DEBUG runtime assertions (warn only, never throw in prod paths)
    function assertGhostsAtEnd(list, where = '') {
      if (!DEBUG || !list || list.deletedAt || !list.items || list.items.length <= 1) return;
      let seenGhost = false;
      list.items.forEach((it, i) => {
        if (it && it.deletedAt) seenGhost = true;
        else if (seenGhost) console.warn('[Inbox assert] ghosts not suffix at', where, i);
      });
    }
    function assertNoDupTsAcrossLists(lists, where = '') {
      if (!DEBUG) return;
      const seen = new Set();
      (lists || []).forEach(l => (l && l.items || []).forEach(it => {
        const t = ts(it && it.timestamp);
        if (t && seen.has(t)) console.warn('[Inbox assert] dup ts', t, where);
        if (t) seen.add(t);
      }));
    }
    function assertValidSanitized(lists, where = '') {
      if (!DEBUG) return;
      (lists || []).forEach(l => {
        if (!l || typeof l.name !== 'string') console.warn('[Inbox assert] bad list', where);
        (l && l.items || []).forEach(it => {
          if (!it || typeof it.text !== 'string' || !ts(it.timestamp) || typeof it.checked !== 'boolean') {
            console.warn('[Inbox assert] bad item', where);
          }
        });
      });
    }

    function saveLocalData() {
      localStorage.setItem('inboxLists', JSON.stringify(state.lists));
      localStorage.setItem(INBOX_LISTS_UPDATED_KEY, String(Date.now()));
    }

    function stripListExtension(name) {
      return name.replace(/\.list$/, '');
    }

    function getEmptyDriveLists(fileName) {
      // Always seed new/empty files (incl. first run, new Drive file) with canonical starter per requirements.
      // One list "inbox" with one "example item".
      // NOTE: item uses SEED_EXAMPLE_TIMESTAMP (fixed) so local seed + remote-empty seed merge to 1 item.
      const now = Date.now();
      return [{
        name: 'inbox',
        items: [{ text: 'example item', timestamp: SEED_EXAMPLE_TIMESTAMP, checked: false, updatedAt: SEED_EXAMPLE_TIMESTAMP }],
        timestamp: now,
        orderUpdatedAt: now
      }];
    }

    function getDriveFileName(fileId, fallbackName = DRIVE_FILE_NAME) {
      return state.driveFiles.find(f => f.id === fileId)?.name || fallbackName;
    }

    function cacheDriveFileLists(fileId, fileName, lists, lastUpdated = Date.now(), remoteModified = null) {
      const sanitized = sanitizeLists(lists);
      if (!sanitized) return;
      state.driveFileCache[fileId] = sanitized;
      const entry = { name: fileName, lists: sanitized, lastUpdated };
      if (remoteModified != null && Number.isFinite(remoteModified)) entry.remoteModified = remoteModified;
      state.persistedDriveFileCache[fileId] = entry;
      localStorage.setItem(DRIVE_FILE_CACHE_STORAGE_KEY, JSON.stringify(state.persistedDriveFileCache));
    }

    function loadPersistedDriveFileCache() {
      state.driveFileCache = {};
      try { state.persistedDriveFileCache = JSON.parse(localStorage.getItem(DRIVE_FILE_CACHE_STORAGE_KEY) || '{}'); }
      catch (err) {
        if (DEBUG) console.warn('[Drive] Failed to parse persisted cache, resetting to empty', err);
        state.persistedDriveFileCache = {};
      }
      let cacheChanged = false;
      Object.entries(state.persistedDriveFileCache).forEach(([fileId, entry]) => {
        if (!entry || typeof entry.name !== 'string' || !ts(entry.lastUpdated)) {
          delete state.persistedDriveFileCache[fileId];
          cacheChanged = true;
          return;
        }
        if (Date.now() - entry.lastUpdated > DRIVE_FILE_CACHE_MAX_AGE_MS) {
          delete state.persistedDriveFileCache[fileId];
          cacheChanged = true;
          return;
        }
        const lists = sanitizeLists(entry.lists);
        if (!lists) {
          delete state.persistedDriveFileCache[fileId];
          cacheChanged = true;
          return;
        }
        state.driveFileCache[fileId] = lists;
      });
      if (cacheChanged) localStorage.setItem(DRIVE_FILE_CACHE_STORAGE_KEY, JSON.stringify(state.persistedDriveFileCache));
    }

    function clearPersistedDriveFileCache() {
      state.driveFileCache = {};
      state.persistedDriveFileCache = {};
      state.driveFileSaveSeq = {};
      state.driveFileSaveChains = {};
      localStorage.removeItem(DRIVE_FILE_CACHE_STORAGE_KEY);
    }

    function applyDriveListsToState(lists, { persist = true, renderNow = true, preserveCurrent = false } = {}) {
      // Always sanitize on apply to ensure checked, dueAt, etc are normalized after Drive roundtrips.
      const safe = sanitizeLists(lists) || [];
      const prevName = (state.lists[state.currentIndex] || {}).name;
      state.lists = safe;
      if (preserveCurrent && prevName) {
        let match = state.lists.findIndex(l => !isDeleted(l) && l.name === prevName);
        if (match < 0) match = state.lists.findIndex(l => l.name === prevName);
        state.currentIndex = match >= 0 ? match : 0;
      } else {
        state.currentIndex = 0;
      }
      if (DEBUG) normalizeListsInPlace(state.lists);
      clampCurrentIndex(); // defensive: ensure current not on ghost list (from remote/parse/assigns)
      if (DEBUG) { assertValidSanitized(state.lists, 'post-applyDrive'); assertNoDupTsAcrossLists(state.lists, 'post-applyDrive'); }
      if (persist) saveLocalData();
      if (renderNow) render();
    }

    // Convenience wrapper for the common case of background merges/reconciles
    // during active editing. Ensures the user's current list (by name) is preserved
    // instead of resetting to the first list.
    function applyDriveListsPreservingCurrent(lists, options = {}) {
      return applyDriveListsToState(lists, { ...options, preserveCurrent: true });
    }

    function getDriveListsSignature(lists) {
      // Includes ghosts (deletedAt items/lists) + oupd/lts for now; stable ts keeps churn low. Optional normalize (strip ghosts/oupd for sig) noted in DESIGN for PR-3+ (low prio, unchanged here).
      // PR-5 rollout: bloat (tombstones // cheap for small lists; keep for prop; future age GC if all mods higher); mixed-version (post-clean in parse + // tombstones + v2 header; old clients see clean text/ts).
      return JSON.stringify(lists);
    }

    // Smart merge for cross-device sync using explicit toggle versions.
    // |tg: (toggledAt) records the time of the last check *or* uncheck.
    // Winner for the checked state is the side with the higher toggledAt (falls back to checkedAt for old data).
    // This makes concurrent check/uncheck reliable ("the last toggle wins").
    // PR-3: full per-item + per-list LWW + deletion safety (maxDel > maxActivity).
    // Matches by lts (timestamp) preferred, fallback name. Ghosts via deletedAt.
    // Item/list deleted only if its del strictly > its max(ts,updatedAt,toggledAt,...) on other side (resurrect safety bias).
    // Order: per-list orderUpdatedAt decides item order winner (remote bias default); common survivors in that rel order; loser uniques + local safety appends at end; ghosts at end.
    // List order: remote lists order bias + local-only appends (alive first); ghost lists appended at end.
    // Preserves PR1/2 format, soft-del ghosts, filters, ts-Set recurrence, structural (no delAt on moves).
    function mergeRemoteIntoLocal(localLists, remoteLists) {
      if (DEBUG) console.log('[Drive] mergeRemoteIntoLocal: locals=', (localLists||[]).length, 'remotes=', (remoteLists||[]).length);
      if (!Array.isArray(remoteLists) || remoteLists.length === 0) {
        const res = sanitizeLists(localLists) || [];
        // ensure ghosts at end using shared helper (for prefix-alive assumptions in clamp/render/patch/drag)
        res.forEach(ghostsToEndInPlace);
        return res;
      }
      // Match locals by lts (preferred for robust id per DESIGN) then name (legacy/compat)
      const localByLts = new Map();
      const localByName = new Map();
      (localLists || []).forEach(l => {
        if (!l) return;
        const lts = ts(l.timestamp);
        if (lts) localByLts.set(lts, l);
        if (l.name != null) localByName.set(l.name, l);
      });
      const usedLocal = new Set(); // track matched to avoid dups on append
      function getListKey(l) {
        if (!l) return '';
        const lts = ts(l.timestamp);
        return lts ? ('lts:' + lts) : ('name:' + l.name);
      }
      const result = [];
      const remoteGhostLists = [];
      const localGhostListsLater = [];

      remoteLists.forEach(remoteList => {
        if (!remoteList || typeof remoteList.name !== 'string') return;
        let localList = null;
        const rLts = ts(remoteList.timestamp);
        if (rLts) {
          localList = localByLts.get(rLts);
        }
        if (!localList && remoteList.name != null) {
          localList = localByName.get(remoteList.name);
        }
        if (localList) usedLocal.add(getListKey(localList));

        // Reconcile this list (incl del rule for list + its items)
        const mList = reconcileList(localList, remoteList);
        if (mList) {
          if (mList.deletedAt) {
            remoteGhostLists.push(mList);
          } else {
            result.push(mList);
          }
        }
      });

      // local-only lists (append safety bias); ghosts collected for end
      (localLists || []).forEach(l => {
        if (!l || typeof l.name !== 'string') return;
        if (usedLocal.has(getListKey(l))) return;
        // local only: keep as-is (incl its deletedAt if set); will sanitize at end
        if (l.deletedAt) {
          localGhostListsLater.push(l);
        } else {
          // normalize item ghosts to end for local-only alives
          const norm = { ...l };
          ghostsToEndInPlace(norm);
          result.push(norm);
        }
      });

      // Append ghost lists at end (for tombstone emission), dedup by key
      const ghostKeys = new Set();
      function pushGhostIfNew(g) {
        if (!g) return;
        const k = getListKey(g);
        if (!ghostKeys.has(k)) {
          ghostKeys.add(k);
          result.push(g);
        }
      };
      remoteGhostLists.forEach(pushGhostIfNew);
      localGhostListsLater.forEach(pushGhostIfNew);

      // === SAFETY FIXES for reported bugs (non-breaking post-processing) ===
      // 1) Dedup items by ts for drag-drop list-to-list within file (remote may retain stale placement).
      //    Local post-move placement wins to prevent dups after cross-list DnD.
      const localPlacement = new Map(); // ts -> preferred list name (from current local after op)
      (localLists || []).forEach(l => {
        if (!l || l.deletedAt) return;
        const nm = l.name;
        (l.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (t && !it.deletedAt && !localPlacement.has(t)) localPlacement.set(t, nm);
        });
      });
      const seenTs = new Set();
      const deduped = [];
      result.forEach(l => {
        if (!l) return;
        const kept = [];
        const ghs = [];
        (l.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (!t || seenTs.has(t)) return;
          const pref = localPlacement.get(t);
          if (pref !== undefined) {
            if (pref === l.name) {
              seenTs.add(t);
              (it.deletedAt ? ghs : kept).push(it);
            }
          } else {
            seenTs.add(t);
            (it.deletedAt ? ghs : kept).push(it);
          }
        });
        deduped.push({ ...l, items: [...kept, ...ghs] });
      });
      if (DEBUG) normalizeListsInPlace(deduped);

      // 2) Final local-toggle bias (protects just-made checks/unchecks from being lost on pull+merge
      //    in rare timing/seq edge cases). Remote higher timestamp still wins.
      const localItemMap = new Map();
      (localLists || []).forEach(lst => {
        (lst && lst.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (t) localItemMap.set(t, it);
        });
      });
      deduped.forEach(lst => {
        (lst && lst.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (!t) return;
          const lIt = localItemMap.get(t);
          if (!lIt) return;
          const lT = ts(lIt.toggledAt || lIt.checkedAt);
          const iT = ts(it.toggledAt || it.checkedAt);
          if (lT > iT) {
            it.checked = !!lIt.checked;
            if (ts(lIt.toggledAt)) it.toggledAt = lIt.toggledAt;
            if (ts(lIt.checkedAt)) it.checkedAt = lIt.checkedAt;
            else if (!lIt.checked && it.checkedAt != null) delete it.checkedAt;
          } else if (lT === iT && lIt.checked && !it.checked) {
            it.checked = true;
            if (ts(lIt.checkedAt)) it.checkedAt = lIt.checkedAt;
            if (ts(lIt.toggledAt)) it.toggledAt = lIt.toggledAt;
          }
        });
      });

      const result = sanitizeLists(deduped) || [];
      if (DEBUG) { assertGhostsAtEnd(result[0]); assertNoDupTsAcrossLists(result, 'post-merge'); assertValidSanitized(result, 'post-merge'); }
      return result;
    }

    // Per DESIGN: reconcile single list (lts/name matched). Handles list del vs activity (incl contained items), copies meta.
    function reconcileList(localList, remoteList) {
      const lL = localList || null;
      const rL = remoteList || null;
      if (!lL && !rL) return null;
      const lDel = ts(lL && lL.deletedAt);
      const rDel = ts(rL && rL.deletedAt);
      const maxListDel = Math.max(lDel, rDel);

      const lListAct = computeListActivity(lL);
      const rListAct = computeListActivity(rL);
      const maxListAct = Math.max(lListAct, rListAct);

      let listDeletedAt = 0;
      if (maxListDel > maxListAct) {
        listDeletedAt = maxListDel;
      }

      // Reconcile items using per-item rule (even if list del; result may use empty for ghost lists)
      const reconciledItems = reconcileItems(lL, rL);

      // Decide item order by higher orderUpdatedAt (remote bias on tie)
      const lOupd = Number(lL && lL.orderUpdatedAt) || 0;
      const rOupd = Number(rL && rL.orderUpdatedAt) || 0;
      const useLocalOrder = lOupd > rOupd && !!lL;
      const baseSideItems = useLocalOrder ? (lL.items || []) : (rL ? rL.items : []);
      const otherSideItems = useLocalOrder ? (rL ? rL.items : []) : (lL ? lL.items : []);

      const recByTs = new Map();
      reconciledItems.forEach(ri => { if (ri && Number.isFinite(ri.timestamp)) recByTs.set(ri.timestamp, ri); });

      const orderedAlive = [];
      const seenTs = new Set();
      baseSideItems.forEach(bi => {
        const ts = bi && bi.timestamp;
        if (!Number.isFinite(ts) || seenTs.has(ts)) return;
        const rec = recByTs.get(ts);
        if (rec && !rec.deletedAt) {
          orderedAlive.push(rec);
          seenTs.add(ts);
        }
      });
      otherSideItems.forEach(oi => {
        const ts = oi && oi.timestamp;
        if (!Number.isFinite(ts) || seenTs.has(ts)) return;
        const rec = recByTs.get(ts);
        if (rec && !rec.deletedAt) {
          orderedAlive.push(rec);
          seenTs.add(ts);
        }
      });

      // Ghosts at end (from reconciled)
      const ghosts = reconciledItems.filter(ri => ri && ri.deletedAt);
      const finalItems = listDeletedAt ? [] : [...orderedAlive, ...ghosts];
      // Note: caller (merge) + sanitize paths also ensure suffix via ghostsToEndInPlace where needed.

      // Name: prefer remote when alive; for ghost list, prefer name from del-winner side (the one with maxDel; best-effort for tombstone). lts authoritative.
      let listName = (rL && rL.name) || (lL && lL.name) || '';
      if (listDeletedAt) {
        const delSide = (rDel >= lDel ? rL : lL) || rL || lL;
        if (delSide && delSide.name) listName = delSide.name;
      } else if (lL && rL && lL.name !== rL.name) {
        if (lOupd > rOupd) listName = lL.name;
      }

      const mList = { name: listName, items: finalItems };
      const ltsVal = Number(rL && rL.timestamp) || Number(lL && lL.timestamp);
      if (Number.isFinite(ltsVal) && ltsVal > 0) mList.timestamp = ltsVal;
      const oupdVal = (lOupd > rOupd ? (lL && lL.orderUpdatedAt) : (rL && rL.orderUpdatedAt)) || (rL && rL.orderUpdatedAt) || (lL && lL.orderUpdatedAt);
      if (Number.isFinite(oupdVal) && oupdVal > 0) mList.orderUpdatedAt = oupdVal;
      if (listDeletedAt) mList.deletedAt = listDeletedAt;
      return mList;
    }

    // Per-item reconcile (DESIGN table + pseudocode). maxDel > maxAct => ghost wins; else LWW per field + toggle special + due bias.
    // Note: activity includes dueAt (as set-time) for del comparison; aligns to "max(ts,updatedAt,toggledAt,...)" intent.
    function reconcileItems(localList, remoteList) {
      const lItems = (localList && localList.items) ? localList.items : [];
      const rItems = (remoteList && remoteList.items) ? remoteList.items : [];
      const localItemByTs = {};
      lItems.forEach(it => { const t = ts(it && it.timestamp); if (t) localItemByTs[t] = it; });
      const remoteItemByTs = {};
      rItems.forEach(it => { const t = ts(it && it.timestamp); if (t) remoteItemByTs[t] = it; });
      const allTs = new Set([...Object.keys(localItemByTs).map(Number), ...Object.keys(remoteItemByTs).map(Number)]);
      const reconciled = [];
      allTs.forEach(t => {
        const lIt = localItemByTs[t];
        const rIt = remoteItemByTs[t];
        const rec = reconcileItem(lIt, rIt);
        if (rec) reconciled.push(rec);
      });
      return reconciled;
    }

    function reconcileItem(lIt, rIt) {
      if (!lIt && !rIt) return null;
      const lDel = ts(lIt && lIt.deletedAt);
      const rDel = ts(rIt && rIt.deletedAt);
      const maxDel = Math.max(lDel, rDel);
      const lAct = computeItemActivity(lIt);
      const rAct = computeItemActivity(rIt);
      const maxAct = Math.max(lAct, rAct);
      if (maxDel > maxAct) {
        const base = (lDel >= rDel ? lIt : rIt) || lIt || rIt;
        return {
          text: (base && base.text) || '',
          timestamp: ts((base && base.timestamp) || (lIt && lIt.timestamp) || (rIt && rIt.timestamp)),
          checked: false,
          deletedAt: maxDel
        }; // ghost minimal; ts fallback for safety
      }
      // alive: prefer base from non-deleted side (the one with full data for resurrection safety, e.g. toggle/recurrence cases where no updatedAt but text must survive). Then apply LWW overrides (upd/text, toggle, due). Aligns to maxDel > maxAct + "never lose" safety. Remote bias only when both alive.
      let winner;
      if (!lIt) {
        winner = { ...rIt };
      } else if (!rIt) {
        winner = { ...lIt };
      } else if (lIt.deletedAt && !rIt.deletedAt) {
        // remote side is the alive/full one (local was ghost but del lost)
        winner = { ...rIt };
      } else if (!lIt.deletedAt && rIt.deletedAt) {
        // local is the alive/full one
        winner = { ...lIt };
      } else {
        // both alive (or edge): remote bias + upd LWW for text
        const lUpd = Number(lIt.updatedAt) || 0;
        const rUpd = Number(rIt.updatedAt) || 0;
        if (lUpd > rUpd) {
          winner = { ...rIt, text: lIt.text, updatedAt: lUpd };
          if (Number(lIt.dueAt) > Number(rIt.dueAt || 0)) winner.dueAt = lIt.dueAt;
        } else {
          winner = { ...rIt };
        }
      }
      // Toggle LWW (exact prior logic preserved for compat)
      const rVer = ts((rIt && (rIt.toggledAt || rIt.checkedAt)) || 0);
      const lVer = ts((lIt && (lIt.toggledAt || lIt.checkedAt)) || 0);
      if (lIt && rIt) {
        if (lVer > rVer) {
          const localHasCA = !!ts(lIt.checkedAt);
          winner = {
            ...winner,
            checked: !!lIt.checked,
            checkedAt: localHasCA ? lIt.checkedAt : (lIt.checked ? winner.checkedAt : undefined),
            toggledAt: lIt.toggledAt || winner.toggledAt
          };
          if (!localHasCA && !lIt.checked) {
            delete winner.checkedAt; // preserve explicit clear from local manual reactivation of recurrent
          }
        } else if (lVer === rVer) {
          if (lIt.checked && !winner.checked) {
            winner = { ...winner, checked: true, checkedAt: lIt.checkedAt || winner.checkedAt, toggledAt: lIt.toggledAt || winner.toggledAt };
          }
        }
      }
      // local due bias (as prior logic)
      if (lIt && ts(lIt.dueAt) && (!winner.dueAt || ts(lIt.dueAt) > ts(winner.dueAt || 0))) {
        winner = { ...winner, dueAt: lIt.dueAt };
      }
      // ensure ts
      if (!ts(winner.timestamp)) {
        winner.timestamp = ts((lIt && lIt.timestamp) || (rIt && rIt.timestamp));
      }
      if (winner.deletedAt) delete winner.deletedAt; // alive
      return winner;
    }

    function restoreActiveDriveFileFromCache() {
      const activeFile = state.driveFiles[state.activeDriveFileIdx];
      const cachedLists = activeFile && state.driveFileCache[activeFile.id];
      if (!cachedLists) return false;
      const localUpdated = Number(localStorage.getItem(INBOX_LISTS_UPDATED_KEY) || 0);
      const cacheUpdated = state.persistedDriveFileCache[activeFile.id]?.lastUpdated || 0;
      // loadData() already applied inboxLists; only use cache when it is at least as fresh.
      if (!localUpdated || localUpdated > cacheUpdated) return false;
      applyDriveListsToState(cachedLists, { persist: true, renderNow: false });
      return true;
    }

    function saveDriveFilesState() {
      localStorage.setItem('driveFiles', JSON.stringify(state.driveFiles));
      localStorage.setItem('activeDriveFileIdx', String(state.activeDriveFileIdx));
    }

    function loadDriveFilesState() {
      try { state.driveFiles = JSON.parse(localStorage.getItem('driveFiles') || '[]'); }
      catch { state.driveFiles = []; }
      state.activeDriveFileIdx = Number(localStorage.getItem('activeDriveFileIdx') || 0);
      if (state.activeDriveFileIdx >= state.driveFiles.length) state.activeDriveFileIdx = 0;
      loadPersistedDriveFileCache();
    }

    function formatDriveUser(user, fallback = '') {
      if (!user) return fallback;
      const name = typeof user.displayName === 'string' ? user.displayName.trim() : '';
      const email = typeof user.emailAddress === 'string' ? user.emailAddress.trim() : '';
      if (name && email && name !== email) return `${name} (${email})`;
      return name || email || fallback;
    }

    async function loadDriveUser() {
      const res = await driveFetch(`${DRIVE_API}/about?fields=user(displayName,emailAddress)`);
      const data = await res.json();
      state.driveUser = data && data.user ? data.user : null;
      state.driveUserLoadFailed = false;
      return state.driveUser;
    }

    function renderDriveStatusIndicator(status) {
      const indicator = document.getElementById('drive-status-indicator');
      const liveRegion = document.getElementById('drive-status-live');
      if (!indicator) return;
      indicator.classList.toggle('connected', state.driveConnected);
      const formattedUser = formatDriveUser(state.driveUser);
      const label = state.driveConnected
        ? `Drive connected${formattedUser ? `: ${formattedUser}` : ''}`
        : (status === 'error' ? 'Drive connection needs attention' : 'Drive disconnected');
      indicator.setAttribute('aria-label', label);
      indicator.title = label;
      if (liveRegion) liveRegion.textContent = label;
      renderFileStrip();
    }

    function setDriveStatus(status) {
      // status: 'disconnected' | 'connected' | 'error'
      state.driveConnected = status === 'connected';
      if (status !== 'connected') {
        state.driveUser = null;
        state.driveUserLoadFailed = false;
      }
      renderDriveStatusIndicator(status);
    }

    function initTokenClient() {
      if (state.tokenClient) return;
      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (response) => {
          if (response.error) {
            if (state.driveTokenReject) { state.driveTokenReject(new Error(response.error)); state.driveTokenReject = null; state.driveTokenResolve = null; }
            return;
          }
          state.driveToken = response.access_token;
          state.driveTokenExpiry = Date.now() + (response.expires_in - 60) * 1000;
          localStorage.setItem('driveToken', state.driveToken);
          localStorage.setItem('driveTokenExpiry', String(state.driveTokenExpiry));
          if (state.driveTokenResolve) { state.driveTokenResolve(state.driveToken); state.driveTokenResolve = null; state.driveTokenReject = null; }
        },
        error_callback: (err) => {
          if (state.driveTokenReject) { state.driveTokenReject(new Error(err.type || 'token_error')); state.driveTokenReject = null; state.driveTokenResolve = null; }
        },
      });
    }

    function requestToken(prompt = 'select_account', hint = '') {
      return new Promise((resolve, reject) => {
        if (state.tokenRequestPending) {
          reject(new Error('Token request already in progress'));
          return;
        }
        state.tokenRequestPending = true;
        state.driveTokenResolve = (token) => { state.tokenRequestPending = false; resolve(token); };
        state.driveTokenReject = (err) => { state.tokenRequestPending = false; reject(err); };
        const config = { prompt };
        if (hint) config.login_hint = hint;
        state.tokenClient.requestAccessToken(config);
      });
    }

    async function ensureToken() {
      if (state.driveToken && Date.now() < state.driveTokenExpiry) return state.driveToken;
      // Try to restore a fresh token from localStorage before going to GIS.
      const storedToken = localStorage.getItem('driveToken');
      const storedExpiry = Number(localStorage.getItem('driveTokenExpiry') || 0);
      if (storedToken && Date.now() < storedExpiry) {
        state.driveToken = storedToken;
        state.driveTokenExpiry = storedExpiry;
        return state.driveToken;
      }
      // Token missing or expired — attempt a silent GIS refresh if possible.
      if (!state.tokenRequestPending && state.tokenClient && localStorage.getItem('driveWasConnected')) {
        try {
          const hint = localStorage.getItem('driveUserHint') || '';
          const token = await requestToken('none', hint);
          if (DEBUG) console.log('[Drive] ensureToken: silent refresh succeeded.');
          return token;
        } catch (err) {
          if (DEBUG) console.log('[Drive] ensureToken: silent refresh failed.', err);
        }
      }
      // Silent refresh not possible or failed — signal reconnect needed.
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      setDriveStatus('error');
      throw new Error('Drive token expired. Please reconnect.');
    }

    async function driveFetch(url, options = {}) {
      const token = await ensureToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      const { keepalive, ...fetchOptions } = options;
      const res = await fetch(url, { ...fetchOptions, headers, keepalive: !!keepalive });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`Drive API error ${res.status}: ${text}`);
      }
      return res;
    }

    // Builds the multipart/related body used by the Drive upload API.
    function buildDriveMultipartBody(name, content) {
      const meta = JSON.stringify({ name, mimeType: 'text/plain' });
      return [
        '--inbox_boundary',
        'Content-Type: application/json; charset=UTF-8',
        '',
        meta,
        '--inbox_boundary',
        'Content-Type: text/plain; charset=UTF-8',
        '',
        content,
        '--inbox_boundary--',
      ].join('\r\n');
    }

    async function createDriveFile(fileName) {
      const res = await driveFetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart`, {
        method: 'POST',
        headers: { 'Content-Type': 'multipart/related; boundary=inbox_boundary' },
        body: buildDriveMultipartBody(fileName, ''),
      });
      return res.json();
    }

    async function fetchDriveFileLists(fileId, fallbackName, { forceRemote = false } = {}) {
      const metaRes = await driveFetch(`${DRIVE_API}/files/${fileId}?fields=modifiedTime`);
      const meta = await metaRes.json();
      const remoteModified = meta.modifiedTime ? Date.parse(meta.modifiedTime) : 0;
      const cacheEntry = state.persistedDriveFileCache[fileId];
      const cacheUpdated = cacheEntry?.lastUpdated || 0;
      const cachedRemoteMod = cacheEntry?.remoteModified || 0;
      const cachedLists = state.driveFileCache[fileId];

      // Prefer cache only if it reflects a remote version at least as new as current,
      // or the local-ahead heuristic for very recent pending saves. This avoids
      // clock-skew / "ahead" cache permanently hiding newer Drive versions.
      const cacheKnowsCurrentOrNewer = cachedRemoteMod >= remoteModified;
      const localAheadHeuristic = cacheUpdated > remoteModified && !cachedRemoteMod;
      if (!forceRemote && cachedLists && (cacheKnowsCurrentOrNewer || localAheadHeuristic)) {
        return { lists: cachedLists, modifiedTime: remoteModified, fromCache: true };
      }

      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      const parsed = text.trim() ? parseListFile(text) : null;
      const fileName = getDriveFileName(fileId, fallbackName);
      const lists = parsed || getEmptyDriveLists(fileName);
      cacheDriveFileLists(fileId, fileName, lists, Math.max(remoteModified, cacheUpdated), remoteModified);
      return { lists, modifiedTime: remoteModified, fromCache: false };
    }

    // Fetches a Drive file by ID, parses it, applies it to local state, and re-renders.
    async function loadAndApplyFileById(fileId, fallbackName) {
      const { lists } = await fetchDriveFileLists(fileId, fallbackName);
      applyDriveListsToState(lists);
      return lists;
    }

    async function findOrCreateDriveFile() {
      if (state.driveFileSwitching) {
        // During a transition prefer explicit fileIds passed by the caller.
        const current = getActiveDriveFileId();
        if (current) return current;
      }

      // Use the cached verified file ID to skip the redundant GET on repeated saves.
      if (state.verifiedDriveFileId && state.driveFiles[state.activeDriveFileIdx]?.id === state.verifiedDriveFileId) {
        return state.verifiedDriveFileId;
      }

      // Verify the active file is still accessible.
      if (state.driveFiles.length > 0 && state.activeDriveFileIdx < state.driveFiles.length) {
        const activeFile = state.driveFiles[state.activeDriveFileIdx];
        try {
          await driveFetch(`${DRIVE_API}/files/${activeFile.id}?fields=id`);
          state.verifiedDriveFileId = activeFile.id;
          return activeFile.id;
        } catch {
          state.verifiedDriveFileId = null;
          // File not accessible — fall through to search/create
        }
      }

      // Search for an existing inbox.list created by this app
      const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
      const res = await driveFetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name)&spaces=drive`);
      const data = await res.json();
      if (data.files && data.files.length > 0) {
        const fId = data.files[0].id;
        if (!state.driveFiles.some(f => f.id === fId)) {
          state.driveFiles.push({ id: fId, name: DRIVE_FILE_NAME });
          state.activeDriveFileIdx = state.driveFiles.length - 1;
          saveDriveFilesState();
          renderFileStrip();
        }
        state.verifiedDriveFileId = fId;
        return fId;
      }

      // Create a new empty file
      const created = await createDriveFile(DRIVE_FILE_NAME);
      state.driveFiles.push({ id: created.id, name: DRIVE_FILE_NAME });
      state.activeDriveFileIdx = state.driveFiles.length - 1;
      saveDriveFilesState();
      renderFileStrip();
      state.verifiedDriveFileId = created.id;
      return created.id;
    }

    async function loadFromDrive() {
      const fileId = await findOrCreateDriveFile();
      const metaRes = await driveFetch(`${DRIVE_API}/files/${fileId}?fields=modifiedTime`);
      const meta = await metaRes.json();
      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      const lists = text.trim() ? parseListFile(text) : null;
      const modifiedTime = meta.modifiedTime ? Date.parse(meta.modifiedTime) : 0;
      return { lists, modifiedTime };
    }

    function getActiveDriveFileId() {
      return state.driveFiles[state.activeDriveFileIdx]?.id || null;
    }

    async function saveToDrive(content, { fileId = null, keepalive = false } = {}) {
      if (!state.driveConnected) return;
      // Skip immediately if offline; the 'online' event listener will flush later.
      // Network failures that slip past this check are caught by the try/catch below.
      if (!navigator.onLine) { return; }
      try {
        // Bind the target file up front so an in-flight save cannot land on a
        // different file if the user switches tabs while the request is pending.
        const targetId = fileId || await findOrCreateDriveFile();
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${targetId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
          keepalive,
        });
        localStorage.setItem(LAST_DRIVE_UPLOAD_KEY, String(Date.now()));
        setDriveStatus('connected');

        // Immediately record the authoritative server modifiedTime so cross-device
        // heuristics and "is remote newer?" decisions are accurate (helps prevent stale overwrites).
        try {
          const metaRes = await driveFetch(`${DRIVE_API}/files/${targetId}?fields=modifiedTime`);
          const meta = await metaRes.json();
          const newRemoteMod = meta.modifiedTime ? Date.parse(meta.modifiedTime) : Date.now();
          const active = state.driveFiles[state.activeDriveFileIdx];
          if (active && active.id === targetId) {
            cacheDriveFileLists(active.id, active.name, state.lists, Date.now(), newRemoteMod);
          }
        } catch (_) { /* non-fatal */ }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] save failed', err);
        setDriveStatus('error');
      }
    }

    // Saves content to a specific Drive file by ID (used for cross-file item moves).
    async function saveToDriveFile(fileId, content, { setStatusOnSuccess = false, throwOnError = false } = {}) {
      if (!state.driveConnected || !navigator.onLine) return;
      try {
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
        });
        if (setStatusOnSuccess) setDriveStatus('connected');
      } catch (err) {
        if (DEBUG) console.warn('[Drive] saveToDriveFile failed', err);
        if (throwOnError) throw err;
      }
    }

    function flushDriveFileInBackground(fileId, content) {
      if (!fileId || !state.driveConnected || !navigator.onLine) return;
      const seq = (state.driveFileSaveSeq[fileId] || 0) + 1;
      state.driveFileSaveSeq[fileId] = seq;
      const previousSavePromise = state.driveFileSaveChains[fileId] || Promise.resolve();
      const chain = previousSavePromise
        .catch((err) => {
          if (DEBUG) console.warn('[Drive] Prior background save failed', err);
        })
        .then(async () => {
          if (state.driveFileSaveSeq[fileId] !== seq) return;
          await saveToDriveFile(fileId, content, { setStatusOnSuccess: true, throwOnError: true });
        });
      state.driveFileSaveChains[fileId] = chain.catch((err) => {
        if (DEBUG) console.warn('[Drive] background file save failed', err);
        setDriveStatus('error');
      });
    }

    // Silently load the Drive file and apply it to the local state.
    // Called after every successful auto-reconnect so the app always starts
    // with the latest saved data rather than whatever is in localStorage.
    function markDriveSyncReady() {
      state.driveSyncReady = true;
    }

    async function loadAndApplyDriveData() {
      if (state.driveFileSwitching) return;
      const opSeq = ++state.driveOpSeq;
      try {
        const activeFile = state.driveFiles[state.activeDriveFileIdx];
        if (!activeFile) {
          markDriveSyncReady();
          return;
        }
        const targetFileId = activeFile.id; // bind ID early
        // Use the cache-aware fetch first (respects remote modifiedTime to avoid unnecessary downloads
        // and to protect recent local edits). Force a remote check for sync pulls so we see other devices' changes.
        const { lists: fetched, modifiedTime: remoteModified, fromCache } = await fetchDriveFileLists(
          targetFileId, activeFile.name, { forceRemote: true }
        );
        if (state.driveOpSeq !== opSeq || state.driveFileSwitching || getActiveDriveFileId() !== targetFileId) return; // ignore stale/overlapped
        const remote = fetched || [];
        const localSig = getDriveListsSignature(state.lists);
        const remoteSig = getDriveListsSignature(remote);
        if (localSig === remoteSig) {
          cacheDriveFileLists(targetFileId, activeFile.name, state.lists, Date.now(), remoteModified);
          markDriveSyncReady();
          preloadDriveFiles();
          return;
        }
        const hasPendingUpload = !!state.saveDataDriveTimer;
        if (hasPendingUpload) {
          // PR4: pending local + detected remote: merge (pull already performed by this load), adopt silent if diff,
          // save the reconciled. (read-merge-write benefit; prefers safety over raw local push)
          clearTimeout(state.saveDataDriveTimer);
          state.saveDataDriveTimer = null;
          const merged = mergeRemoteIntoLocal(state.lists, remote);
          if (state.driveOpSeq !== opSeq || getActiveDriveFileId() !== targetFileId) return;
          if (getDriveListsSignature(merged) !== getDriveListsSignature(state.lists)) {
            applyDriveListsPreservingCurrent(merged, { persist: false, renderNow: false });
            render();
          }
          cacheDriveFileLists(targetFileId, activeFile.name, merged, Date.now(), remoteModified);
          markDriveSyncReady();
          await saveToDrive(generateListFile(merged), { fileId: targetFileId });
        } else {
          // No pending local write — merge to adopt remote changes (incl. checks from other devices)
          // while preferring the "newer" checkedAt per item and keeping device-local-only items.
          const merged = mergeRemoteIntoLocal(state.lists, remote);
          if (state.driveOpSeq !== opSeq || state.driveFileSwitching || getActiveDriveFileId() !== targetFileId) return;
          cacheDriveFileLists(targetFileId, activeFile.name, merged, Date.now(), remoteModified);
          markDriveSyncReady();
          applyDriveListsPreservingCurrent(merged);
        }
        preloadDriveFiles();
      } catch (err) {
        if (DEBUG) console.warn('[Drive] auto-load on reconnect failed', err);
      } finally {
        markDriveSyncReady();
      }
    }

    // Attempt to restore the connected state from a persisted token on startup.
    // Called automatically via onGoogleLibraryLoad when the GIS script is ready.
    async function autoReconnectDrive() {
      if (!localStorage.getItem('driveWasConnected')) return;
      // Try to restore a still-valid token from localStorage — no GIS call needed.
      const storedToken = localStorage.getItem('driveToken');
      // Fallback of 0 means epoch (already expired), so the check below fails safely.
      const storedExpiry = Number(localStorage.getItem('driveTokenExpiry') || 0);
      if (storedToken && Date.now() < storedExpiry) {
        state.driveToken = storedToken;
        state.driveTokenExpiry = storedExpiry;
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Restored from persisted token.');
        await loadAndApplyDriveData();
        startDrivePolling();
        return;
      }
      // Token expired — attempt a silent GIS refresh with no user interaction (prompt: 'none').
      // This works when the user has an active Google session that previously granted access,
      // keeping them connected across browser restarts and app re-opens without any popup.
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      await silentReconnectDrive();
    }

    // Silently requests a new access token via GIS without showing any UI.
    // On success, restores the connected state and syncs data.
    // On failure (e.g. session expired, consent revoked), signals the error state
    // so the user can tap the Drive button to reconnect manually.
    async function silentReconnectDrive() {
      const hint = localStorage.getItem('driveUserHint') || '';
      try {
        initTokenClient();
        await requestToken('none', hint);
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Silent re-auth succeeded.');
        await loadAndApplyDriveData();
        startDrivePolling();
      } catch (err) {
        setDriveStatus('error');
        markDriveSyncReady();
        if (DEBUG) console.log('[Drive] Silent re-auth failed — tap Drive button to reconnect.', err);
      }
    }

    // The GIS library calls window.onGoogleLibraryLoad once it is ready.
    // Set this before the <script> tag executes so the callback is in place.
    window.onGoogleLibraryLoad = autoReconnectDrive;

    // Belt-and-suspenders: if the GIS client loaded earlier (race with head async script vs
    // body-end inline), invoke the reconnect hook ourselves so Drive hydrate isn't skipped
    // and we don't get stuck showing/editing only the local cache.
    if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      setTimeout(() => { try { autoReconnectDrive(); } catch (_) {} }, 0);
    }

    async function connectDrive() {
      try {
        initTokenClient();
        const emailHint = await showPrompt('Enter the Google account email to connect\n(leave blank for automatic selection):');
        if (emailHint === null) return; // user cancelled
        await requestToken('select_account', emailHint.trim() || undefined);
        // Mark as connected so saveToDrive is allowed to proceed
        localStorage.setItem('driveWasConnected', '1');
        try {
          await loadDriveUser();
          // Store the email as a hint to enable silent re-auth on future visits.
          const email = state.driveUser && state.driveUser.emailAddress;
          if (email) localStorage.setItem('driveUserHint', email);
        } catch (err) {
          state.driveUserLoadFailed = true;
          if (DEBUG) console.warn('[Drive] load user on connect failed', err);
        }
        setDriveStatus('connected');
        // Load file and offer merge/replace if remote data exists.
        // Capture the active file ID early (connect may populate driveFiles inside loadFromDrive/findOrCreate).
        const connectActiveId = getActiveDriveFileId();
        let remote = null;
        try {
          ({ lists: remote } = await loadFromDrive());
        } catch (err) {
          if (DEBUG) console.warn('[Drive] load on connect failed', err);
        }

        if (remote && remote.length > 0) {
          const choice = await showConfirm(
            'Found existing inbox.list on Drive.\n\nOK = Use Drive data (replaces local)\nCancel = Keep local data (overwrites Drive)'
          );
          if (choice) {
            // Pure assign on explicit user choice "use Drive" (PR4 doc; replaces local per user intent)
            // sanitize for consistency (PR4 review)
            state.lists = sanitizeLists(remote) || [];
            clampCurrentIndex(); // defensive: ghosts from Drive choice
            saveData();
            render();
          } else {
            // Push local data to Drive (PR4: explicit connect path, direct generate ok)
            await saveToDrive(generateListFile(), { fileId: connectActiveId });
          }
        } else {
          // No remote data — push local (PR4 doc)
          await saveToDrive(generateListFile(), { fileId: connectActiveId });
        }
        markDriveSyncReady();
        startDrivePolling();
      } catch (err) {
        if (DEBUG) console.warn('[Drive] connect failed', err);
        setDriveStatus('error');
        markDriveSyncReady();
      }
    }

    function disconnectDrive() {
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      if (state.driveToken) {
        google.accounts.oauth2.revoke(state.driveToken, () => {});
      }
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      state.driveFiles = [];
      state.activeDriveFileIdx = 0;
      state.verifiedDriveFileId = null;
      state.driveUser = null;
      state.driveUserLoadFailed = false;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      localStorage.removeItem('driveWasConnected');
      localStorage.removeItem('driveUserHint');
      localStorage.removeItem('driveFiles');
      localStorage.removeItem('activeDriveFileIdx');
      clearPersistedDriveFileCache();
      setDriveStatus('disconnected');
    }

    async function flushPendingDriveSave({ keepalive = false } = {}) {
      if (state.saveDataDriveTimer) {
        clearTimeout(state.saveDataDriveTimer);
        state.saveDataDriveTimer = null;
      }
      if (!state.driveConnected || state.driveFileSwitching) return;
      const fileId = getActiveDriveFileId();
      if (!fileId) return;

      // Snapshot the *intended* content + fileId at the start of this flush.
      // This is critical for correctness during concurrent file transitions.
      const snapshotContentForFile = generateListFile(state.lists);
      const intendedFileId = fileId;

      // PR4 concurrency/structural: use op seq to ignore stale; structural remove pending (from cross source) forces direct bypass to protect relocation even on reconnect flush
      const opSeq = ++state.driveOpSeq;
      const pendingStructuralTs = state.structuralRemovePending[intendedFileId] || 0;
      const now = Date.now();
      const bypassStructural = pendingStructuralTs && (now - pendingStructuralTs < 60000);
      if (bypassStructural) {
        delete state.structuralRemovePending[intendedFileId];
        if (DEBUG) console.log('[Drive] flush: bypassing pull for recent structural remove (cross-file source relocation safety)');
      }

      let content = snapshotContentForFile;
      if (!bypassStructural && navigator.onLine && !keepalive) {
        // PR4 read-merge-write: pull first (forceRemote), merge local edits/dels into it, adopt if changed (silent),
        // then save result. Reduces races vs prior direct generate. Later reconcile on reconnect for offline.
        try {
          const activeFile = state.driveFiles[state.activeDriveFileIdx];
          const fallbackName = activeFile ? stripListExtension(activeFile.name) : undefined;
          const { lists: remote } = await fetchDriveFileLists(intendedFileId, fallbackName, { forceRemote: true });
          // Re-validate after await.
          // If a file switch/close/add happened (switching flag, active id changed, or newer op),
          // we MUST NOT write snapshot/current lists using the old intendedFileId.
          // The transition code is responsible for explicitly flushing the correct snapshot for the file being left.
          // This is the key guard against "one file overriding another".
          if (!state.driveConnected || state.driveFileSwitching || !navigator.onLine || getActiveDriveFileId() !== intendedFileId || state.driveOpSeq !== opSeq) {
            if (DEBUG) console.log('[Drive] post-pull state/seq/switch changed, ABORTING flush to prevent clobbering a different file (intendedFileId=', intendedFileId, 'currentActive=', getActiveDriveFileId(), ')');
            return; // Do not save. Avoids writing another file's lists to this fileId.
          }
          // Step 6 extra re-check before final save
          if (getActiveDriveFileId() !== intendedFileId) {
            if (DEBUG) console.log('[Drive] final intendedFile mismatch, ABORT');
            return;
          }
          const merged = mergeRemoteIntoLocal(state.lists, remote || []);
          if (DEBUG) {
            const lsig = getDriveListsSignature(state.lists);
            const msig = getDriveListsSignature(merged);
            console.log('[Drive] flush pull+merge: pulled, localSig!=mergedSig?', lsig !== msig);
          }
          if (getDriveListsSignature(merged) !== getDriveListsSignature(state.lists)) {
            applyDriveListsPreservingCurrent(merged, { persist: false, renderNow: false }); // silent adopt for safety (dels etc)
            render();
          }
          content = generateListFile(merged);
        } catch (e) {
          if (DEBUG) console.warn('[Drive] pre-flush pull failed, falling back to local snapshot (preserve intent; reconcile later)', e);
          content = snapshotContentForFile;
        }
      } else {
        // explicit no-pull: keepalive (must be non-awaitable), !onLine, structural bypass, or other. preserve local generate.
        if (DEBUG) console.log('[Drive] flush: no-pull path (keepalive or !onLine or structural)');
        content = snapshotContentForFile;
      }
      // Final safety: only write if we still match the original intent.
      if (getActiveDriveFileId() === intendedFileId && !state.driveFileSwitching) {
        saveToDrive(content, { fileId: intendedFileId, keepalive });
      } else if (DEBUG) {
        console.log('[Drive] flush: skipping final save after no-pull path due to concurrent transition');
      }
    }

    // Flush debounced Drive writes before the page hides or goes offline.
    // keepalive lets mobile browsers finish the PATCH after the tab closes.
    window.addEventListener('pagehide', () => flushPendingDriveSave({ keepalive: true }));
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'hidden') {
        flushPendingDriveSave({ keepalive: true });
        stopDrivePolling();
      } else if (document.visibilityState === 'visible' && state.driveConnected && !state.driveFileSwitching) {
        // Cross-device sync: pull immediately when returning, and ensure active polling is running.
        // These may be racing a just-started transition; the seq + switching guards inside will protect them.
        flushPendingDriveSave();
        loadAndApplyDriveData().catch(() => {});
        startDrivePolling();
      }
    });
    window.addEventListener('focus', () => {
      if (state.driveConnected && !state.driveFileSwitching) {
        flushPendingDriveSave();
        loadAndApplyDriveData().catch(() => {});
        startDrivePolling();
      }
    });
    // Additional wake-up for mobile PWAs / when restoring from background (pageshow often fires on resume)
    window.addEventListener('pageshow', () => {
      if (state.driveConnected && !state.driveFileSwitching && document.visibilityState === 'visible') {
        flushPendingDriveSave();
        loadAndApplyDriveData().catch(() => {});
        startDrivePolling();
      }
    });
    window.addEventListener('online', () => {
      if (state.driveConnected) {
        flushPendingDriveSave();
        // Also pull latest from Drive so we adopt remote changes made while offline
        // (instead of only pushing local and potentially sticking on a stale local cache).
        loadAndApplyDriveData().catch(() => {});
        startDrivePolling();
      }
    });

    // ==================== ACTIVE POLLING FOR NEAR-INSTANT CROSS-DEVICE SYNC ====================
    // The app is deliberately serverless and stores data only in *your* Google Drive files.
    // True instantaneous push would require a backend (Drive webhooks + WebSocket/FCM to clients).
    // Instead we do very lightweight "modifiedTime?" polls every 4 seconds *while the app is visible*.
    // When the other device saves, its upload bumps Drive's modifiedTime → this device detects it
    // on next poll tick and pulls + merges (using the toggledAt version logic for checks).
    // Result: changes usually appear within a few seconds when both devices are open and in foreground.
    let drivePollInterval = null;

    function stopDrivePolling() {
      if (drivePollInterval) {
        clearInterval(drivePollInterval);
        drivePollInterval = null;
      }
    }

    async function checkForRemoteChanges() {
      if (!state.driveConnected || state.driveFileSwitching) return;
      const activeFile = state.driveFiles[state.activeDriveFileIdx];
      if (!activeFile) return;
      const pollTargetId = activeFile.id;
      try {
        // Extremely cheap metadata-only request
        const metaRes = await driveFetch(`${DRIVE_API}/files/${pollTargetId}?fields=modifiedTime`);
        const meta = await metaRes.json();
        const remoteModified = meta.modifiedTime ? Date.parse(meta.modifiedTime) : 0;
        const cacheEntry = state.persistedDriveFileCache[pollTargetId];
        const knownRemote = (cacheEntry && cacheEntry.remoteModified) || 0;

        if (remoteModified > knownRemote) {
          // loadAndApply will re-validate the current active against pollTargetId via its own guards.
          if (DEBUG) console.log('[Drive] poll detected change, loadAndApply', pollTargetId);
          await loadAndApplyDriveData();
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] poll check failed', err);
      }
    }

    function startDrivePolling() {
      stopDrivePolling();
      if (!state.driveConnected) return;
      drivePollInterval = setInterval(() => {
        if (document.visibilityState !== 'visible' || !state.driveConnected || state.driveFileSwitching) return;
        checkForRemoteChanges().catch(() => {});
      }, DRIVE_POLL_INTERVAL_MS);
    }

    // Hook into setDriveStatus so polling starts/stops with connection
    const _originalSetDriveStatus = setDriveStatus;
    setDriveStatus = function(status) {
      const wasConnected = state.driveConnected;
      _originalSetDriveStatus(status);
      if (status === 'connected' && !wasConnected) {
        setTimeout(startDrivePolling, 1500); // after initial data load
      } else if (status !== 'connected') {
        stopDrivePolling();
      }
    };

    // Also stop polling cleanly on explicit disconnect
    const _originalDisconnect = disconnectDrive;
    disconnectDrive = function() {
      stopDrivePolling();
      _originalDisconnect();
    };
    // ==================== END ACTIVE POLLING ====================

    // ==================== END GOOGLE DRIVE ====================

    const INPUT_REFOCUS_DELAY_MS = 50;  // mobile keyboard needs time to reflow
    const INIT_FOCUS_DELAY_MS = 300;    // initial focus delay on page load
    const DRIVE_SAVE_DEBOUNCE_MS = 350; // faster outgoing so other devices see changes sooner
    const DRIVE_POLL_INTERVAL_MS = 2500; // while visible + connected: poll metadata frequently for near-instant feel (cheap call)
    const MAIN_BOTTOM_PADDING_OFFSET_PX = 8; // breathing room so the last item is not flush against the bar

    // ==================== DRAG CONTROLLER ====================
    const DRAG_THRESHOLD_PX = 8;
    const LONG_PRESS_DELAY = 250;            // milliseconds - hold this long without dragging to trigger rename on lists/items
    const LONG_PRESS_CANCEL_THRESHOLD = 10;  // px; cancel long-press if finger moves this far
    const DRAG_AUTO_SCROLL_EDGE = 96;        // px from content edge that triggers scroll
    const DRAG_AUTO_SCROLL_MAX_SPEED = 14;   // px per animation frame at deepest edge

    function getDragScrollBounds() {
      const bottomBar = document.querySelector('.bottom-bar');
      const bottomInset = bottomBar ? bottomBar.getBoundingClientRect().height : 120;
      // Use fixed chrome (tabs/file-strip), not .main — main moves with scroll so the up-edge
      // zone would disappear once the user has scrolled down the list.
      const fileStrip = document.querySelector('.file-strip');
      const tabs = document.querySelector('.tabs');
      let top = 92;
      if (tabs) top = tabs.getBoundingClientRect().bottom;
      else if (fileStrip) top = fileStrip.getBoundingClientRect().bottom;
      return { top, bottom: window.innerHeight - bottomInset };
    }

    function canScrollPageUp() {
      return window.scrollY > 0;
    }

    function canScrollPageDown() {
      return window.scrollY + window.innerHeight < document.documentElement.scrollHeight - 1;
    }

    // Factory that creates an independent drag controller.
    // config: {
    //   draggingClass        – CSS class applied to the source element while dragging
    //   ghostOffset(e)       – returns { x, y } cursor offset for the ghost element
    //   buildGhost(sourceEl) – returns a populated ghost HTMLElement (className set by factory)
    //   updateDropTarget(x, y) – clears old indicators, sets new ones, returns dropTarget or null
    //   clearDropIndicators()  – removes all drop-indicator classes (called on drag end)
    //   commitDrop(fromIndex, dropTarget) – mutates data, saves, re-renders
    //   onDragComplete()     – optional hook called at the end of every drag (cancel or drop)
    //   shouldSkip(e)        – optional; return true to abort onPointerDown early
    //   blockedWhile()       – optional; return true when another controller is active
    //   autoScroll           – optional; scroll the page when dragging near viewport edges
    //   onLongPressRename(el, index) – optional; called for long-press + release (no drag) to rename
    // }
    function createDragController(config) {
      let isDragging = false;
      let fromIndex = null;
      let ghost = null;
      let sourceEl = null;
      let dropTarget = null;
      let pendingDrag = null;
      let longPressPending = null;
      let longPressTimer = null;
      let contextMenuSuppressedAt = 0;
      let lastPointerX = 0;
      let lastPointerY = 0;
      let autoScrollRafId = null;

      let blockedWhileCallback = config.blockedWhile || null;
      function isBlocked() { return blockedWhileCallback ? blockedWhileCallback() : false; }

      function suppressContextMenu(e) {
        e.preventDefault();
        contextMenuSuppressedAt = Date.now();
        if (DEBUG) console.log('[drag] context menu suppressed', { isDragging, hasLongPressPending: !!longPressPending });
        if (!isDragging && longPressPending) {
          if (DEBUG) console.log('[drag] context menu triggered – starting drag immediately from long-press state');
          const lp = longPressPending;
          cancelLongPress(false, true); // skip rename
          startDrag(lp.el, lp.index,
            { clientX: lp.lastX, clientY: lp.lastY, pointerId: lp.pointerId, pointerType: lp.pointerType },
            lp.pointerId);
        }
      }

      function onLongPressMove(e) {
        if (!longPressPending || e.pointerId !== longPressPending.pointerId) return;
        longPressPending.lastX = e.clientX;
        longPressPending.lastY = e.clientY;
        const dx = e.clientX - longPressPending.startX;
        const dy = e.clientY - longPressPending.startY;
        const dist = Math.hypot(dx, dy);
        if (dist > LONG_PRESS_CANCEL_THRESHOLD) {
          if (DEBUG) console.log('[drag] long-press cancelled – finger moved too far', { dist: dist.toFixed(1) });
          const wasLong = !!(longPressPending && longPressPending.longPressed);
          const lpData = longPressPending;
          cancelLongPress(true, true); // skip rename because we're starting drag on move
          if (wasLong && lpData) {
            // Long press was active + moved → start drag instead of rename
            startDrag(lpData.el, lpData.index,
              { clientX: e.clientX, clientY: e.clientY, pointerId: e.pointerId, pointerType: lpData.pointerType },
              e.pointerId);
          }
        } else {
          // Still within the hold threshold – block the browser from starting a
          // scroll gesture so setPointerCapture won't trigger pointercancel later.
          e.preventDefault();
        }
      }

      function cancelLongPress(removeActiveClass = true, skipRename = false) {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (longPressPending) {
          const lp = longPressPending;
          const wasLongPressed = !!lp.longPressed;
          if (removeActiveClass) {
            lp.el.classList.remove('long-press-active');
            if (DEBUG) console.log('[drag] long-press cancelled');
          }
          lp.el.style.touchAction = ''; // restore scrollability
          longPressPending = null;

          // If long press completed (held without dragging) and we are lifting/cancelling, trigger rename
          if (wasLongPressed && !isDragging && !skipRename && config.onLongPressRename) {
            config.onLongPressRename(lp.el, lp.index);
          }
        }
        document.removeEventListener('pointermove', onLongPressMove);
        document.removeEventListener('pointerup', cancelLongPress);
        document.removeEventListener('pointercancel', cancelLongPress);
        document.removeEventListener('contextmenu', suppressContextMenu);
      }

      function onPendingMove(e) {
        if (!pendingDrag || e.pointerId !== pendingDrag.pointerId) return;
        const dx = e.clientX - pendingDrag.startX;
        const dy = e.clientY - pendingDrag.startY;
        if (Math.hypot(dx, dy) > DRAG_THRESHOLD_PX) {
          const pd = pendingDrag;
          const lp = longPressPending;
          cancelPendingDrag();
          if (lp) {
            cancelLongPress(true, true); // prevent rename when starting drag
          }
          startDrag(pd.el, pd.index, e, pd.pointerId);
        }
      }

      function cancelPendingDrag() {
        if (!pendingDrag) return;
        pendingDrag = null;
        document.removeEventListener('pointermove', onPendingMove);
        document.removeEventListener('pointerup', cancelPendingDrag);
        document.removeEventListener('pointercancel', cancelPendingDrag);
        document.removeEventListener('pointerup', cancelLongPress);
        document.removeEventListener('pointercancel', cancelLongPress);
      }

      function startDrag(el, index, startEvent, pointerId) {
        if (DEBUG) console.log('[drag] startDrag', { index, pointerId, x: startEvent.clientX, y: startEvent.clientY });
        isDragging = true;
        fromIndex = index;
        el.classList.remove('long-press-active');
        el.classList.add(config.draggingClass);

        // Prevent the browser from scrolling while the drag gesture is active.
        // Setting touch-action on body alone is not enough because the item element's
        // CSS rule (touch-action: manipulation) has higher specificity and wins.
        // cancelLongPress() cleared the inline style, restoring the CSS class rule,
        // so we must re-apply touch-action:none directly on the element.
        document.body.style.touchAction = 'none';
        document.body.style.userSelect = 'none';
        el.style.touchAction = 'none';
        sourceEl = el;

        ghost = config.buildGhost(el);
        ghost.className = 'drag-ghost';
        document.body.appendChild(ghost);
        const offset = config.ghostOffset(startEvent);
        ghost.style.left = (startEvent.clientX - offset.x) + 'px';
        ghost.style.top  = (startEvent.clientY - offset.y) + 'px';

        const isTouchDrag = startEvent.pointerType === 'touch' || startEvent.pointerType === 'pen';

        // setPointerCapture routes events to this element even when the pointer drifts off it.
        // Skip it for touch/pen: on Android/iOS calling setPointerCapture on a touch pointer
        // that the browser has partially claimed fires pointercancel immediately, killing the drag.
        // Document-level listeners already capture all events so this is safe.
        if (!isTouchDrag && el.setPointerCapture) {
          try {
            el.setPointerCapture(pointerId);
            if (DEBUG) console.log('[drag] setPointerCapture succeeded', { pointerId });
          } catch (err) {
            if (DEBUG) console.warn('[drag] setPointerCapture failed', err);
          }
        }

        // Re-attach context-menu suppressor for touch/pen: cancelLongPress removes it before
        // this function runs, but some browsers fire contextmenu with a short delay after the
        // long-press threshold, which would steal the pointer and fire pointercancel mid-drag.
        if (isTouchDrag) {
          document.addEventListener('contextmenu', suppressContextMenu);
          // On iOS, pointermove events are not delivered reliably without setPointerCapture.
          // Use touchmove as an additional source of position updates so the ghost tracks
          // the finger and dropTarget is populated when the user lifts.
          document.addEventListener('touchmove', onTouchDragMove, { passive: false });
          document.addEventListener('touchend', onTouchDragEnd);
          document.addEventListener('touchcancel', onDragEnd);
        }

        document.addEventListener('pointermove', onDragMove, { passive: false });
        document.addEventListener('pointerup', onDragEnd);
        // pointercancel fires on mobile when the browser takes over scrolling;
        // handle it so the ghost is always cleaned up and never gets stuck
        document.addEventListener('pointercancel', onDragEnd);
        if (config.autoScroll) {
          document.addEventListener('wheel', onDragWheel, { passive: false });
        }
      }

      function hasGhostLeftMainTop() {
        if (!ghost) return false;
        const main = document.querySelector('.main');
        if (!main) return false;
        return ghost.getBoundingClientRect().top < main.getBoundingClientRect().top;
      }

      function computeAutoScrollSpeed(clientY) {
        const edge = DRAG_AUTO_SCROLL_EDGE;
        const max = DRAG_AUTO_SCROLL_MAX_SPEED;
        const { top, bottom } = getDragScrollBounds();
        if (clientY <= top + edge) {
          if (!canScrollPageUp()) return 0;
          if (hasGhostLeftMainTop()) return 0;
          const dist = Math.max(0, Math.min(edge, clientY - top));
          return -max * (1 - dist / edge);
        }
        if (clientY >= bottom - edge) {
          if (!canScrollPageDown()) return 0;
          const dist = Math.min(edge, clientY - (bottom - edge));
          return max * (dist / edge);
        }
        return 0;
      }

      function refreshDropTargetAfterScroll() {
        if (!isDragging || !ghost) return;
        dropTarget = config.updateDropTarget(lastPointerX, lastPointerY, sourceEl);
      }

      function stopAutoScroll() {
        if (autoScrollRafId != null) {
          cancelAnimationFrame(autoScrollRafId);
          autoScrollRafId = null;
        }
      }

      function tickAutoScroll() {
        autoScrollRafId = null;
        if (!isDragging || !config.autoScroll) return;
        const speed = computeAutoScrollSpeed(lastPointerY);
        if (speed === 0) {
          stopAutoScroll();
          return;
        }
        window.scrollBy(0, speed);
        dropTarget = config.updateDropTarget(lastPointerX, lastPointerY, sourceEl);
        autoScrollRafId = requestAnimationFrame(tickAutoScroll);
      }

      function applyDragMove(clientX, clientY) {
        lastPointerX = clientX;
        lastPointerY = clientY;
        const offset = config.ghostOffset({ clientX, clientY });
        ghost.style.left = (clientX - offset.x) + 'px';
        ghost.style.top  = (clientY - offset.y) + 'px';
        dropTarget = config.updateDropTarget(clientX, clientY, sourceEl);
        const autoScrollSpeed = config.autoScroll ? computeAutoScrollSpeed(clientY) : 0;
        if (autoScrollSpeed !== 0 && autoScrollRafId == null) {
          autoScrollRafId = requestAnimationFrame(tickAutoScroll);
        } else if (autoScrollSpeed === 0) {
          stopAutoScroll();
        }
      }

      // touchmove handler: mirrors onDragMove using the first touch point.
      // This is a fallback for iOS where pointermove may not fire without setPointerCapture.
      function onTouchDragMove(e) {
        if (!isDragging || !ghost) return;
        e.preventDefault();
        const t = e.touches[0];
        if (!t) return;
        applyDragMove(t.clientX, t.clientY);
      }

      // touchend handler: commit the drop using the last known position tracked by touchmove.
      function onTouchDragEnd(e) {
        // Remove touch-specific listeners and let onDragEnd handle state cleanup.
        document.removeEventListener('touchmove', onTouchDragMove);
        document.removeEventListener('touchend', onTouchDragEnd);
        document.removeEventListener('touchcancel', onDragEnd);
        // Synthesise a pointerup-like object so onDragEnd logic is reused.
        onDragEnd({ type: 'pointerup' });
      }

      function onDragMove(e) {
        if (!isDragging || !ghost) return;
        e.preventDefault();
        applyDragMove(e.clientX, e.clientY);
      }

      function onDragWheel(e) {
        if (!isDragging || !config.autoScroll) return;
        e.preventDefault();
        window.scrollBy(0, e.deltaY);
        refreshDropTargetAfterScroll();
        const speed = computeAutoScrollSpeed(lastPointerY);
        if (speed !== 0 && autoScrollRafId == null) {
          autoScrollRafId = requestAnimationFrame(tickAutoScroll);
        }
      }

      function onDragEnd(e) {
        if (!isDragging) return;
        // Some browsers fire pointercancel as a side-effect of their long-press
        // context-menu gesture even after e.preventDefault() was called on
        // contextmenu.  Ignore such spurious cancels so the drag can continue.
        if (e.type === 'pointercancel' && Date.now() - contextMenuSuppressedAt < 500) {
          if (DEBUG) console.log('[drag] ignoring pointercancel within 500 ms of context menu suppression');
          contextMenuSuppressedAt = 0;
          return;
        }
        if (DEBUG) console.log('[drag] onDragEnd', { type: e.type, dropTarget: dropTarget ? dropTarget.type : null });
        stopAutoScroll();
        document.removeEventListener('pointermove', onDragMove);
        document.removeEventListener('pointerup', onDragEnd);
        document.removeEventListener('pointercancel', onDragEnd);
