     * Shared pure helpers (added for #3 + testability): ts(), computeItemActivity(), computeListActivity(), ghostsToEndInPlace() (~580; called in empty-remote merge ~708, local-only norm ~763; note: main mergeRemoteIntoLocal ~703 path uses construction/dedup for suffix, sanitize does NOT reorder).
     * Patch sites: applyItemsPatch etc (ts fallback).
     * Other: findListIndexByName, getDriveListsSignature, loadAndApplyDriveData (with opSeq/seq guards), cross-file target (full mergeRemoteIntoLocal after unshift ~2296), recurrenceJustCompleted (session Set, module-local to IIFE), structuralRemovePending, drive*Seq/switching.
     *
     * Current ghosts suffix reality (from audit):
     * - Per-item: reconcile builds orderedAlive + ghosts; merge dedup rebuilds kept+ghs per list; ghostsToEndInPlace only in specific branches (empty-remote, some local-only).
     * - Top-level lists: merge appends ghosts at end; deleteCurrentList splice+push; promoteByTimestamps rebuild may not suffix ghosts; many =sanitize + clamp paths do NOT call ghostsToEnd.
     * - generate/parse follow in-memory order (no enforcement inside).
     * - Render/clamp defensively filter (isDeleted, find !isDeleted) — masks but does not prevent bad state.
     *
     * See BULLETPROOF-LOOP-PLAN.md for full failure modes, the Bulletproof Loop (Audit→Test→Harden→Verify→Document→Repeat), and PR Plan.
     * Strategy: Central normalize + DEBUG asserts at stable points (post-merge/sanitize/apply/flush/parse/saveAndRender + after structural). Tests in self-tests.js. No behavior change in this audit step.
     *
     * Use isDeleted / filterAlive* / getAliveItems / ghostsToEndInPlace consistently. ts() for all numeric time fields.
     */

    function clampCurrentIndex() {
      if (state.lists.length === 0) {
        state.currentIndex = 0;
        return;
      }
      let idx = state.currentIndex;
      if (idx < 0 || idx >= state.lists.length || isDeleted(state.lists[idx])) {
        // Pick first alive list (ghosts may be at end after soft del); fallback to 0 if all deleted.
        idx = state.lists.findIndex(l => !isDeleted(l));
        if (idx < 0) idx = 0;
      }
      state.currentIndex = idx;
    }

    function loadData() {
      const saved = localStorage.getItem('inboxLists');
      if (saved) {
        try {
          state.lists = sanitizeLists(JSON.parse(saved)) || [];
          if (state.lists.length > 0 && !localStorage.getItem(INBOX_LISTS_UPDATED_KEY)) {
            localStorage.setItem(INBOX_LISTS_UPDATED_KEY, String(Date.now()));
          }
        } catch (e) { state.lists = []; /* bare [] on corrupt localStorage (pre-existing, safe; seed follows) */ }
      }
      if (DEBUG) normalizeListsInPlace(state.lists);
      if (state.lists.length === 0) {
        // seed lists (local only; PR4 direct assign documented: initial or no saved, no Drive merge here)
        // PR-5: sanitize caller for init/seed (polish remaining)
        // Default: one list "inbox" with one "example item".
        const now = Date.now();
        state.lists = sanitizeLists([
          { name: 'inbox', items: [
            { text: 'example item', timestamp: SEED_EXAMPLE_TIMESTAMP, checked: false, updatedAt: SEED_EXAMPLE_TIMESTAMP }
          ], timestamp: now, orderUpdatedAt: now }
        ]) || [];
        saveData();
      }
      clampCurrentIndex(); // defensive post-assign for ghosts from load/seed
    }

    function syncMainBottomPadding() {
      const bottomBar = document.querySelector('.bottom-bar');
      if (!bottomBar) return;
      const bottomBarHeight = Math.ceil(bottomBar.getBoundingClientRect().height);
      document.documentElement.style.setProperty('--bottom-bar-height', `${bottomBarHeight + MAIN_BOTTOM_PADDING_OFFSET_PX}px`);
    }

    // ==================== FILE STRIP ====================

    function renderFileStrip() {
      const strip = document.getElementById('file-strip');
      const filesEl = document.getElementById('file-strip-files');
      if (!strip || !filesEl) return;
      filesEl.innerHTML = '';
      const hasPills = state.driveConnected && state.driveFiles.length > 0;
      strip.classList.toggle('has-pills', hasPills);
      if (!hasPills) return;

      state.driveFiles.forEach((file, idx) => {
        const pill = document.createElement('div');
        pill.className = `file-pill${idx === state.activeDriveFileIdx ? ' active' : ''}`;
        pill.dataset.fileIndex = idx;
        pill.addEventListener('pointerdown', (e) => filePillDrag.onPointerDown(e, pill, idx));

        const nameBtn = document.createElement('button');
        nameBtn.type = 'button';
        nameBtn.className = 'file-pill-name';
        nameBtn.textContent = file.name;
        nameBtn.setAttribute('aria-label', `Switch to ${file.name}`);
        nameBtn.onclick = () => {
          if (filePillDragClickBlocked) { filePillDragClickBlocked = false; return; }
          if (idx !== state.activeDriveFileIdx) switchDriveFile(idx);
        };

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.className = 'file-pill-remove';
        removeBtn.textContent = '×';
        removeBtn.setAttribute('aria-label', `Remove ${file.name} from strip`);
        removeBtn.onclick = (e) => { e.stopPropagation(); removeDriveFile(idx); };

        pill.append(nameBtn, removeBtn);
        filesEl.appendChild(pill);
      });

      const addBtn = document.createElement('button');
      addBtn.type = 'button';
      addBtn.className = 'file-strip-add';
      addBtn.textContent = '+ file';
      addBtn.setAttribute('aria-label', 'Pick a Drive file');
      addBtn.onclick = showFilePicker;
      filesEl.appendChild(addBtn);
    }

    async function switchDriveFile(idx) {
      if (idx === state.activeDriveFileIdx || idx < 0 || idx >= state.driveFiles.length) return;

      const previousFile = state.driveFiles[state.activeDriveFileIdx];
      const previousContent = previousFile ? generateListFile() : null;
      const switchSeq = ++state.driveSwitchSeq;
      const opSeq = ++state.driveOpSeq;
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      state.driveFileSwitching = true;
      if (DEBUG) console.log('[Drive] file transition start', { seq: switchSeq, op: opSeq, from: getActiveDriveFileId() });

      // Capture for error revert (optimistic cached preview safety)
      const prevActiveIdx = state.activeDriveFileIdx;
      const prevLists = JSON.parse(JSON.stringify(state.lists || []));
      const prevVerified = state.verifiedDriveFileId;

      const targetFile = state.driveFiles[idx];
      const targetFileId = targetFile.id;
      const fallbackName = stripListExtension(targetFile.name);
      const cachedLists = state.driveFileCache[targetFileId];

      try {
        // Always explicitly snapshot + background-flush the file we are leaving.
        // Use the *previous* file's ID (captured before any change) so concurrent ops cannot mis-target.
        if (previousFile) {
          cacheDriveFileLists(previousFile.id, previousFile.name, state.lists);
          if (previousContent) {
            flushDriveFileInBackground(previousFile.id, previousContent);
          }
        }

        // Show cached *content* immediately for responsiveness (lists + renderListsView), but
        // defer activeDriveFileIdx + renderFileStrip + verified until post-fetch success to avoid
        // leaving inconsistent active state on error/stale seq. Post-fetch always clamps + validates.
        let didPreview = false;
        if (cachedLists) {
          // Pure assign for cached path (perf: instant UI, no merge cost on hit; PR4)
          // PR-5: sanitize on assign (ensures callers; cache entries already sanitized but defensive)
          state.lists = sanitizeLists(JSON.parse(JSON.stringify(cachedLists))) || [];
          state.currentIndex = 0;
          clampCurrentIndex(); // defensive: ghosts from cache
          saveLocalData();
          // DO NOT set activeIdx or renderFileStrip yet
          renderListsView();
          didPreview = true;
        }

        const { lists } = await fetchDriveFileLists(targetFileId, fallbackName, { forceRemote: true });
        if (state.driveSwitchSeq !== switchSeq || state.driveOpSeq !== opSeq) {
          // stale (another transition started, higher seq): revert preview if any. Do not touch active or files list.
          if (didPreview) {
            state.lists = sanitizeLists(prevLists) || prevLists;
            state.currentIndex = 0;
            clampCurrentIndex();
            renderListsView();
          }
          return;
        }

        const remoteSignature = getDriveListsSignature(lists);
        const shownSignature = getDriveListsSignature(state.lists);
        if (!cachedLists || remoteSignature !== shownSignature) {
          if (cachedLists) {
            // PR4: cached + merge on sig diff (prefer merge wrapper over pure remote assign)
            const merged = mergeRemoteIntoLocal(state.lists, lists);
            state.lists = merged;
            if (DEBUG) console.log('[Drive] switch cached+merge decision: sig diff, used merge');
          } else {
            // no cache for target: pure assign from remote (no prior local for *this* file to merge; documented)
            // PR-5: sanitize caller updated for consistency (parse output -> normalized ghosts/fields)
            state.lists = sanitizeLists(lists) || [];
          }
          state.currentIndex = 0;
          clampCurrentIndex(); // defensive: ghosts from remote fetch / merge
          saveLocalData();
          state.activeDriveFileIdx = idx;
          state.verifiedDriveFileId = null;
          saveDriveFilesState();
          renderFileStrip();
          renderListsView();
        } else if (didPreview) {
          // sig same after cached preview: now commit the switch
          state.activeDriveFileIdx = idx;
          state.verifiedDriveFileId = null;
          saveDriveFilesState();
          renderFileStrip();
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] switchDriveFile failed', err);
        setDriveStatus('error');
        // revert any previewed state + active
        state.lists = sanitizeLists(prevLists) || prevLists;
        state.activeDriveFileIdx = prevActiveIdx;
        state.verifiedDriveFileId = prevVerified;
        state.currentIndex = 0;
        clampCurrentIndex();
        renderListsView();
        renderFileStrip();
      } finally {
        if (state.driveSwitchSeq === switchSeq) {
          state.driveFileSwitching = false;
          syncRecurrenceState();
          syncDueState();
          render();
        }
      }
    }

    // Background-preloads any Drive files not yet in the session cache so
    // that future file switches are instant (cache-hit path in switchDriveFile).
    async function preloadDriveFiles() {
      const uncached = state.driveFiles.filter(f => !state.driveFileCache[f.id]);
      if (uncached.length === 0) return;
      await Promise.allSettled(uncached.map(async (file) => {
        try {
          await fetchDriveFileLists(file.id, file.name);
          if (DEBUG) console.log('[Drive] preloaded', file.name);
        } catch (err) {
          if (DEBUG) console.warn('[Drive] preload failed for', file.name, err);
        }
      }));
    }

    async function removeDriveFile(idx) {
      if (idx < 0 || idx >= state.driveFiles.length) return;
      const removedFile = state.driveFiles[idx];
      const wasActive = idx === state.activeDriveFileIdx;

      // Capture leaving snapshot + target *before* any mutation.
      const leavingContent = wasActive ? generateListFile() : null;
      const leavingFileId = removedFile ? removedFile.id : null;

      // Compute successor target by ID (robust to index shifts) before splice.
      let targetFile = null;
      let computedNewActiveIdx = state.activeDriveFileIdx;
      if (wasActive) {
        const tempFiles = [...state.driveFiles];
        tempFiles.splice(idx, 1);
        if (tempFiles.length === 0) {
          computedNewActiveIdx = 0;
        } else if (idx < state.activeDriveFileIdx) {
          computedNewActiveIdx = state.activeDriveFileIdx - 1;
        } else if (state.activeDriveFileIdx >= tempFiles.length) {
          computedNewActiveIdx = tempFiles.length - 1;
        }
        targetFile = tempFiles[computedNewActiveIdx] || null;
      }

      const switchSeq = ++state.driveSwitchSeq;
      const opSeq = ++state.driveOpSeq;
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      state.driveFileSwitching = true;
      if (DEBUG) console.log('[Drive] file transition start', { seq: switchSeq, op: opSeq, from: getActiveDriveFileId() });

      const prevActiveIdx = state.activeDriveFileIdx;
      const prevLists = JSON.parse(JSON.stringify(state.lists || []));
      const prevVerified = state.verifiedDriveFileId;

      try {
        // CRITICAL: flush the file we are closing *using its explicit ID* before mutating the tracked list.
        // This guarantees the content for the removed file is sent to the correct Drive file.
        if (wasActive && removedFile && leavingContent) {
          cacheDriveFileLists(removedFile.id, removedFile.name, state.lists);
          if (state.driveConnected) {
            flushDriveFileInBackground(removedFile.id, leavingContent);
          }
        }

        // Perform the removal from our tracked list (local action; file stays on Drive).
        state.driveFiles.splice(idx, 1);
        state.verifiedDriveFileId = null;
        if (removedFile) {
          delete state.driveFileSaveSeq[removedFile.id];
          delete state.driveFileSaveChains[removedFile.id];
          delete state.driveFileCache[removedFile.id];
          delete state.persistedDriveFileCache[removedFile.id];
          localStorage.setItem(DRIVE_FILE_CACHE_STORAGE_KEY, JSON.stringify(state.persistedDriveFileCache));
        }

        if (state.driveFiles.length === 0) {
          state.activeDriveFileIdx = 0;
        } else if (idx < prevActiveIdx) {  // use the pre-splice value for correct adjustment
          state.activeDriveFileIdx = prevActiveIdx - 1;
        } else if (prevActiveIdx >= state.driveFiles.length) {
          state.activeDriveFileIdx = state.driveFiles.length - 1;
        }

        // Persist which files are tracked promptly (the "strip membership"). Content for a leaving
        // active file was already flushed above using its explicit ID. We still defer the *strip render*
        // + final active commit visual until the target content is loaded (avoids mismatched pill vs lists).
        saveDriveFilesState();

        // Note: we intentionally defer renderFileStrip() (and in some paths re-save) until after we have loaded
        // content for the (new) active file when it was the one being closed. This eliminates the window where
        // activeDriveFileIdx points at one file while state.lists still holds data for another.

        if (wasActive && targetFile) {
          // Use the pre-computed target ID for the fetch (do not rely on live array indices after concurrent removes).
          const targetId = targetFile.id;
          const targetName = stripListExtension(targetFile.name);
          const cachedLists = state.driveFileCache[targetId];

          let didPreview = false;
          if (cachedLists) {
            state.lists = sanitizeLists(JSON.parse(JSON.stringify(cachedLists))) || [];
            state.currentIndex = 0;
            clampCurrentIndex();
            saveLocalData();
            renderListsView();
            didPreview = true;
          }

          const { lists } = await fetchDriveFileLists(targetId, targetName, { forceRemote: true });

          if (state.driveSwitchSeq !== switchSeq || state.driveOpSeq !== opSeq) {
            // A newer file operation started. The removal from driveFiles has already occurred (desired for "close"),
            // but do not apply potentially stale lists or re-render strip for this superseded transition.
            if (didPreview) {
              // best-effort revert of previewed lists; active/strip removal already committed
              state.lists = sanitizeLists(prevLists) || prevLists;
              state.currentIndex = 0;
              clampCurrentIndex();
              renderListsView();
            }
            return;
          }

          // Apply content for the *new* active file (pure assign matches prior behavior for post-remove).
          state.lists = sanitizeLists(lists) || [];
          state.currentIndex = 0;
          clampCurrentIndex();
          saveLocalData();
          // Now it is safe to update the UI strip (active index was already adjusted above and persisted).
          renderFileStrip();
          renderListsView();
        } else if (!wasActive) {
          // Removing a non-active file: strip + state already persisted above; just render.
          renderFileStrip();
        } else {
          // was active but no target left (last file removed)
          renderFileStrip();
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] removeDriveFile failed', err);
        setDriveStatus('error');
        // On error we keep the splice (removal from tracking) but restore lists/active for the previous state if possible.
        state.lists = sanitizeLists(prevLists) || prevLists;
        state.activeDriveFileIdx = prevActiveIdx;
        state.verifiedDriveFileId = prevVerified;
        state.currentIndex = 0;
        clampCurrentIndex();
        renderListsView();
        renderFileStrip();
      } finally {
        if (state.driveSwitchSeq === switchSeq) {
          state.driveFileSwitching = false;
          syncRecurrenceState();
          syncDueState();
          render();
        }
      }
    }

    async function showFilePicker() {
      try {
        const files = await listDriveFiles();
        showFilePickerModal(files);
      } catch (err) {
        if (DEBUG) console.warn('[Drive] showFilePicker failed', err);
        await showAlert('Failed to list Drive files. Please try again.');
      }
    }

    async function listDriveFiles() {
      const q = encodeURIComponent(`name contains '.list' and trashed=false`);
      const res = await driveFetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name)&spaces=drive&orderBy=name`);
      const data = await res.json();
      return data.files || [];
    }

    function showFilePickerModal(files) {
      const listEl = document.getElementById('file-picker-list');
      listEl.innerHTML = '';
      openModalDialog('file-picker-modal', (modal, close) => {
        if (files.length > 0) {
          files.forEach(file => {
            const alreadyAdded = state.driveFiles.some(f => f.id === file.id);
            const row = document.createElement('button');
            row.type = 'button';
            row.className = 'file-picker-row';
            row.textContent = file.name + (alreadyAdded ? ' ✓' : '');
            row.disabled = alreadyAdded;
            row.onclick = async () => { close(); await addDriveFile(file); };
            listEl.appendChild(row);
          });
        } else {
          const empty = document.createElement('p');
          empty.className = 'file-picker-empty';
          empty.textContent = 'No .list files found. Create a new one below.';
          listEl.appendChild(empty);
        }
        const newRow = document.createElement('button');
        newRow.type = 'button';
        newRow.className = 'file-picker-row file-picker-create';
        newRow.textContent = '+ Create new .list file';
        newRow.onclick = () => { close(); createNewDriveFile(); };
        listEl.appendChild(newRow);

        const closeBtn = document.getElementById('file-picker-close-btn');
        const trap = createFocusTrap(modal, 'button:not(:disabled)');
        function onBackdrop(e) { if (e.target === modal) close(); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(); } }
        closeBtn.addEventListener('click', close);
        modal.addEventListener('click', onBackdrop);
        modal.addEventListener('keydown', onKey);
        modal.addEventListener('keydown', trap);
        closeBtn.focus();
        return () => {
          closeBtn.removeEventListener('click', close);
          modal.removeEventListener('click', onBackdrop);
          modal.removeEventListener('keydown', onKey);
          modal.removeEventListener('keydown', trap);
        };
      });
    }

    async function addDriveFile(file) {
      const existing = state.driveFiles.findIndex(f => f.id === file.id);
      if (existing !== -1) { await switchDriveFile(existing); return; }

      const previousFileId = getActiveDriveFileId();
      const switchSeq = ++state.driveSwitchSeq;
      const opSeq = ++state.driveOpSeq;
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;

      if (state.driveConnected && previousFileId) {
        // direct snapshot save of previous on add (PR4: documented direct; snapshot of leaving file before switch)
        // Use explicit previousFileId captured at call time so rapid adds cannot misdirect the save.
        await saveToDrive(generateListFile(), { fileId: previousFileId }).catch(() => {});
      }

      state.driveFileSwitching = true;

      // Capture revert info (in case this add is superseded by another quick add/switch)
      const prevActiveIdx = state.activeDriveFileIdx;
      const prevLists = JSON.parse(JSON.stringify(state.lists || []));
      const prevVerified = state.verifiedDriveFileId;

      const targetFileId = file.id;
      const targetFallbackName = stripListExtension(file.name);

      try {
        const { lists } = await fetchDriveFileLists(targetFileId, targetFallbackName, { forceRemote: true });

        if (state.driveSwitchSeq !== switchSeq || state.driveOpSeq !== opSeq) {
          // A newer transition won; do not push this file into the active list or change lists.
          // (The file remains on Drive; user can add it again later if desired.)
          return;
        }

        state.driveFiles.push({ id: file.id, name: file.name });
        state.activeDriveFileIdx = state.driveFiles.length - 1;
        state.verifiedDriveFileId = null;

        // Pure assign from fetch for added file (PR4 remaining direct; no prior local session state for target vs previous file's lists)
        // Post-assign sanitize + clamp for consistency with apply paths (PR4 review)
        state.lists = sanitizeLists(lists) || [];
        state.currentIndex = 0;
        clampCurrentIndex(); // defensive: ghosts from add file fetch
        saveLocalData();
        saveDriveFilesState();
        renderFileStrip();
        renderListsView();
        preloadDriveFiles();
      } catch (err) {
        if (DEBUG) console.warn('[Drive] addDriveFile failed', err);
        setDriveStatus('error');
        // revert active/lists if we got partway
        state.lists = sanitizeLists(prevLists) || prevLists;
        state.activeDriveFileIdx = prevActiveIdx;
        state.verifiedDriveFileId = prevVerified;
        state.currentIndex = 0;
        clampCurrentIndex();
        renderListsView();
        renderFileStrip();
      } finally {
        if (state.driveSwitchSeq === switchSeq) {
          state.driveFileSwitching = false;
          syncRecurrenceState();
          syncDueState();
          render();
        }
      }
    }

    async function createNewDriveFile() {
      const name = await showPrompt('New file name:');
      if (!name || !name.trim()) return;
      const fileName = name.trim().endsWith('.list') ? name.trim() : name.trim() + '.list';

      const previousFileId = getActiveDriveFileId();
      const switchSeq = ++state.driveSwitchSeq;
      const opSeq = ++state.driveOpSeq;
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;

      if (state.driveConnected && previousFileId) {
        // direct snapshot save of previous on create new file (PR4: documented direct)
        // Explicit previousFileId protects against rapid create + other file ops.
        await saveToDrive(generateListFile(), { fileId: previousFileId }).catch(() => {});
      }

      state.driveFileSwitching = true;

      const prevActiveIdx = state.activeDriveFileIdx;
      const prevLists = JSON.parse(JSON.stringify(state.lists || []));
      const prevVerified = state.verifiedDriveFileId;

      try {
        const created = await createDriveFile(fileName);
        const lists = getEmptyDriveLists(fileName);
        cacheDriveFileLists(created.id, fileName, lists);

        if (state.driveSwitchSeq !== switchSeq || state.driveOpSeq !== opSeq) {
          // Superseded by another rapid transition. The new file was created on Drive (acceptable side effect),
          // but we do not add it to the active strip or switch to it.
          return;
        }

        state.driveFiles.push({ id: created.id, name: fileName });
        state.activeDriveFileIdx = state.driveFiles.length - 1;
        state.verifiedDriveFileId = null;

        // Pure assign for newly created empty file. We also push the seeded content immediately
        // (Drive create used empty body) so that subsequent polls/loads see our starter instead of
        // re-seeding and (even with stable ts) to make the example item durable on Drive.
        state.lists = sanitizeLists(lists) || [];
        state.currentIndex = 0;
        clampCurrentIndex(); // defensive: ghosts from new file create
        saveLocalData();
        saveDriveFilesState();
        renderFileStrip();
        renderListsView();

        // Direct upload of initial seed (bypass normal saveData debounce + pull+merge for brand new file).
        if (state.driveConnected) {
          saveToDrive(generateListFile(state.lists), { fileId: created.id }).catch((e) => {
            if (DEBUG) console.warn('[Drive] initial seed upload for new file failed', e);
          });
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] createNewDriveFile failed', err);
        await showAlert('Failed to create file. Please try again.');
        // revert
        state.lists = sanitizeLists(prevLists) || prevLists;
        state.activeDriveFileIdx = prevActiveIdx;
        state.verifiedDriveFileId = prevVerified;
        state.currentIndex = 0;
        clampCurrentIndex();
        renderListsView();
        renderFileStrip();
      } finally {
        if (state.driveSwitchSeq === switchSeq) {
          state.driveFileSwitching = false;
          syncRecurrenceState();
          syncDueState();
          render();
        }
      }
    }

    // ==================== END FILE STRIP ====================

    // ==================== INLINE DIALOGS ====================
    // Replace native prompt/confirm/alert so they work in PWA full-screen mode and
    // respect the app's dark mode + CSS variables.

    // Returns a keydown handler that traps Tab focus within modal among selector-matching elements.
    function createFocusTrap(modal, selector) {
      return function(e) {
        if (e.key !== 'Tab') return;
        const focusable = Array.from(modal.querySelectorAll(selector));
        const first = focusable[0], last = focusable[focusable.length - 1];
        if (e.shiftKey) {
          if (document.activeElement === first) { e.preventDefault(); last.focus(); }
        } else {
          if (document.activeElement === last) { e.preventDefault(); first.focus(); }
        }
      };
    }

    // Shared boilerplate: opens modalId, calls setup(modal, close) which wires event
    // listeners, focuses the initial element, and returns a teardown callback that
    // removes them. Resolves with whatever value setup passes to close().
    function openModalDialog(modalId, setup) {
      return new Promise(resolve => {
        const modal = document.getElementById(modalId);
        function close(value) {
          modal.classList.remove('open');
          cleanup();
          resolve(value);
        }
        const cleanup = setup(modal, close);
        modal.classList.add('open');
      });
    }

    function showConfirm(message) {
      return openModalDialog('confirm-modal', (modal, close) => {
        document.getElementById('confirm-modal-msg').textContent = message;
        const okBtn = document.getElementById('confirm-modal-ok');
        const cancelBtn = document.getElementById('confirm-modal-cancel');
        function onOk() { close(true); }
        function onCancel() { close(false); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); onCancel(); } }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        modal.addEventListener('keydown', onKey);
        cancelBtn.focus();
        return () => {
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          modal.removeEventListener('keydown', onKey);
        };
      });
    }

    function showPrompt(label, defaultValue = '') {
      return openModalDialog('prompt-modal', (modal, close) => {
        document.getElementById('prompt-modal-label').textContent = label;
        const input = document.getElementById('prompt-modal-input');
        input.value = defaultValue;
        const okBtn = document.getElementById('prompt-modal-ok');
        const cancelBtn = document.getElementById('prompt-modal-cancel');
        function onOk() { close(input.value); }
        function onCancel() { close(null); }
        function onKey(e) {
          if (e.key === 'Enter') { e.preventDefault(); onOk(); }
          if (e.key === 'Escape') { e.stopPropagation(); onCancel(); }
        }
        okBtn.addEventListener('click', onOk);
        cancelBtn.addEventListener('click', onCancel);
        input.addEventListener('keydown', onKey);
        input.focus();
        input.select();
        return () => {
          okBtn.removeEventListener('click', onOk);
          cancelBtn.removeEventListener('click', onCancel);
          input.removeEventListener('keydown', onKey);
        };
      });
    }

    function showAlert(message) {
      return openModalDialog('alert-modal', (modal, close) => {
        document.getElementById('alert-modal-msg').textContent = message;
        const okBtn = document.getElementById('alert-modal-ok');
        function onKey(e) { if (e.key === 'Escape' || e.key === 'Enter') { e.stopPropagation(); close(); } }
        okBtn.addEventListener('click', close);
        modal.addEventListener('keydown', onKey);
        okBtn.focus();

      return document.body.classList.contains('dark') ? 'Switch to light mode' : 'Switch to dark mode';
    }

    function showSettingsModal() {
      return openModalDialog('settings-modal', (modal, close) => {
        const lineEl = document.getElementById('settings-drive-line');
        const hintEl = document.getElementById('settings-drive-hint');
        const closeBtn = document.getElementById('settings-close-btn');
        const themeBtn = document.getElementById('settings-theme-btn');
        const listBtn = document.getElementById('settings-list-btn');
        const connectBtn = document.getElementById('settings-connect-btn');
        const disconnectBtn = document.getElementById('settings-disconnect-btn');
        const syncBtn = document.getElementById('settings-sync-btn');
        const syncHint = document.getElementById('settings-sync-hint');
        const trap = createFocusTrap(modal, 'button:not([hidden])');
        let closed = false;

        function renderSettings(loading = false) {
          if (state.driveConnected) {
            lineEl.textContent = loading
              ? 'Drive connected'
              : (state.driveUser
                ? formatDriveUser(state.driveUser, 'Drive connected')
                : (state.driveUserLoadFailed ? 'Drive connected' : 'Drive connected'));
            hintEl.textContent = loading ? 'Loading account…' : 'Lists sync across your devices.';
          } else {
            lineEl.textContent = 'Drive not connected';
            hintEl.textContent = 'Connect to sync lists across devices.';
          }
          connectBtn.hidden = state.driveConnected;
          disconnectBtn.hidden = !state.driveConnected;
          const showSync = !!state.driveConnected;
          if (syncBtn) syncBtn.hidden = !showSync;
          if (syncHint) syncHint.hidden = !showSync;
        }

        async function hydrateDriveUser() {
          if (!state.driveConnected) return;
          renderSettings(true);
          try {
            await loadDriveUser();
          } catch (err) {
            state.driveUserLoadFailed = true;
            if (DEBUG) console.warn('[Drive] load user in settings failed', err);
          }
          if (!closed) {
            if (state.driveConnected) renderDriveStatusIndicator('connected');
            renderSettings(false);
          }
        }

        function onClose() { close(null); }
        function onTheme() {
          applyDark(!document.body.classList.contains('dark'));
          themeBtn.setAttribute('aria-label', themeToggleAriaLabel());
        }
        function onList() { close('list'); }
        function onConnect() { close('connect'); }
        function onDisconnect() { close('disconnect'); }
        function onSync() {
          if (!state.driveConnected) return;
          close('sync');
        }
        function onBackdrop(e) { if (e.target === modal) close(null); }
        function onKey(e) { if (e.key === 'Escape') { e.stopPropagation(); close(null); } }

        themeBtn.setAttribute('aria-label', themeToggleAriaLabel());
        renderSettings();
        renderSettingsHelp();
        if (state.driveConnected) hydrateDriveUser();
        closeBtn.addEventListener('click', onClose);
        themeBtn.addEventListener('click', onTheme);
        listBtn.addEventListener('click', onList);
        connectBtn.addEventListener('click', onConnect);
        disconnectBtn.addEventListener('click', onDisconnect);
        if (syncBtn) syncBtn.addEventListener('click', onSync);
        modal.addEventListener('click', onBackdrop);
        modal.addEventListener('keydown', onKey);
        modal.addEventListener('keydown', trap);
        closeBtn.focus();

        return () => {
          closed = true;
          closeBtn.removeEventListener('click', onClose);
          themeBtn.removeEventListener('click', onTheme);
          listBtn.removeEventListener('click', onList);
          connectBtn.removeEventListener('click', onConnect);
          disconnectBtn.removeEventListener('click', onDisconnect);
          if (syncBtn) syncBtn.removeEventListener('click', onSync);
          // syncHint is static, no listeners
          modal.removeEventListener('click', onBackdrop);
          modal.removeEventListener('keydown', onKey);
          modal.removeEventListener('keydown', trap);
        };
      }).then(async action => {
        if (action === 'list') {
          showListModal();
          return;
        }
        if (action === 'disconnect') {
          if (await showConfirm('Disconnect from Google Drive?')) disconnectDrive();
          return;
        }
        if (action === 'connect') {
          if (typeof google === 'undefined' || !google.accounts) {
            await showAlert('Google Sign-In is still loading. Please try again in a moment.');
            return;
          }
          connectDrive();
        }
        if (action === 'sync') {
          if (state.driveConnected) {
            try {
              // Explicit user "Sync now": drop any local pending timer so we adopt/merge the remote state.
              // This is the escape hatch when checks from the phone/laptop are not appearing.
              if (state.saveDataDriveTimer) {
                clearTimeout(state.saveDataDriveTimer);
                state.saveDataDriveTimer = null;
              }
              await loadAndApplyDriveData();
              flushPendingDriveSave();
              startDrivePolling();
            } catch (e) {
              await showAlert('Sync failed. Check your connection and try again.');
            }
          }
        }
      });
    }

    function renderTabs() {
      const container = document.getElementById('tabs-container');
      container.innerHTML = '';

        if (isDeleted(list)) return;
        const tab = document.createElement('button');
        tab.type = 'button';
        tab.className = `tab ${index === state.currentIndex ? 'active' : ''}`;
        tab.textContent = list.name;
        tab.setAttribute('role', 'tab');
        tab.setAttribute('aria-selected', index === state.currentIndex ? 'true' : 'false');
        tab.addEventListener('pointerdown', (e) => tabDrag.onPointerDown(e, tab, index));
        tab.onclick = () => {
          if (tabDragClickBlocked) { tabDragClickBlocked = false; return; }
          state.currentIndex = index; render();
        };
        tab.ondblclick = (e) => {
          e.preventDefault();
          state.currentIndex = index;
          renameCurrentList();
        };
        if (index === state.currentIndex) {
          const group = document.createElement('div');
          group.className = 'tab-group';
          group.appendChild(tab);

          const deleteBtn = document.createElement('button');

    async function createNewList() {
      const name = await showPrompt('New list name:');
      if (name && name.trim()) {
        const now = Date.now();
        const newList = { name: name.trim(), items: [], timestamp: now, orderUpdatedAt: now };
        // Insert before any trailing ghost lists so alive lists (incl new) remain prefix-contiguous for indices/drag.
        let insertPos = state.lists.length;
        for (let i = 0; i < state.lists.length; i++) {
          if (isDeleted(state.lists[i])) { insertPos = i; break; }
        }
        state.lists.splice(insertPos, 0, newList);
        state.currentIndex = insertPos;
        saveData();
        render();
      }
    }

    async function renameCurrentList() {
      const list = state.lists[state.currentIndex];
      if (!list || isDeleted(list)) return;
      const newName = await showPrompt('Rename list:', list.name);
      if (newName === null) return;
      const trimmed = newName.trim();
      if (!trimmed) return;
      list.name = trimmed;
      saveData();
      render();
    }

    async function deleteCurrentList() {
      const list = state.lists[state.currentIndex];
      if (!list || isDeleted(list)) return;
      const itemCount = getAliveItems(list).length;
      const message = itemCount > 0
        ? `Delete "${list.name}"? This will permanently remove ${itemCount} item${itemCount === 1 ? '' : 's'}.`
        : `Delete "${list.name}"?`;
      if (!await showConfirm(message)) return;
      const oldIdx = state.currentIndex;
      list.deletedAt = Date.now();
      list.items = []; // drop for tombstone emit (generate drops non-empty anyway; contained item ghosts separate if needed)
      // Soft delete list: keep ghost list in state.lists (for // deleted-list tombstone in generate); move to end so alive lists stay prefix-contiguous (tab indices + drag stable).
      const ghost = state.lists.splice(oldIdx, 1)[0];
      state.lists.push(ghost);
      // current may now point past (if was last) or to shifted; clamp will pick first alive if current now on ghost
      clampCurrentIndex();
      saveData();
      render();
    }

    // Builds and returns a fully-wired <li> element for a single list item.
    // Keeping item DOM construction here separates it from renderItems' concern
    // of managing the container and the empty-state check.
    function createItemElement(item, itemIndex) {
      const li = document.createElement('li');
      li.className = 'item';
      li.dataset.itemIndex = String(itemIndex);
      li.dataset.itemTs = String(item.timestamp);
      const itemTs = item.timestamp; // stable key for live index resolution in handlers

      if (!item.checked) {
        li.addEventListener('pointerdown', (e) => {
          const cur = getItemIndexByTimestamp(itemTs);
          itemDrag.onPointerDown(e, li, cur >= 0 ? cur : itemIndex);
        });
        li.ondblclick = (e) => {
          if (e.target.closest('.delete-btn') || e.target.closest('.checkbox')) return;
          const cur = getItemIndexByTimestamp(itemTs);
          const idx = cur >= 0 ? cur : itemIndex;
          editItem(state.currentIndex, idx);
        };
      }

      const checkbox = document.createElement('button');
      checkbox.type = 'button';
      checkbox.className = `checkbox ${item.checked ? 'checked' : ''}`;
      checkbox.setAttribute('aria-label', item.checked ? 'Uncheck item' : 'Check item');
      checkbox.onclick = (e) => {
        e.stopImmediatePropagation();
        const cur = getItemIndexByTimestamp(itemTs);
        if (cur >= 0) toggleItem(state.currentIndex, cur);
      };

      const textSpan = document.createElement('span');
      textSpan.className = `item-text ${item.checked ? 'checked' : ''}`;
      const meta = getItemMeta(item.text);
      textSpan.textContent = meta.displayText;
      const displayForActions = meta.displayText || item.text;

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'delete-btn';
      del.textContent = '×';
      del.setAttribute('aria-label', 'Delete item');
      del.onclick = async (e) => {
        e.stopImmediatePropagation();
        const cur = getItemIndexByTimestamp(itemTs);
        if (cur >= 0 && await showConfirm(`Delete "${displayForActions}"?`)) deleteItem(state.currentIndex, cur);
      };

      const children = [checkbox, textSpan];
      if (meta.recurrenceLabel) {
        const hint = document.createElement('span');
        hint.className = 'recurrence-hint';
        hint.textContent = meta.recurrenceLabel;
        if (!item.checked && meta.rule) {
          const { overdue, dueAt } = evaluateRecurrence(meta.rule, item);
          const overdueHint = formatOverdueHint(overdue, dueAt);
          if (overdueHint) applyOverdueHint(li, hint, overdueHint);
        }
        children.push(hint);
      } else if (meta.dueLabel || item.dueAt) {
        const hint = document.createElement('span');
        hint.className = 'due-hint';
        if (!item.checked && item.dueAt) {
          const overdueHint = formatOverdueHint(Date.now() > item.dueAt, item.dueAt);
          if (overdueHint) applyOverdueHint(li, hint, overdueHint);
          else hint.textContent = formatDueLabel(item.dueAt);
        } else if (item.dueAt && item.checked) {
          hint.textContent = formatDueLabel(item.dueAt);
        } else {
          hint.textContent = meta.dueLabel;
        }
        children.push(hint);
      }
      children.push(del);
      li.append(...children);
      return li;
    }

    // ==================== RECURRENCE ====================
    // Recurrent item state contract:
    //   checked   — dormant (Recurrent section) vs active; toggled by syncRecurrenceState + completeRecurrentItem
    //   checkedAt — lastDoneAt; kept while active so interval math survives overlord activation
    const REC_MONTHS = {
      january: 1, jan: 1, february: 2, feb: 2, march: 3, mar: 3, april: 4, apr: 4,
      may: 5, june: 6, jun: 6, july: 7, jul: 7, august: 8, aug: 8,
      september: 9, sep: 9, sept: 9, october: 10, oct: 10, november: 11, nov: 11,
      december: 12, dec: 12,
    };
    const REC_WEEKDAYS = {
      sunday: 0, sun: 0, monday: 1, mon: 1, tuesday: 2, tue: 2, tues: 2,
      wednesday: 3, wed: 3, thursday: 4, thu: 4, thur: 4, thurs: 4,
      friday: 5, fri: 5, saturday: 6, sat: 6,
    };
    const REC_SEASONS = {
      spring: [3, 4, 5], summer: [6, 7, 8], autumn: [9, 10, 11], fall: [9, 10, 11], winter: [12, 1, 2],
    };
    const REC_ORDINALS = { first: 1, second: 2, third: 3, fourth: 4, last: -1 };

    function recStartOfDay(d) {
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).getTime();
    }

    function recDaysInMonth(year, month) {
      return new Date(year, month, 0).getDate();
    }

    function recNthWeekdayOfMonth(year, month, weekday, ordinal) {
      if (ordinal === -1) {
        for (let day = recDaysInMonth(year, month); day >= 1; day--) {
          const dt = new Date(year, month - 1, day);
          if (dt.getDay() === weekday) return recStartOfDay(dt);
        }
        return null;
      }
      let count = 0;
      for (let day = 1; day <= recDaysInMonth(year, month); day++) {
        const dt = new Date(year, month - 1, day);
        if (dt.getDay() === weekday) {
          count++;
          if (count === ordinal) return recStartOfDay(dt);
        }
      }
      return null;
    }

    function recAddIntervalMs(ms, every, unit) {
      const d = new Date(ms);
      if (unit === 'day') d.setDate(d.getDate() + every);
      else if (unit === 'week') d.setDate(d.getDate() + every * 7);
      else if (unit === 'month') d.setMonth(d.getMonth() + every);
      else if (unit === 'year') d.setFullYear(d.getFullYear() + every);
      return d.getTime();
    }

    function recMonthInWindow(m, window) {
      if (!window) return true;
      if (window.type === 'months') return window.months.has(m);
      if (window.from <= window.to) return m >= window.from && m <= window.to;
      return m >= window.from || m <= window.to;
    }

    function recParseWindow(expr) {
      const e = expr.trim().toLowerCase();
      if (REC_SEASONS[e]) return { type: 'months', months: new Set(REC_SEASONS[e]) };
      if (e.includes(' to ')) {
        const [a, b] = e.split(' to ').map(s => s.trim());
        const from = REC_MONTHS[a], to = REC_MONTHS[b];
        if (from && to) return { type: 'range', from, to };
      }
      if (e.includes(' and ')) {
        const parts = e.split(' and ').map(s => REC_MONTHS[s.trim()]);
        if (parts.every(Boolean)) return { type: 'months', months: new Set(parts) };
      }
      const single = REC_MONTHS[e];
      if (single) return { type: 'months', months: new Set([single]) };
      return null;
    }

    function recParseClockTime(s) {
      const m = s.trim().match(/^(\d{1,2}):(\d{2})$/);
      if (!m) return null;
      const hour = Number(m[1]);
      const minute = Number(m[2]);
      if (hour < 0 || hour > 23 || minute < 0 || minute > 59) return null;
      return hour * 60 + minute;
    }

    function recParseDailyTimesRule(s) {
      if (!/\d{1,2}:\d{2}/.test(s)) return null;
      const parts = s.split(/\s+and\s+/);
      const times = [];
      for (const part of parts) {
        const mins = recParseClockTime(part);
        if (mins == null) return null;
        times.push(mins);
      }
      if (times.length === 0) return null;
      return { type: 'dailyTimes', times: [...new Set(times)].sort((a, b) => a - b) };
    }

    function recDailyTimeSlotMs(dayStart, minutes) {
      return dayStart + minutes * 60 * 1000;
    }

    function recDailyTimeSlotsForDay(dayStart, times) {
      return times.map(mins => recDailyTimeSlotMs(dayStart, mins));
    }

    function recNextDailyTimeSlotAfter(times, afterMs, now = new Date()) {
      for (let dayOffset = 0; dayOffset < 3; dayOffset++) {
        const dayStart = recStartOfDay(new Date(now.getFullYear(), now.getMonth(), now.getDate() + dayOffset));
        for (const slot of recDailyTimeSlotsForDay(dayStart, times)) {
          if (slot > afterMs) return slot;
        }
      }
      return null;
    }

    function recParseIntervalPart(s) {
      let m = s.match(/^every\s+(\d+)?\s*(day|days|week|weeks|month|months|year|years)$/);
      if (m) {
        const n = m[1] ? Number(m[1]) : 1;
        const u = m[2];
        const unit = u.startsWith('day') ? 'day' : u.startsWith('week') ? 'week' : u.startsWith('month') ? 'month' : 'year';
        return n > 0 ? { every: n, unit } : null;
      }
      m = s.match(/^(\d+)\s*(d|w|m|y)$/);
      if (m) {
        const unit = { d: 'day', w: 'week', m: 'month', y: 'year' }[m[2]];
        const n = Number(m[1]);
        return n > 0 ? { every: n, unit } : null;
      }
      m = s.match(/^(\d+)\s+(day|days|week|weeks|month|months|year|years)$/);
      if (m) {
        const n = Number(m[1]);
        const u = m[2];
        const unit = u.startsWith('day') ? 'day' : u.startsWith('week') ? 'week' : u.startsWith('month') ? 'month' : 'year';
        return n > 0 ? { every: n, unit } : null;
      }
      return null;
    }

    function recSplitRuleAndHome(raw) {
      let home = null;
      const ruleParts = [];
      raw.split('|').forEach(part => {
        const trimmed = part.trim();
        const hm = trimmed.match(/^home:\s*(.+)$/i);
        if (hm) home = hm[1].trim();
        else if (trimmed) ruleParts.push(trimmed);
      });
      return { ruleText: ruleParts.join(' | '), home };
    }

    function parseRecurrenceRule(raw) {
      const s = raw.toLowerCase().replace(/\s+/g, ' ').trim();
      if (!s) return null;

      let m = s.match(/^(?:on\s+)?(\d{1,2})\s+([a-z]+)$/);
      if (m) {
        const day = Number(m[1]), month = REC_MONTHS[m[2]];
        if (month && day >= 1 && day <= 31) return { type: 'annualDate', day, month };
      }

      m = s.match(/^(last|first|second|third|fourth)\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\s+(?:of\s+)?each\s+month$/);
      if (m) {
        const ordinal = REC_ORDINALS[m[1]];
        const weekday = REC_WEEKDAYS[m[2]];
        if (ordinal != null && weekday !== undefined) return { type: 'weekdayOfMonth', ordinal, weekday };
      }

      m = s.match(/^once\s+in\s+(.+)$/);
      if (m) {
        const w = recParseWindow(m[1]);
        if (w && w.type === 'months') return { type: 'onceInMonths', months: [...w.months].sort((a, b) => a - b) };
      }

      if (!s.includes('every') && !/\d\s*(d|w|m|y)\b/.test(s) && !/\d\s+(day|week|month|year)/.test(s)) {
        m = s.match(/^in\s+(.+)$/);
        if (m) {
          const w = recParseWindow(m[1]);
          if (w && w.type === 'months') return { type: 'onceInMonths', months: [...w.months].sort((a, b) => a - b) };
        }
      }

      if (s === 'every month') return { type: 'dayOfMonth', day: 1 };

      const dailyTimes = recParseDailyTimesRule(s);
      if (dailyTimes) return dailyTimes;

      m = s.match(/^on\s+the\s+(\d{1,2})(?:st|nd|rd|th)?(?:\s+of\s+every\s+month)?$/);
      if (m) {
        const day = Number(m[1]);
        if (day >= 1 && day <= 31) return { type: 'dayOfMonth', day };
      }

      m = s.match(/^every\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday)(?:\s+in\s+(.+))?$/);
      if (m) {
        const weekday = REC_WEEKDAYS[m[1]];
        const window = m[2] ? recParseWindow(m[2]) : null;
        if (weekday !== undefined && (!m[2] || window)) return { type: 'everyWeekday', weekday, window };
      }

      m = s.match(/^(.+?)\s+in\s+(.+)$/);
      if (m) {
        const interval = recParseIntervalPart(m[1]);
        const window = recParseWindow(m[2]);
        if (interval && window) return recIntervalRule(interval, window);
      }

      const interval = recParseIntervalPart(s);
      if (interval) return recIntervalRule(interval, null);

      return null;
    }

    function recIntervalRule(interval, window) {
      if (interval.unit === 'month') {
        if (interval.every === 1) return { type: 'dayOfMonth', day: 1, window };
        return { type: 'everyNMonths', every: interval.every, window };
      }
      return { type: 'interval', ...interval, window };
    }

    function parseRecurrence(raw) {
      const { ruleText, home } = recSplitRuleAndHome(raw.trim());
      const rule = parseRecurrenceRule(ruleText);
      if (!rule) return null;
      if (home) rule.home = home;
      return rule;
    }

    function findListIndexByName(name) {
      if (!name) return -1;
      // Prefer alive list (ghosts may exist at end after soft del)
      let idx = state.lists.findIndex(l => !isDeleted(l) && l.name === name);
      if (idx < 0) idx = state.lists.findIndex(l => l.name === name);
      return idx;
    }

    function promoteItemToTop(list, itemIndex) {
      // Legacy index path (kept for any external, but internal syncs now use stable ts).
      if (!list || !list.items || itemIndex <= 0 || itemIndex >= list.items.length) return false;
      const [item] = list.items.splice(itemIndex, 1);
      list.items.unshift(item);
      if (list) list.orderUpdatedAt = Date.now();
      return true;
    }

    function returnRecurrentItemToHome(listIndex, itemIndex, rule) {
      if (!rule.home) return false;
      const homeIdx = findListIndexByName(rule.home);
      if (homeIdx < 0 || homeIdx === listIndex) return false;
      const [moved] = state.lists[listIndex].items.splice(itemIndex, 1);
      state.lists[homeIdx].items.unshift(moved);
      if (state.lists[homeIdx]) state.lists[homeIdx].orderUpdatedAt = Date.now();
      if (listIndex !== homeIdx && state.lists[listIndex]) state.lists[listIndex].orderUpdatedAt = Date.now();
      return true;
    }

    // Robust promotion: collect by stable timestamp to avoid any index invalidation from unshifts.
    // Prepends the to-promote group preserving *their relative order* from before the lift.
    // Only bumps orderUpdatedAt when an actual change to ordering occurs.
    function promoteByTimestamps(list, timestamps) {
      if (!list || !Array.isArray(list.items) || !timestamps || timestamps.length === 0) return false;
      const tsSet = new Set(timestamps.map(t => String(t)));
      const toPromote = [];
      const remaining = [];
      list.items.forEach(it => {
        if (it && tsSet.has(String(it.timestamp)) && !isDeleted(it)) {
          toPromote.push(it);
        } else {
          remaining.push(it);
        }
      });
      if (toPromote.length === 0) return false;
      const beforeOrder = list.items.map(it => it && it.timestamp);
      list.items = [...toPromote, ...remaining];
      if (DEBUG) normalizeListsInPlace([list]);
      const changedOrder = JSON.stringify(beforeOrder) !== JSON.stringify(list.items.map(it => it && it.timestamp));
      // Always claim orderUpdatedAt when we promote (surfaces due things for cross-device order win + rigidity).
      // We set even on "no visual change" because activation also updated the checked/updatedAt.
      list.orderUpdatedAt = Date.now();
      return true;
    }

    // Shared helper (updated for stability): sync* collect *timestamps* (not fragile idxs) and we
    // delegate to promoteByTimestamps. This guarantees deterministic group-to-top for e.g. multiple
    // recurrents becoming active together, and no more "jumping around" from index skew on unshift.
    function applyPromotions(list, toPromote /* idxs or timestamps; we normalize */) {
      if (!list || !toPromote || toPromote.length === 0) return false;
      // Support both old idx callers (if any) and new ts: if numbers look like small idxs vs large ts, but
      // we switched callers to always pass timestamps for safety. Fallback: treat as idxs via legacy.
      const looksLikeTs = toPromote.some(v => typeof v === 'number' && v > 100000000000); // ts ~ms since 2000s are >1e11
      if (looksLikeTs || (toPromote.length > 0 && typeof toPromote[0] === 'number' && toPromote[0] > 1e10)) {
        return promoteByTimestamps(list, toPromote);
      }
      // legacy idx path (reverse to reduce shift skew)
      let didChange = false;
      toPromote.sort((a, b) => b - a).forEach(idx => {
        if (promoteItemToTop(list, idx)) didChange = true;
      });
      return didChange;
    }

    // Centralizes the decision for whether a recurrent item should be forced dormant
    // or activated by the enforcer. This reduces ad-hoc logic spread across sync,
    // merge, and toggle paths. The recent manual uncheck guard (tog > ca) lets users
    // temporarily override the schedule without the enforcer immediately snapping it back.
    function getRecurrentEnforcement(item, rule) {
      if (!rule) {
        return { dormant: false, forceDormant: false, shouldActivate: false };
      }
      const { dormant } = evaluateRecurrence(rule, item);
      const tog = Number(item.toggledAt) || 0;
      const ca = Number(item.checkedAt) || 0;
      const recentManualUncheck = tog > ca;
      const justCompleted = !!(recurrenceJustCompleted && recurrenceJustCompleted.has(item.timestamp));
      return {
        dormant,
        forceDormant: dormant && !item.checked && !recentManualUncheck,
        shouldActivate: !dormant && item.checked && !justCompleted
      };
    }

    const recurrenceMetaCache = new Map();
    let recurrenceJustCompleted = null; // Set<number> of timestamps — session-local "just completed" skip for recurrence auto-reactivation (survives merge/parse object churn, cross-device not applicable)

    function buildItemMeta(text) {
      if (typeof text !== 'string') return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
      const recMatch = text.match(/\s*\[recurrent:\s*([^\]]+)\]\s*$/i);
      if (recMatch) {
        const bracketContent = recMatch[1].trim();
        const rule = parseRecurrence(bracketContent);
        if (!rule) return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
        return {
          displayText: text.slice(0, recMatch.index).trimEnd(),
          recurrenceLabel: recSplitRuleAndHome(bracketContent).ruleText,
          rule,
          dueLabel: null,
        };
      }
      const dueMatch = text.match(/\s*\[due:\s*([^\]]+)\]\s*$/i);
      if (dueMatch) {
        const dueContent = dueMatch[1].trim();
        if (!parseDueDate(dueContent, Date.now())) return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
        return {
          displayText: text.slice(0, dueMatch.index).trimEnd(),
          recurrenceLabel: null,
          rule: null,
          dueLabel: dueContent,
        };
      }
      return { displayText: text, recurrenceLabel: null, rule: null, dueLabel: null };
    }

    function getItemMeta(text) {
      if (!recurrenceMetaCache.has(text)) recurrenceMetaCache.set(text, buildItemMeta(text));
      return recurrenceMetaCache.get(text);
    }

    function clearRecurrenceMetaCache() {
      recurrenceMetaCache.clear();
    }

    function completeRecurrentItem(listIndex, itemIndex, item, rule) {
      item.checked = true;
      const now = Date.now();
      item.checkedAt = now;
      item.toggledAt = now;
      if (!recurrenceJustCompleted) recurrenceJustCompleted = new Set();
      recurrenceJustCompleted.add(item.timestamp);
      return returnRecurrentItemToHome(listIndex, itemIndex, rule);
    }

    function recWeekdayOnOrBefore(weekday, now) {
      const d = new Date(recStartOfDay(now));
      const diff = (d.getDay() - weekday + 7) % 7;
      d.setDate(d.getDate() - diff);
      return recStartOfDay(d);
    }

    function recNextWeekdayStart(weekday, afterMs) {
      const d = new Date(afterMs);
      d.setDate(d.getDate() + 1);
      const start = new Date(recStartOfDay(d));
      const diff = (weekday - start.getDay() + 7) % 7;
      start.setDate(start.getDate() + diff);
      return recStartOfDay(start);
    }

    function recDoneInCalendarMonth(lastDone, year, month) {
      if (!lastDone) return false;
      const d = new Date(lastDone);
      return d.getFullYear() === year && d.getMonth() + 1 === month;
    }

    function recOnceInMonthPeriodEnd(year, actMonth) {
      return actMonth === 12
        ? recStartOfDay(new Date(year + 1, 0, 1))
        : recStartOfDay(new Date(year, actMonth, 1));
    }

    // Done during the month, or after its window closed (logged late while overdue).
    function recSatisfiedOnceInMonth(lastDone, year, actMonth) {
      if (recDoneInCalendarMonth(lastDone, year, actMonth)) return true;
      return !!(lastDone && lastDone >= recOnceInMonthPeriodEnd(year, actMonth));
    }

    function recMissedOnceInMonth(rule, lastDone, year, month, todayStart) {
      return rule.months.filter(m => m < month).some(actMonth => {
        const actEnd = recOnceInMonthPeriodEnd(year, actMonth);
        if (todayStart < actEnd) return false;
        return !recSatisfiedOnceInMonth(lastDone, year, actMonth);
      });
    }

    function recEarliestMissedOnceInMonthDueAt(rule, lastDone, year, month, todayStart) {
      const missed = rule.months
        .filter(m => m < month)
        .sort((a, b) => a - b)
        .find(actMonth => {
          const actEnd = recOnceInMonthPeriodEnd(year, actMonth);
          if (todayStart < actEnd) return false;
          return !recSatisfiedOnceInMonth(lastDone, year, actMonth);
        });
      return missed ? recOnceInMonthPeriodEnd(year, missed) : null;
    }

    function recStatus(dormant, overdue, dueAt = null) {
      return { dormant, overdue, dueAt: overdue ? dueAt : null };
    }

    // Dispatch table for rule types. Reduces the giant if-chain in evaluateRecurrence
    // and makes adding new recurrence rule types easier. Each handler receives
    // precomputed common values.
    const REC_RULE_HANDLERS = {
      annualDate(item, rule, lastDone, todayStart, year, month, now) {
        const activateStart = recStartOfDay(new Date(year, rule.month - 1, rule.day));
        if (todayStart < activateStart) return recStatus(true, false);
        const doneThisYear = lastDone && lastDone >= activateStart;
        if (doneThisYear) return recStatus(true, false);
        return recStatus(false, true, activateStart);
      },

      dayOfMonth(item, rule, lastDone, todayStart, year, month, now) {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        const activateStart = recStartOfDay(new Date(year, month - 1, rule.day));
        const nextPeriodStart = month === 12
          ? recStartOfDay(new Date(year + 1, 0, rule.day))
          : recStartOfDay(new Date(year, month, rule.day));
        if (recDoneInCalendarMonth(lastDone, year, month) && lastDone >= activateStart) {
          return recStatus(true, false);
        }
        if (todayStart < activateStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextPeriodStart, activateStart);
      },

      weekdayOfMonth(item, rule, lastDone, todayStart, year, month, now) {
        const ordinal = rule.ordinal === -1 ? -1 : rule.ordinal;
        const activateStart = recNthWeekdayOfMonth(year, month, rule.weekday, ordinal);
        const nextMonthStart = recStartOfDay(new Date(year, month, 1));
        if (!activateStart) return recStatus(true, false);
        if (lastDone && lastDone >= activateStart) return recStatus(true, false);
        if (todayStart < activateStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextMonthStart, activateStart);
      },

      onceInMonths(item, rule, lastDone, todayStart, year, month, now) {
        if (!rule.months.includes(month)) {
          if (recMissedOnceInMonth(rule, lastDone, year, month, todayStart)) {
            return recStatus(false, true, recEarliestMissedOnceInMonthDueAt(rule, lastDone, year, month, todayStart));
          }
          return recStatus(true, false);
        }
        const monthStart = recStartOfDay(new Date(year, month - 1, 1));
        const nextMonthStart = month === 12
          ? recStartOfDay(new Date(year + 1, 0, 1))
          : recStartOfDay(new Date(year, month, 1));
        if (lastDone && lastDone >= monthStart && lastDone < nextMonthStart) {
          return recStatus(true, false);
        }
        return recStatus(false, todayStart >= nextMonthStart, monthStart);
      },

      everyWeekday(item, rule, lastDone, todayStart, year, month, now) {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        const periodStart = recWeekdayOnOrBefore(rule.weekday, now);
        const nextPeriodStart = recNextWeekdayStart(rule.weekday, periodStart);
        if (lastDone && lastDone >= periodStart) return recStatus(true, false);
        if (todayStart < periodStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextPeriodStart, periodStart);
      },

      everyNMonths(item, rule, lastDone, todayStart, year, month, now) {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        const anchor = new Date(item.timestamp);
        const anchorMonthIndex = anchor.getFullYear() * 12 + anchor.getMonth();
        const currentMonthIndex = year * 12 + (month - 1);
        const delta = currentMonthIndex - anchorMonthIndex;
        if (delta < 0 || delta % rule.every !== 0) return recStatus(true, false);
        const day = Math.min(anchor.getDate(), recDaysInMonth(year, month));
        const activateStart = recStartOfDay(new Date(year, month - 1, day));
        const nextPeriodStart = recStartOfDay(new Date(year, month - 1 + rule.every, day));
        if (lastDone && lastDone >= activateStart) return recStatus(true, false);
        if (todayStart < activateStart) return recStatus(true, false);
        return recStatus(false, todayStart >= nextPeriodStart, activateStart);
      },

      interval(item, rule, lastDone, todayStart, year, month, now) {
        if (rule.window && !recMonthInWindow(month, rule.window)) return recStatus(true, false);
        if (!lastDone) return recStatus(false, false);
        const nextDue = recAddIntervalMs(lastDone, rule.every, rule.unit);
        const nextDueStart = recStartOfDay(new Date(nextDue));
        if (todayStart < nextDueStart) return recStatus(true, false);
        return recStatus(false, todayStart > nextDueStart, nextDueStart);
      },

      dailyTimes(item, rule, lastDone, todayStart, year, month, now) {
        const nowMs = now.getTime();
        if (!lastDone) {
          const todaySlots = recDailyTimeSlotsForDay(todayStart, rule.times);
          const passedToday = todaySlots.filter(slot => nowMs >= slot);
          if (passedToday.length === 0) return recStatus(true, false);
          const dueSlot = passedToday[passedToday.length - 1];
          return recStatus(false, nowMs > dueSlot, dueSlot);
        }
        const nextSlot = recNextDailyTimeSlotAfter(rule.times, lastDone, now);
        if (nextSlot == null || nowMs < nextSlot) return recStatus(true, false);
        return recStatus(false, nowMs > nextSlot, nextSlot);
      }
    };

    function evaluateRecurrence(rule, item, now = new Date()) {
      const year = now.getFullYear();
      const month = now.getMonth() + 1;
      const todayStart = recStartOfDay(now);
      const checkedAtMs = Number(item.checkedAt);
      const lastDone = Number.isFinite(checkedAtMs) && checkedAtMs > 0 ? checkedAtMs : null;

      const handler = REC_RULE_HANDLERS[rule.type];
      if (handler) {
        return handler(item, rule, lastDone, todayStart, year, month, now);
      }
      return recStatus(false, false);
    }

    function syncRecurrenceState() {
      let changed = false;
      state.lists.forEach(list => {
        const toPromoteTs = [];
        list.items.forEach((item, idx) => {
          if (isDeleted(item)) return;
          const { rule } = getItemMeta(item.text);
          if (!rule) return;
          const enforcement = getRecurrentEnforcement(item, rule);
          if (enforcement.forceDormant) {
            item.checked = true;
            item.updatedAt = Date.now();
            changed = true;
          } else if (enforcement.shouldActivate) {
            item.checked = false;
            item.updatedAt = Date.now();
            if (Number.isFinite(item.timestamp)) toPromoteTs.push(item.timestamp);
            changed = true;
          }
        });
        if (applyPromotions(list, toPromoteTs)) changed = true;
      });
      if (recurrenceJustCompleted) recurrenceJustCompleted.clear();
      if (changed) (state.driveSyncReady ? saveData() : saveLocalData());
      return changed;
    }

    // ==================== DUE DATES ====================
    // One-shot deadlines via [due: …]. Relative offsets resolve from item.timestamp (add time).
    // Date-only values use start-of-day; checked items keep the bracket and move to Finished.

    function dueAtFromYMD(year, month, day, timeStr) {
      if (!Number.isFinite(year) || month < 1 || month > 12 || day < 1 || day > 31) return null;
      const probe = new Date(year, month - 1, day);
      if (probe.getFullYear() !== year || probe.getMonth() !== month - 1 || probe.getDate() !== day) return null;
      let dueAt = recStartOfDay(probe);
      if (timeStr) {
        const mins = recParseClockTime(timeStr);
        if (mins == null) return null;
        dueAt += mins * 60 * 1000;
      }
      return dueAt;
    }

    function dueDayMonthFromDmy(first, second) {
      if (first > 12) return { day: first, month: second };
      if (second > 12) return { day: second, month: first };
      return { day: first, month: second };
    }

    function parseDueDate(raw, anchorMs) {
      const s = raw.toLowerCase().replace(/\s+/g, ' ').trim();
      if (!s) return null;

      let interval = recParseIntervalPart(s);
      if (!interval && s.startsWith('in ')) interval = recParseIntervalPart(s.slice(3).trim());
      if (interval) return { dueAt: recAddIntervalMs(anchorMs, interval.every, interval.unit), label: raw.trim() };

      const anchor = new Date(anchorMs);
      if (s === 'today') return { dueAt: recStartOfDay(anchor), label: 'today' };
      if (s === 'tomorrow') {
        const d = new Date(anchor);
        d.setDate(d.getDate() + 1);
        return { dueAt: recStartOfDay(d), label: 'tomorrow' };
      }

      let m = s.match(/^(today|tomorrow)\s+(\d{1,2}:\d{2})$/);
      if (m) {
        const d = new Date(anchor);
        if (m[1] === 'tomorrow') d.setDate(d.getDate() + 1);
        const mins = recParseClockTime(m[2]);
        if (mins == null) return null;
        return { dueAt: recStartOfDay(d) + mins * 60 * 1000, label: raw.trim() };
      }

      // ISO / numeric year-first: 2026-06-28, 2026/6/28, 2026-06-28 17:00, 2026-06-28t17:00
      m = s.match(/^(\d{4})[-/.](\d{1,2})[-/.](\d{1,2})(?:[t\s]+(\d{1,2}:\d{2}))?$/);
      if (m) {
        const dueAt = dueAtFromYMD(Number(m[1]), Number(m[2]), Number(m[3]), m[4]);
        if (dueAt != null) return { dueAt, label: raw.trim() };
      }

      // Day-first numeric: 28-06-2026, 28/06/2026, 28.06.2026 17:00 (DD-MM-YYYY when ambiguous)
      m = s.match(/^(\d{1,2})[-/.](\d{1,2})[-/.](\d{4})(?:\s+(\d{1,2}:\d{2}))?$/);
      if (m) {
        const { day, month } = dueDayMonthFromDmy(Number(m[1]), Number(m[2]));
        const dueAt = dueAtFromYMD(Number(m[3]), month, day, m[4]);
        if (dueAt != null) return { dueAt, label: raw.trim() };
      }

      m = s.match(/^(\d{1,2})\s+([a-z]+)(?:\s+(\d{1,2}:\d{2}))?$/);
      if (m) {
        const day = Number(m[1]);
        const month = REC_MONTHS[m[2]];
        if (!month || day < 1 || day > 31) return null;
        let dueAt = recStartOfDay(new Date(anchor.getFullYear(), month - 1, day));
        if (m[3]) {
          const mins = recParseClockTime(m[3]);
          if (mins == null) return null;
          dueAt += mins * 60 * 1000;
        }
        return { dueAt, label: raw.trim() };
      }

      return null;
    }

    function applyDueFromText(item) {
      const match = typeof item.text === 'string' ? item.text.match(/\s*\[due:\s*([^\]]+)\]\s*$/i) : null;
      if (!match) {
        delete item.dueAt;
        return;
      }
      const parsed = parseDueDate(match[1].trim(), item.timestamp);
      if (parsed) item.dueAt = parsed.dueAt;
      else delete item.dueAt;
    }

    function dueHasClockTime(dueAt) {
      const d = new Date(dueAt);
      return d.getHours() !== 0 || d.getMinutes() !== 0;
    }

    function dueFormatClockTime(dueAt) {
      const d = new Date(dueAt);
      return `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function dueFormatShortDate(dueAt, includeTime) {
      const d = new Date(dueAt);
      const months = ['jan', 'feb', 'mar', 'apr', 'may', 'jun', 'jul', 'aug', 'sep', 'oct', 'nov', 'dec'];
      const base = `${d.getDate()} ${months[d.getMonth()]}`;
      return includeTime ? `${base} ${dueFormatClockTime(dueAt)}` : base;
    }

    function formatOverdueHint(isOverdue, dueAt) {
      if (!isOverdue) return null;
      return dueAt ? formatDueDisplay(dueAt) : 'overdue';
    }

    function applyOverdueHint(li, hint, hintText) {
      hint.classList.add('hint-overdue');
      li.classList.add('item-overdue');
      hint.textContent = hintText;
    }

    function formatDueLabel(dueAt, now = new Date()) {
      const todayStart = recStartOfDay(now);
      const dueDayStart = recStartOfDay(new Date(dueAt));
      const hasTime = dueHasClockTime(dueAt);
      if (dueDayStart === todayStart) return hasTime ? `today ${dueFormatClockTime(dueAt)}` : 'today';
      if (dueDayStart === todayStart + 864e5) return hasTime ? `tomorrow ${dueFormatClockTime(dueAt)}` : 'tomorrow';
      return dueFormatShortDate(dueAt, hasTime);
    }

    function formatDueDisplay(dueAt, now = new Date()) {
      const nowMs = now.getTime();
      if (nowMs > dueAt) {
        const days = Math.floor((nowMs - dueAt) / 864e5);
        if (days < 1) return 'overdue';
        if (days === 1) return 'overdue · 1 day';
        return `overdue · ${days} days`;
      }
      return formatDueLabel(dueAt, now);
    }

    function syncDueState() {
      let changed = false;
      state.lists.forEach(list => {
        const toPromoteTs = [];
        list.items.forEach((item, idx) => {
          if (isDeleted(item)) return;
          if (item.checked) return;
          const { dueLabel } = getItemMeta(item.text);
          if (!dueLabel && !item.dueAt) return;
          if (!item.dueAt) applyDueFromText(item);
          if (!item.dueAt || Date.now() <= item.dueAt) return;
          if (Number.isFinite(item.timestamp)) toPromoteTs.push(item.timestamp);
        });
        if (applyPromotions(list, toPromoteTs)) changed = true;
      });
      if (changed) (state.driveSyncReady ? saveData() : saveLocalData());
      return changed;
    }

    // Self-tests have been moved to self-tests.js to keep index.html as clean as possible.
    // The functions below are tiny stubs. The real implementations live in self-tests.js.
    // See README for how to run them.
    function runDueSelfTest() { /* see self-tests.js */ }
    function runRecurrenceSelfTest() { /* see self-tests.js */ }
    function runSyncMergeSelfTest() { /* see self-tests.js */ }

    function runAllSelfTests() {
      // If the external test file has already been loaded and enhanced the global, use it.
      if (typeof window !== 'undefined' && window.__runFullSelfTests) {
        return window.__runFullSelfTests();
      }
      // Try to dynamically load the external test file (works great for local file: / localhost + ?selftest)
      if (typeof document !== 'undefined') {
        const needsLoad = location.protocol === 'file:' || location.hostname === 'localhost' || location.search.includes('selftest');
        if (needsLoad) {
          const s = document.createElement('script');
          s.src = 'self-tests.js';
          s.onload = () => {
            if (window.__runFullSelfTests) window.__runFullSelfTests();
            else console.log('%c[Inbox] self-tests.js loaded. Call runInboxSelfTests() again.', 'color:#666');
          };
          document.head.appendChild(s);
          return { passed: 0, failed: 0, loading: true };
        }
      }
      console.log('%c[Inbox] Full self-tests are in self-tests.js (runInboxSelfTests or ?selftest). See README.', 'color:#666');
      return { passed: 0, failed: 0 };
    }

    window.runInboxSelfTests = runAllSelfTests;

    // Expose pure functions (and key helpers used by tests) so self-tests.js can run
    // against the live implementation without duplicating logic.
    // This is the main technique that lets us keep index.html clean while having strong tests.
    if (typeof window !== 'undefined') {
      window.__inboxPure = {
        ts,
        computeItemActivity,
        computeListActivity,
        ghostsToEndInPlace,
        isValidItem,
        sanitizeLists,
        isDeleted,
        filterAliveItems,
        filterAliveLists,
        getAliveItems,
        parseListFile,
        generateListFile,
        mergeRemoteIntoLocal,
        reconcileList,
        reconcileItems,
        reconcileItem,
        getDriveListsSignature,
        promoteByTimestamps,
        applyPromotions,
        getRecurrentEnforcement,
        // Recurrence / due support for the full test suite
        parseRecurrence,
        evaluateRecurrence,
        parseDueDate,
        formatDueDisplay,
        recStartOfDay,
        recAddIntervalMs
      };
      window._assertInboxInvariants = () => {
        if (!DEBUG) return;
        assertValidSanitized(state.lists, 'manual');
        assertNoDupTsAcrossLists(state.lists, 'manual');
        (state.lists || []).forEach(l => assertGhostsAtEnd(l, 'manual'));
        console.log('%c[Inbox] invariants checked (manual)', 'color:#34c759');
      };
    }

    const BUCKET_ORDER = ['today', 'yesterday', 'last week', 'older'];
    const BUCKET_LABELS = { today: 'Today', yesterday: 'Yesterday', 'last week': 'Last week', older: 'Older' };

    // ==================== SURGICAL DOM UPDATES ====================
    // Patch the items view in place for common ops; fall back to renderItems() when unsure.

    function getItemsContainer() {
      return document.getElementById('items-container');
    }

    function classifyItemSection(item) {
      const { rule } = getItemMeta(item.text);
      if (!item.checked) return 'active';
      if (rule) return 'recurrent';
      return 'finished';
    }

    function countItemsBySection(list) {
      const counts = { active: 0, recurrent: 0, finished: 0 };
      filterAliveItems(list && list.items).forEach(item => { counts[classifyItemSection(item)]++; });
      return counts;
    }

    function findItemElement(itemIndex) {
      const container = getItemsContainer();
      if (!container) return null;
      let li = container.querySelector(`.item[data-item-index="${itemIndex}"]`);
      if (li) return li;
      // Fallback using stable ts from current array slot (helps if numeric datasets are stale from prior reindexes).
      // For delete patches the numeric index is historical and li still carries it, so primary hit above.
      const list = state.lists[state.currentIndex];
      const it = list && list.items && list.items[itemIndex];
      if (it && it.timestamp != null) {
        li = container.querySelector(`.item[data-item-ts="${it.timestamp}"]`);
        if (li) return li;
      }
      return null;
    }

    function findItemElementByTs(timestamp) {
      return getItemsContainer()?.querySelector(`.item[data-item-ts="${timestamp}"]`) || null;
    }

    function reindexItemElements() {
      const list = state.lists[state.currentIndex];
      if (!list) return;
      const tsToIdx = new Map(list.items.map((item, idx) => [String(item.timestamp), idx]));
      getItemsContainer()?.querySelectorAll('.item').forEach(li => {
        const idx = tsToIdx.get(li.dataset.itemTs);
        if (idx !== undefined) li.dataset.itemIndex = String(idx);
      });
    }

    // Resolve live array index from a stable timestamp. Prevents stale closures after
    // promotes, deletes, reorders, or reindexes that only mutate data-item-index.
    function getItemIndexByTimestamp(ts) {
      const list = state.lists[state.currentIndex];
