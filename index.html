          const candidates = new Map(); // listKey → { list, score }
          (remoteList.items || []).forEach(it => {
            const t = ts(it && it.timestamp);
            if (!t || it.deletedAt) return;
            const cand = localByItemTs.get(t);
            if (!cand || isLocalUsed(cand)) return;
            const k = getListKey(cand);
            const prev = candidates.get(k);
            if (prev) prev.score += 1;
            else candidates.set(k, { list: cand, score: 1 });
          });
          let best = null;
          let tied = false;
          candidates.forEach(c => {
            if (!best || c.score > best.score) { best = c; tied = false; }
            else if (c.score === best.score) tied = true;
          });
          if (best && best.score > 0 && !tied) localList = best.list;
        }
        if (localList) usedLocal.add(getListKey(localList));

        // Reconcile this list (incl del rule for list + its items)
        const mList = reconcileList(localList, remoteList);
        if (mList) {
          if (mList.deletedAt) {
            remoteGhostLists.push(mList);
          } else {
            result.push(mList);
          }
        }
      });

      // local-only lists (append safety bias); ghosts collected for end
      (localLists || []).forEach(l => {
        if (!l || typeof l.name !== 'string') return;
        if (usedLocal.has(getListKey(l))) return;
        // local only: keep as-is (incl its deletedAt if set); will sanitize at end
        if (l.deletedAt) {
          localGhostListsLater.push(l);
        } else {
          // normalize item ghosts to end for local-only alives
          const norm = { ...l };
          Sync.ghostsToEndInPlace(norm);
          result.push(norm);
        }
      });

      // Append ghost lists at end (for tombstone emission), dedup by key
      const ghostKeys = new Set();
      function pushGhostIfNew(g) {
        if (!g) return;
        const k = getListKey(g);
        if (!ghostKeys.has(k)) {
          ghostKeys.add(k);
          result.push(g);
        }
      };
      remoteGhostLists.forEach(pushGhostIfNew);
      localGhostListsLater.forEach(pushGhostIfNew);

      // === SAFETY FIXES for reported bugs (non-breaking post-processing) ===
      // 1) Dedup items by ts for drag-drop list-to-list within file (remote may retain stale placement).
      //    Local post-move placement wins to prevent dups after cross-list DnD.
      const localPlacement = new Map(); // ts -> preferred list name (from current local after op)
      (localLists || []).forEach(l => {
        if (!l || l.deletedAt) return;
        const nm = l.name;
        (l.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (t && !it.deletedAt && !localPlacement.has(t)) localPlacement.set(t, nm);
        });
      });
      const seenTs = new Set();
      const deduped = [];
      result.forEach(l => {
        if (!l) return;
        const kept = [];
        const ghs = [];
        (l.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (!t || seenTs.has(t)) return;
          const pref = localPlacement.get(t);
          if (pref !== undefined) {
            if (pref === l.name) {
              seenTs.add(t);
              (it.deletedAt ? ghs : kept).push(it);
            }
          } else {
            seenTs.add(t);
            (it.deletedAt ? ghs : kept).push(it);
          }
        });
        deduped.push({ ...l, items: [...kept, ...ghs] });
      });
      Sync.normalizeListsInPlace(deduped);
      assertGhostsAtEnd({items: deduped.flatMap(l => l.items || [])}, 'post-dedup');

      // 2) Final local-toggle bias (protects just-made checks/unchecks from being lost on pull+merge
      //    in rare timing/seq edge cases). Remote higher timestamp still wins.
      const localItemMap = new Map();
      (localLists || []).forEach(lst => {
        (lst && lst.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (t) localItemMap.set(t, it);
        });
      });
      deduped.forEach(lst => {
        (lst && lst.items || []).forEach(it => {
          const t = ts(it && it.timestamp);
          if (!t) return;
          const lIt = localItemMap.get(t);
          if (!lIt) return;
          const lT = ts(lIt.toggledAt || lIt.checkedAt);
          const iT = ts(it.toggledAt || it.checkedAt);
          if (lT > iT) {
            it.checked = !!lIt.checked;
            if (ts(lIt.toggledAt)) it.toggledAt = lIt.toggledAt;
            if (ts(lIt.checkedAt)) it.checkedAt = lIt.checkedAt;
            else if (!lIt.checked && it.checkedAt != null) delete it.checkedAt;
          } else if (lT === iT && lIt.checked && !it.checked) {
            it.checked = true;
            if (ts(lIt.checkedAt)) it.checkedAt = lIt.checkedAt;
            if (ts(lIt.toggledAt)) it.toggledAt = lIt.toggledAt;
          }
        });
      });

      const sanitizedResult = Sync.sanitizeLists(deduped) || [];
      if (DEBUG) {
        assertGhostsAtEnd(sanitizedResult[0]);
        assertNoDupTsAcrossLists(sanitizedResult, 'post-merge');
        assertValidSanitized(sanitizedResult, 'post-merge');
        // Bug #2 safety: no alive item should appear in more than one list after dedup
        const aliveTsLists = new Map();
        sanitizedResult.forEach(l => {
          if (!l || l.deletedAt) return;
          (l.items || []).forEach(it => {
            if (!it || it.deletedAt) return;
            const t = ts(it.timestamp);
            if (!t) return;
            if (aliveTsLists.has(t)) {
              console.warn('[Inbox] BUG#2 invariant: alive item ts=' + t + ' in multiple lists:', aliveTsLists.get(t), 'and', l.name);
            } else {
              aliveTsLists.set(t, l.name);
            }
          });
        });
      }
      return sanitizedResult;
    }

    // Per DESIGN: reconcile single list (lts/name matched). Handles list del vs activity (incl contained items), copies meta.
    function reconcileList(localList, remoteList) {
      const lL = localList || null;
      const rL = remoteList || null;
      if (!lL && !rL) return null;
      const lDel = ts(lL && lL.deletedAt);
      const rDel = ts(rL && rL.deletedAt);
      const maxListDel = Math.max(lDel, rDel);

      const lListAct = computeListActivity(lL);
      const rListAct = computeListActivity(rL);
      const maxListAct = Math.max(lListAct, rListAct);

      let listDeletedAt = 0;
      if (maxListDel > maxListAct) {
        listDeletedAt = maxListDel;
      }

      // Reconcile items using per-item rule (even if list del; result may use empty for ghost lists)
      const reconciledItems = reconcileItems(lL, rL);

      // Decide item order by higher orderUpdatedAt (remote bias on tie)
      const lOupd = Number(lL && lL.orderUpdatedAt) || 0;
      const rOupd = Number(rL && rL.orderUpdatedAt) || 0;
      const useLocalOrder = lOupd > rOupd && !!lL;
      const baseSideItems = useLocalOrder ? (lL.items || []) : (rL ? rL.items : []);
      const otherSideItems = useLocalOrder ? (rL ? rL.items : []) : (lL ? lL.items : []);

      const recByTs = new Map();
      reconciledItems.forEach(ri => { if (ri && Number.isFinite(ri.timestamp)) recByTs.set(ri.timestamp, ri); });

      const orderedAlive = [];
      const seenTs = new Set();
      baseSideItems.forEach(bi => {
        const ts = bi && bi.timestamp;
        if (!Number.isFinite(ts) || seenTs.has(ts)) return;
        const rec = recByTs.get(ts);
        if (rec && !rec.deletedAt) {
          orderedAlive.push(rec);
          seenTs.add(ts);
        }
      });
      otherSideItems.forEach(oi => {
        const ts = oi && oi.timestamp;
        if (!Number.isFinite(ts) || seenTs.has(ts)) return;
        const rec = recByTs.get(ts);
        if (rec && !rec.deletedAt) {
          orderedAlive.push(rec);
          seenTs.add(ts);
        }
      });

      // Ghosts at end (from reconciled)
      const ghosts = reconciledItems.filter(ri => ri && ri.deletedAt);
      const finalItems = listDeletedAt ? [] : [...orderedAlive, ...ghosts];
      // Note: caller (merge) + sanitize paths also ensure suffix via ghostsToEndInPlace where needed.

      // Name: prefer remote when alive; for ghost list, prefer name from del-winner side (the one with maxDel; best-effort for tombstone). lts authoritative.
      let listName = (rL && rL.name) || (lL && lL.name) || '';
      if (listDeletedAt) {
        const delSide = (rDel >= lDel ? rL : lL) || rL || lL;
        if (delSide && delSide.name) listName = delSide.name;
      } else if (lL && rL && lL.name !== rL.name) {
        if (lOupd > rOupd) listName = lL.name;
      }

      const mList = { name: listName, items: finalItems };
      const ltsVal = ts(rL && rL.timestamp) || ts(lL && lL.timestamp);
      if (ts(ltsVal)) mList.timestamp = ltsVal;
      const oupdVal = (lOupd > rOupd ? (lL && lL.orderUpdatedAt) : (rL && rL.orderUpdatedAt)) || (rL && rL.orderUpdatedAt) || (lL && lL.orderUpdatedAt);
      if (ts(oupdVal)) mList.orderUpdatedAt = oupdVal;
      if (listDeletedAt) mList.deletedAt = listDeletedAt;
      return mList;
    }

    // Per-item reconcile (DESIGN table + pseudocode). maxDel > maxAct => ghost wins; else LWW per field + toggle special + due bias.
    // Note: activity includes dueAt (as set-time) for del comparison; aligns to "max(ts,updatedAt,toggledAt,...)" intent.
    // dueAt survival + local bias explicit for merge/sync interactions (step 8).
    function reconcileItems(localList, remoteList) {
      const lItems = (localList && localList.items) ? localList.items : [];
      const rItems = (remoteList && remoteList.items) ? remoteList.items : [];
      const localItemByTs = {};
      lItems.forEach(it => { const t = ts(it && it.timestamp); if (t) localItemByTs[t] = it; });
      const remoteItemByTs = {};
      rItems.forEach(it => { const t = ts(it && it.timestamp); if (t) remoteItemByTs[t] = it; });
      const allTs = new Set([...Object.keys(localItemByTs).map(Number), ...Object.keys(remoteItemByTs).map(Number)]);
      const reconciled = [];
      allTs.forEach(t => {
        const lIt = localItemByTs[t];
        const rIt = remoteItemByTs[t];
        const rec = reconcileItem(lIt, rIt);
        if (rec) reconciled.push(rec);
      });
      return reconciled;
    }

    function reconcileItem(lIt, rIt) {
      if (!lIt && !rIt) return null;
      const lDel = ts(lIt && lIt.deletedAt);
      const rDel = ts(rIt && rIt.deletedAt);
      const maxDel = Math.max(lDel, rDel);
      const lAct = computeItemActivity(lIt);
      const rAct = computeItemActivity(rIt);
      const maxAct = Math.max(lAct, rAct);
      if (maxDel > maxAct) {
        const base = (lDel >= rDel ? lIt : rIt) || lIt || rIt;
        return {
          text: (base && base.text) || '',
          timestamp: ts((base && base.timestamp) || (lIt && lIt.timestamp) || (rIt && rIt.timestamp)),
          checked: false,
          deletedAt: maxDel
        }; // ghost minimal; ts fallback for safety
      }
      // alive: prefer base from non-deleted side (the one with full data for resurrection safety, e.g. toggle/recurrence cases where no updatedAt but text must survive). Then apply LWW overrides (upd/text, toggle, due). Aligns to maxDel > maxAct + "never lose" safety. Remote bias only when both alive.
      let winner;
      if (!lIt) {
        winner = { ...rIt };
      } else if (!rIt) {
        winner = { ...lIt };
      } else if (lIt.deletedAt && !rIt.deletedAt) {
        // remote side is the alive/full one (local was ghost but del lost)
        winner = { ...rIt };
      } else if (!lIt.deletedAt && rIt.deletedAt) {
        // local is the alive/full one
        winner = { ...lIt };
      } else {
        // both alive (or edge): remote bias + upd LWW for text
        const lUpd = Number(lIt.updatedAt) || 0;
        const rUpd = Number(rIt.updatedAt) || 0;
        if (lUpd > rUpd) {
          winner = { ...rIt, text: lIt.text, updatedAt: lUpd };
          if (Number(lIt.dueAt) > Number(rIt.dueAt || 0)) winner.dueAt = lIt.dueAt;
        } else {
          winner = { ...rIt };
        }
      }
      // Toggle LWW (exact prior logic preserved for compat)
      const rVer = ts((rIt && (rIt.toggledAt || rIt.checkedAt)) || 0);
      const lVer = ts((lIt && (lIt.toggledAt || lIt.checkedAt)) || 0);
      if (lIt && rIt) {
        if (lVer > rVer) {
          const localHasCA = !!ts(lIt.checkedAt);
          winner = {
            ...winner,
            checked: !!lIt.checked,
            checkedAt: localHasCA ? lIt.checkedAt : (lIt.checked ? winner.checkedAt : undefined),
            toggledAt: lIt.toggledAt || winner.toggledAt
          };
          if (!localHasCA && !lIt.checked) {
            delete winner.checkedAt; // preserve explicit clear from local manual reactivation of recurrent
          }
        } else if (lVer === rVer) {
          if (lIt.checked && !winner.checked) {
            winner = { ...winner, checked: true, checkedAt: lIt.checkedAt || winner.checkedAt, toggledAt: lIt.toggledAt || winner.toggledAt };
          }
        }
      }
      // local due bias (as prior logic)
      if (lIt && ts(lIt.dueAt) && (!winner.dueAt || ts(lIt.dueAt) > ts(winner.dueAt || 0))) {
        winner = { ...winner, dueAt: lIt.dueAt };
      }
      // ensure ts
      if (!ts(winner.timestamp)) {
        winner.timestamp = ts((lIt && lIt.timestamp) || (rIt && rIt.timestamp));
      }
      if (winner.deletedAt) delete winner.deletedAt; // alive
      return winner;
    }

    function restoreActiveDriveFileFromCache() {
      const activeFile = state.driveFiles[state.activeDriveFileIdx];
      const cachedLists = activeFile && state.driveFileCache[activeFile.id];
      if (!cachedLists) return false;
      const localUpdated = Number(localStorage.getItem(INBOX_LISTS_UPDATED_KEY) || 0);
      const cacheUpdated = state.persistedDriveFileCache[activeFile.id]?.lastUpdated || 0;
      // loadData() already applied inboxLists; only use cache when it is at least as fresh.
      if (!localUpdated || localUpdated > cacheUpdated) return false;
      Drive.applyDriveListsToState(cachedLists, { persist: true, renderNow: false });
      return true;
    }

    function saveDriveFilesState() {
      localStorage.setItem('driveFiles', JSON.stringify(state.driveFiles));
      localStorage.setItem('activeDriveFileIdx', String(state.activeDriveFileIdx));
    }

    function loadDriveFilesState() {
      try { state.driveFiles = JSON.parse(localStorage.getItem('driveFiles') || '[]'); }
      catch { state.driveFiles = []; }
      state.activeDriveFileIdx = Number(localStorage.getItem('activeDriveFileIdx') || 0);
      if (state.activeDriveFileIdx >= state.driveFiles.length) state.activeDriveFileIdx = 0;
      loadPersistedDriveFileCache();
    }

    function formatDriveUser(user, fallback = '') {
      if (!user) return fallback;
      const name = typeof user.displayName === 'string' ? user.displayName.trim() : '';
      const email = typeof user.emailAddress === 'string' ? user.emailAddress.trim() : '';
      if (name && email && name !== email) return `${name} (${email})`;
      return name || email || fallback;
    }

    async function loadDriveUser() {
      const res = await driveFetch(`${DRIVE_API}/about?fields=user(displayName,emailAddress)`);
      const data = await res.json();
      state.driveUser = data && data.user ? data.user : null;
      state.driveUserLoadFailed = false;
      return state.driveUser;
    }

    function renderDriveStatusIndicator(status) {
      const indicator = document.getElementById('drive-status-indicator');
      const liveRegion = document.getElementById('drive-status-live');
      if (!indicator) return;
      indicator.classList.toggle('connected', state.driveConnected);
      const formattedUser = formatDriveUser(state.driveUser);
      const label = state.driveConnected
        ? `Drive connected${formattedUser ? `: ${formattedUser}` : ''}`
        : (status === 'error' ? 'Drive connection needs attention' : 'Drive disconnected');
      indicator.setAttribute('aria-label', label);
      indicator.title = label;
      if (liveRegion) liveRegion.textContent = label;
      renderFileStrip();
    }

    function setDriveStatus(status) {
      // status: 'disconnected' | 'connected' | 'error'
      state.driveConnected = status === 'connected';
      if (status !== 'connected') {
        state.driveUser = null;
        state.driveUserLoadFailed = false;
      }
      renderDriveStatusIndicator(status);
    }

    function initTokenClient() {
      if (state.tokenClient) return;
      state.tokenClient = google.accounts.oauth2.initTokenClient({
        client_id: DRIVE_CLIENT_ID,
        scope: DRIVE_SCOPE,
        callback: (response) => {
          if (response.error) {
            if (state.driveTokenReject) { state.driveTokenReject(new Error(response.error)); state.driveTokenReject = null; state.driveTokenResolve = null; }
            return;
          }
          state.driveToken = response.access_token;
          state.driveTokenExpiry = Date.now() + (response.expires_in - 60) * 1000;
          localStorage.setItem('driveToken', state.driveToken);
          localStorage.setItem('driveTokenExpiry', String(state.driveTokenExpiry));
          if (state.driveTokenResolve) { state.driveTokenResolve(state.driveToken); state.driveTokenResolve = null; state.driveTokenReject = null; }
        },
        error_callback: (err) => {
          if (state.driveTokenReject) { state.driveTokenReject(new Error(err.type || 'token_error')); state.driveTokenReject = null; state.driveTokenResolve = null; }
        },
      });
    }

    function requestToken(prompt = 'select_account', hint = '') {
      return new Promise((resolve, reject) => {
        if (state.tokenRequestPending) {
          reject(new Error('Token request already in progress'));
          return;
        }
        state.tokenRequestPending = true;
        state.driveTokenResolve = (token) => { state.tokenRequestPending = false; resolve(token); };
        state.driveTokenReject = (err) => { state.tokenRequestPending = false; reject(err); };
        const config = { prompt };
        if (hint) config.login_hint = hint;
        state.tokenClient.requestAccessToken(config);
      });
    }

    async function ensureToken() {
      if (state.driveToken && Date.now() < state.driveTokenExpiry) return state.driveToken;
      // Try to restore a fresh token from localStorage before going to GIS.
      const storedToken = localStorage.getItem('driveToken');
      const storedExpiry = Number(localStorage.getItem('driveTokenExpiry') || 0);
      if (storedToken && Date.now() < storedExpiry) {
        state.driveToken = storedToken;
        state.driveTokenExpiry = storedExpiry;
        return state.driveToken;
      }
      // Token missing or expired — attempt a silent GIS refresh if possible.
      if (!state.tokenRequestPending && state.tokenClient && localStorage.getItem('driveWasConnected')) {
        try {
          const hint = localStorage.getItem('driveUserHint') || '';
          const token = await requestToken('none', hint);
          if (DEBUG) console.log('[Drive] ensureToken: silent refresh succeeded.');
          return token;
        } catch (err) {
          if (DEBUG) console.log('[Drive] ensureToken: silent refresh failed.', err);
        }
      }
      // Silent refresh not possible or failed — signal reconnect needed.
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      setDriveStatus('error');
      throw new Error('Drive token expired. Please reconnect.');
    }

    // A10: injectable I/O seam for async race self-tests. Production always uses real fetch.
    // When set, ensureToken is skipped so tests never need GIS.
    let driveFetchImpl = null;
    function installDriveFetchMock(fn) {
      driveFetchImpl = typeof fn === 'function' ? fn : null;
    }
    function uninstallDriveFetchMock() {
      driveFetchImpl = null;
    }

    async function driveFetch(url, options = {}) {
      if (driveFetchImpl) {
        return driveFetchImpl(url, options);
      }
      const token = await ensureToken();
      const headers = { Authorization: `Bearer ${token}`, ...(options.headers || {}) };
      const { keepalive, ...fetchOptions } = options;
      const res = await fetch(url, { ...fetchOptions, headers, keepalive: !!keepalive });
      if (!res.ok) {
        const text = await res.text().catch(() => '');
        throw new Error(`Drive API error ${res.status}: ${text}`);
      }
      return res;
    }

    // Builds the multipart/related body used by the Drive upload API.
    function buildDriveMultipartBody(name, content) {
      const meta = JSON.stringify({ name, mimeType: 'text/plain' });
      return [
        '--inbox_boundary',
        'Content-Type: application/json; charset=UTF-8',
        '',
        meta,
        '--inbox_boundary',
        'Content-Type: text/plain; charset=UTF-8',
        '',
        content,
        '--inbox_boundary--',
      ].join('\r\n');
    }

    async function createDriveFile(fileName) {
      const res = await driveFetch(`${DRIVE_UPLOAD_API}/files?uploadType=multipart`, {
        method: 'POST',
        headers: { 'Content-Type': 'multipart/related; boundary=inbox_boundary' },
        body: buildDriveMultipartBody(fileName, ''),
      });
      return res.json();
    }

    async function fetchDriveFileLists(fileId, fallbackName, { forceRemote = false } = {}) {
      const metaRes = await driveFetch(`${DRIVE_API}/files/${fileId}?fields=modifiedTime`);
      const meta = await metaRes.json();
      const remoteModified = meta.modifiedTime ? Date.parse(meta.modifiedTime) : 0;
      const cacheEntry = state.persistedDriveFileCache[fileId];
      const cacheUpdated = cacheEntry?.lastUpdated || 0;
      const cachedRemoteMod = cacheEntry?.remoteModified || 0;
      const cachedLists = state.driveFileCache[fileId];

      // Prefer cache only if it reflects a remote version at least as new as current,
      // or the local-ahead heuristic for very recent pending saves. This avoids
      // clock-skew / "ahead" cache permanently hiding newer Drive versions.
      const cacheKnowsCurrentOrNewer = cachedRemoteMod >= remoteModified;
      const localAheadHeuristic = cacheUpdated > remoteModified && !cachedRemoteMod;
      if (!forceRemote && cachedLists && (cacheKnowsCurrentOrNewer || localAheadHeuristic)) {
        return { lists: cachedLists, modifiedTime: remoteModified, fromCache: true };
      }

      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      const parsed = text.trim() ? Sync.parseListFile(text) : null;
      const fileName = getDriveFileName(fileId, fallbackName);
      const lists = parsed || getEmptyDriveLists(fileName);
      cacheDriveFileLists(fileId, fileName, lists, Math.max(remoteModified, cacheUpdated), remoteModified);
      return { lists, modifiedTime: remoteModified, fromCache: false };
    }

    // Fetches a Drive file by ID, parses it, applies it to local state, and re-renders.
    async function loadAndApplyFileById(fileId, fallbackName) {
      const { lists } = await fetchDriveFileLists(fileId, fallbackName);
      Drive.applyDriveListsToState(lists);
      return lists;
    }

    async function findOrCreateDriveFile() {
      if (state.driveFileSwitching) {
        // During a transition prefer explicit fileIds passed by the caller.
        const current = getActiveDriveFileId();
        if (current) return current;
      }

      // Use the cached verified file ID to skip the redundant GET on repeated saves.
      if (state.verifiedDriveFileId && state.driveFiles[state.activeDriveFileIdx]?.id === state.verifiedDriveFileId) {
        return state.verifiedDriveFileId;
      }

      // Verify the active file is still accessible.
      if (state.driveFiles.length > 0 && state.activeDriveFileIdx < state.driveFiles.length) {
        const activeFile = state.driveFiles[state.activeDriveFileIdx];
        try {
          await driveFetch(`${DRIVE_API}/files/${activeFile.id}?fields=id`);
          state.verifiedDriveFileId = activeFile.id;
          return activeFile.id;
        } catch {
          state.verifiedDriveFileId = null;
          // File not accessible — fall through to search/create
        }
      }

      // Search for an existing inbox.list created by this app
      const q = encodeURIComponent(`name='${DRIVE_FILE_NAME}' and trashed=false`);
      const res = await driveFetch(`${DRIVE_API}/files?q=${q}&fields=files(id,name)&spaces=drive`);
      const data = await res.json();
      if (data.files && data.files.length > 0) {
        const fId = data.files[0].id;
        if (!state.driveFiles.some(f => f.id === fId)) {
          state.driveFiles.push({ id: fId, name: DRIVE_FILE_NAME });
          state.activeDriveFileIdx = state.driveFiles.length - 1;
          saveDriveFilesState();
          renderFileStrip();
        }
        state.verifiedDriveFileId = fId;
        return fId;
      }

      // Create a new empty file
      const created = await createDriveFile(DRIVE_FILE_NAME);
      state.driveFiles.push({ id: created.id, name: DRIVE_FILE_NAME });
      state.activeDriveFileIdx = state.driveFiles.length - 1;
      saveDriveFilesState();
      renderFileStrip();
      state.verifiedDriveFileId = created.id;
      return created.id;
    }

    async function loadFromDrive() {
      const fileId = await findOrCreateDriveFile();
      const metaRes = await driveFetch(`${DRIVE_API}/files/${fileId}?fields=modifiedTime`);
      const meta = await metaRes.json();
      const res = await driveFetch(`${DRIVE_API}/files/${fileId}?alt=media`);
      const text = await res.text();
      const lists = text.trim() ? Sync.parseListFile(text) : null;
      const modifiedTime = meta.modifiedTime ? Date.parse(meta.modifiedTime) : 0;
      return { lists, modifiedTime };
    }

    function getActiveDriveFileId() {
      return state.driveFiles[state.activeDriveFileIdx]?.id || null;
    }

    // ==================== DRIVE FILE TRANSITION PROTOCOL ====================
    // The four file management operations (switchDriveFile, removeDriveFile, addDriveFile,
    // createNewDriveFile) share a complex safe-transition dance whose goal is to prevent
    // cross-file clobbering, ghost resurrection on reconnect, and lost writes during rapid
    // navigation or offline periods.
    //
    // Core steps (owned by withFileTransition + executeDriveFileTransition):
    //   - Bump driveSwitchSeq + driveOpSeq for staleness detection.
    //   - Clear pending debounce + set driveFileSwitching flag (blocks normal flush/poll).
    //   - Capture revert snapshot (previous lists + active + verified) for error recovery.
    //   - Explicit flush of the *previous* file using its concrete ID (critical).
    //   - Optional immediate cache preview for perceived speed (defer real active change).
    //   - Force-fetch target, seq guard, sanitize+normalize+clamp, apply or merge.
    //   - Success path commits active/verified + render; error path reverts from snapshot.
    //   - finally: clear switching flag, run syncRecurrence/syncDue, render.
    //
    // Parallel guards also exist in flushPendingDriveSave (intendedFileId snapshot + opSeq check
    // + switching flag). structuralRemovePending provides a short bypass window for cross-file
    // source-side moves so that the "remove from source" is not undone by a later pull-merge.
    //
    // The original duplication was deliberate defense-in-depth. Extraction made the shared
    // protocol explicit in withFileTransition / executeDriveFileTransition while preserving
    // every guard, timing detail, and observable behavior.

    function startFileTransition() {
      const switchSeq = ++state.driveSwitchSeq;
      const opSeq = ++state.driveOpSeq;
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      state.driveFileSwitching = true;
      if (DEBUG) console.log('[Drive] file transition start', { seq: switchSeq, op: opSeq, from: getActiveDriveFileId() });
      return { switchSeq, opSeq };
    }

    function captureRevertSnapshot() {
      return {
        prevActiveIdx: state.activeDriveFileIdx,
        prevLists: JSON.parse(JSON.stringify(state.lists || [])),
        prevVerified: state.verifiedDriveFileId
      };
    }

    // The concrete helpers (startFileTransition, captureRevertSnapshot, withFileTransition,
    // executeDriveFileTransition) live just below. The four public Drive file ops delegate the
    // common dance to them and only supply the transition-specific pieces (target selection,
    // pre-work such as direct previous save for add/create, successor computation for remove, etc.).

    async function executeDriveFileTransition(options) {
      const {
        previousFile,
        previousContent = null,
        getTarget,           // () => { id, name, fallbackName, cachedLists? }
        preWork = null,      // async () => {}  (e.g. direct save of previous for add/create)
        onLeavePrevious = null, // (previousFile, previousContent) => {}
        computeSuccessor = null, // for remove: compute target after removal
        isRemoval = false,
        onSuccess = null,    // (target, appliedLists) => {}
      } = options;

      if (preWork) await preWork();

      const { switchSeq, opSeq } = startFileTransition();
      const revert = captureRevertSnapshot();

      let target = getTarget ? getTarget() : null;
      if (!target && computeSuccessor) {
        target = computeSuccessor();
      }

      try {
        if (onLeavePrevious && previousFile) {
          onLeavePrevious(previousFile, previousContent);
        }

        let didPreview = false;
        let targetLists = null;

        const targetId = target?.id;
        const fallbackName = target?.fallbackName || stripListExtension(target?.name || '');
        const cached = target?.cachedLists || (targetId ? state.driveFileCache[targetId] : null);

        if (cached) {
          targetLists = Sync.sanitizeLists(JSON.parse(JSON.stringify(cached))) || [];
          Sync.normalizeListsInPlace(targetLists);
          state.currentIndex = 0;
          clampCurrentIndex();
          if (DEBUG) assertValidSanitized(targetLists, 'post-transition-preview');
          saveLocalData();
          renderListsView();
          didPreview = true;
        }

        if (!targetId) {
          // e.g. last file removed
          if (isRemoval) {
            renderFileStrip();
          }
          return;
        }

        const { lists: fetched } = await fetchDriveFileLists(targetId, fallbackName, { forceRemote: true });

        if (state.driveSwitchSeq !== switchSeq || state.driveOpSeq !== opSeq) {
          if (didPreview) {
            state.lists = Sync.sanitizeLists(revert.prevLists) || revert.prevLists;
            Sync.normalizeListsInPlace(state.lists);
            state.currentIndex = 0;
            clampCurrentIndex();
            if (DEBUG) assertValidSanitized(state.lists, 'post-stale-revert');
            renderListsView();
          }
          return;
        }

        const remoteSig = getDriveListsSignature(fetched);
        const currentSig = getDriveListsSignature(state.lists);

        if (!cached || remoteSig !== currentSig) {
          if (cached) {
            const merged = Sync.mergeRemoteIntoLocal(state.lists, fetched);
            state.lists = merged;
            Sync.normalizeListsInPlace(state.lists);
            if (DEBUG) { assertValidSanitized(state.lists, 'post-transition-merge'); assertNoDupTsAcrossLists(state.lists, 'post-transition-merge'); }
          } else {
            state.lists = Sync.sanitizeLists(fetched) || [];
            Sync.normalizeListsInPlace(state.lists);
          }
          state.currentIndex = 0;
          clampCurrentIndex();
          saveLocalData();

          if (onSuccess) onSuccess(target, state.lists);

          state.activeDriveFileIdx = target.idx ?? state.activeDriveFileIdx;
          state.verifiedDriveFileId = null;
          saveDriveFilesState();
          renderFileStrip();
          renderListsView();
        } else if (didPreview) {
          state.activeDriveFileIdx = target.idx ?? state.activeDriveFileIdx;
          state.verifiedDriveFileId = null;
          saveDriveFilesState();
          renderFileStrip();
        }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] transition failed', err);
        setDriveStatus('error');
        state.lists = Sync.sanitizeLists(revert.prevLists) || revert.prevLists;
        Sync.normalizeListsInPlace(state.lists);
        state.activeDriveFileIdx = revert.prevActiveIdx;
        state.verifiedDriveFileId = revert.prevVerified;
        state.currentIndex = 0;
        clampCurrentIndex();
        if (DEBUG) assertValidSanitized(state.lists, 'post-transition-error');
        renderListsView();
        renderFileStrip();
      } finally {
        if (state.driveSwitchSeq === (options.switchSeq || state.driveSwitchSeq)) {  // safety
          state.driveFileSwitching = false;
          syncRecurrenceState();
          syncDueState();
          render();
        }
      }
    }

    Drive.Transition = { execute: executeDriveFileTransition };

    // Higher-order helper for the common safe transition protocol (B high-effort).
    // Reduces duplication across switch/remove/add/create while keeping every guard.
    async function withFileTransition(fn) {
      const { switchSeq, opSeq } = startFileTransition();
      const revert = captureRevertSnapshot();

      try {
        return await fn({ switchSeq, opSeq, revert });
      } catch (err) {
        if (DEBUG) console.warn('[Drive] transition failed', err);
        setDriveStatus('error');
        state.lists = Sync.sanitizeLists(revert.prevLists) || revert.prevLists;
        Sync.normalizeListsInPlace(state.lists);
        state.activeDriveFileIdx = revert.prevActiveIdx;
        state.verifiedDriveFileId = revert.prevVerified;
        state.currentIndex = 0;
        clampCurrentIndex();
        if (DEBUG) assertValidSanitized(state.lists, 'post-transition-error');
        renderListsView();
        renderFileStrip();
        throw err;
      } finally {
        if (state.driveSwitchSeq === switchSeq) {
          state.driveFileSwitching = false;
          syncRecurrenceState();
          syncDueState();
          render();
        }
      }
    }

    // Lightweight coordinator object for Drive multi-file + transition state (seqs, switching, snapshots).
    // Goal: begin pulling coordination concerns out of the flat `state` bag and the
    // individual transition functions. Keeps everything inside the single IIFE.
    // Over time this can grow to own more of the seq/switching/cache/pending logic.
    const DriveFileCoordinator = {
      startTransition: startFileTransition,
      captureRevertSnapshot,
      getActiveId: getActiveDriveFileId,
      // Accessors (read-only for now) to reduce direct state drilling in future
      isSwitching() { return state.driveFileSwitching; },
      getActiveFile() { return state.driveFiles[state.activeDriveFileIdx] || null; },
    };

    // Expose on Drive namespace for discoverability (consistent with prior B loops)
    Drive.Coordinator = DriveFileCoordinator;

    async function saveToDrive(content, { fileId = null, keepalive = false } = {}) {
      if (!state.driveConnected) return;
      // Skip immediately if offline; the 'online' event listener will flush later.
      // Network failures that slip past this check are caught by the try/catch below.
      if (!navigator.onLine) { return; }
      try {
        // Bind the target file up front so an in-flight save cannot land on a
        // different file if the user switches tabs while the request is pending.
        const targetId = fileId || await findOrCreateDriveFile();
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${targetId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
          keepalive,
        });
        localStorage.setItem(LAST_DRIVE_UPLOAD_KEY, String(Date.now()));
        setDriveStatus('connected');

        // Immediately record the authoritative server modifiedTime so cross-device
        // heuristics and "is remote newer?" decisions are accurate (helps prevent stale overwrites).
        try {
          const metaRes = await driveFetch(`${DRIVE_API}/files/${targetId}?fields=modifiedTime`);
          const meta = await metaRes.json();
          const newRemoteMod = meta.modifiedTime ? Date.parse(meta.modifiedTime) : Date.now();
          const active = state.driveFiles[state.activeDriveFileIdx];
          if (active && active.id === targetId) {
            cacheDriveFileLists(active.id, active.name, state.lists, Date.now(), newRemoteMod);
          }
        } catch (_) { /* non-fatal */ }
      } catch (err) {
        if (DEBUG) console.warn('[Drive] save failed', err);
        setDriveStatus('error');
      }
    }

    // Saves content to a specific Drive file by ID (used for cross-file item moves).
    async function saveToDriveFile(fileId, content, { setStatusOnSuccess = false, throwOnError = false } = {}) {
      if (!state.driveConnected || !navigator.onLine) return;
      try {
        await driveFetch(`${DRIVE_UPLOAD_API}/files/${fileId}?uploadType=media`, {
          method: 'PATCH',
          headers: { 'Content-Type': 'text/plain; charset=UTF-8' },
          body: content,
        });
        if (setStatusOnSuccess) setDriveStatus('connected');
      } catch (err) {
        if (DEBUG) console.warn('[Drive] saveToDriveFile failed', err);
        if (throwOnError) throw err;
      }
    }

    function flushDriveFileInBackground(fileId, content) {
      if (!fileId || !state.driveConnected || !navigator.onLine) return;
      const seq = (state.driveFileSaveSeq[fileId] || 0) + 1;
      state.driveFileSaveSeq[fileId] = seq;
      const previousSavePromise = state.driveFileSaveChains[fileId] || Promise.resolve();
      const chain = previousSavePromise
        .catch((err) => {
          if (DEBUG) console.warn('[Drive] Prior background save failed', err);
        })
        .then(async () => {
          if (state.driveFileSaveSeq[fileId] !== seq) return;
          await saveToDriveFile(fileId, content, { setStatusOnSuccess: true, throwOnError: true });
        });
      state.driveFileSaveChains[fileId] = chain.catch((err) => {
        if (DEBUG) console.warn('[Drive] background file save failed', err);
        setDriveStatus('error');
      });
    }

    // Silently load the Drive file and apply it to the local state.
    // Called after every successful auto-reconnect so the app always starts
    // with the latest saved data rather than whatever is in localStorage.
    function markDriveSyncReady() {
      state.driveSyncReady = true;
    }

    async function loadAndApplyDriveData() {
      if (state.driveFileSwitching) return;
      const opSeq = ++state.driveOpSeq;
      try {
        const activeFile = state.driveFiles[state.activeDriveFileIdx];
        if (!activeFile) {
          markDriveSyncReady();
          return;
        }
        const targetFileId = activeFile.id; // bind ID early
        // Use the cache-aware fetch first (respects remote modifiedTime to avoid unnecessary downloads
        // and to protect recent local edits). Force a remote check for sync pulls so we see other devices' changes.
        const { lists: fetched, modifiedTime: remoteModified, fromCache } = await fetchDriveFileLists(
          targetFileId, activeFile.name, { forceRemote: true }
        );
        {
          // A13: use live connection flag (not hardcoded true) — same pure helper as flush.
          const stale = shouldAbortFlushAfterAwait({
            driveConnected: state.driveConnected,
            driveFileSwitching: state.driveFileSwitching,
            online: true,
            activeFileId: getActiveDriveFileId(),
            intendedFileId: targetFileId,
            driveOpSeq: state.driveOpSeq,
            flushOpSeq: opSeq,
          });
          if (stale.abort) return; // ignore stale/overlapped load
        }
        const remote = fetched || [];
        const localSig = getDriveListsSignature(state.lists);
        const remoteSig = getDriveListsSignature(remote);
        if (localSig === remoteSig) {
          cacheDriveFileLists(targetFileId, activeFile.name, state.lists, Date.now(), remoteModified);
          if (DEBUG) console.log('[Drive] loadAndApply no change, sig match');
          markDriveSyncReady();
          preloadDriveFiles();
          return;
        }

        // A13: shared post-fetch gates (same pure helpers as flush / merge branches).
        // Bypass paths previously skipped these and regenerated content from live state.lists
        // after await — a concurrent file switch could cache/write the *new* file's lists to
        // the bound targetFileId. Snapshot content only when gate+commit allow.
        const postFetchGate = () => shouldAbortFlushAfterAwait({
          driveConnected: state.driveConnected,
          driveFileSwitching: state.driveFileSwitching,
          online: true,
          activeFileId: getActiveDriveFileId(),
          intendedFileId: targetFileId,
          driveOpSeq: state.driveOpSeq,
          flushOpSeq: opSeq,
        });
        const canCommitSave = () => shouldCommitFlushSave({
          activeFileId: getActiveDriveFileId(),
          intendedFileId: targetFileId,
          driveFileSwitching: state.driveFileSwitching,
        });
        // Structural bypass: keep local snapshot, write to bound id, clear flag only after save.
        // Returns false if aborted (structural flag left intact for flush/poll).
        async function writeStructuralBypassSnapshot(where) {
          const gate = postFetchGate();
          if (gate.abort) {
            if (DEBUG) console.log('[Drive] loadAndApply bypass ABORT', where, gate.reason);
            return false;
          }
          if (!canCommitSave()) {
            if (DEBUG) console.log('[Drive] loadAndApply bypass commit blocked', where);
            return false;
          }
          Sync.normalizeListsInPlace(state.lists);
          // Snapshot under gate so state.lists cannot be swapped to another file mid-write.
          const content = Sync.generateListFile(state.lists);
          const listsSnap = JSON.parse(JSON.stringify(state.lists));
          cacheDriveFileLists(targetFileId, activeFile.name, listsSnap, Date.now(), remoteModified);
          markDriveSyncReady();
          await saveToDrive(content, { fileId: targetFileId });
          // A12: clear only after save so concurrent polls cannot merge-revert mid-write.
          clearStructuralRemovePending(targetFileId);
          return true;
        }

        const hasPendingUpload = !!state.saveDataDriveTimer;
        if (hasPendingUpload) {
          // PR4: pending local + detected remote: merge (pull already performed by this load), adopt silent if diff,
          // save the reconciled. (read-merge-write benefit; prefers safety over raw local push)
          clearTimeout(state.saveDataDriveTimer);
          state.saveDataDriveTimer = null;
          const bypassStruc = getStructuralBypassForFile(targetFileId).active;
          if (bypassStruc) {
            if (DEBUG) console.log('[Drive] loadAndApply: bypassing merge for recent structural (protect list reorder / cross remove)');
            await writeStructuralBypassSnapshot('pending');
          } else {
            const merged = Sync.mergeRemoteIntoLocal(state.lists, remote);
            const gate = postFetchGate();
            if (gate.abort) {
              if (DEBUG) console.log('[Drive] loadAndApply merge ABORT pending', gate.reason);
              return;
            }
            if (getDriveListsSignature(merged) !== getDriveListsSignature(state.lists)) {
              Drive.applyDriveListsPreservingCurrent(merged, { persist: false, renderNow: false });
              Sync.normalizeListsInPlace(state.lists);
              render();
            }
            cacheDriveFileLists(targetFileId, activeFile.name, merged, Date.now(), remoteModified);
            markDriveSyncReady();
            Sync.normalizeListsInPlace(merged);
            if (DEBUG) assertValidSanitized(merged, 'post-flush-merge');
            // A13: final commit gate before write (aligned with flush shouldCommitFlushSave).
            if (canCommitSave()) {
              await saveToDrive(Sync.generateListFile(merged), { fileId: targetFileId });
            } else if (DEBUG) {
              console.log('[Drive] loadAndApply: skip merge save (commit blocked)');
            }
          }
        } else {
          // No pending local write — merge to adopt remote changes (incl. checks from other devices)
          // while preferring the "newer" checkedAt per item and keeping device-local-only items.
          // Check structural bypass: a recent reorder/cross-file move may still be in-flight
          // (saveToDrive not yet completed). If so, keep local ordering to prevent jump-back.
          const bypassStrucC = getStructuralBypassForFile(targetFileId).active;
          if (bypassStrucC) {
            if (DEBUG) console.log('[Drive] loadAndApply (no pending): bypassing merge for recent structural (protect ordering)');
            await writeStructuralBypassSnapshot('no-pending');
          } else {
            const merged = Sync.mergeRemoteIntoLocal(state.lists, remote);
            const gate = postFetchGate();
            if (gate.abort) {
              if (DEBUG) console.log('[Drive] loadAndApply merge ABORT no-pending', gate.reason);
              return;
            }
            cacheDriveFileLists(targetFileId, activeFile.name, merged, Date.now(), remoteModified);
            markDriveSyncReady();
            applyDriveListsPreservingCurrent(merged);
          }
        }
        preloadDriveFiles();
      } catch (err) {
        if (DEBUG) console.warn('[Drive] auto-load on reconnect failed', err);
      } finally {
        markDriveSyncReady();
      }
    }

    // Attempt to restore the connected state from a persisted token on startup.
    // Called automatically via onGoogleLibraryLoad when the GIS script is ready.
    async function autoReconnectDrive() {
      if (!localStorage.getItem('driveWasConnected')) return;
      // Try to restore a still-valid token from localStorage — no GIS call needed.
      const storedToken = localStorage.getItem('driveToken');
      // Fallback of 0 means epoch (already expired), so the check below fails safely.
      const storedExpiry = Number(localStorage.getItem('driveTokenExpiry') || 0);
      if (storedToken && Date.now() < storedExpiry) {
        state.driveToken = storedToken;
        state.driveTokenExpiry = storedExpiry;
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Restored from persisted token.');
        await loadAndApplyDriveData();
        startDrivePolling();
        return;
      }
      // Token expired — attempt a silent GIS refresh with no user interaction (prompt: 'none').
      // This works when the user has an active Google session that previously granted access,
      // keeping them connected across browser restarts and app re-opens without any popup.
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      await silentReconnectDrive();
    }

    // Silently requests a new access token via GIS without showing any UI.
    // On success, restores the connected state and syncs data.
    // On failure (e.g. session expired, consent revoked), signals the error state
    // so the user can tap the Drive button to reconnect manually.
    async function silentReconnectDrive() {
      const hint = localStorage.getItem('driveUserHint') || '';
      try {
        initTokenClient();
        await requestToken('none', hint);
        setDriveStatus('connected');
        if (DEBUG) console.log('[Drive] Silent re-auth succeeded.');
        await loadAndApplyDriveData();
        startDrivePolling();
      } catch (err) {
        setDriveStatus('error');
        markDriveSyncReady();
        if (DEBUG) console.log('[Drive] Silent re-auth failed — tap Drive button to reconnect.', err);
      }
    }

    // The GIS library calls window.onGoogleLibraryLoad once it is ready.
    // Set this before the <script> tag executes so the callback is in place.
    window.onGoogleLibraryLoad = autoReconnectDrive;

    // Belt-and-suspenders: if the GIS client loaded earlier (race with head async script vs
    // body-end inline), invoke the reconnect hook ourselves so Drive hydrate isn't skipped
    // and we don't get stuck showing/editing only the local cache.
    if (typeof google !== 'undefined' && google.accounts && google.accounts.oauth2) {
      setTimeout(() => { try { autoReconnectDrive(); } catch (_) {} }, 0);
    }

    async function connectDrive() {
      try {
        initTokenClient();
        const emailHint = await showPrompt('Enter the Google account email to connect\n(leave blank for automatic selection):');
        if (emailHint === null) return; // user cancelled
        await requestToken('select_account', emailHint.trim() || undefined);
        // Mark as connected so saveToDrive is allowed to proceed
        localStorage.setItem('driveWasConnected', '1');
        try {
          await loadDriveUser();
          // Store the email as a hint to enable silent re-auth on future visits.
          const email = state.driveUser && state.driveUser.emailAddress;
          if (email) localStorage.setItem('driveUserHint', email);
        } catch (err) {
          state.driveUserLoadFailed = true;
          if (DEBUG) console.warn('[Drive] load user on connect failed', err);
        }
        setDriveStatus('connected');
        // Load file and offer merge/replace if remote data exists.
        // Capture the active file ID early (connect may populate driveFiles inside loadFromDrive/findOrCreate).
        const connectActiveId = getActiveDriveFileId();
        let remote = null;
        try {
          ({ lists: remote } = await loadFromDrive());
        } catch (err) {
          if (DEBUG) console.warn('[Drive] load on connect failed', err);
        }

        if (remote && remote.length > 0) {
          const choice = await showConfirm(
            'Found existing inbox.list on Drive.\n\nOK = Use Drive data (replaces local)\nCancel = Keep local data (overwrites Drive)'
          );
          if (choice) {
            // Pure assign on explicit user choice "use Drive" (PR4 doc; replaces local per user intent)
            // sanitize for consistency (PR4 review)
            state.lists = Sync.sanitizeLists(remote) || [];
            Sync.normalizeListsInPlace(state.lists);
            if (DEBUG) assertValidSanitized(state.lists, 'post-remote-apply');
            clampCurrentIndex(); // defensive: ghosts from Drive choice
            if (DEBUG) assertValidSanitized(state.lists, 'post-connect-choice');
            saveData();
            render();
          } else {
            // Push local data to Drive (PR4: explicit connect path, direct generate ok)
            await saveToDrive(Sync.generateListFile(), { fileId: connectActiveId });
          }
        } else {
          // No remote data — push local (PR4 doc)
          await saveToDrive(Sync.generateListFile(), { fileId: connectActiveId });
        }
        markDriveSyncReady();
        startDrivePolling();
      } catch (err) {
        if (DEBUG) console.warn('[Drive] connect failed', err);
        setDriveStatus('error');
        markDriveSyncReady();
      }
    }

    function disconnectDrive() {
      clearTimeout(state.saveDataDriveTimer);
      state.saveDataDriveTimer = null;
      if (state.driveToken) {
        google.accounts.oauth2.revoke(state.driveToken, () => {});
      }
      state.driveToken = null;
      state.driveTokenExpiry = 0;
      state.driveFiles = [];
      state.activeDriveFileIdx = 0;
      state.verifiedDriveFileId = null;
      state.driveUser = null;
      state.driveUserLoadFailed = false;
      localStorage.removeItem('driveToken');
      localStorage.removeItem('driveTokenExpiry');
      localStorage.removeItem('driveWasConnected');
      localStorage.removeItem('driveUserHint');
      localStorage.removeItem('driveFiles');
      localStorage.removeItem('activeDriveFileIdx');
      clearPersistedDriveFileCache();
      setDriveStatus('disconnected');
    }

    // ==================== DRIVE FLUSH CONCURRENCY GUARDS (R1 — pure, testable) ====================
    // Failure mode: rapid file switch while a debounced/pulling flush is in flight can write
    // file A's snapshot to file B's id (or clobber the wrong .list). Guards after every await
    // and before final save are the safety net. Pure helpers make the matrix unit-testable without Drive.

    /** True when flush must not start (no connection, mid-transition, or no active file). */
    function shouldSkipFlushStart({ driveConnected, driveFileSwitching, activeFileId }) {
      return !driveConnected || !!driveFileSwitching || !activeFileId;
    }

    /**
     * Post-await abort decision for flush (and similar loadAndApply pulls).
     * Returns { abort, reason }. Any concurrent switch/opSeq bump/file change → abort.
     */
    function shouldAbortFlushAfterAwait({
      driveConnected,
      driveFileSwitching,
      online,
      activeFileId,
      intendedFileId,
      driveOpSeq,
      flushOpSeq,
    }) {
      if (!driveConnected) return { abort: true, reason: 'disconnected' };
      if (driveFileSwitching) return { abort: true, reason: 'switching' };
      if (!online) return { abort: true, reason: 'offline' };
      if (!intendedFileId || activeFileId !== intendedFileId) return { abort: true, reason: 'file-mismatch' };
      if (driveOpSeq !== flushOpSeq) return { abort: true, reason: 'stale-op' };
      return { abort: false, reason: null };
    }

    /** Final write gate: active file still the intended one and not mid-transition. */
    function shouldCommitFlushSave({ activeFileId, intendedFileId, driveFileSwitching }) {
      return !!(intendedFileId && activeFileId === intendedFileId && !driveFileSwitching);
    }
