<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="favicon.ico">
  <title>Inbox</title>
  <meta name="description" content="Quick notes and lists. Mobile-first, calm, minimal.">
  <!-- CSP: restricts resource loading to self + Google APIs needed for GIS/Drive.
       'unsafe-inline' is required because this is a self-contained single-file app with
       no build step; moving all scripts/styles to separate files would allow removing it. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://accounts.google.com; connect-src 'self' https://www.googleapis.com https://accounts.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; frame-ancestors 'none'">
  <style>
    /* Custom properties */
    :root {
      --bg: #f8f8f8;
      --text: #1a1a1a;
      --muted: #666666;
      --border: #e0e0e0;
      --accent: #222222;
      --bottom-bar-height: 90px;
      --top-bar-height: 44px;
      --pill-height: 28px;
    }

    /* Base */
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 0;
      line-height: 1.5;
    }

    .header-btn {
      font-size: 15px; padding: 8px 14px; border: 1px solid var(--accent);
      background: transparent; color: var(--accent); cursor: pointer;
    }
    .header-icon-btn { width: 36px; height: 36px; padding: 0; display: flex; align-items: center; justify-content: center; }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0;
    }

    /* Tabs */
    .tabs {
      position: fixed; top: var(--top-bar-height); left: 0; right: 0;
      background: white; border-bottom: 1px solid var(--border);
      z-index: 90; overflow-x: auto;
    }
    .tabs-inner { display: flex; padding: 0 8px; min-height: 48px; align-items: center; gap: 4px; }
    .tab { padding: 10px 16px; font-size: 15px; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
    .tab.active { font-weight: 600; border-bottom-color: var(--accent); }
    .tab-add { padding: 10px 14px; font-size: 18px; color: var(--muted); cursor: pointer; }
    .tab-group { display: flex; align-items: center; border: 2px solid gold; }
    .tab-action-btn {
      border: none; background: none; font-family: inherit; line-height: inherit;
      padding: 4px 5px; font-size: 15px; color: var(--muted); cursor: pointer;
      display: flex; align-items: center;
    }
    .tab-action-btn:hover { color: var(--text); }

    /* Main & items */
    .main { padding-top: calc(var(--top-bar-height) + 48px); padding-bottom: var(--bottom-bar-height); min-height: 72vh; }
    .items { padding: 0 8px; }
    .items ul { list-style: none; margin: 0; padding: 0; }
    .item {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 12px; border-bottom: 1px solid var(--border);
      user-select: none; touch-action: manipulation; -webkit-touch-callout: none;
    }
    .item:active { background: #f0f0f0; }
    .checkbox {
      width: 22px; height: 22px; border: 2px solid var(--accent); flex-shrink: 0;
      cursor: pointer; padding: 0; background: transparent;
    }
    .checkbox.checked { background: var(--accent); border-color: var(--accent); }
    .item-text { flex: 1; font-size: 15px; color: var(--text); }
    .item-text.checked { text-decoration: line-through; color: var(--muted); }
    .item-edit-input { flex: 1; font-size: 17px; font-family: inherit; border: none; border-bottom: 2px solid var(--accent); background: transparent; color: var(--text); padding: 0; outline: none; }
    .delete-btn { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; font-size: 20px; color: var(--muted); cursor: pointer; }

    .empty-state { padding: 40px 16px; text-align: center; color: var(--muted); font-size: 15px; }

    /* Collapsible item sections (Recurrent, Finished) */
    .finished-section { border-top: 1px solid var(--border); margin-top: 4px; }
    .finished-group-header {
      padding: 8px 12px 4px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; list-style: none;
    }
    .finished-toggle {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 12px; font-size: 15px; color: var(--muted);
      cursor: pointer; border: none; background: none; font-family: inherit;
      width: 100%; text-align: left;
    }
    .finished-toggle:hover { color: var(--text); }
    .finished-toggle-arrow { font-size: 11px; display: inline-block; transition: transform 0.15s; }
    .finished-toggle-arrow.open { transform: rotate(90deg); }
    .finished-items { display: none; }
    .finished-items.open { display: block; }
    .finished-item { opacity: 0.65; }
    .finished-clear {
      margin-left: auto;
      font-size: 10px;
      padding: 1px 5px;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--muted);
      background: transparent;
      cursor: pointer;
      line-height: 1;
      white-space: nowrap;
    }
    .finished-toggle:hover .finished-clear { color: var(--text); }
    .finished-clear:hover { border-color: var(--accent); color: var(--accent); }
    .finished-label { flex: 1 1 auto; }
    .recurrence-hint, .due-hint {
      flex-shrink: 0; margin-left: auto; padding-left: 8px;
      font-size: 13px; color: var(--muted); text-align: right;
      max-width: 50%; line-height: 1.3;
    }
    .hint-overdue { color: #c93400; font-weight: 500; }
    .item-overdue .item-text:not(.checked) { color: #c93400; }
    body.dark .hint-overdue { color: #ff9f0a; }
    body.dark .item-overdue .item-text:not(.checked) { color: #ff9f0a; }

    /* Bottom bar */
    .bottom-bar {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: white; border-top: 1px solid var(--border);
      padding: 10px 10px 8px; z-index: 100; display: flex; flex-direction: column; gap: 6px;
    }
    .add-row { display: flex; align-items: center; gap: 6px; }
    #add-input { flex: 1; min-width: 0; padding: 11px 13px; font-size: 16px; border: 2px solid var(--accent); outline: none; }
    #add-btn { padding: 11px 18px; background: var(--muted); color: white; border: none; font-weight: 600; cursor: pointer; white-space: nowrap; }

    /* Modal */
    .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: none; align-items: flex-end; }
    .modal.open { display: flex; }
    .modal-content { background: white; width: 100%; padding: 20px 16px 24px; box-sizing: border-box; }
    .modal-header { display: flex; justify-content: space-between; margin-bottom: 16px; }
    #list-textarea { width: 100%; height: 220px; font-family: monospace; font-size: 13px; padding: 12px; border: 1px solid #ddd; box-sizing: border-box; }
    .modal-footer { display: flex; gap: 8px; margin-top: 16px; }
    .modal-footer .header-btn { flex: 1; }
    /* Use CSS variables so #done-btn adapts to dark mode automatically */
    #done-btn, .modal-ok-btn { background: var(--accent); color: var(--bg); border-color: var(--accent); }
    /* Modal element-specific styles */
    .modal-message { margin: 0 0 16px; white-space: pre-wrap; }
    .settings-panel { display: flex; flex-direction: column; gap: 22px; max-height: 62vh; overflow-y: auto; margin-bottom: 4px; }
    .settings-block-label {
      margin: 0 0 8px; font-size: 11px; font-weight: 600;
      color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em;
    }
    .settings-line { margin: 0; font-size: 15px; line-height: 1.45; color: var(--text); }
    .settings-hint { margin: 6px 0 0; font-size: 13px; line-height: 1.5; color: var(--muted); }
    .settings-text-btn {
      border: none; background: none; padding: 0; font: inherit; font-size: 15px;
      color: var(--text); text-decoration: underline; cursor: pointer; text-align: left;
    }
    .settings-text-btn:hover { color: var(--muted); }
    .settings-legal {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
    }
    .settings-legal-sep {
      color: var(--border);
      margin: 0 2px;
    }
    .settings-legal .settings-text-btn {
      font-size: 13px;
      text-decoration: none;
    }
    .settings-legal .settings-text-btn:hover {
      text-decoration: underline;
    }
    .settings-theme-btn {
      width: var(--pill-height); height: var(--pill-height); box-sizing: border-box;
      border: 1px solid var(--border); background: transparent; color: var(--text);
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; cursor: pointer; font-family: inherit;
    }
    .settings-theme-btn:hover { border-color: var(--accent); }
    .settings-theme-btn svg { display: block; }
    .settings-theme-btn .theme-icon-sun { display: none; }
    body.dark .settings-theme-btn .theme-icon-moon { display: none; }
    body.dark .settings-theme-btn .theme-icon-sun { display: block; }
    .settings-chip-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .settings-chip {
      font-size: 12px; line-height: 1.3; padding: 5px 9px;
      background: #f0f0f0; color: var(--muted); border-radius: 2px;
    }
    body.dark .settings-chip { background: #2a2a2a; }
    .settings-sub { margin: 14px 0 0; }
    .settings-sub:first-of-type { margin-top: 10px; }
    .settings-sub-label { margin: 0 0 6px; font-size: 12px; color: var(--text); }
    #settings-help > .settings-hint:first-child { margin-top: 0; }
    .settings-footer { display: flex; gap: 8px; margin-top: 4px; }
    .settings-footer .header-btn { flex: 1; }
    #alert-modal-ok { flex: 1; }
    #file-picker-title { margin: 0; }
    #file-picker-list { max-height: 280px; overflow-y: auto; margin-top: 8px; }
    #prompt-modal-label { display: block; margin-bottom: 8px; font-weight: 600; }
    #prompt-modal-input { width: 100%; padding: 12px; font-size: 17px; border: 2px solid var(--accent); box-sizing: border-box; background: transparent; color: var(--text); }

    /* Move mode */


    /* Drag */
    .item.dragging { opacity: 0.4; background: #f0f0f0; }
    .item.drop-before { border-top: 4px solid #007aff; }
    .item.drop-after { border-bottom: 4px solid #007aff; }
    .item.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.drag-over { background: #fff8e1; border-bottom-color: #ffd700; }
    .tab.tab-dragging { opacity: 0.4; }
    .tab.long-press-active { background: rgba(0, 122, 255, 0.09); transition: background 0.15s; }
    .tab.tab-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .tab.tab-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .file-pill.pill-drag-over { border-color: var(--accent); background: rgba(0, 122, 255, 0.08); }
    .file-pill.pill-drop-before { box-shadow: -3px 0 0 0 #007aff; }
    .file-pill.pill-drop-after { box-shadow: 3px 0 0 0 #007aff; }
    .file-pill.pill-dragging { opacity: 0.4; }
    .drag-ghost {
      position: fixed; pointer-events: none; z-index: 9999;
      background: white; border: 2px solid var(--accent); border-radius: 8px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.25); padding: 16px 12px;
      display: flex; align-items: center; gap: 14px; width: 280px; max-width: 80vw;
      font-size: 17px; opacity: 0.42;
    }

    button.checkbox, button.tab, button.tab-add, button.delete-btn {
      font-family: inherit; line-height: inherit;
    }
    button.tab { border: none; border-bottom: 3px solid transparent; background: none; font-size: inherit; color: inherit; }
    button.tab-add, button.delete-btn { border: none; background: none; }
    button.checkbox { background: none; }

    /* Top bar (files · brand · actions) */
    .file-strip {
      position: fixed; top: 0; left: 0; right: 0; height: var(--top-bar-height);
      background: white; border-bottom: 1px solid var(--border);
      z-index: 100;
      display: grid; grid-template-columns: minmax(0, 1fr) auto minmax(0, 1fr);
      align-items: center; padding: 0 8px; gap: 8px;
    }
    .file-strip-files {
      grid-column: 1; justify-self: start; width: 100%; min-width: 0;
      display: flex; align-items: center; gap: 6px; overflow-x: auto;
    }
    .file-strip-brand {
      grid-column: 2; justify-self: center;
      font-size: 17px; font-weight: 600; white-space: nowrap; pointer-events: none;
    }
    .file-strip-actions {
      grid-column: 3; justify-self: end;
      display: flex; gap: 4px; align-items: center;
    }
    .file-strip.has-pills {
      grid-template-columns: minmax(0, 1fr) auto;
    }
    .file-strip.has-pills .file-strip-brand { display: none; }
    .file-strip.has-pills .file-strip-actions { grid-column: 2; }

    .top-bar-btn {
      width: var(--pill-height); height: var(--pill-height); box-sizing: border-box;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      display: inline-flex; align-items: center; justify-content: center;
      padding: 0; cursor: pointer; flex-shrink: 0; font-family: inherit;
    }
    .top-bar-btn:hover { color: var(--text); border-color: var(--accent); }
    .top-bar-btn svg { display: block; }
    .top-bar-status { position: relative; }
    .top-bar-status::before {
      content: ""; width: 10px; height: 10px; border-radius: 999px;
      background: #ff3b30; box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.08);
    }
    .top-bar-status.connected::before { background: #34c759; }
    .file-pill {
      display: inline-flex; align-items: center; gap: 3px;
      height: var(--pill-height); box-sizing: border-box; padding: 0 10px; font-size: 13px;
      border: 1px solid var(--border); background: transparent; color: var(--muted);
      white-space: nowrap; flex-shrink: 0;
    }
    .file-pill.active { border-color: var(--accent); color: var(--text); font-weight: 600; }
    .file-pill-name { cursor: pointer; font-family: inherit; font-size: 13px; background: none; border: none; padding: 0; color: inherit; }
    .file-pill-remove {
      font-size: 13px; line-height: 1; color: var(--muted);
      background: none; border: none; cursor: pointer; padding: 0 0 0 3px;
      font-family: inherit;
    }
    .file-pill-remove:hover { color: var(--text); }
    .file-strip-add {
      display: inline-flex; align-items: center;
      height: var(--pill-height); box-sizing: border-box; padding: 0 10px; font-size: 13px;
      border: 1px dashed var(--muted); background: transparent; color: var(--muted);
      white-space: nowrap; cursor: pointer; flex-shrink: 0;
      font-family: inherit;
    }
    .file-strip-add:hover { color: var(--text); border-color: var(--text); }
    /* File picker list row */
    .file-picker-row {
      display: block; width: 100%; text-align: left;
      padding: 12px 16px; border: none; border-bottom: 1px solid var(--border);
      background: none; font-family: inherit; font-size: 15px;
      cursor: pointer; color: var(--text); box-sizing: border-box;
    }
    .file-picker-row:disabled { color: var(--muted); cursor: default; }
    .file-picker-empty {
      padding: 12px 16px; color: var(--muted); font-size: 14px; margin: 0;
    }
    .file-picker-create { color: var(--muted); }

    /* Dark mode */
    body.dark {
      --bg: #0f0f0f;
      --text: #e5e5e5;
      --muted: #777777;
      --border: #2a2a2a;
      --accent: #e5e5e5;
    }
    body.dark .tabs,
    body.dark .bottom-bar {
      background: #1a1a1a;
      border-color: var(--border);
    }
    body.dark .item:active { background: #222222; }
    body.dark .item.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark #add-input {
      background: #222222;
      border-color: #444444;
      color: var(--text);
    }
    body.dark .empty-state { color: var(--muted); }
    body.dark .modal-content { background: #1a1a1a; color: var(--text); }
    body.dark .drag-ghost { background: #1a1a1a; color: #e5e5e5; }
    body.dark .tab.drag-over { background: #3a3a3a; border-bottom-color: #c0c0c0; }
    body.dark .tab.long-press-active { background: rgba(255, 255, 255, 0.08); }
    body.dark .tab.tab-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .tab.tab-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }
    body.dark .tab-group { border-color: silver; }
    body.dark .file-pill.pill-drop-before { box-shadow: -3px 0 0 0 #c0c0c0; }
    body.dark .file-pill.pill-drop-after { box-shadow: 3px 0 0 0 #c0c0c0; }
    body.dark .top-bar-status::before { background: #ff453a; box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08); }
    body.dark .top-bar-status.connected::before { background: #30d158; }
    body.dark .file-strip { background: #1a1a1a; border-color: var(--border); }
    body.dark .file-picker-row:not(:disabled):hover { background: #222222; }
  </style>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>
  <!-- Top bar -->
  <div class="file-strip" id="file-strip">
    <div class="file-strip-files" id="file-strip-files"></div>
    <div class="file-strip-brand">Inbox</div>
    <div class="file-strip-actions">
      <button id="settings-btn" class="top-bar-btn" type="button" aria-label="Settings">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82L4.21 7.2a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33h0A1.65 1.65 0 0 0 9.93 3.1V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h0a1.65 1.65 0 0 0 1.82-.33l-.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v0A1.65 1.65 0 0 0 20.9 9H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
      </button>
      <button id="drive-status-indicator" class="top-bar-btn top-bar-status" type="button" aria-label="Drive disconnected" title="Drive disconnected"></button>
      <span id="drive-status-live" class="sr-only" aria-live="polite" aria-atomic="true">Drive disconnected</span>
    </div>
  </div>

  <!-- Tabs -->
  <div class="tabs"><div class="tabs-inner" id="tabs-container" role="tablist"></div></div>

  <!-- Main content -->
  <div class="main">
    <div id="items-container" class="items"></div>
  </div>

  <!-- Bottom bar -->
  <div class="bottom-bar">
    <div class="add-row">
      <input type="text" id="add-input" placeholder="Add item to current list...">
      <button id="add-btn">Add</button>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal" id="list-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="list-modal-title">
      <div class="modal-header">
        <h3 id="list-modal-title">inbox.list</h3>
        <button class="header-btn" id="modal-close-btn">Close</button>
      </div>
      <textarea id="list-textarea" readonly></textarea>
      <div class="modal-footer">
        <button class="header-btn" id="modal-copy-btn">Copy</button>
        <button id="done-btn" class="header-btn">Done</button>
      </div>
    </div>
  </div>

  <!-- File picker modal -->
  <div class="modal" id="file-picker-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="file-picker-title">
      <div class="modal-header">
        <h3 id="file-picker-title">Drive Files</h3>
        <button class="header-btn" id="file-picker-close-btn">Close</button>
      </div>
      <div id="file-picker-list"></div>
    </div>
  </div>

  <!-- Settings modal -->
  <div class="modal" id="settings-modal">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="settings-modal-title">
      <div class="modal-header">
        <h3 id="settings-modal-title">Settings</h3>
        <button class="header-btn" id="settings-close-btn">Close</button>
      </div>
      <div class="settings-panel">
        <section class="settings-block">
          <div class="settings-block-label">Appearance</div>
          <button type="button" id="settings-theme-btn" class="settings-theme-btn" aria-label="Switch to dark mode">
            <svg class="theme-icon-moon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
            <svg class="theme-icon-sun" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>
          </button>
